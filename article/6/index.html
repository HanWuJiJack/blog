 $event.target.value)"\n  /&gt;\n&lt;/template&gt;\n</code></pre><h3 style="text-align: left; line-height: 1.5;">多个 v-model 绑定</h3><p style="text-align: left;">利用刚才在 v-model 参数小节中学到的技巧，我们可以在一个组件上创建多个 v-model 双向绑定，每一个 v-model 都会同步不同的 prop：</p><pre style="text-align: left;"><code class="language-html" style="text-align: left; line-height: 1.5;">&lt;UserName\n  v-model:first-name="first"\n  v-model:last-name="last"\n/&gt;\n&lt;script&gt;\nexport default {\n  props: {\n    firstName: String,\n    lastName: String\n  },\n  emits: [\'update:firstName\', \'update:lastName\']\n}\n&lt;/script&gt;\n\n&lt;template&gt;\n  &lt;input\n    type="text"\n    :value="firstName"\n    @input="$emit(\'update:firstName\', $event.target.value)"\n  /&gt;\n  &lt;input\n    type="text"\n    :value="lastName"\n    @input="$emit(\'update:lastName\', $event.target.value)"\n  /&gt;\n&lt;/template&gt;\n</code></pre><h3 style="text-align: left; line-height: 1.5;">自定义v-model 的修饰符</h3><p style="text-align: left;">在学习输入绑定时，我们知道了 v-model 有一些内置的修饰符，例如 .trim，.number 和 .lazy。在某些场景下，你可能想要一个自定义组件的 v-model 支持自定义的修饰符。</p><p style="text-align: left;">我们来创建一个自定义的修饰符 capitalize，它会自动将 v-model 绑定输入的字符串值第一个字母转为大写：</p><pre style="text-align: left;"><code class="language-html" style="text-align: left; line-height: 1.5;">&lt;MyComponent v-model.capitalize="myText" /&gt;\n</code></pre><p style="text-align: left;">组件的 v-model 上所添加的修饰符，可以通过 modelModifiers prop 在组件内访问到。在下面的组件中，我们声明了 modelModifiers 这个 prop，它的默认值是一个空对象：</p><pre style="text-align: left;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">&lt;script&gt;\nexport default {\n  props: {\n    modelValue: String,\n    modelModifiers: {\n      default: () =&gt; ({})\n    }\n  },\n  emits: [\'update:modelValue\'],\n  created() {\n    console.log(this.modelModifiers) // { capitalize: true }\n  }\n}\n&lt;/script&gt;\n\n&lt;template&gt;\n  &lt;input\n    type="text"\n    :value="modelValue"\n    @input="$emit(\'update:modelValue\', $event.target.value)"\n  /&gt;\n&lt;/template&gt;\n</code></pre><p style="text-align: left;">注意这里组件的 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>modelModifiers</code></span> prop 包含了 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>capitalize</code></span>且其值为 true，因为它在模板中的 v-model 绑定上被使用了。</p><p style="text-align: left;">有了 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>modelModifiers</code></span>这个 prop，我们就可以在原生事件侦听函数中检查它的值，然后决定触发的自定义事件中要向父组件传递什么值。在下面的代码里，我们就是在每次 &nbsp;元素触发 input 事件时将值的首字母大写：</p><pre style="text-align: left;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">&lt;script&gt;\nexport default {\n  props: {\n    modelValue: String,\n    modelModifiers: {\n      default: () =&gt; ({})\n    }\n  },\n  emits: [\'update:modelValue\'],\n  methods: {\n    emitValue(e) {\n      let value = e.target.value\n      if (this.modelModifiers.capitalize) {\n        value = value.charAt(0).toUpperCase() + value.slice(1)\n      }\n      this.$emit(\'update:modelValue\', value)\n    }\n  }\n}\n&lt;/script&gt;\n\n&lt;template&gt;\n  &lt;input type="text" :value="modelValue" @input="emitValue" /&gt;\n&lt;/template&gt;\n</code></pre><p style="text-align: left;">对于又有参数又有修饰符的 v-model 绑定，生成的 prop 名将是 arg + "Modifiers"。举例来说：</p><pre style="text-align: left;"><code class="language-html" style="text-align: left; line-height: 1.5;">&lt;MyComponent v-model:title.capitalize="myText"&gt;\n</code></pre><p style="text-align: left;">相应的声明应该是：</p><pre style="text-align: left;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">export default {\n  props: [\'title\', \'titleModifiers\'],\n  emits: [\'update:title\'],\n  created() {\n    console.log(this.titleModifiers) // { capitalize: true }\n  }\n}\n\n</code></pre><p><br></p><p><br></p><p><br></p><p><br></p><p><br></p><p><br></p>',__v:0,updateByUser:7},{state:1,createTime:e,updateTime:"2024-01-09T03:37:10.544Z",_id:"659bb28bc58a6f24f80b8b57",id:23,createByUser:7,name:"[vue]11-彻底搞懂 JS 异步编程",__v:0,html:'<h1 style="text-align: center;">JS 异步编程六种方案</h1><h2>前言</h2><p>我们知道Javascript语言的执行环境是"单线程"。也就是指一次只能完成一件任务。如果有多个任务，就必须排队，前面一个任务完成，再执行后面一个任务。</p><p>这种模式虽然实现起来比较简单，执行环境相对单纯，但是只要有一个任务耗时很长，后面的任务都必须排队等着，会拖延整个程序的执行。常见的浏览器无响应（假死），往往就是因为某一段Javascript代码长时间运行（比如死循环），导致整个页面卡在这个地方，其他任务无法执行。</p><p>为了解决这个问题，Javascript语言将任务的执行模式分成两种：同步和异步。本文主要介绍异步编程几种办法，并通过比较，得到最佳异步编程的解决方案！</p><p><strong>想阅读更多优质文章请猛戳GitHub博客</strong></p><h2>一、同步与异步</h2><p>我们可以通俗理解为异步就是一个任务分成两段，先执行第一段，然后转而执行其他任务，等做好了准备，再回过头执行第二段。排在异步任务后面的代码，不用等待异步任务结束会马上运行，也就是说，<strong>异步任务不具有”堵塞“效应</strong>。比如，有一个任务是读取文件进行处理，异步的执行过程就是下面这样</p><p><img src="https://hanwujijack.github.io/blog/44.png" alt="https://hanwujijack.github.io/blog/44.png" data-href="https://hanwujijack.github.io/blog/44.png" style=""/></p><p><br></p><p><br></p><p>这种不连续的执行，就叫做异步。相应地，连续的执行，就叫做同步</p><p><img src="https://hanwujijack.github.io/blog/45.png" alt="https://hanwujijack.github.io/blog/45.png" data-href="https://hanwujijack.github.io/blog/45.png" style=""/></p><p><br></p><p><br></p><p>"异步模式"非常重要。在浏览器端，耗时很长的操作都应该异步执行，避免浏览器失去响应，最好的例子就是Ajax操作。在服务器端，"异步模式"甚至是唯一的模式，因为执行环境是单线程的，如果允许同步执行所有http请求，服务器性能会急剧下降，很快就会失去响应。接下来介绍下异步编程六种方法。</p><h2>二、回调函数（Callback）</h2><p>回调函数是异步操作最基本的方法。以下代码就是一个回调函数的例子：</p><pre><code class="language-javascript">ajax(url, () =&gt; {\n    // 处理逻辑\n})\n</code></pre><p>但是回调函数有一个致命的弱点，就是容易写出<strong>回调地狱（Callback hell）</strong>。假设多个请求存在依赖性，你可能就会写出如下代码：</p><pre><code class="language-javascript">ajax(url, () =&gt; {\n    // 处理逻辑\n    ajax(url1, () =&gt; {\n        // 处理逻辑\n        ajax(url2, () =&gt; {\n            // 处理逻辑\n        })\n    })\n})\n</code></pre><p>回调函数的优点是简单、容易理解和实现，缺点是不利于代码的阅读和维护，各个部分之间高度耦合，使得程序结构混乱、流程难以追踪（尤其是多个回调函数嵌套的情况），而且每个任务只能指定一个回调函数。此外它不能使用 try catch 捕获错误，不能直接 return。</p><h2>三、事件监听</h2><p>这种方式下，<strong>异步任务的执行不取决于代码的顺序，而取决于某个事件是否发生</strong>。</p><p>下面是两个函数f1和f2，编程的意图是f2必须等到f1执行完成，才能执行。首先，为f1绑定一个事件（这里采用的jQuery的写法）</p><pre><code class="language-javascript">f1.on(\'done\', f2);\n</code></pre><p>上面这行代码的意思是，当f1发生done事件，就执行f2。然后，对f1进行改写：</p><pre><code class="language-javascript">function f1() {\n  setTimeout(function () {\n    // ...\n    f1.trigger(\'done\');\n  }, 1000);\n}\n</code></pre><p>上面代码中，f1.trigger(\'done\')表示，执行完成后，立即触发done事件，从而开始执行f2。</p><p>这种方法的优点是比较容易理解，可以绑定多个事件，每个事件可以指定多个回调函数，而且可以"去耦合"，有利于实现模块化。缺点是整个程序都要变成事件驱动型，运行流程会变得很不清晰。阅读代码的时候，很难看出主流程。</p><h2>四、发布订阅</h2><p>我们假定，存在一个"信号中心"，某个任务执行完成，就向信号中心"发布"（publish）一个信号，其他任务可以向信号中心"订阅"（subscribe）这个信号，从而知道什么时候自己可以开始执行。这就叫做"发布/订阅模式"（publish-subscribe pattern），又称"观察者模式"（observer pattern）。</p><p>首先，f2向信号中心jQuery订阅done信号。</p><pre><code class="language-hljs bash code">jQuery.subscribe(\'done\', f2);\n</code></pre><p>然后，f1进行如下改写：</p><pre><code class="language-hljs bash code">function f1() {\n  setTimeout(function () {\n    // ...\n    jQuery.publish(\'done\');\n  }, 1000);\n}\n</code></pre><p>上面代码中，jQuery.publish(\'done\')的意思是，f1执行完成后，向信号中心jQuery发布done信号，从而引发f2的执行。 f2完成执行后，可以取消订阅（unsubscribe）</p><pre><code class="language-hljs bash code">jQuery.unsubscribe(\'done\', f2);\n</code></pre><p>这种方法的性质与“事件监听”类似，但是明显优于后者。因为可以通过查看“消息中心”，了解存在多少信号、每个信号有多少订阅者，从而监控程序的运行。</p><h2>五、Promise/A+</h2><p>Promise本意是承诺，在程序中的意思就是承诺我过一段时间后会给你一个结果。 什么时候会用到过一段时间？答案是异步操作，异步是指可能比较长时间才有结果的才做，例如网络请求、读取本地文件等</p><h3>1.Promise的三种状态</h3><ul><li>Pending----Promise对象实例创建时候的初始状态</li><li>Fulfilled----可以理解为成功的状态</li><li>Rejected----可以理解为失败的状态</li></ul><p><img src="https://hanwujijack.github.io/blog/46.png" alt="https://hanwujijack.github.io/blog/46.png" data-href="https://hanwujijack.github.io/blog/46.png" style=""/></p><p><br></p><p><br></p><p><strong>这个承诺一旦从等待状态变成为其他状态就永远不能更改状态了</strong>，比如说一旦状态变为 resolved 后，就不能再次改变为Fulfilled</p><pre><code class="language-javascript">let p = new Promise((resolve, reject) =&gt; {\n  reject(\'reject\')\n  resolve(\'success\')//无效代码不会执行\n})\np.then(\n  value =&gt; {\n    console.log(value)\n  },\n  reason =&gt; {\n    console.log(reason)//reject\n  }\n)\n</code></pre><p>当我们在构造 Promise 的时候，构造函数内部的代码是立即执行的</p><pre><code class="language-javascript">new Promise((resolve, reject) =&gt; {\n  console.log(\'new Promise\')\n  resolve(\'success\')\n})\nconsole.log(\'end\')\n// new Promise =&gt; end\n</code></pre><h3>2.promise的链式调用</h3><ul><li>每次调用返回的都是一个新的Promise实例(这就是then可用链式调用的原因)</li><li>如果then中返回的是一个结果的话会把这个结果传递下一次then中的成功回调</li><li>如果then中出现异常,会走下一个then的失败回调</li><li>在 then中使用了return，那么 return 的值会被Promise.resolve() 包装(见例1，2)</li><li>then中可以不传递参数，如果不传递会透到下一个then中(见例3)</li><li>catch 会捕获到没有捕获的异常</li></ul><p>接下来我们看几个例子：</p><pre><code class="language-javascript">  // 例1\n  Promise.resolve(1)\n  .then(res =&gt; {\n    console.log(res)\n    return 2 //包装成 Promise.resolve(2)\n  })\n  .catch(err =&gt; 3)\n  .then(res =&gt; console.log(res))\n</code></pre><pre><code class="language-javascript">// 例2\nPromise.resolve(1)\n  .then(x =&gt; x + 1)\n  .then(x =&gt; {\n    throw new Error(\'My Error\')\n  })\n  .catch(() =&gt; 1)\n  .then(x =&gt; x + 1)\n  .then(x =&gt; console.log(x)) //2\n  .catch(console.error)\n</code></pre><pre><code class="language-javascript">// 例3\nlet fs = require(\'fs\')\nfunction read(url) {\n  return new Promise((resolve, reject) =&gt; {\n    fs.readFile(url, \'utf8\', (err, data) =&gt; {\n      if (err) reject(err)\n      resolve(data)\n    })\n  })\n}\nread(\'./name.txt\')\n  .then(function(data) {\n    throw new Error() //then中出现异常,会走下一个then的失败回调\n  }) //由于下一个then没有失败回调，就会继续往下找，如果都没有，就会被catch捕获到\n  .then(function(data) {\n    console.log(\'data\')\n  })\n  .then()\n  .then(null, function(err) {\n    console.log(\'then\', err)// then error\n  })\n  .catch(function(err) {\n    console.log(\'error\')\n  })\n</code></pre><p>Promise不仅能够捕获错误，而且也很好地解决了回调地狱的问题，可以把之前的回调地狱例子改写为如下代码：</p><pre><code class="language-javascript">ajax(url)\n  .then(res =&gt; {\n      console.log(res)\n      return ajax(url1)\n  }).then(res =&gt; {\n      console.log(res)\n      return ajax(url2)\n  }).then(res =&gt; console.log(res))\n</code></pre><p>它也是存在一些缺点的，比如无法取消 Promise，错误需要通过回调函数捕获。</p><h2>六、生成器Generators/ yield</h2><p>Generator 函数是 ES6 提供的一种异步编程解决方案，语法行为与传统函数完全不同，Generator 最大的特点就是可以控制函数的执行。</p><ul><li>语法上，首先可以把它理解成，Generator 函数是一个状态机，封装了多个内部状态。</li><li><strong>Generator 函数除了状态机，还是一个遍历器对象生成函数</strong>。</li><li><strong>可暂停函数, yield可暂停，next方法可启动，每次返回的是yield后的表达式结果</strong>。</li><li>yield表达式本身没有返回值，或者说总是返回undefined。<strong>next方法可以带一个参数，该参数就会被当作上一个yield表达式的返回值</strong>。</li></ul><p>我们先来看个例子：</p><pre><code class="language-javascript">function *foo(x) {\n  let y = 2 * (yield (x + 1))\n  let z = yield (y / 3)\n  return (x + y + z)\n}\nlet it = foo(5)\nconsole.log(it.next())   // =&gt; {value: 6, done: false}\nconsole.log(it.next(12)) // =&gt; {value: 8, done: false}\nconsole.log(it.next(13)) // =&gt; {value: 42, done: true}\n</code></pre><p>可能结果跟你想象不一致，接下来我们逐行代码分析：</p><ul><li>首先 Generator 函数调用和普通函数不同，它会返回一个迭代器</li><li>当执行第一次 next 时，传参会被忽略，并且函数暂停在 yield (x + 1) 处，所以返回 5 + 1 = 6</li><li>当执行第二次 next 时，传入的参数12就会被当作上一个yield表达式的返回值，如果你不传参，yield 永远返回 undefined。此时 let y = 2 * 12，所以第二个 yield 等于 2 * 12 / 3 = 8</li><li>当执行第三次 next 时，传入的参数13就会被当作上一个yield表达式的返回值，所以 z = 13, x = 5, y = 24，相加等于 42</li></ul><p>我们再来看个例子：有三个本地文件，分别1.txt,2.txt和3.txt，内容都只有一句话，下一个请求依赖上一个请求的结果，想通过Generator函数依次调用三个文件</p><pre><code class="language-javascript">//1.txt文件\n2.txt\n</code></pre><pre><code class="language-javascript">//2.txt文件\n3.txt\n</code></pre><pre><code class="language-javascript">//3.txt文件\n结束\n</code></pre><pre><code class="language-javascript">let fs = require(\'fs\')\nfunction read(file) {\n  return new Promise(function(resolve, reject) {\n    fs.readFile(file, \'utf8\', function(err, data) {\n      if (err) reject(err)\n      resolve(data)\n    })\n  })\n}\nfunction* r() {\n  let r1 = yield read(\'./1.txt\')\n  let r2 = yield read(r1)\n  let r3 = yield read(r2)\n  console.log(r1)\n  console.log(r2)\n  console.log(r3)\n}\nlet it = r()\nlet { value, done } = it.next()\nvalue.then(function(data) { // value是个promise\n  console.log(data) //data=&gt;2.txt\n  let { value, done } = it.next(data)\n  value.then(function(data) {\n    console.log(data) //data=&gt;3.txt\n    let { value, done } = it.next(data)\n    value.then(function(data) {\n      console.log(data) //data=&gt;结束\n    })\n  })\n})\n// 2.txt=&gt;3.txt=&gt;结束\n</code></pre><p>从上例中我们看出手动迭代<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Generator</code></span> 函数很麻烦，实现逻辑有点绕，而实际开发一般会配合 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>co</code></span> 库去使用。<code><strong>co是一个为Node.js和浏览器打造的基于生成器的流程控制工具，借助于Promise，你可以使用更加优雅的方式编写非阻塞代码</strong></code>。</p><p>安装<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>co</code></span>库只需：<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>npm install co</code></span></p><p>上面例子只需两句话就可以轻松实现</p><pre><code class="language-javascript">function* r() {\n  let r1 = yield read(\'./1.txt\')\n  let r2 = yield read(r1)\n  let r3 = yield read(r2)\n  console.log(r1)\n  console.log(r2)\n  console.log(r3)\n}\nlet co = require(\'co\')\nco(r()).then(function(data) {\n  console.log(data)\n})\n// 2.txt=&gt;3.txt=&gt;结束=&gt;undefined\n</code></pre><p>我们可以通过 Generator 函数解决回调地狱的问题，可以把之前的回调地狱例子改写为如下代码：</p><pre><code class="language-javascript">function *fetch() {\n    yield ajax(url, () =&gt; {})\n    yield ajax(url1, () =&gt; {})\n    yield ajax(url2, () =&gt; {})\n}\nlet it = fetch()\nlet result1 = it.next()\nlet result2 = it.next()\nlet result3 = it.next()\n</code></pre><h2>七、async/await</h2><h3>1.Async/Await简介</h3><p>使用async/await，你可以轻松地达成之前使用生成器和co函数所做到的工作,它有如下特点：</p><ul><li>async/await是基于Promise实现的，它不能用于普通的回调函数。</li><li>async/await与Promise一样，是非阻塞的。</li><li>async/await使得异步代码看起来像同步代码，这正是它的魔力所在。</li></ul><p><strong>一个函数如果加上 async ，那么该函数就会返回一个 Promise</strong></p><pre><code class="language-javascript">async function async1() {\n  return "1"\n}\nconsole.log(async1()) // -&gt; Promise {&lt;resolved&gt;: "1"}\n</code></pre><p>Generator函数依次调用三个文件那个例子用async/await写法，只需几句话便可实现</p><pre><code class="language-javascript">let fs = require(\'fs\')\nfunction read(file) {\n  return new Promise(function(resolve, reject) {\n    fs.readFile(file, \'utf8\', function(err, data) {\n      if (err) reject(err)\n      resolve(data)\n    })\n  })\n}\nasync function readResult(params) {\n  try {\n    let p1 = await read(params, \'utf8\')//await后面跟的是一个Promise实例\n    let p2 = await read(p1, \'utf8\')\n    let p3 = await read(p2, \'utf8\')\n    console.log(\'p1\', p1)\n    console.log(\'p2\', p2)\n    console.log(\'p3\', p3)\n    return p3\n  } catch (error) {\n    console.log(error)\n  }\n}\nreadResult(\'1.txt\').then( // async函数返回的也是个promise\n  data =&gt; {\n    console.log(data)\n  },\n  err =&gt; console.log(err)\n)\n// p1 2.txt\n// p2 3.txt\n// p3 结束\n// 结束\n</code></pre><h3>2.Async/Await并发请求</h3><p>如果请求两个文件，毫无关系，可以通过并发请求</p><pre><code class="language-javascript">let fs = require(\'fs\')\nfunction read(file) {\n  return new Promise(function(resolve, reject) {\n    fs.readFile(file, \'utf8\', function(err, data) {\n      if (err) reject(err)\n      resolve(data)\n    })\n  })\n}\nfunction readAll() {\n  read1()\n  read2()//这个函数同步执行\n}\nasync function read1() {\n  let r = await read(\'1.txt\',\'utf8\')\n  console.log(r)\n}\nasync function read2() {\n  let r = await read(\'2.txt\',\'utf8\')\n  console.log(r)\n}\nreadAll() // 2.txt 3.txt\n</code></pre><h2>八、总结</h2><p><strong>1.JS 异步编程进化史：callback -&gt; promise -&gt; generator -&gt; async + await</strong></p><p><strong>2.async/await 函数的实现，就是将 Generator 函数和自动执行器，包装在一个函数里。</strong></p><p><strong>3.async/await可以说是异步终极解决方案了。</strong></p><p><strong>(1) async/await函数相对于Promise，优势体现在</strong>：</p><ul><li>处理 then 的调用链，能够更清晰准确的写出代码</li><li>并且也能优雅地解决回调地狱问题。</li></ul><p>当然async/await函数也存在一些缺点，因为 await 将异步代码改造成了同步代码，如果多个异步代码没有依赖性却使用了 await 会导致性能上的降低，代码没有依赖性的话，完全可以使用 Promise.all 的方式。</p><p><strong>(2) async/await函数对 Generator 函数的改进，体现在以下三点</strong>：</p><ul><li>内置执行器。 Generator 函数的执行必须靠执行器，所以才有了 co 函数库，而 async 函数自带执行器。也就是说，async 函数的执行，与普通函数一模一样，只要一行。</li><li>更广的适用性。 co 函数库约定，yield 命令后面只能是 Thunk 函数或 Promise 对象，而 async 函数的 await 命令后面，可以跟 Promise 对象和原始类型的值（数值、字符串和布尔值，但这时等同于同步操作）。</li><li>更好的语义。 async 和 await，比起星号和 yield，语义更清楚了。async 表示函数里有异步操作，await 表示紧跟在后面的表达式需要等待结果。</li></ul>',updateByUser:7},{state:1,createTime:e,updateTime:"2024-01-09T03:37:28.630Z",_id:"659bb268c58a6f24f80b8b4e",id:22,createByUser:7,name:"[vue]10-Mint UI 使用",__v:0,updateByUser:7,html:'<h1 style="text-align: center;">Vue项目mint-ui引入方式（完整引入、按需引入）</h1><blockquote>一、使用 vue-cli<br>二、引入 Mint UI<br>1、完整引入<br>2、按需引入<br>三、开始使用<br></blockquote><h2 style="line-height: 1.5;">一、使用 vue-cli</h2><pre><code class="language-c">npm install -g vue-cli\nvue init webpack projectname</code></pre><h2 style="line-height: 1.5;">二、引入 Mint UI</h2><p>你可以引入整个 Mint UI，或是根据需要仅引入部分组件。我们先介绍如何引入完整的 Mint UI。</p><h2 style="line-height: 1.5;">1、完整引入</h2><p>（1）、安装mint-ui：</p><pre><code class="language-c">npm intall mint-ui  --save</code></pre><p>（2）、 main.js 中引入：</p><pre><code class="language-c">import MintUI from \'mint-ui\'\nimport \'mint-ui/lib/style.css\'\nVue.use(MintUI)</code></pre><p>以上代码便完成了 Mint UI 的引入。需要注意的是，样式文件需要单独引入。</p><p>（3）、调用：</p><p>如：顶部导航</p><pre><code class="language-c">&lt;mt-header fixed title="固定在顶部"&gt;&lt;/mt-header&gt;</code></pre><h2 style="line-height: 1.5;">2、按需引入</h2><p>（1）、安装mint-ui：</p><pre><code class="language-c">npm intall mint-ui  --save</code></pre><p>（2）、安装 babel-plugin-component：</p><pre><code class="language-c">npm install babel-plugin-component -D</code></pre><p>注：借助 babel-plugin-component，我们可以只引入需要的组件，以达到减小项目体积的目的。</p><p>（3）、修改.babelrc：</p><pre><code class="language-c">"plugins": [["component", [\n{\n"libraryName": "mint-ui",\n"style": true\n}\n]]]</code></pre><p>（4）、 main.js 中引入：</p><p>如：顶部导航</p><pre><code class="language-c">// 按需导入 Mint-UI 中的组件\nimport { Header } from \'mint-ui\'\nVue.component(Header.name, Header)</code></pre><p>（5）、 调用：</p><p>如：顶部导航</p><p><br></p><pre><code class="language-c">&lt;mt-header fixed title="固定在顶部"&gt;&lt;/mt-header&gt;</code></pre><h2 style="line-height: 1.5;">三、开始使用</h2><p>至此，一个基于 Vue 和 Mint UI 的开发环境已经搭建完毕，现在就可以编写代码了。</p><p>启动开发模式：</p><pre><code class="language-c">npm run dev</code></pre><p>编译：</p><pre><code class="language-c">npm run build</code></pre><p><br></p>'},{state:1,createTime:e,updateTime:"2024-01-09T03:37:44.636Z",_id:"659bb248c58a6f24f80b8b45",id:21,createByUser:7,name:"[vue]09-网络请求",__v:0,updateByUser:7,html:"<h1 style=\"text-align: center;\">vue 中网络请求 axios 的使用和封装</h1><h1>介绍</h1><p>Axios，是一个基于 promise()的网络请求库，作用于 node.js 和浏览器中，它是 isomorphic 的(即同一套代码可以运行在浏览器和 node.js 中)。在服务端它使用原生 node.js http 模块, 而在客户端 (浏览端) 则使用 XMLHttpRequest。</p><h1>选择什么网络模块</h1><p>Vue 中发送网络请求的方式有很多种：</p><p><br></p><p>一、ajax</p><p><br></p><pre><code >缺点：配置和调用方式非常混乱，不完善</code></pre><p><br></p><p>二、jQuery-ajax</p><p><br></p><pre><code >缺点：在vue的整个开发中都不需要用到jquery，jquery的代码1w+行，vue的代码也才1w+行</code></pre><p><br></p><p>三、vue-resource</p><p><br></p><pre><code >缺点：不再继续更新和维护了</code></pre><p>四、axios</p><p><br></p><pre><code >优点：vue作者（尤雨溪）推荐，可以在浏览器中发送XML请求，node.js中发送http请求，支持PromiseAPI，拦截请求和响应等等</code></pre><h1>axios 请求方式</h1><p>axios 支持多种请求方式：</p><p><br></p><ol><li>axios(config)</li><li>axios.request(config)</li><li>axios.get(url[,config])</li><li>axios.delete(url[,config])</li><li>axios.head(url[,config])</li><li>axios.post(url[,data[,config]])</li><li>axios.put(url[,data[,config]])</li><li>axios.patch(url[,data[,config]])</li></ol><h1>axios 的基本使用</h1><p>安装<span style=\"background-color: rgb(241, 243, 245);\"><code>npm install axios --save</code></span><br></p><p><br></p><p>main.js 导入<span style=\"background-color: rgb(241, 243, 245);\"><code>import axios from 'axios'</code></span><br></p><p><br></p><p>axios 使用方法 1:</p><p><br></p><pre><code class=\"language-javascript\">axios({\n    url: 'https://lianghj.top:3000/song/url?id=1989103128',//请求地址,?后面跟query参数    \n    method: 'get'//请求方式，不写默认get请求方式\n}).then(res =&gt; {\n    console.log(res)//打印请求数据\n})</code></pre><p><br></p><p>axios 使用方法 1:</p><p><br></p><pre><code class=\"language-javascript\">axios.get({\n    url: 'https://lianghj.top:3000/song/url?id=1989103128',//请求地址,?后面跟query参数\n}).then(res =&gt; {\n    console.log(res)//打印请求数据\n})</code></pre><p><br></p><h1>axios 发送多个并发请求</h1><p>axios.all 用于发送多个并发请求，返回的结果为一个数组，存放每一个请求的数据</p><p><br></p><pre><code class=\"language-javascript\">axios.all([\n    axios({ url: 'https://lianghj.top:3000/song/url?id=1989103128', }),\n    axios({ url: 'https://lianghj.top:3000/song/url?id=1989103128', })])\n    .then(res =&gt; { console.log(res) })</code></pre><h1>axios 全局配置</h1><p>在开发过程中，很多参数都是固定的，上面的请求示例中可以看得出<span style=\"background-color: rgb(241, 243, 245);\"><code>https://lianghj.top</code></span>这个是固定的，后面接请求的地址，我们可以将一些公共的进行抽取，也可以利用 axios 的全局配置</p><p><br></p><pre><code class=\"language-javascript\">axios.defaults.baseURL = 'https://lianghj.top' //公共地址\naxios.defaults.headers.post['Content-Type'] = 'application/x-www-form-urlencoded' //请求头\ntimeout: 5000//超时时间</code></pre><p><br></p><p>axios 的全局配置可以带来很大方便，到时候封装的时候就不用每次请求都带 baseURL,timeout 这些参数了，或者 baseURL 更改了只要修改一条就行了不用每个请求都去作出修改</p><h1>axios 封装</h1><p>如果不对 axios 进行封装那么一旦请求多了代码会变得繁琐，例如一个页面有 50 个请求，每次都<span style=\"background-color: rgb(241, 243, 245);\"><code>axios({url:'https://lianghj.top/xxxxxxxxxxxx'})</code></span>,一旦 &nbsp;<span style=\"background-color: rgb(241, 243, 245);\"><code>https://lianghj.top </code></span>这个服务器名字换了，那 50 个请求都要一个一个去改，这在开发中是不好的，所以我们要去封装起来，哪怕服务器名字换了我们只要修改一次就行了</p><p><br></p><p>创建一个 js 文件</p><p><br></p><pre><code class=\"language-javascript\">export function request(config, success, fail) {\n    return new Promise((resolve, reject) =&gt; {\n        const instance = axios.create({//创建axios实例\n            baseURL: 'xxxxxxxxxxxx',\n            timeout: 5000\n        })\n        instance(config).then(res =&gt; { resolve(res) })\n            .catch(err =&gt; { reject(err) })\n    })\n\n}\n//调用import {request} from '封装好的axios模块路径'\nrequesr({ url: '/song/url?id=1989103128' })\n.then(res =&gt; { console.log(res) })\n.catch(err =&gt; { console.log(err) })</code></pre><h1>axios 拦截器</h1><p>axios 拦截器是什么，对于某些请求我们想要进行一个拦截，用于拼接一些东西或者判断有没有携带一些东西之类的，这时候就用到的 axios 的拦截器进行对应的处理</p><p><br></p><p>如何使用拦截器?</p><p><br></p><pre><code >//配置请求拦截和响应拦截</code><code class=\"language-javascript\">axios.interceptors.request\n    .use(config =&gt; {\n        console.log('请求拦截成功')    //例如每次请求之前都要携带token，保证拥有获取数据的权限    \n        config.headers.Authorization = window.sessionStorage.getItem('token')\n        return config\n    },\n        err =&gt; {\n            console.log('请求拦截失败')\n            return err\n        })\naxios.interceptors.response\n    .use(response =&gt; {\n        console.log('响应拦截成功')\n        return response.data\n    },\n        err =&gt; {\n            console.log('响应拦截失败')\n            return err\n        })</code></pre><p><br></p><p>怎么将拦截器添加到刚刚封装好的 js 文件?</p><p><br></p><pre><code class=\"language-javascript\">export function request(config, success, fail) {\n    const instance = axios.create({//创建axios实例        \n        baseURL: 'xxxxxxxxxxxx',\n        timeout: 5000\n    })\n    //请求拦截    \n    instance.interceptors.request.use(config =&gt; {\n        console.log('请求拦截成功')\n        return config\n    },\n        err =&gt; {\n            console.log('请求拦截失败')\n            return err\n        })\n    //响应拦截    \n    instance.interceptors.response.use(response =&gt; {\n        console.log('响应拦截成功')\n        return response.data\n    }, err =&gt; {\n        console.log('响应拦截失败')\n        return err\n    })    //发送真正的网络请求  \n    return instance(config)\n}\n</code></pre><p style=\"line-height: 1;\"><br></p>"},{state:1,createTime:e,updateTime:"2024-01-09T02:26:56.972Z",_id:"659bb232c58a6f24f80b8b3c",id:20,createByUser:7,name:"[vue]08-Demo",__v:0,updateByUser:7,html:"<h3>动态权限</h3><p>permission.js</p><pre><code >import router from './router'\nimport store from './store'\nimport {\n  Message\n} from 'element-ui'\nimport NProgress from 'nprogress'\nimport 'nprogress/nprogress.css'\nimport {\n  getToken\n} from '@/utils/auth'\nimport {\n  asyncloadJS\n} from '@/utils/loadJS.js'\nNProgress.configure({\n  showSpinner: false\n})\n\nconst whiteList = ['/login', '/auth-redirect', '/bind', '/register']\n// 面包屑黑名单\nconst navBlackList = ['Index', 'Projects/sign/detail/:id', 'Engineering/sign/check-point/:id', 'Engineering/sign/detection-package/:id', 'Projects/sign/detail']\n\nrouter.beforeEach((to, from, next) =&gt; {\n  NProgress.start()\n  if (getToken()) {\n    to.meta.title && store.dispatch('settings/setTitle', to.meta.title)\n    /* has token*/\n    if (to.path === '/login') {\n      next({\n        path: '/'\n      })\n      NProgress.done()\n    } else {\n      if (store.getters.roles.length === 0) {\n        // 判断当前用户是否已拉取完user_info信息\n        store.dispatch('GetInfo').then(() =&gt; {\n          store.dispatch('GenerateRoutes').then(accessRoutes =&gt; {\n            // 根据roles权限生成可访问的路由表\n            router.addRoutes(accessRoutes) // 动态添加可访问路由表\n            next({\n              ...to,\n              replace: true\n            }) // hack方法 确保addRoutes已完成\n          })\n        }).catch(err =&gt; {\n          store.dispatch('LogOut').then(() =&gt; {\n            Message.error(err)\n            next({\n              path: '/'\n            })\n          })\n        })\n      } else if (to.matched[1] && \"/full/fileEditor/:id\" === to.matched[1].path) {\n        if (!document.getElementById(\"onlyoffice\")) {\n          asyncloadJS('http://180.167.43.62:18089/web-apps/apps/api/documents/api.js', undefined, \"onlyoffice\").then(() =&gt; {\n            next()\n          });\n        } else {\n          next()\n        }\n      } else {\n        if (navBlackList.indexOf(to.name) !== -1) {\n          store.dispatch(\"settings/changeSetting\", {\n            key: \"isNav\",\n            value: false,\n          });\n        } else {\n          store.dispatch(\"settings/changeSetting\", {\n            key: \"isNav\",\n            value: true,\n          });\n        }\n        next()\n      }\n    }\n  } else {\n    // 没有token\n    if (whiteList.indexOf(to.path) !== -1) {\n      // 在免登录白名单，直接进入\n      next()\n    } else {\n      // console.log(\"8888\", to)\n      // debugger;\n      // if (to.query.code) {\n      //   store.dispatch('qywxLogin', {\n      //     code: to.query.code\n      //   }).then((res) =&gt; {\n      //     // debugger;\n      //     // console.log('qywxLogin', res)\n      //     next({\n      //       path: to.fullPath || \"/\",\n      //     }) // 否则全部重定向到登录页\n      //   }).catch((err) =&gt; {\n      //     // debugger;\n      //     console.error('qywxLogin', err)\n      //     next({\n      //       path: '/login',\n      //       query: {\n      //         redirect: to.fullPath\n      //       }\n      //     }) // 否则全部重定向到登录页\n      //   })\n      // } else {\n      //   next({\n      //     path: '/login',\n      //     query: {\n      //       redirect: to.fullPath\n      //     }\n      //   }) // 否则全部重定向到登录页\n      // }\n      next({\n        path: '/login',\n        query: {\n          redirect: to.fullPath\n        }\n      }) // 否则全部重定向到登录页\n      NProgress.done()\n    }\n  }\n})\n\nrouter.afterEach(() =&gt; {\n  // document.title = '综合&检测管理'\n  NProgress.done()\n})\n</code></pre><h3>axios封装</h3><p><br></p><pre><code >import axios from 'axios'\nimport { Notification, MessageBox, Message } from 'element-ui'\nimport store from '@/store'\nimport { getToken } from '@/utils/auth'\nimport errorCode from '@/utils/errorCode'\nimport { Loading } from 'element-ui';\naxios.defaults.headers['Content-Type'] = 'application/json;charset=utf-8'\n\n\n\n// 创建axios实例\nconst service = axios.create({\n    // axios中请求配置有baseURL选项，表示请求URL公共部分\n    baseURL: `${process.env.VUE_APP_BASE_API}`,\n    // 超时\n    timeout: 5000\n})\n// request拦截器\nservice.interceptors.request.use(config =&gt; {\n    // 是否需要设置 token\n    const isToken = (config.headers || {}).isToken === false\n    if (getToken() && !isToken) {\n        config.headers['Authorization'] = 'Bearer ' + getToken() // 让每个请求携带自定义token 请根据实际情况自行修改\n    }\n    // console.log('config=&gt;', config)\n    // get请求映射params参数\n    if (config.method === 'get' && config.params) {\n        let url = config.url + '?';\n        for (const propName of Object.keys(config.params)) {\n            const value = config.params[propName];\n            var part = encodeURIComponent(propName) + \"=\";\n            if (value !== null && typeof (value) !== \"undefined\") {\n                if (typeof value === 'object') {\n                    for (const key of Object.keys(value)) {\n                        if (value[key] !== null && typeof (value[key]) !== 'undefined') {\n                            let params = propName + '[' + key + ']';\n                            let subPart = encodeURIComponent(params) + '=';\n                            url += subPart + encodeURIComponent(value[key]) + '&';\n                        }\n                    }\n                } else {\n                    url += part + encodeURIComponent(value) + \"&\";\n                }\n            }\n            config.data = JSON.stringify(config.params)\n        }\n        url = url.slice(0, -1);\n        config.params = {};\n        config.url = url;\n    }\n    // console.log('config=&gt;2', config)\n    return config\n}, error =&gt; {\n    console.log(error)\n    Promise.reject(error)\n})\n\n// 响应拦截器\nservice.interceptors.response.use(res =&gt; {\n    // 未设置状态码则默认成功状态\n    const code = res.data.code || 200;\n    // 获取错误信息\n    const message = errorCode[code] || res.data.msg || errorCode['default']\n    if (code === 401) {\n        // MessageBox.confirm('登录状态已过期，您可以继续留在该页面，或者重新登录', '系统提示', {\n        //   confirmButtonText: '重新登录',\n        //   cancelButtonText: '取消',\n        //   type: 'warning'\n        // }\n        // ).then(() =&gt; {\n\n        // }).catch(() =&gt; { });\n        store.dispatch('LogOut').then(() =&gt; {\n            location.href = '/PI/index';\n        })\n        return Promise.reject('令牌验证失败')\n    } else if (code === 500) {\n        Message({\n            message: message,\n            type: 'error'\n        })\n        return Promise.reject({message,code})\n    } else if (code !== 200) {\n        Notification.error({\n            title: message\n        })\n        return Promise.reject({message,code})\n    } else {\n        return res.data\n    }\n},\n    error =&gt; {\n        // console.log('err=&gt;' + error)\n        let { message } = error;\n        if (message == \"Network Error\") {\n            message = \"后端接口连接异常\";\n        }\n        else if (message.includes(\"timeout\")) {\n            message = \"系统接口请求超时\";\n        }\n        else if (message.includes(\"Request failed with status code\")) {\n            message = \"系统接口\" + message.substr(message.length - 3) + \"异常\";\n        }\n        Message({\n            message: message,\n            type: 'error',\n            duration: 5 * 1000\n        })\n        return Promise.reject(error)\n    }\n)\nfunction request({ method = 'get', url, data, params, headers, config = {}, autoCancel = false }) {\n    method = method.toLowerCase()\n    let loading = undefined\n    if (method === 'post') {\n        loading = Loading.service({\n            lock: true,\n            //   text: 'Loading',\n            spinner: 'el-icon-loading',\n            background: 'rgba(0, 0, 0, 0.4)'\n        });\n    }\n    if (autoCancel) {\n        if (Object.prototype.toString.call(window.cancelApiMap) !== '[object Object]') {\n            window.cancelApiMap = {}\n        }\n        let cc = window.cancelApiMap[url + method]\n        if (cc) {\n            return Promise.reject('阻止进程')\n        }\n        config.cancelToken = new axios.CancelToken((c) =&gt; {\n            window.cancelApiMap[url + method] = c\n        })\n    }\n    return new Promise((resolve, reject) =&gt; {\n        service({\n            method,\n            url,\n            data,\n            params,\n            headers,\n            ...config\n        }).then((res) =&gt; {\n            resolve(res)\n        }).catch(error =&gt; {\n            reject(error)\n        }).finally(() =&gt; {\n            if (loading) {\n                setTimeout(() =&gt; {\n                    loading.close();\n                    loading = undefined\n                }, 1500)\n            }\n            // 请求成功，删除cancel标记\n            // window.cancelApiMap[url + method] && (delete window.cancelApiMap[url + method])\n        })\n    })\n}\n\nexport default request\n</code></pre><h3>下载文件封装</h3><pre><code >import axios from 'axios'\nimport { Notification, MessageBox, Message } from 'element-ui'\nimport store from '@/store'\nimport { getToken } from '@/utils/auth'\nimport errorCode from '@/utils/errorCode'\nimport { Loading } from 'element-ui';\n\nexport default function requestDownload({ url, data}) {\n  axios({\n    method: 'get',\n    url: url,\n    params: data,\n    headers: {\n      Authentication: 'Bearer ' + getToken(),\n      Accept: 'application/json'\n    },\n    responseType: 'blob'\n  }).then(response =&gt; {\n    let data = response.data;\n    let fileReader = new FileReader();\n    fileReader.onload = function () {\n      console.log('response', response)\n      const blob = new Blob([response.data], { type: response.headers['content-type']});\n      const downloadElement = document.createElement('a');\n      const href = window.URL.createObjectURL(blob); //创建下载的链接\n      downloadElement.href = href;\n      let timestamp = new Date().getTime();\n      downloadElement.download = `${timestamp}.zip`;\n      document.body.appendChild(downloadElement);\n      downloadElement.click(); //点击下载\n      document.body.removeChild(downloadElement); //下载完成移除元素\n      window.URL.revokeObjectURL(href); //释放blob对\n    };\n    fileReader.readAsText(data)\n  }).catch((error) =&gt; {\n\n  })\n}\n</code></pre><h3>上传文件封装</h3><p><br></p><pre><code >import axios from 'axios'\nimport { Notification, MessageBox, Message } from 'element-ui'\nimport store from '@/store'\nimport { getToken } from '@/utils/auth'\nimport errorCode from '@/utils/errorCode'\n\n// axios.defaults.headers['Content-Type'] = 'application/json;charset=utf-8'\naxios.defaults.headers.post['Content-Type'] = 'multipart/form-data;'\n// 创建axios实例\nconst service = axios.create({\n    // axios中请求配置有baseURL选项，表示请求URL公共部分\n    baseURL: `${process.env.VUE_APP_BASE_API}`,\n    // 超时\n    timeout: 50000\n})\n// request拦截器\nservice.interceptors.request.use(config =&gt; {\n    // 是否需要设置 token\n    const isToken = (config.headers || {}).isToken === false\n    if (getToken() && !isToken) {\n        config.headers['Authorization'] = 'Bearer ' + getToken() // 让每个请求携带自定义token 请根据实际情况自行修改\n    }\n    // console.log('config=&gt;', config)\n    // get请求映射params参数\n    if (config.method === 'get' && config.params) {\n        let url = config.url + '?';\n        for (const propName of Object.keys(config.params)) {\n            const value = config.params[propName];\n            var part = encodeURIComponent(propName) + \"=\";\n            if (value !== null && typeof (value) !== \"undefined\") {\n                if (typeof value === 'object') {\n                    for (const key of Object.keys(value)) {\n                        if (value[key] !== null && typeof (value[key]) !== 'undefined') {\n                            let params = propName + '[' + key + ']';\n                            let subPart = encodeURIComponent(params) + '=';\n                            url += subPart + encodeURIComponent(value[key]) + '&';\n                        }\n                    }\n                } else {\n                    url += part + encodeURIComponent(value) + \"&\";\n                }\n            }\n            config.data = JSON.stringify(config.params)\n        }\n        url = url.slice(0, -1);\n        config.params = {};\n        config.url = url;\n    }\n    // console.log('config=&gt;2', config)\n    return config\n}, error =&gt; {\n    console.log(error)\n    Promise.reject(error)\n})\n\n// 响应拦截器\nservice.interceptors.response.use(res =&gt; {\n    // 未设置状态码则默认成功状态\n    const code = res.data.code || 200;\n    // 获取错误信息\n    const msg = errorCode[code] || res.data.msg || errorCode['default']\n    if (code === 401) {\n        // MessageBox.confirm('登录状态已过期，您可以继续留在该页面，或者重新登录', '系统提示', {\n        //   confirmButtonText: '重新登录',\n        //   cancelButtonText: '取消',\n        //   type: 'warning'\n        // }\n        // ).then(() =&gt; {\n        //   store.dispatch('LogOut').then(() =&gt; {\n        //     location.href = '/index';\n        //   })\n        // }).catch(() =&gt; { });\n        store.dispatch('LogOut').then(() =&gt; {\n            location.href = '/PI/index';\n        })\n        return Promise.reject('令牌验证失败')\n    } else if (code === 500) {\n        Message({\n            message: msg,\n            type: 'error'\n        })\n        return Promise.reject(new Error(msg))\n    } else if (code !== 200) {\n        Notification.error({\n            title: msg\n        })\n        return Promise.reject('error')\n    } else {\n        return res.data\n    }\n},\n    error =&gt; {\n        // console.log('err' + error)\n        let { message } = error;\n        if (message == \"Network Error\") {\n            message = \"后端接口连接异常\";\n        }\n        else if (message.includes(\"timeout\")) {\n            message = \"系统接口请求超时\";\n        }\n        else if (message.includes(\"Request failed with status code\")) {\n            message = \"系统接口\" + message.substr(message.length - 3) + \"异常\";\n        }\n        Message({\n            message: message,\n            type: 'error',\n            duration: 5 * 1000\n        })\n        return Promise.reject(error)\n    }\n)\n\nexport default service\n</code></pre><p><br></p>"},{state:1,createTime:e,updateTime:"2024-01-09T01:52:35.628Z",_id:"659bb205c58a6f24f80b8b33",id:19,createByUser:7,name:"[vue]07-路由「Vue-router」",__v:0,updateByUser:7,html:"<h1 style=\"text-align: center;\">vue路由详解</h1><h2 style=\"line-height: 1.5;\"><strong>路由发展历史</strong></h2><p>路由这个概念最先是运用在后端的，⻚⾯的跳转是通过服务器端进⾏控制的，随着 spa 前端单页应用程序的诞生，前端路由随之而出。</p><ul><li>传统的⻚⾯的跳转，是通过前端向后台发送请求；</li><li>后台通过模板引擎的渲染，将⼀个新的 html 界⾯再返回给前台；</li><li>如⻚⾯跳转时：from 表单的提交；a 标签的默认属性；js 调⽤ location.href，给其赋值; H5: history 的 go / forward / back -- // history.push / replace</li></ul><p>在 SPA（即只有⼀个 html ） 的出现后，前端可以⾃由控制组件的渲染，来模拟⻚⾯的跳转，实现前端的路由;</p><blockquote>hash 路由和 history 路由</blockquote><h3 style=\"line-height: 1.5;\"><strong>hash 路由和 history 路由的区别</strong></h3><ul><li>hash 路由 ⼀般会携带 ⼀个 # 号，不够美观； history 路由不存在这个问题；</li><li>默认 hash 路由是不会像浏览器发出请求的，主要是⼀般⽤于锚点；history 中 go / back / forward 以及浏览器的前进、后退按钮⼀般都会像服务端发起请求；-- history 的所有 url 内容，服务端都可以获取到</li><li>基于此 hash 模式，是不⽀持 SSR 的，但是 history 模式可以做 SSR</li><li>history 在部署的时候，如 nginx， 需要只渲染⾸⻚，让⾸⻚根据路径重新跳转</li><li>hash 路由的监听，一般用 hashChange 事件监听，history 路由的监听是 onPopState 方法</li></ul><p><strong>ngnix 配置</strong></p><p><br></p><pre><code class=\"language-js\">单个的服务器部署\nlocation / {\n try_files uri $uri /xxx/main/index.html\n}\n 存在代理的情况\nlocation / {\n rewrite ^ /file/index.html break; # 这⾥代表的是xxx.cdn 的资源路径\n  proxy_pass https://www.xxx.cdn.com;\n}\n</code></pre><h3 style=\"line-height: 1.5;\"><strong>总结</strong></h3><p>- 传统的后端路由是根据 url 访问相关的 controller 进⾏数据资源和模板引擎的拼接，返回前端<br>- 前端路由是通过 js 根据 url 返回对应的组件加载。<br>- 前端的路由包含两个部分：1. url 的处理 2.组件加载</p><hr/><p><br></p><h2 style=\"line-height: 1.5;\"><strong>Vue Router 简介</strong></h2><p>用 Vue + Vue Router 创建单页应用非常简单，其本质就是:建立并管理 url 和对应组件之间的映射关系，由 html 和 javascript 两部分组成的 Vue Router</p><h3 style=\"line-height: 1.5;\"><strong>HTML</strong></h3><ol><li>router-link 组件来导航,用户点击后切换到相关视图.当 &lt;router-link&gt; 对应的路由匹配成功，将自动设置 class 属性值 .router-link-active.</li><li>router-view 组件来设置切换的视图在哪里渲染.(一个页面也可以有多个 router-view 分别展示特定的视图,并且支持嵌套)</li></ol><h3 style=\"line-height: 1.5;\"><strong>JavaScript</strong></h3><p><br></p><pre><code class=\"language-javascript\">new Vue({\n  el: '#app',\n  router,\n  components: { App },\n  template: '&lt;App/&gt;',\n})\n// 通过注入路由器，我们可以在任何组件内通过 this.$router 访问路由器，也可以通过 this.$route 访问当前路由：\n</code></pre><p>$router是指整个路由实例,你可以操控整个路由,通过'$router.push'往其中添加任意的路由对象.<br>$route:是指当前路由实例('$router')跳转到的路由对象;</p><hr/><p><br></p><h2 style=\"line-height: 1.5;\"><strong>Vue Router 常用 API</strong></h2><h3 style=\"line-height: 1.5;\"><strong>动态路由匹配</strong></h3><blockquote>我们经常需要把某种模式匹配到的所有路由，全都映射到同个组件。例如，我们有一个 User 组件，对于所有 ID 各不相同的用户，都要使用这个组件来渲染。那么，我们可以在 vue-router 的路由路径中使用“动态路径参数” 来达到这个效果：（动态路由匹配本质上就是通过 url 进行传参）</blockquote><p><strong>路由对象属性</strong></p><p>这里指的是路由对象 this.$route:</p><p>- $route.path 类型: string 字符串，对应当前路由的路径，总是解析为绝对路径，如 \"/foo/bar\"。<br>- $route.params 类型: Object 一个 key/value 对象，包含了动态片段和全匹配片段，如果没有路由参数，就是一个空对象。<br>- $route.query 类型: Object 一个 key/value 对象，表示 URL 查询参数。例如，对于路径 /foo?user=1，则有 $route.query.user == 1，如果没有查询参数，则是个空对象。<br>- $route .name 当前路由的名称，如果有的话。这里建议最好给每个路由对象命名,方便以后编程式导航.不过记住 name 必须唯一!<br>- $route.hash 类型: string 当前路由的 hash 值 (带 #) ，如果没有 hash 值，则为空字符串。<br>- $route.fullPath 类型: string 完成解析后的 URL，包含查询参数和 hash 的完整路径。<br>- $route.matched 类型: Array&lt;RouteRecord&gt;一个数组，包含当前路由的所有嵌套路径片段的路由记录 。路由记录就是 routes 配置数组中的对象副本 (还有在 children 数组)。</p><h3 style=\"line-height: 1.5;\"><strong>编程式导航</strong></h3><p>除了使用 &lt;router-link&gt; 创建 a 标签来定义导航链接，我们还可以借助 router 的实例方法，通过编写代码来实现 this.$router.push<br>当你点击 &lt;router-link&gt; 时，这个方法会在内部调用，所以说，点击 &lt;router-link :to=\"...\"&gt; 等同于调用 router.push(...)。</p><p><br></p><pre><code class=\"language-javascript\">// 字符串\nrouter.push('home')\n\n// 对象\nrouter.push({ path: 'home' })\n\n// 命名的路由\nrouter.push({ name: 'user', params: { userId: '123' } })\n\n// 带查询参数，变成 /register?plan=private\nrouter.push({ path: 'register', query: { plan: 'private' } })\n</code></pre><p>1. router.replace(location, onComplete?, onAbort?)<br>router.replace 和 router.push 很像,写法一样.但实际效果不一样.push 是向 history 里添加新记录.而 replace 是直接将当前浏览器 history 记录替换掉!<br>2. router.go(n)方法<br>这个方法的参数是一个整数，意思是在 history 记录中向前或者后退多少步，类似 window.history.go(n)。</p><p><br></p><pre><code class=\"language-javascript\">// 在浏览器记录中前进一步，等同于 history.forward()\nrouter.go(1)\n\n// 后退一步记录，等同于 history.back()\nrouter.go(-1)\n\n// 前进 3 步记录\nrouter.go(3)\n\n// 如果 history 记录不够用，那就默默地失败呗\nrouter.go(-100)\nrouter.go(100)\n</code></pre><h3 style=\"line-height: 1.5;\"><strong>命名视图</strong></h3><p>有时候想同时 (同级) 展示多个视图，而不是嵌套展示，例如创建一个布局，有 sidebar (侧导航) 和 main (主内容) 两个视图，这个时候命名视图就派上用场了。你可以在界面中拥有多个单独命名的视图，而不是只有一个单独的出口。如果 router-view 没有设置名字，那么默认为 default。</p><p><br></p><pre><code class=\"language-javascript\">&lt;router-view class=\"view one\"&gt;&lt;/router-view&gt;\n&lt;router-view class=\"view two\" name=\"a\"&gt;&lt;/router-view&gt;\n&lt;router-view class=\"view three\" name=\"b\"&gt;&lt;/router-view&gt;\n\nconst router = new VueRouter({\n  routes: [\n    {\n      path: '/',\n      components: {\n        default: Foo,\n        a: Bar,\n        b: Baz\n      }\n    }\n  ]\n})\n</code></pre><h3 style=\"line-height: 1.5;\"><strong>嵌套路由</strong></h3><p>就是父路由嵌套子路由.url 上就是/user 嵌套两个子路由后就是/user/foo 和/uer/bar.</p><table style=\"width: auto; text-align: left;\"><tbody><tr><th colspan=\"1\" rowspan=\"1\" width=\"auto\">路径</th><th colspan=\"1\" rowspan=\"1\" width=\"auto\">组件</th></tr><tr><td colspan=\"1\" rowspan=\"1\" width=\"auto\">/user</td><td colspan=\"1\" rowspan=\"1\" width=\"auto\">User</td></tr><tr><td colspan=\"1\" rowspan=\"1\" width=\"auto\">/user/foo</td><td colspan=\"1\" rowspan=\"1\" width=\"auto\">Foo</td></tr><tr><td colspan=\"1\" rowspan=\"1\" width=\"auto\">/user/bar</td><td colspan=\"1\" rowspan=\"1\" width=\"auto\">Bar</td></tr></tbody></table><p><strong>路由对象中定义子路由</strong></p><p><br></p><pre><code class=\"language-javascript\">const router = new VueRouter({\n  routes: [\n    //重定向\n    { path: '/a', redirect: '/user' },\n    // 重定向的目标也可以是一个命名的路由：\n    // { path: '/a', redirect: { name: 'User' }}\n    // 一个方法，动态返回重定向目标：\n    //  { path: '/a', redirect: to =&gt; {\n    //   // 方法接收 目标路由 作为参数\n    //   // return 重定向的 字符串路径/路径对象\n    // }}，\n    {\n      path: '/user',\n      component: User,\n      name: 'user',\n      //嵌套路由就写在children配置中,写法和rutes一样.\n      children: [\n        {\n          path: '',\n          component: UserDefault,\n          name: 'default',\n          //children:[{}]   也可以继续添加children嵌套\n        },\n        //如果/user下没有匹配到其他子路由时,User的&lt;router-view&gt;是什么都不会显示的,如果你想让它显示点什么.可以将path:''.设为空.此时UserDefault就是默认显示的组件.\n\n        { path: 'foo', component: UserFoo, name: 'foo' },\n        //此时path等同于'/user/foo',子路由会继承父路由的路径.但是不能写成path:'/foo'.因为以 / 开头的嵌套路径会被当作根路径,也就是说此时foo成了根路径.而不是user.\n\n        { path: 'bar', component: UserBar, name: 'bar' },\n      ],\n    },\n  ],\n})\n</code></pre><h3 style=\"line-height: 1.5;\"><strong>别名</strong></h3><p>别名是在 rutes 里的 alias 进行配置:</p><p><br></p><pre><code class=\"language-javascript\">const router = new VueRouter({\n  //这时,路径'/fxxksky'和'/two-dogs' 都会跳转到A\n  routes: [\n    { path: '/fxxksky', component: A, alias: '/two-dogs' },\n    //当有多个别名时,alias也可以写成数组形式.  alias: ['/two-dogs', 'three-dogs','four-dogs','five-dogs']\n  ],\n})\n</code></pre><h3 style=\"line-height: 1.5;\"><strong>路由元信息</strong></h3><p>路由配置的 meta 对象里的信息</p><p><br></p><pre><code class=\"language-javascript\">const router = new VueRouter({\n  routes: [\n    {\n      path: '/foo',\n      component: Foo,\n      children: [\n        {\n          path: 'bar',\n          component: Bar,\n          // a meta field\n          meta: { requiresAuth: true },\n        },\n      ],\n    },\n  ],\n})\n</code></pre><p>我们称呼 routes数组 配置中的每个路由对象为 路由记录。路由记录可以是嵌套的，因此，当一个路由匹配成功后，他可能匹配多个路由记录<br>一个路由匹配到的所有路由记录会暴露为 $route 对象 (还有在导航守卫中的路由对象) 的 $route.matched 数组。因此，我们需要遍历 $route.matched 来检查路由记录中的 meta 字段。</p><p><br></p><pre><code class=\"language-javascript\">router.beforeEach((to, from, next) =&gt; {\n  if (to.matched.some((record) =&gt; record.meta.requiresAuth)) {\n    // this route requires auth, check if logged in\n    // if not, redirect to login page.\n    if (!auth.loggedIn()) {\n      next({\n        path: '/login',\n        query: { redirect: to.fullPath },\n      })\n    } else {\n      next()\n    }\n  } else {\n    next() // 确保一定要调用 next()\n  }\n})\n</code></pre><p>所以要优雅要隐性地传递信息,就使用 meta 对象.</p><h3 style=\"line-height: 1.5;\"><strong>滚动行为</strong></h3><p>切换路由时,可以使页面滚动到你想要的某个地方,或者是保持之前滚动的位置,这时你就需要使用 scrollBehavior 这个方法.</p><p>- 这里控制和记住的滚动位置都是仅对整个组件页面而言的,并不包含组件里面其他的滚动条.<br>- 这里路由的模式只能是 history.因为它使用了 History 新增的 pushState().</p><p><br></p><pre><code class=\"language-javascript\">const router = new VueRouter({\n  mode:'history',//这个不能忘,默认是hash模式\n  routes: [...],\n  scrollBehavior (to, from, savedPosition) {\n     // to：要进入的目标路由对象，到哪里去.和导航守卫的beforeEach一样\n\t   //from：离开的路由对象，哪里来\n\t   //savedPosition: 点击前进/后退的时候记录值{x:?,y:?}.并且只有通过浏览器的前进后退才会触发.\n     // return 期望滚动到哪个的位置 { x: number, y: number }或者是{ selector: string, offset? : { x: number, y: number }},这里selector接收字符串形 式的hash,如'#foo',同时你还可以通过offset设置偏移,版本需要大于2.6+\n\t//举个实例\n\tif(savePosition) { //如果是浏览器的前进后退就,返回之前保存的位置\n      return savePosition;\n    }else if(to.hash) {//如果存在hash,就滚动到hash所在位置\n      return {selector: to.hash}\n    }else{\n\t  return {x:0,y:0}//否则就滚动到顶部\n\t}\n  }\n})\n</code></pre><h2 style=\"line-height: 1.5;\"><strong>手写简单 hash 和 history 路由</strong></h2><h2 style=\"line-height: 1.5;\"><strong>hash</strong></h2><p>window.location.hash 值的变化会直接反应到浏览器地址栏（#后面的部分会发生变化），同时，浏览器地址栏 hash 值的变化也会触发 window.location.hash 值的变化，从而触发 onhashchange 事件</p><p>1. hash 即 URL 中\"#\"字符后面的部分。<br><br>- 使用浏览器访问网页时，如果网页 URL 中带有 hash，页面就会定位到 id（或 name）与 hash 值一样的元素的位置；<br>- hash 的改变不会导致页面重新加载；<br>- hash 值浏览器是不会随请求发送到服务器端的；<br>- 通过 window.location.hash 属性获取和设置 hash 值。<br><br>2. hashchange 事件<br><br>- 当 URL 的片段标识符更改时，将触发 hashchange 事件（跟在#符号后面的 URL 部分，包括#符号）<br>- hashchange 事件触发时，事件对象会有 hash 改变前的 URL（oldURL）和 hash 改变后的 URL（newURL）两个属性。</p><p>hash路由</p><p><br></p><pre><code class=\"language-html\">&lt;div id=\"container\"&gt;\n  &lt;button onclick=\"window.location.hash = '#'\"&gt;首页&lt;/button&gt;\n  &lt;button onclick=\"window.location.hash = '#about'\"&gt;关于我们&lt;/button&gt;\n  &lt;button onclick=\"window.location.hash = '#user'\"&gt;用户列表&lt;/button&gt;\n&lt;/div&gt;\n\n&lt;div id=\"context\"&gt;&lt;/div&gt;\n\n&lt;script&gt;\nclass BaseRouter {\n  constructor() {\n    this.routes = {}\n    this.refresh = this.refresh.bind(this)\n    window.addEventListener('load', this.refresh)\n    window.addEventListener('hashchange', this.refresh)\n  }\n\n  route(path, callback) {\n    this.routes[path] = callback || function () {}\n  }\n\n  refresh() {\n    const path = `/${window.location.hash.slice(1) || ''}`\n    this.routes[path]()\n  }\n}\n\nconst Route = new BaseRouter()\n\nRoute.route('/about', () =&gt; changeText('关于我们页面'))\nRoute.route('/user', () =&gt; changeText('用户列表页'))\nRoute.route('/', () =&gt; changeText('首页'))\n\nfunction changeText(arg) {\n  document.getElementById('context').innerHTML = arg\n}\n&lt;/script&gt;</code></pre><h3 style=\"line-height: 1.5;\"><strong>history 路由（h5）</strong></h3><p>HTML5 新增的 history API：</p><p>- <strong>history.pushState(data, title [, url])</strong>：pushState 主要用于往历史记录堆栈顶部添加一条记录。各参数解析如下：①data 会在 onpopstate 事件触发时作为参数传递过去；②title 为页面标题，当前所有浏览器都会忽略此参数；③url 为页面地址，可选，缺少时表示为当前页地址<br>- <strong>history.replaceState(data, title [, url])</strong>：更改当前的历史记录，参数同上； 上面的 pushState 是添加，这个更改<br>- <strong>history.state</strong>：用于存储以上方法的 data 数据，不同浏览器的读写权限不一样<br>- <strong>window.onpopstate</strong> ：响应 pushState 或者 replaceState 的调用<br>- <strong>popstate:popstate</strong>: 类似于一个事件函数，当用户在浏览器点击后退、前进，或者在 js 中调用 histroy.back()，history.go()，history.forward()，点击浏览器的前进、后退按钮等，会触发 popstate 事件；但 pushState、replaceState 不会触发这个事件。利用这一特性，我们可以在用户前进或者返回页面的时候做一些事情。</p><p><br></p><pre><code class=\"language-html\">&lt;div id=\"container\"&gt;\n  &lt;button onclick=\"window.location.hash = '#'\"&gt;首页&lt;/button&gt;\n  &lt;button onclick=\"window.location.hash = '#about'\"&gt;关于我们&lt;/button&gt;\n  &lt;button onclick=\"window.location.hash = '#user'\"&gt;用户列表&lt;/button&gt;\n&lt;/div&gt;\n\n&lt;div id=\"context\"&gt;&lt;/div&gt;\n&lt;script&gt;\nclass BaseRouter {\n  constructor() {\n    this.routes = {}\n    this._bindPopstate()\n    this.init()\n  }\n\n  init(path) {\n    window.history.replaceState({ path }, null, path)\n    const cb = this.routes[path]\n    if (cb) {\n      cb()\n    }\n  }\n\n  route(path, callback) {\n    this.routes[path] = callback || function () {}\n  }\n\n  go(path) {\n    window.history.pushState({ path }, null, path)\n    const cb = this.routes[path]\n    if (cb) {\n      cb()\n    }\n  }\n\n  _bindPopstate() {\n    window.addEventListener('popstate', (e) =&gt; {\n      const path = e.state && e.state.path\n      this.routes[path] && this.routes[path]()\n    })\n  }\n}\n\nconst Route = new BaseRouter()\n\nRoute.route('./about', () =&gt; changeText('关于我们页面'))\nRoute.route('./user', () =&gt; changeText('用户列表页'))\nRoute.route('./', () =&gt; changeText('首页'))\n\nfunction changeText(arg) {\n  document.getElementById('context').innerHTML = arg\n}\n\ncontainer.addEventListener('click', (e) =&gt; {\n  if (e.target.tagName === 'A') {\n    e.preventDefault()\n    Route.go(e.target.getAttribute('href'))\n  }\n})\n&lt;/script&gt;</code></pre><h2 style=\"line-height: 1.5;\"><strong>路由异步组件</strong></h2><p><br></p><pre><code class=\"language-javascript\">import Home from '../views/Home.vue'\n// import About from '../views/About.vue'\n\nconst routes = [\n  {\n    path: '/',\n    name: 'Home',\n    component: Home,\n  },\n  {\n    path: '/about',\n    name: 'About',\n    // 异步加载路由组件，webpackChunkName单独配置路由包名，通过浏览器加载该路由时可以发现一个about.js文件。正常加载路由时候没有\n    component: () =&gt;\n      import(/* webpackChunkName: \"about\" */ '../views/About.vue'),\n  },\n]\n</code></pre><p>其实，异步组件路由 包括 React.lazy 、 import() 就是⼀种对代码进⾏动态拆分的技术，我们⼀般 叫做 code splitting 。 在需要的时候，才进⾏加载；</p><h2 style=\"line-height: 1.5;\"><strong>vue-router 路由守卫</strong></h2><h3 style=\"line-height: 1.5;\"><strong>全局守卫</strong></h3><p><br></p><pre><code class=\"language-javascript\">// main.js 入口文件\nimport router from './router' // 引入路由\nrouter.beforeEach((to, from, next) =&gt; {\n  // 全局前置守卫 进入路由之前\n  next()\n})\nrouter.beforeResolve((to, from, next) =&gt; {\n  // 全局解析守卫(2.5.0+) 在beforeRouteEnter调用之后调用\n  next()\n})\nrouter.afterEach((to, from) =&gt; {\n  console.log('afterEach 全局后置钩子')\n  // 全局后置钩子 进入路由之后\n})\n</code></pre><h3 style=\"line-height: 1.5;\"><strong>路由独享守卫</strong></h3><p>可以为某些路由单独配置守卫</p><p><br></p><pre><code class=\"language-javascript\">const router = new VueRouter({\n  routes: [\n    {\n      path: '/foo',\n      component: Foo,\n      beforeEnter: (to, from, next) =&gt; {\n        // 参数用法什么的都一样,调用顺序在全局前置守卫后面，所以不会被全局守卫覆盖\n        // ...\n      },\n    },\n  ],\n})\n</code></pre><h3 style=\"line-height: 1.5;\"><strong>路由组件内的守卫</strong></h3><p><br></p><pre><code class=\"language-javascript\">// 进入路由前\n  beforeRouteEnter (to, from, next) {\n    // 在路由独享守卫后调用 不！能！获取组件实例 `this`，组件实例还没被创建\n  },\n// 路由复用同一个组件时\n  beforeRouteUpdate (to, from, next) {\n    // 在当前路由改变，但是该组件被复用时调用 可以访问组件实例 `this`\n    // 举例来说，对于一个带有动态参数的路径 /foo/:id，在 /foo/1 和 /foo/2 之间跳转的时候，\n    // 由于会渲染同样的 Foo 组件，因此组件实例会被复用。而这个钩子就会在这个情况下被调用。\n  },\n// 离开当前路由时\n  beforeRouteLeave (to, from, next) {\n    // 导航离开该组件的对应路由时调用，可以访问组件实例 `this`\n  }\n</code></pre><p>关于 beforeRouteEnter 获取 this 解决方法：<br>可以通过传一个回调给 next 来访问组件实例。<br>但是回调的执行时机在 mounted 后面,所以在我看来这里对 this 的访问意义不太大，可以放在 created 或者 mounted 里面。</p><p><br></p><pre><code class=\"language-javascript\"> beforeRouteEnter (to, from, next) {\n    console.log('在路由独享守卫后调用');\n      next(vm =&gt; {\n        // 通过 `vm` 访问组件实例`this` 执行回调的时机在mounted后面，\n      })\n    }\n</code></pre><p><strong>路由守卫的触发流程</strong></p><p><br></p><pre><code class=\"language-javascript\">beforeRouteLeave:【组件】路由组件的组件离开路由前钩子，可取消路由离开。\nbeforeEach: 【全局】路由全局前置守卫，可用于登录验证、全局路由 loading 等。\nbeforeRouteUpdate:【组件】-如果是路由的参数变化，触发;\nbeforeEnter: 【配置⽂件】路由独享守卫\nbeforeRouteEnter: 【组件】路由组件的组件进入路由前钩子。\nbeforeResolve:【全局】路由全局解析守卫\nafterEach:【全局】路由全局后置钩子\n</code></pre><h3>router.addRoute和router.addRoutes的区别是什么</h3><p><code>router.addRoute</code> 和 <code>router.addRoutes</code> 是 Vue Router 中用于动态添加路由的两个方法，它们的区别在于添加路由的方式和参数类型。</p><ol><li>router.addRoute(route: RouteRecordRaw): voidaddRoute 方法用于添加单个路由对象到路由器中。它接受一个 RouteRecordRaw 类型的参数，表示要添加的路由对象。示例代码：const route = { path: '/dynamic', component: DynamicComponent}; router.addRoute(route);使用 addRoute 方法添加的路由将立即生效，并可以在当前路由的导航过程中使用。</li><li>router.addRoutes(routes: RouteRecordRaw[]): voidaddRoutes 方法用于添加多个路由对象到路由器中。它接受一个数组类型的参数，其中每个元素都是 RouteRecordRaw 类型的路由对象。示例代码：const routes = [ { path: '/dynamic1', component: DynamicComponent1 }, { path: '/dynamic2', component: DynamicComponent2 }]; router.addRoutes(routes);</li></ol><p>使用 <code>addRoutes</code> 方法添加的路由将在下一次导航时生效。你需要重新触发导航，或者在当前导航完成后进行导航，以使添加的路由生效。</p><p>总结：</p><pre><code >import router from './router'\nimport store from './store'\nimport {\n  Message\n} from 'element-ui'\nimport NProgress from 'nprogress'\nimport 'nprogress/nprogress.css'\nimport {\n  getToken\n} from '@/utils/auth'\nimport {\n  asyncloadJS\n} from '@/utils/loadJS.js'\nNProgress.configure({\n  showSpinner: false\n})\n\nconst whiteList = ['/login', '/auth-redirect', '/bind', '/register']\n// 面包屑黑名单\nconst navBlackList = ['Index', 'Projects/sign/detail/:id', 'Engineering/sign/check-point/:id', 'Engineering/sign/detection-package/:id', 'Projects/sign/detail']\n\nrouter.beforeEach((to, from, next) =&gt; {\n  NProgress.start()\n  if (getToken()) {\n    to.meta.title && store.dispatch('settings/setTitle', to.meta.title)\n    /* has token*/\n    if (to.path === '/login') {\n      next({\n        path: '/'\n      })\n      NProgress.done()\n    } else {\n      if (store.getters.roles.length === 0) {\n        // 判断当前用户是否已拉取完user_info信息\n        store.dispatch('GetInfo').then(() =&gt; {\n          store.dispatch('GenerateRoutes').then(accessRoutes =&gt; {\n            // 根据roles权限生成可访问的路由表\n            router.addRoutes(accessRoutes) // 动态添加可访问路由表\n            next({\n              ...to,\n              replace: true\n            }) // hack方法 确保addRoutes已完成\n          })\n        }).catch(err =&gt; {\n          store.dispatch('LogOut').then(() =&gt; {\n            Message.error(err)\n            next({\n              path: '/'\n            })\n          })\n        })\n      } else {\n        if (navBlackList.indexOf(to.name) !== -1) {\n          store.dispatch(\"settings/changeSetting\", {\n            key: \"isNav\",\n            value: false,\n          });\n        } else {\n          store.dispatch(\"settings/changeSetting\", {\n            key: \"isNav\",\n            value: true,\n          });\n        }\n        next()\n      }\n    }\n  } else {\n    // 没有token\n    if (whiteList.indexOf(to.path) !== -1) {\n      // 在免登录白名单，直接进入\n      next()\n    } else {\n      next({\n        path: '/login',\n        query: {\n          redirect: to.fullPath\n        }\n      }) // 否则全部重定向到登录页\n      NProgress.done()\n    }\n  }\n})\n\nrouter.afterEach(() =&gt; {\n  // document.title = '综合&检测管理'\n  NProgress.done()\n})\n</code></pre><ul><li><code>addRoute</code> 用于添加单个路由对象，立即生效。</li><li><code>addRoutes</code> 用于添加多个路由对象，需要在下一次导航时生效。</li></ul><p>根据你的具体需求，选择合适的方法来添加<a href=\"https://so.csdn.net/so/search?q=%E5%8A%A8%E6%80%81%E8%B7%AF%E7%94%B1&spm=1001.2101.3001.7020\" target=\"_blank\">动态路由</a>。如果你只需要添加一个路由，可以使用 <code>addRoute</code>。如果你需要添加多个路由，可以使用 <code>addRoutes</code>，并确保在适当的时机触发导航以使路由生效。</p>"},{state:1,createTime:e,updateTime:"2024-01-09T03:38:21.826Z",_id:"659bb1ebc58a6f24f80b8b2a",id:18,createByUser:7,name:"[vue]06-移动webapp适配方案--rem",__v:0,updateByUser:7,html:'<h1 style="text-align: center;"><a href="https://segmentfault.com/a/1190000039182158" target=""><span style="color: rgb(0, 0, 0);">vue使用rem适配</span></a></h1><p>1.安装依赖</p><pre style="line-height: 1.5;"><code class="language-bash">//安装 postcss-pxtorem\nnpm i postcss-pxtorem -S</code></pre><p>5.在src目录新建rem文件夹,下面新建rem.js,添加如下代码:</p><pre style="line-height: 1.5;"><code class="language-javascript">//基准大小\nconst baseSize = 37.5\n// 设置 rem 函数\nfunction setRem() {\n const salepro = document.documentElement.clientWidth / 750\n // 当前页面宽度相对于 750 宽的缩放比例，可根据自己需要修改.\n // 设置页面根节点字体大小\n document.documentElement.style.fontSize = (baseSize * Math.min(salepro, 2)) + \'px\'\n}\n// 初始化\nsetRem()\n// 改变窗口大小时重新设置 rem\nwindow.onresize = function () {\n setRem()\n}</code></pre><p>6.在项目根目录新建 .postcssrc.js,添加代码如下:</p><pre style="line-height: 1.5;"><code class="language-javascript">module.exports = {\n "plugins": {\n  "postcss-pxtorem": {\n   "rootValue": 37.5,\n   "propList": ["*"]\n  }\n }\n}</code></pre><blockquote>注意:我在配置中,比例是1:1,也就是设计图宽是750px,你在css中直接写width:750px;就可以啦,不用进行换算,是不是很棒。</blockquote><p>7.在main.js中引入</p><pre style="line-height: 1.5;"><code class="language-javascript">import \'@/rem/rem.js\'</code></pre><p>8.在vue模板中使用,css中添加如下代码:</p><pre style="line-height: 1.5;"><code class="language-css">&lt;style lang="scss" scoped&gt;\n.about {\n  width: 750px;\n  height: 100vh;\n  box-sizing: border-box;\n  background-color: blue !important;\n  .kk {\n    width: 350px;\n    height: 350px;\n    background-color: red;\n  }\n}\n&lt;/style&gt;</code></pre><p>9.效果图如下:<br><img src="https://hanwujijack.github.io/blog/40.webp" alt="https://hanwujijack.github.io/blog/40.webp" data-href="https://hanwujijack.github.io/blog/40.webp" style=""/><br><br></p>'},{state:1,createTime:e,updateTime:"2024-01-09T03:38:36.550Z",_id:"659bb1cfc58a6f24f80b8b21",id:17,createByUser:7,name:"[vue]05-生命周期",__v:0,updateByUser:7,html:'<h1 style="text-align: center;"><a href="https://www.cnblogs.com/lily1010/p/5830946.html" target=""><span style="color: rgb(0, 0, 0);">Vue生命周期</span></a></h1><p><span style="background-color: rgb(255, 153, 204);">一 vue的生命周期如下图所示(很清晰)</span></p><p><img src="https://hanwujijack.github.io/blog/40.png" alt="https://hanwujijack.github.io/blog/40.png" data-href="https://hanwujijack.github.io/blog/40.png" style=""/> </p><p><span style="background-color: rgb(255, 153, 204);">二 vue生命周期的栗子</span></p><p><span style="background-color: rgb(255, 255, 153);"> 注意触发vue的created事件以后,this便指向vue实例,这点很重要</span></p><p><br></p><pre><code class="language-html">&lt;!DOCTYPE html&gt;\n&lt;html&gt;\n    &lt;head&gt;\n        &lt;meta charset="UTF-8"&gt;\n        &lt;title&gt;vue生命周期&lt;/title&gt;\n        &lt;script src="../js/vue.js"&gt;&lt;/script&gt;\n        &lt;meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" /&gt;\n    &lt;/head&gt;\n    &lt;body&gt;\n        &lt;div class="test" style="border: 1px black dashed;padding: 8px;"&gt;\n            {{a}}\n        &lt;/div&gt;\n        &lt;div class="test2" style="border: 1px red solid;margin-top: 10px;padding: 8px;"&gt;\n            我是内容二\n        &lt;/div&gt;\n        &lt;script type="text/javascript"&gt;\n            var myVue = new Vue({\n                el: ".test",\n                data: {\n                    a: "我是内容,在控制台输入myVue.a=123456,可以改变我的值"\n                },\n                created: function () { \n                    //在实例创建之后同步调用。此时实例已经结束解析选项，这意味着已建立：数据绑定，计算属性，方法，watcher/事件回调。\n                    //但是还没有开始 DOM 编译，$el 还不存在,但是实例存在,即this.a存在,可打印出来 。\n                    console.log("建立");\n                },\n                beforeCompile: function () {\n                    console.log("未开始编译");\n                },\n                compiled: function () { \n                    //在编译结束后调用。此时所有的指令已生效，因而数据的变化将触发 DOM 更新。但是不担保 $el 已插入文档。\n                    console.log("编译完成");\n                },\n                ready: function () { \n                    //在编译结束和 $el 第一次插入文档之后调用，如在第一次 attached 钩子之后调用。注意必须是由 Vue 插入（如 vm.$appendTo() 等方法或指令更新）才触发 ready 钩子。\n                    console.log("一切准备好了");\n                },\n                attached :function () {  //myVue.$appendTo(".test2")暂时触发不了,不知道怎么解决\n                    //在 vm.$el 插入 DOM 时调用。必须是由指令或实例方法（如 $appendTo()）插入，直接操作 vm.$el 不会 触发这个钩子。\n                    console.log("插入DOM成功");\n                },\n                detached :function () { //触发事件 myVue.$destroy(true),其中参数true控制是否删除DOM节点或者myVue.$remove()\n                    //在 vm.$el 从 DOM 中删除时调用。必须是由指令或实例方法删除，直接操作 vm.$el 不会 触发这个钩子。\n                    console.log("删除DOM成功");\n                },\n                beforeDestroy: function () {  //触发方式,在console里面打myVue.$destroy();\n                    //在开始销毁实例时调用。此时实例仍然有功能。\n                    console.log("销毁前");\n                },\n                destroyed: function () {   //触发方式,在console里面打myVue.$destroy();其中myVue.$destroy(true)是删除DOM节点,会触发detached函数,但是实例仍然存在\n                    //在实例被销毁之后调用。此时所有的绑定和实例的指令已经解绑，注意是解绑不是销毁,所有的子实例也已经被销毁。\n                    console.log("已销毁");\n                }\n        });\n        &lt;/script&gt;\n    &lt;/body&gt;\n&lt;/html&gt;\n</code></pre><p> </p><p> </p><p> </p><p> </p><p>将上面代码贴入后,在chrome控制台进行控制,刚开始载入页面的时候触发的事件是:</p><p><img src="https://images2015.cnblogs.com/blog/812815/201609/812815-20160901182416949-1300588845.png" alt="" data-href="" style="height: auto;"/><img src="https://hanwujijack.github.io/blog/41.png" alt="https://hanwujijack.github.io/blog/41.png" data-href="https://hanwujijack.github.io/blog/41.png" style=""/></p><p> </p><p>在控制台触发detached 事件如下(注意DOM已删除,但是实例仍然存在):</p><p><img src="https://images2015.cnblogs.com/blog/812815/201609/812815-20160901182903340-645849981.png" alt="" data-href="" style="height: auto;"/><img src="https://hanwujijack.github.io/blog/42.png" alt="https://hanwujijack.github.io/blog/42.png" data-href="https://hanwujijack.github.io/blog/42.png" style=""/></p><p> </p><p> 在控制台触发beforeDestroy和destroyed事件如下:(注意destroyed事件触发后,是解绑实例,不是删除实例)</p><p><img src="https://hanwujijack.github.io/blog/43.png" alt="https://hanwujijack.github.io/blog/43.png" data-href="https://hanwujijack.github.io/blog/43.png" style=""/></p>'},{state:1,createTime:e,updateTime:"2024-01-09T03:38:46.243Z",_id:"659bb1acc58a6f24f80b8b18",id:16,createByUser:7,name:"[vue]04-props",__v:0,updateByUser:7,html:'<h1 style="text-align: center;"><a href="https://www.cnblogs.com/wentutu/p/10930399.html" target=""><span style="color: rgb(0, 0, 0);">vue组件之属性Props</span></a></h1><h1></h1><p><br></p><h4>组件的属性和事件</h4><h5>父子组件之间的通信</h5><p>父子组件之间的通信就是 props down,events up，父组件通过 属性props向下传递数据给子组件，子组件通过 事件events 给父组件发送消息。<br>比如，子组件需要某个数据，就在内部定义一个prop属性，然后父组件就像给html元素指定特性值一样，把自己的data属性传递给子组件的这个属性。<br>而当子组件内部发生了什么事情的时候，就通过自定义事件来把这个事情涉及到的数据暴露出来，供父组件处理。</p><pre><code class="language-html" style="line-height: 1.5;">&lt;my-component v-bind:foo="baz" v-on:event-a="doThis(arg1,...arg2)"&gt;&lt;/my-component&gt;\n</code></pre><p>如上代码，</p><ul><li>foo是</li><li>event-a是子组件定义的一个事件，doThis是父组件的一个方法</li></ul><p>过程就是这样：</p><ul><li>父组件把baz数据通过prop传递给子组件的foo；</li><li>子组件内部得到foo的值，就可以进行相应的操作；</li><li>当子组件内部发生了一些变化，希望父组件能知道时，就利用代码触发event-a事件，把一些数据发送出去</li><li>父组件把这个事件处理器绑定为doThis方法，子组件发送的数据，就作为doThis方法的参数被传进来</li><li>然后父组件就可以根据这些数据，进行相应的操作</li></ul><h5>属性Props</h5><p>Vue组件通过props属性来声明一个自己的属性，然后父组件就可以往里面传递数据。</p><pre><code class="language-javascript" style="line-height: 1.5;">Vue.component(\'mycomponent\',{\n    template: \'&lt;div&gt;这是一个自定义组件,父组件传给我的内容是：{{myMessage}}&lt;/div&gt;\',\n    props: [\'myMessage\'],\n    data () {\n      return {\n        message: \'hello world\'\n      }\n    }\n  })\n</code></pre><p>然后调用该组件</p><p><strong>注意</strong>，由于HTML特性是不区分大小写的，所以传递属性值时，myMessage应该转换成 kebab-case (短横线隔开式)my-message="hello"。</p><pre><code class="language-html" style="line-height: 1.5;">&lt;div id="app"&gt;\n    &lt;mycomponent my-message="hello"&gt;&lt;/mycomponent&gt;\n&lt;/div&gt;\n</code></pre><h5>v-bind绑定属性值</h5><p>v-bind绑定属性值的一个特性：一般情况下，使用v-bind给元素特性(attribute)传递值时，Vue会将""中的内容当做一个表达式。</p><pre><code class="language-html" style="line-height: 1.5;">//比如\n&lt;div attr="message"&gt;hello&lt;/div&gt;\n</code></pre><p>上面这样，div元素的attr特性值就是message。</p><pre><code class="language-html" style="line-height: 1.5;">&lt;div v-bind:attr="message"&gt;hello&lt;/div&gt;\n</code></pre><p>这里的message应该是Vue实例的data的一个属性，这样div元素的attr特性值就是message这个属性的值。</p><p>之所以说是一般情况，是因为class和style特性并不是这样。用v-bind:class和class传入正常的类名，效果是一样的，因为对于这两个特性，Vue采用了合并而不是替换的原则。</p><h5>动态绑定特性值</h5><p>根据上面，想要把父组件的属性绑定到子组件，应该使用v-bind，这样，父组件中数据改变时能反映到子组件。<br><strong>注意</strong>，根据父组件传递给子组件的属性类型的不同，当在子组件中更改这个属性时，会有以下两种情况：</p><ul><li>当父组件传递的属性是引用类型时，在子组件中更改相应的属性会导致父组件相应属性的更改。</li></ul><pre><code class="language-html" style="line-height: 1.5;">&lt;div id="app"&gt;\n     &lt;div&gt;这是父组件的parentArray：{{parentArray}}&lt;/div&gt;\n     &lt;my-component :child-array="parentArray"&gt;&lt;/my-component&gt;\n   &lt;/div&gt;\n   &lt;script&gt;\n     Vue.component(\'my-component\', {\n       template: `\n       &lt;div&gt;这是接收了父组件传递值的子组件的childArray: {{childArray}} &lt;br&gt;\n           &lt;button type="button" @click="changeArray"&gt;\n           点击我改变父元素的parentArray&lt;/button&gt;\n         &lt;/div&gt;`,\n       props: [\'childArray\'],\n       data () {\n         return {\n           counter: 1\n         }\n       },\n       methods: {\n         changeArray () {\n           this.childArray.push(this.counter++)\n         }\n       }\n     })\n     new Vue({\n       el: \'#app\',\n       data: {\n         parentArray: []\n       }\n     })\n   &lt;/script&gt;\n</code></pre><p>点击结果<br><img src="https://img2018.cnblogs.com/blog/1237756/201905/1237756-20190527140216284-423069725.png" alt="" data-href="" style="height: auto;"/><br>当父组件传递值为基本类型时，在子组件中更改这个属性会报错。正确的做法是，在父组件中绑定属性值时，加上.sync修饰符。</p><pre><code class="language-html" style="line-height: 1.5;">  &lt;div id="app2"&gt;\n        &lt;div&gt;这是父组件的parentArray：{{parent}}&lt;/div&gt;\n        &lt;my-component-sync :child.sync="parent"&gt;&lt;/my-component-sync&gt;\n\n    &lt;/div&gt;\n    &lt;script src="https://cdn.jsdelivr.net/npm/vue"&gt;&lt;/script&gt;\n    &lt;script&gt;\n        Vue.component(\'myComponentSync\', {\n            template: `&lt;div&gt;这是接收了父组件传递值的子组件的child: {{child}} &lt;br&gt;\n              &lt;button type="button" @click="change"&gt;\n              点击我改变父元素的parent&lt;/button&gt;\n            &lt;/div&gt;`,\n            props: [\'child\'],\n            data() {\n                return {\n                    counter: this.child\n                }\n            },\n            methods: {\n                change() {\n                    this.counter++\n                    this.$emit(\'update:child\', this.counter)\n                }\n            }\n        })\n        new Vue({\n            el: \'#app2\',\n            data: {\n                parent: 0\n            }\n        })\n    &lt;/script&gt;\n     \n</code></pre><p>点击结果如下图，去掉无法改变<br><img src="https://img2018.cnblogs.com/blog/1237756/201905/1237756-20190527142106591-1238840783.png" alt="" data-href="" style="height: auto;"/></p><h5>子组件希望对传入的prop进行操作</h5><p>一般来说，是不建议在子组件中对父组件中传递来的属性进行操作的。如果真的有这种需求,可以这样:</p><ol><li>父组件传递了一个基本类型值，那么可以在子组件中创建一个新的属性，并以传递进来的值进行初始化，之后就可以操作这个新的属性了</li></ol><pre><code class="language-javascript" style="line-height: 1.5;">props: [\'initialCounter\'],\ndata: function () {\n  return { counter: this.initialCounter }\n}\n</code></pre><ol><li>父组件传递了一个引用类型值，为了避免更改父组件中相应的数据，最好是对引用类型进行复制。复杂的情况，肯定应该是深复制。</li></ol><h5>给子组件传递正确类型的值</h5><p>同样是上面的原因，静态的给子组件的特性传递值，它都会把他当做一个字符串。</p><pre><code class="language-html" style="line-height: 1.5;">&lt;!-- 传递了一个字符串 "1" --&gt;\n&lt;comp some-prop="1"&gt;&lt;/comp&gt;\n</code></pre><p>子组件中，特性的值是字符串 "1" 而不是 number 1。如果想传递正确的数值，应该使用v-bind传递，这样就能把传递的值当做一个表达式来处理，而不是字符串。</p><pre><code class="language-html" style="line-height: 1.5;">&lt;!-- 传递实际的 number 1 --&gt;\n&lt;comp v-bind:some-prop="1"&gt;&lt;/comp&gt;\n</code></pre><h5>Prop验证</h5><p>我们可以给组件的props属性添加验证，当传入的数据不符合要求时，Vue会发出警告。</p><pre><code class="language-javascript" style="line-height: 1.5;">Vue.component(\'myComponent\', {\n  props: {\n    // 基础类型检测 (`null` 意思是任何类型都可以)\n    propA: Number,\n    // 多种类型\n    propB: [String, Number],\n    // 必传且是字符串\n    propC: {\n      type: String,\n      required: true\n    },\n    // 数字，有默认值\n    propD: {\n      type: Number,\n      default: 100\n    },\n    // 数组/对象的默认值应当由一个工厂函数返回\n    propE: {\n      type: Object,\n      default: function () {\n        return { message: \'hello\' }\n      }\n    },\n    // 自定义验证函数\n    propF: {\n      validator: function (value) {\n        return value &gt; 10\n      }\n    }\n  }\n})\n</code></pre><p>type 可以是下面原生构造器：</p><ul><li>String</li><li>Number</li><li>Boolean</li><li>Function</li><li>Object</li><li>Array</li><li>Symbol<br>type 也可以是一个自定义构造器函数，使用 instanceof 检测。</li></ul><pre><code class="language-javascript" style="line-height: 1.5;">// 自定义Person构造器\n function Person(name, age) {\n    this.name = name\n    this.age = age\n  }\n  Vue.component(\'my-component\', {\n    template: `&lt;div&gt;名字: {{ person-prop.name }}， 年龄： {{ person-prop.age }} &lt;/div&gt;`,\n    props: {\n      person-prop: {\n        type: Person     // 指定类型\n      }\n    }\n  })\n  new Vue({\n    el: \'#app2\',\n    data: {\n      person: 2        // 传入Number类型会报错\n    }\n  })\n</code></pre><h5>非Prop类型的属性</h5><p>也可以像在html标签中添加data-开头的自定义属性一样，给自定义组件添加任意的属性。而不仅限于data-*形式，这样做的话，Vue会把这个属性放在自定义组件的根元素上。一个自定义组件的模板只能有一个根元素。</p><p>覆盖非Prop属性</p><p>如果父组件向子组件的非prop属性传递了值，那么这个值会覆盖子组件模板中的特性。</p><pre><code class="language-html" style="line-height: 1.5;">&lt;div id="app3"&gt;\n    &lt;my-component2 att="helloParent"&gt;&lt;/my-component2&gt;\n&lt;/div&gt;\n&lt;script&gt;\n  Vue.component(\'my-component2\', {\n    template: `&lt;div att="helloChild"&gt;子组件原有的特性被覆盖了&lt;/div&gt;`\n  })\n  new Vue({\n    el: \'#app3\'\n  })\n&lt;/script&gt;\n</code></pre><p>上面渲染的结果是，div的att属性是helloParent。<br>注意：前面已经提到过，覆盖原则对于class和style不适用,而是采用了合并(merge)的原则。</p><pre><code class="language-html" style="line-height: 1.5;">&lt;div id="app3"&gt;\n    &lt;my-component2 att="helloParent" class="class2" style="color: red;"&gt;&lt;/my-component2&gt;\n&lt;/div&gt;\n&lt;script&gt;\n  Vue.component(\'my-component2\', {\n    template: `&lt;div att="helloChild" class="class1" style="background: yellow;"&gt;子组件原有的特性被覆盖了&lt;/div&gt;`\n  })\n  new Vue({\n    el: \'#app3\'\n  })\n&lt;/script&gt;\n</code></pre><p>上面的渲染结果是，div的类名是class1 class2，行内样式是color:red; background:yellow;。</p>'},{state:1,createTime:e,updateTime:"2024-01-08T08:30:50.357Z",_id:"659bacd0c58a6f24f80b8af9",id:15,createByUser:7,name:"[vue]03-组件",__v:0,html:'<p><img src="https://hanwujijack.github.io/blog/20.webp" alt="https://hanwujijack.github.io/blog/20.webp" data-href="https://hanwujijack.github.io/blog/20.webp" style=""/></p><p>本节大纲</p><blockquote>正文</blockquote><h3>一、什么是组件</h3><p>Vue 玩的就是组件，如果看过我　React 文章的朋友对组件肯定不会陌生。其实我们的应用界面就是由一个个组件构成的。</p><p>举个栗子，我们就以手淘首页部分界面为例子来说</p><p><img src="//upload-images.jianshu.io/upload_images/1586207-a31187117161be30.png?imageMogr2/auto-orient/strip|imageView2/2/w/649/format/webp" alt="" data-href="" style=""/><img src="https://hanwujijack.github.io/blog/21.webp" alt="https://hanwujijack.github.io/blog/21.webp" data-href="https://hanwujijack.github.io/blog/21.webp" style=""/></p><p>从图中我们可以直观的看到，这些框出来的就可以开发成一个个组件，然后把这些组件合并在一起就完成首页了「淘宝不一定是这样的做的，这里只是为了让大家直观的感受一下什么是组件」</p><h3>二、Vue 中组件的形式</h3><p>在 Vue 中有四种组件形式，分别是全局组件、局部组件、嵌套组件和单个组件，下面我们一一来看</p><h4>1、全局组件</h4><blockquote>1、全局组件含义和使用方法</blockquote><p>全局组件，顾名思义，就是本页「所有 vue 实例中」都可以使用的组件</p><p>注册全局组件方法如下</p><p><br></p><pre><code class="language-javascript">Vue.component(\'组件名称\',{\n  模版和方法等\n})\n</code></pre><p>我们可以使用 Vue.extend() 函数「也可以不用，直接使用 Vue.component()」来创建一个 Vue 的构造器「注意它不是 Vue 实例」</p><blockquote>2、直接撸码感受一下全局组件「引入 vue.js 这里就不说了，直接上核心代码」</blockquote><p><br></p><pre><code class="language-html">&lt;body&gt;\n  &lt;h2&gt;vue-component&lt;/h2&gt;\n  &lt;hr&gt;\n  &lt;div id="container"&gt;\n    &lt;h3&gt;爱吃什么水果？ app 实例&lt;/h3&gt;\n      &lt;ol&gt;\n        &lt;todolist\n        &gt;&lt;/todolist&gt;\n      &lt;/ol&gt;\n  &lt;/div&gt;\n\n  &lt;div id="container2"&gt;\n    &lt;h3&gt;爱吃什么水果？ app2 实例&lt;/h3&gt;\n      &lt;ol&gt;\n        &lt;todolist\n        &gt;&lt;/todolist&gt;\n      &lt;/ol&gt;\n  &lt;/div&gt;\n\n  &lt;div&gt;\n    &lt;h3&gt;爱吃什么水果？&lt;/h3&gt;\n    组件没有在任何实例中，所以不显示 &lt;font color="red"&gt;「组件一定要挂载到某个 Vue 实例中，否则不会生效」&lt;/font&gt;\n      &lt;ol&gt;\n        &lt;todolist\n        &gt;&lt;/todolist&gt;\n      &lt;/ol&gt;\n  &lt;/div&gt;\n\n  &lt;script type="text/javascript"&gt;\n    // 定义一个组件构造器，不是实例\n    var todolist = Vue.extend({\n      template:\'&lt;div&gt;&lt;li v-for="(item,index) in datas" @click="showName(index)"&gt;{{item.text}}&lt;/li&gt;&lt;/div&gt;\',\n      data() {\n        return {\n          datas:[\n           { id: 0, text: \'苹果\' },\n           { id: 1, text: \'香蕉\' },\n           { id: 2, text: \'只要是水果我都爱吃\' }\n         ]\n        }\n      },\n      // 组件的方法\n      methods:{\n        showName(index){\n          alert(this.datas[index].text)\n        }\n      }\n    })\n\n    // 全局组件注册\n    Vue.component(\'todolist\',todolist)\n    // 定义一个 Vue 实例\n    var app = new Vue({\n      el:"#container",\n      // data:{}\n    })\n    // 定义另一个 Vue 实例\n    var app2 = new Vue({\n      el:\'#container2\'\n    })\n  &lt;/script&gt;\n&lt;/body&gt;</code></pre><p><span style="color: rgb(64, 64, 64); background-color: rgb(255, 255, 255); font-size: 16px;">从上面的代码中我们可以看出来，我们使用 Vue.extend() 函数创建了一个 Vue 构造器，并且使用全局注册组件方式注册了组件，还声明了三个 div ，两个 Vue 实例，我们来看看运行结果吧</span></p><p><img src="https://hanwujijack.github.io/blog/22.webp" alt="https://hanwujijack.github.io/blog/22.webp" data-href="https://hanwujijack.github.io/blog/22.webp" style=""/></p><p><br></p><p>从结果上我们可以看出:</p><ul><li>1、 前两个 Div 都把 todolist 组件渲染出来了，这就说明了 todolist 是一个全局组件，在所有的 Vue 实例中都可以使用，但是在第三个 div 中却没有渲染出来，因为组件必须挂载到 Vue 实例中「很明显组件没有挂载到第三个 div」中。</li><li>2、组件可以看成一个 Vue 实例，里面可以写 methods ，可以写 template 模版，并且可以定义数据「但是这里 data 一定要写成函数，并且在 return 中写数据」，当然以后 props 等都可以写</li></ul><h4>2、局部组件</h4><blockquote>1、局部组件和使用方法</blockquote><p>我们使用 Vue 对象的 components 属性来实现局部组件注册，顾名思义局部组件就是只能在本对象中使用的组件，模版如下：</p><p><br></p><pre><code class="language-javascript  language">new Vue({\n  el: \'#myapp\',\n  ...\n  // 把组件注册到本 Vue 实例下\n  components: {\'组件别名\': 组件名}\n  \n})\n</code></pre><blockquote>2、代码中体验局部组件</blockquote><ul><li>1、我们接着上面的代码直接修改，修改的地方很简单，如下所示：<br></li></ul><p><img src="https://hanwujijack.github.io/blog/23.webp" alt="https://hanwujijack.github.io/blog/23.webp" data-href="https://hanwujijack.github.io/blog/23.webp" style=""/></p><ul><li style="text-align: start;">2、运行查看结果：</li></ul><p style="text-align: start;"><img src="https://hanwujijack.github.io/blog/24.webp" alt="https://hanwujijack.github.io/blog/24.webp" data-href="https://hanwujijack.github.io/blog/24.webp" style=""></p><p style="text-align: start;"><br></p><p>可以看到，只有 app 实例下正确的加载了 todolist 组件，别的没有加载「这就是局部组件」</p><ul><li>3、注意</li></ul><p>我们如果在 app2 中使用局组件 todolist 是不会显示的，我们的 demo 强行使用，是为了演示效果，其实浏览器已经报错了，如下：<br><br><img src="https://hanwujijack.github.io/blog/25.webp" alt="https://hanwujijack.github.io/blog/25.webp" data-href="https://hanwujijack.github.io/blog/25.webp" style=""/></p><p><br></p><p>大概意思就是找不到 todolist 组件，你是否正确注册的意思</p><h4>3、嵌套组件「组合组件」</h4><blockquote>1、嵌套组件「组合组件」的含义和使用方法</blockquote><p>我们可以在一个组件中嵌套另一个组件，也就是在组件中定义 components 并且传入子组件即可，一般使用方法如下：</p><p><br></p><pre><code class="language-javascript">// 定义一个组件\nvar customcomponent = Vue.extend({\n    template: \'&lt;div&gt;。。。。&lt;/div&gt;\',\n    data():{},\n    ....\n})\n\nvar parentcomponent = Vue.extend({\n    // 模版中就可以使用子组件了\n    template: \'&lt;div&gt;你类组件的一些模版 &lt;custom-component&gt;&lt;/custom-component&gt;&lt;/div&gt;\',\n    data():{},\n    ....\n    // 把子组件注册到父类组件中\n    components: {\n        \'custom-component\':custom component\n    }\n})\n</code></pre><p>基本使用方法就是如此，当然我们可以加入 methods 等属性和方法</p><blockquote>2、撸码看效果</blockquote><p>我们在上面的代码的基础上修改如下三个地方：<br><br><img src="https://hanwujijack.github.io/blog/26.webp" alt="https://hanwujijack.github.io/blog/26.webp" data-href="https://hanwujijack.github.io/blog/26.webp" style=""/></p><p style="text-align: start;">分为三个步骤：</p><ul><li style="text-align: start;">1、定义组件</li><li style="text-align: start;">2、注册组件</li><li style="text-align: start;">3、使用组件</li></ul><p style="text-align: start;">运行查看结果：</p><p style="text-align: start;"><img src="https://hanwujijack.github.io/blog/27.webp" alt="https://hanwujijack.github.io/blog/27.webp" data-href="https://hanwujijack.github.io/blog/27.webp" style=""></p><p style="text-align: start;"><br></p><p style="text-align: start;"><br></p><p>我们可以看到，子组件在 todolist 组件中显示出来了，这样嵌套组件就完成了</p><h4>4、单个组件</h4><p>我们通上以上方式就可以实现组件化 Vue ，但是如果在大型项目中这样使用会让人感觉到 T 疼，全部组件写在一个页面中，难维护，难查阅。那么有就第 4 种方式--单个组件，什么是单个组件，也就是定义一个后缀为 .vue 的文件，然后把模版、js、style 都写在这个文件中，这就是单个组件，我们开始吧</p><blockquote>1、创建一个单个组件的项目</blockquote><p>如果看过第一节的朋友应该知道，我们通过 vue-cli 能快速创建一个 vue 项目，并且里面单个组件等全部都为你生成了，下面我们通过自己手动来模拟一个类似于 vue-cli 创建出来的项目这么一个过程，直接上代码</p><ul><li>1、新建一个文件夹--myvuedemo</li><li></li></ul><pre><code class="language-javascript">// 命令行输入，无论是 windows 还是 mac \nmkdir myvuedemo\ncd myvuedemo \n</code></pre><ul><li>2、使用 yarn 初始化项目「当然也可以使用 npm ，yarn 和 npm 的安装以前在 React 教程中说过，不清楚的可以自行百度一下」</li><li></li></ul><pre><code class="language-javascript">yarn init \n</code></pre><p>一路回车即可，目录如下：<br><br><img src="https://hanwujijack.github.io/blog/28.webp" alt="https://hanwujijack.github.io/blog/28.webp" data-href="https://hanwujijack.github.io/blog/28.webp" style=""/></p><p style="text-align: start;">我们可以看到使用 yarn init 初始代项目，就多了一个 package.json 文件</p><ul><li style="text-align: start;">3、在 myvuedemo 目录下新建 src 和 dist 目录，并且新建 index.html 文件</li></ul><p style="text-align: start;"><img src="https://hanwujijack.github.io/blog/29.webp" alt="https://hanwujijack.github.io/blog/29.webp" data-href="https://hanwujijack.github.io/blog/29.webp" style=""></p><p style="text-align: start;"><br></p><ul><li>4、安装依赖</li></ul><p>在前面我们都是使用引信　vue.js 的方式来使用 vue 的，现在我们安装依赖的方式来使用 vue ，所以我们要安装一些依赖，在 myvuedemo 目录下使用如下命令
