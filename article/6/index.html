, 245);"><code>Virtual DOM</code></span> 渲染成真实的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 实际上要经历 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>VNode</code></span> 的定义、<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>、<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patch</code></span> 等过程，所以本章节 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 源码的解析也按这几个过程来简析。</p><h3>3.1、<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>VNode</code></span> 模拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 树</h3><h4><code><strong>3.1.1、VNode 类简析</strong></code></h4><p>在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue.js</code></span> 中，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual DOM</code></span> 是用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>VNode</code></span> 这个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Class</code></span> 去描述，它定义在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>src/core/vdom/vnode.js</code></span> 中 ，从以下代码块中可以看到 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue.js</code></span> 中的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual DOM</code></span> 的定义较为复杂一些，因为它这里包含了很多 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue.js</code></span> 的特性。实际上 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue.js</code></span> 中 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual DOM</code></span> 是借鉴了一个开源库 &nbsp;<a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Fsnabbdom%2Fsnabbdom" target="_blank">snabbdom</a> 的实现，然后加入了一些 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue.js</code></span> 的一些特性。</p><pre><code class="language-javascript">export default class VNode {\n  tag: string | void;\n  data: VNodeData | void;\n  children: ?Array&lt;VNode&gt;;\n  text: string | void;\n  elm: Node | void;\n  ns: string | void;\n  context: Component | void; // rendered in this component\'s scope\n  key: string | number | void;\n  componentOptions: VNodeComponentOptions | void;\n  componentInstance: Component | void; // component instance\n  parent: VNode | void; // component placeholder node\n\n  // strictly internal\n  raw: boolean; // contains raw HTML? (server only)\n  isStatic: boolean; // hoisted static node\n  isRootInsert: boolean; // necessary for enter transition check\n  isComment: boolean; // empty comment placeholder?\n  isCloned: boolean; // is a cloned node?\n  isOnce: boolean; // is a v-once node?\n  asyncFactory: Function | void; // async component factory function\n  asyncMeta: Object | void;\n  isAsyncPlaceholder: boolean;\n  ssrContext: Object | void;\n  fnContext: Component | void; // real context vm for functional nodes\n  fnOptions: ?ComponentOptions; // for SSR caching\n  devtoolsMeta: ?Object; // used to store functional render context for devtools\n  fnScopeId: ?string; // functional scope id support\n\n  constructor (\n    tag?: string,\n    data?: VNodeData,\n    children?: ?Array&lt;VNode&gt;,\n    text?: string,\n    elm?: Node,\n    context?: Component,\n    componentOptions?: VNodeComponentOptions,\n    asyncFactory?: Function\n  ) {\n    this.tag = tag\n    this.data = data\n    this.children = children\n    this.text = text\n    this.elm = elm\n    this.ns = undefined\n    this.context = context\n    this.fnContext = undefined\n    this.fnOptions = undefined\n    this.fnScopeId = undefined\n    this.key = data && data.key\n    this.componentOptions = componentOptions\n    this.componentInstance = undefined\n    this.parent = undefined\n    this.raw = false\n    this.isStatic = false\n    this.isRootInsert = true\n    this.isComment = false\n    this.isCloned = false\n    this.isOnce = false\n    this.asyncFactory = asyncFactory\n    this.asyncMeta = undefined\n    this.isAsyncPlaceholder = false\n  }\n}\n</code></pre><p>这里千万不要因为 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>VNode</code></span> 的这么属性而被吓到，或者咬紧牙去摸清楚每个属性的意义，其实，我们主要了解其几个核心的关键属性就差不多了，例如：</p><ul><li><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>tag</code></span> 属性即这个<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span>的标签属性</li><li><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>data</code></span> 属性包含了最后渲染成真实<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>dom</code></span>节点后，节点上的<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>class</code></span>，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>attribute</code></span>，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>style</code></span>以及绑定的事件</li><li><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>children</code></span> 属性是<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span>的子节点</li><li><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>text</code></span> 属性是文本属性</li><li><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>elm</code></span> 属性为这个<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span>对应的真实<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>dom</code></span>节点</li><li><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>key</code></span> 属性是<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span>的标记，在<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>过程中可以提高<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>的效率</li></ul><h4>3.1.2、源码创建 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>VNode</code></span> 过程</h4><p>（1）初始化vue</p><p>我们在实例化一个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vue</code></span> 实例，也即 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>new Vue( )</code></span> 时，实际上是执行 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>src/core/instance/index.js</code></span> 中定义的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Function</code></span> 函数。</p><pre><code class="language-javascript">function Vue (options) {\n  if (process.env.NODE_ENV !== \'production\' &&\n    !(this instanceof Vue)\n  ) {\n    warn(\'Vue is a constructor and should be called with the `new` keyword\')\n  }\n  this._init(options)\n}\n</code></pre><p>通过查看 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>function</code></span>，我们知道 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 只能通过 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>new</code></span> 关键字初始化，然后调用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>this._init</code></span> 方法，该方法在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>src/core/instance/init.js</code></span> 中定义。</p><pre><code class="language-javascript">  Vue.prototype._init = function (options?: Object) {\n    const vm: Component = this\n      \n    // 省略一系列其它初始化的代码\n      \n    if (vm.$options.el) {\n      console.log(\'vm.$options.el:\',vm.$options.el);\n      vm.$mount(vm.$options.el)\n    }\n  }\n</code></pre><p><code><strong>（2）Vue 实例挂载</strong></code></p><p><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 中是通过 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>$mount</code></span> 实例方法去挂载 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>dom</code></span> 的，下面我们通过分析 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>compiler</code></span> 版本的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>mount</code></span> 实现，相关源码在目录 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>src/platforms/web/entry-runtime-with-compiler.js</code></span> 文件中定义：。</p><pre><code class="language-javascript">const mount = Vue.prototype.$mount\nVue.prototype.$mount = function (\n  el?: string | Element,\n  hydrating?: boolean\n): Component {\n  el = el && query(el)\n  \n   // 省略一系列初始化以及逻辑判断代码  \n \n  return mount.call(this, el, hydrating)\n}\n</code></pre><p>我们发现最终还是调用用原先原型上的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>$mount</code></span> 方法挂载 ，原先原型上的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>$mount</code></span> 方法在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>src/platforms/web/runtime/index.js</code></span> 中定义 。</p><pre><code class="language-javascript">Vue.prototype.$mount = function (\n  el?: string | Element,\n  hydrating?: boolean\n): Component {\n  el = el && inBrowser ? query(el) : undefined\n  return mountComponent(this, el, hydrating)\n}\n</code></pre><p>我们发现<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>$mount</code></span> 方法实际上会去调用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>mountComponent</code></span> 方法，这个方法定义在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>src/core/instance/lifecycle.js</code></span> 文件中</p><pre><code class="language-javascript">export function mountComponent (\n  vm: Component,\n  el: ?Element,\n  hydrating?: boolean\n): Component {\n  vm.$el = el\n  // 省略一系列其它代码\n  let updateComponent\n  /* istanbul ignore if */\n  if (process.env.NODE_ENV !== \'production\' && config.performance && mark) {\n    updateComponent = () =&gt; {\n      // 生成虚拟 vnode   \n      const vnode = vm._render()\n      // 更新 DOM\n      vm._update(vnode, hydrating)\n     \n    }\n  } else {\n    updateComponent = () =&gt; {\n      vm._update(vm._render(), hydrating)\n    }\n  }\n\n  // 实例化一个渲染Watcher，在它的回调函数中会调用 updateComponent 方法  \n  new Watcher(vm, updateComponent, noop, {\n    before () {\n      if (vm._isMounted && !vm._isDestroyed) {\n        callHook(vm, \'beforeUpdate\')\n      }\n    }\n  }, true /* isRenderWatcher */)\n  hydrating = false\n\n  return vm\n}\n</code></pre><p>从上面的代码可以看到，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>mountComponent</code></span> 核心就是先实例化一个渲染<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Watcher</code></span>，在它的回调函数中会调用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>updateComponent</code></span> 方法，在此方法中调用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vm._render</code></span> 方法先生成虚拟 Node，最终调用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vm._update</code></span> 更新 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span>。</p><p><strong>（3）创建虚拟 Node</strong></p><p><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>_render</code></span> 方法是实例的一个私有方法，它用来把实例渲染成一个虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Node</code></span>。它的定义在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>src/core/instance/render.js</code></span> 文件中：</p><pre><code class="language-javascript"> Vue.prototype._render = function (): VNode {\n    const vm: Component = this\n    const { render, _parentVnode } = vm.$options\n    let vnode\n    try {\n      // 省略一系列代码  \n      currentRenderingInstance = vm\n      // 调用 createElement 方法来返回 vnode\n      vnode = render.call(vm._renderProxy, vm.$createElement)\n    } catch (e) {\n      handleError(e, vm, `render`){}\n    }\n    // set parent\n    vnode.parent = _parentVnode\n    console.log("vnode...:",vnode);\n    return vnode\n  }\n</code></pre><p><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue.js</code></span> 利用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>_createElement</code></span> 方法创建 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>VNode</code></span>，它定义在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>src/core/vdom/create-elemenet.js</code></span> 中：</p><pre><code class="language-javascript">export function _createElement (\n  context: Component,\n  tag?: string | Class&lt;Component&gt; | Function | Object,\n  data?: VNodeData,\n  children?: any,\n  normalizationType?: number\n): VNode | Array&lt;VNode&gt; {\n    \n  // 省略一系列非主线代码\n  \n  if (normalizationType === ALWAYS_NORMALIZE) {\n    // 场景是 render 函数不是编译生成的\n    children = normalizeChildren(children)\n  } else if (normalizationType === SIMPLE_NORMALIZE) {\n    // 场景是 render 函数是编译生成的\n    children = simpleNormalizeChildren(children)\n  }\n  let vnode, ns\n  if (typeof tag === \'string\') {\n    let Ctor\n    ns = (context.$vnode && context.$vnode.ns) || config.getTagNamespace(tag)\n    if (config.isReservedTag(tag)) {\n      // 创建虚拟 vnode\n      vnode = new VNode(\n        config.parsePlatformTagName(tag), data, children,\n        undefined, undefined, context\n      )\n    } else if ((!data || !data.pre) && isDef(Ctor = resolveAsset(context.$options, \'components\', tag))) {\n      // component\n      vnode = createComponent(Ctor, data, context, children, tag)\n    } else {\n      vnode = new VNode(\n        tag, data, children,\n        undefined, undefined, context\n      )\n    }\n  } else {\n    vnode = createComponent(tag, data, context, children)\n  }\n  if (Array.isArray(vnode)) {\n    return vnode\n  } else if (isDef(vnode)) {\n    if (isDef(ns)) applyNS(vnode, ns)\n    if (isDef(data)) registerDeepBindings(data)\n    return vnode\n  } else {\n    return createEmptyVNode()\n  }\n}\n</code></pre><p><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>_createElement</code></span> 方法有 5 个参数，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>context</code></span> 表示 VNode 的上下文环境，它是 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Component</code></span> 类型；<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>tag</code></span>表示标签，它可以是一个字符串，也可以是一个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Component</code></span>；<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>data</code></span> 表示 VNode 的数据，它是一个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>VNodeData</code></span> 类型，可以在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>flow/vnode.js</code></span> 中找到它的定义；<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>children</code></span> 表示当前 VNode 的子节点，它是任意类型的，需要被规范为标准的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>VNode</code></span> 数组；</p><h4><strong>3.1.3、实例查看</strong></h4><p>为了更直观查看我们平时写的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 代码如何用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>VNode</code></span> 类来表示，我们通过一个实例的转换进行更深刻了解。</p><p>例如，实例化一个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 实例：</p><pre><code class="language-javascript">  var app = new Vue({\n    el: \'#app\',\n    render: function (createElement) {\n      return createElement(\'div\', {\n        attrs: {\n          id: \'app\',\n          class: "class_box"\n        },\n      }, this.message)\n    },\n    data: {\n      message: \'Hello Vue!\'\n    }\n  })\n</code></pre><p>我们打印出其对应的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>VNode</code></span> 表示：</p><p><img src="https://hanwujijack.github.io/blog/62.png" alt="https://hanwujijack.github.io/blog/62.png" data-href="https://hanwujijack.github.io/blog/62.png" style=""/></p><p><br></p><p><br></p><h3>3.2、<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 过程</h3><h4>3.2.1、<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue.js</code></span> 源码的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 调用逻辑</h4><p><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue.js</code></span> 源码实例化了一个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>watcher</code></span>，这个 ~ 被添加到了在模板当中所绑定变量的依赖当中，一旦 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>model</code></span> 中的响应式的数据发生了变化，这些响应式的数据所维护的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>dep</code></span> 数组便会调用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>dep.notify()</code></span> 方法完成所有依赖遍历执行的工作，这包括视图的更新，即 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>updateComponent</code></span> 方法的调用。<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>watcher</code></span> 和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>updateComponent</code></span>方法定义在 &nbsp;<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>src/core/instance/lifecycle.js</code></span> 文件中 。</p><pre><code class="language-javascript">export function mountComponent (\n  vm: Component,\n  el: ?Element,\n  hydrating?: boolean\n): Component {\n  vm.$el = el\n  // 省略一系列其它代码\n  let updateComponent\n  /* istanbul ignore if */\n  if (process.env.NODE_ENV !== \'production\' && config.performance && mark) {\n    updateComponent = () =&gt; {\n      // 生成虚拟 vnode   \n      const vnode = vm._render()\n      // 更新 DOM\n      vm._update(vnode, hydrating)\n     \n    }\n  } else {\n    updateComponent = () =&gt; {\n      vm._update(vm._render(), hydrating)\n    }\n  }\n\n  // 实例化一个渲染Watcher，在它的回调函数中会调用 updateComponent 方法  \n  new Watcher(vm, updateComponent, noop, {\n    before () {\n      if (vm._isMounted && !vm._isDestroyed) {\n        callHook(vm, \'beforeUpdate\')\n      }\n    }\n  }, true /* isRenderWatcher */)\n  hydrating = false\n\n  return vm\n}\n</code></pre><p>完成视图的更新工作事实上就是调用了<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vm._update</code></span>方法，这个方法接收的第一个参数是刚生成的<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vnode</code></span>，调用的<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vm._update</code></span>方法定义在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>src/core/instance/lifecycle.js</code></span>中。</p><pre><code class="language-javascript">  Vue.prototype._update = function (vnode: VNode, hydrating?: boolean) {\n    const vm: Component = this\n    const prevEl = vm.$el\n    const prevVnode = vm._vnode\n    const restoreActiveInstance = setActiveInstance(vm)\n    vm._vnode = vnode\n    if (!prevVnode) {\n      // 第一个参数为真实的node节点，则为初始化\n      vm.$el = vm.__patch__(vm.$el, vnode, hydrating, false /* removeOnly */)\n    } else {\n      // 如果需要diff的prevVnode存在，那么对prevVnode和vnode进行diff\n      vm.$el = vm.__patch__(prevVnode, vnode)\n    }\n    restoreActiveInstance()\n    // update __vue__ reference\n    if (prevEl) {\n      prevEl.__vue__ = null\n    }\n    if (vm.$el) {\n      vm.$el.__vue__ = vm\n    }\n    // if parent is an HOC, update its $el as well\n    if (vm.$vnode && vm.$parent && vm.$vnode === vm.$parent._vnode) {\n      vm.$parent.$el = vm.$el\n    }\n  }\n</code></pre><p>在这个方法当中最为关键的就是 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vm.__patch__</code></span> 方法，这也是整个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>virtual-dom</code></span> 当中最为核心的方法，主要完成了<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>prevVnode</code></span> 和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 过程并根据需要操作的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vdom</code></span> 节点打 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patch</code></span>，最后生成新的真实 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>dom</code></span> 节点并完成视图的更新工作。</p><p>接下来，让我们看下 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vm.__patch__</code></span>的逻辑过程， <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vm.__patch__</code></span> 方法定义在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>src/core/vdom/patch.js</code></span> 中。</p><pre><code class="language-javascript">function patch (oldVnode, vnode, hydrating, removeOnly) {\n    ......\n    if (isUndef(oldVnode)) {\n      // 当oldVnode不存在时，创建新的节点\n      isInitialPatch = true\n      createElm(vnode, insertedVnodeQueue)\n    } else {\n      // 对oldVnode和vnode进行diff，并对oldVnode打patch  \n      const isRealElement = isDef(oldVnode.nodeType)\n      if (!isRealElement && sameVnode(oldVnode, vnode)) {\n        // patch existing root node\n        patchVnode(oldVnode, vnode, insertedVnodeQueue, null, null, removeOnly)\n      } \n\t......\n  }\n}\n</code></pre><p>在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patch</code></span> 方法中，我们看到会分为两种情况，一种是当 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldVnode</code></span> 不存在时，会创建新的节点；另一种则是已经存在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldVnode</code></span> ，那么会对 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldVnode</code></span> 和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 进行 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 及 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patch</code></span> 的过程。其中 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patch</code></span> 过程中会调用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>sameVnode</code></span> 方法来对对传入的2个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 进行基本属性的比较，只有当基本属性相同的情况下才认为这个2个<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 只是局部发生了更新，然后才会对这2个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 进行 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>，如果2个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 的基本属性存在不一致的情况，那么就会直接跳过 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 的过程，进而依据 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 新建一个真实的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>dom</code></span>，同时删除老的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>dom</code></span>节点。</p><pre><code class="language-javascript">function sameVnode (a, b) {\n  return (\n    a.key === b.key &&\n    a.tag === b.tag &&\n    a.isComment === b.isComment &&\n    isDef(a.data) === isDef(b.data) &&\n    sameInputType(a, b)\n  )\n}\n</code></pre><p><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 过程中主要是通过调用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patchVnode</code></span> 方法进行的:</p><pre><code class="language-javascript">  function patchVnode (oldVnode, vnode, insertedVnodeQueue, ownerArray, index, removeOnly) {\n    ...... \n    const elm = vnode.elm = oldVnode.elm\n    const oldCh = oldVnode.children\n    const ch = vnode.children\n    // 如果vnode没有文本节点\n    if (isUndef(vnode.text)) {\n      // 如果oldVnode的children属性存在且vnode的children属性也存在  \n      if (isDef(oldCh) && isDef(ch)) {\n        // updateChildren，对子节点进行diff  \n        if (oldCh !== ch) updateChildren(elm, oldCh, ch, insertedVnodeQueue, removeOnly)\n      } else if (isDef(ch)) {\n        if (process.env.NODE_ENV !== \'production\') {\n          checkDuplicateKeys(ch)\n        }\n        // 如果oldVnode的text存在，那么首先清空text的内容,然后将vnode的children添加进去  \n        if (isDef(oldVnode.text)) nodeOps.setTextContent(elm, \'\')\n        addVnodes(elm, null, ch, 0, ch.length - 1, insertedVnodeQueue)\n      } else if (isDef(oldCh)) {\n        // 删除elm下的oldchildren\n        removeVnodes(elm, oldCh, 0, oldCh.length - 1)\n      } else if (isDef(oldVnode.text)) {\n        // oldVnode有子节点，而vnode没有，那么就清空这个节点  \n        nodeOps.setTextContent(elm, \'\')\n      }\n    } else if (oldVnode.text !== vnode.text) {\n      // 如果oldVnode和vnode文本属性不同，那么直接更新真是dom节点的文本元素\n      nodeOps.setTextContent(elm, vnode.text)\n    }\n    ......\n  }\n</code></pre><p>从以上代码得知，</p><p><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 过程中又分了好几种情况，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 为 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldVnode</code></span>的子节点，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>ch</code></span> 为 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vnode</code></span>的子节点：</p><ul><li>首先进行文本节点的判断，若 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldVnode.text !== vnode.text</code></span>，那么就会直接进行文本节点的替换；</li><li>在<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 没有文本节点的情况下，进入子节点的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>；</li><li>当 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>ch</code></span> 都存在且不相同的情况下，调用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>updateChildren</code></span> 对子节点进行 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>；</li><li>若 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span>不存在，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>ch</code></span> 存在，首先清空 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldVnode</code></span> 的文本节点，同时调用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>addVnodes</code></span> 方法将 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>ch</code></span> 添加到<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>elm</code></span>真实 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>dom</code></span> 节点当中；</li><li>若 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span>存在，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>ch</code></span>不存在，则删除 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>elm</code></span> 真实节点下的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 子节点；</li><li>若 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldVnode</code></span> 有文本节点，而 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 没有，那么就清空这个文本节点。</li></ul><h4>3.2.2、子节点 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 流程分析</h4><p><code><strong>（1）Vue.js 源码</strong></code></p><p>​ 这里着重分析下<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>updateChildren</code></span>方法，它也是整个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 过程中最重要的环节，以下为 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue.js</code></span> 的源码过程，为了更形象理解 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 过程，我们给出相关的示意图来讲解。</p><pre><code class="language-javascript">  function updateChildren (parentElm, oldCh, newCh, insertedVnodeQueue, removeOnly) {\n    // 为oldCh和newCh分别建立索引，为之后遍历的依据\n    let oldStartIdx = 0\n    let newStartIdx = 0\n    let oldEndIdx = oldCh.length - 1\n    let oldStartVnode = oldCh[0]\n    let oldEndVnode = oldCh[oldEndIdx]\n    let newEndIdx = newCh.length - 1\n    let newStartVnode = newCh[0]\n    let newEndVnode = newCh[newEndIdx]\n    let oldKeyToIdx, idxInOld, vnodeToMove, refElm\n\n    // 直到oldCh或者newCh被遍历完后跳出循环\n    while (oldStartIdx &lt;= oldEndIdx && newStartIdx &lt;= newEndIdx) {\n      if (isUndef(oldStartVnode)) {\n        oldStartVnode = oldCh[++oldStartIdx] // Vnode has been moved left\n      } else if (isUndef(oldEndVnode)) {\n        oldEndVnode = oldCh[--oldEndIdx]\n      } else if (sameVnode(oldStartVnode, newStartVnode)) {\n        patchVnode(oldStartVnode, newStartVnode, insertedVnodeQueue, newCh, newStartIdx)\n        oldStartVnode = oldCh[++oldStartIdx]\n        newStartVnode = newCh[++newStartIdx]\n      } else if (sameVnode(oldEndVnode, newEndVnode)) {\n        patchVnode(oldEndVnode, newEndVnode, insertedVnodeQueue, newCh, newEndIdx)\n        oldEndVnode = oldCh[--oldEndIdx]\n        newEndVnode = newCh[--newEndIdx]\n      } else if (sameVnode(oldStartVnode, newEndVnode)) { // Vnode moved right\n        patchVnode(oldStartVnode, newEndVnode, insertedVnodeQueue, newCh, newEndIdx)\n        canMove && nodeOps.insertBefore(parentElm, oldStartVnode.elm, nodeOps.nextSibling(oldEndVnode.elm))\n        oldStartVnode = oldCh[++oldStartIdx]\n        newEndVnode = newCh[--newEndIdx]\n      } else if (sameVnode(oldEndVnode, newStartVnode)) { // Vnode moved left\n        patchVnode(oldEndVnode, newStartVnode, insertedVnodeQueue, newCh, newStartIdx)\n        canMove && nodeOps.insertBefore(parentElm, oldEndVnode.elm, oldStartVnode.elm)\n        oldEndVnode = oldCh[--oldEndIdx]\n        newStartVnode = newCh[++newStartIdx]\n      } else {\n        if (isUndef(oldKeyToIdx)) oldKeyToIdx = createKeyToOldIdx(oldCh, oldStartIdx, oldEndIdx)\n        idxInOld = isDef(newStartVnode.key)\n          ? oldKeyToIdx[newStartVnode.key]\n          : findIdxInOld(newStartVnode, oldCh, oldStartIdx, oldEndIdx)\n        if (isUndef(idxInOld)) { // New element\n          createElm(newStartVnode, insertedVnodeQueue, parentElm, oldStartVnode.elm, false, newCh, newStartIdx)\n        } else {\n          vnodeToMove = oldCh[idxInOld]\n          if (sameVnode(vnodeToMove, newStartVnode)) {\n            patchVnode(vnodeToMove, newStartVnode, insertedVnodeQueue, newCh, newStartIdx)\n            oldCh[idxInOld] = undefined\n            canMove && nodeOps.insertBefore(parentElm, vnodeToMove.elm, oldStartVnode.elm)\n          } else {\n            // same key but different element. treat as new element\n            createElm(newStartVnode, insertedVnodeQueue, parentElm, oldStartVnode.elm, false, newCh, newStartIdx)\n          }\n        }\n        newStartVnode = newCh[++newStartIdx]\n      }\n    }\n    if (oldStartIdx &gt; oldEndIdx) {\n      refElm = isUndef(newCh[newEndIdx + 1]) ? null : newCh[newEndIdx + 1].elm\n      addVnodes(parentElm, refElm, newCh, newStartIdx, newEndIdx, insertedVnodeQueue)\n    } else if (newStartIdx &gt; newEndIdx) {\n      removeVnodes(parentElm, oldCh, oldStartIdx, oldEndIdx)\n    }\n  }\n</code></pre><p>在开始遍历 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 前，首先给 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span>和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newCh</code></span> 分别分配一个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>startIndex</code></span> 和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>endIndex</code></span> 来作为遍历的索引，当<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 或者 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newCh</code></span> 遍历完后(遍历完的条件就是 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 或者 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newCh</code></span> 的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>startIndex &gt;= endIndex</code></span> )，就停止<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newCh</code></span> 的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 过程。接下来通过实例来看下整个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 的过程(节点属性中不带 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>key</code></span> 的情况)。</p><p><code><strong>（2）无 key 的 diff 过程</strong></code></p><p>我们通过以下示意图对以上代码过程进行讲解：</p><p>（2.1）首先从第一个节点开始比较，不管是 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 还是 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newCh</code></span> 的起始或者终止节点都不存在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>sameVnode</code></span> ，同时节点属性中是不带 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>key</code></span>标记的，因此第一轮的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 完后，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newCh</code></span>的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>startVnode</code></span> 被添加到 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldStartVnode</code></span>的前面，同时 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newStartIndex</code></span>前移一位；</p><p><img src="https://hanwujijack.github.io/blog/63.png" alt="https://hanwujijack.github.io/blog/63.png" data-href="https://hanwujijack.github.io/blog/63.png" style=""/></p><p><br></p><p><br></p><p>（2.2）第二轮的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>中，满足 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>sameVnode(oldStartVnode, newStartVnode)</code></span>，因此对这2个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 进行<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>，最后将 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patch</code></span> 打到 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldStartVnode</code></span> 上，同时 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldStartVnode</code></span>和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newStartIndex</code></span> 都向前移动一位 ；</p><p><img src="https://hanwujijack.github.io/blog/64.png" alt="https://hanwujijack.github.io/blog/64.png" data-href="https://hanwujijack.github.io/blog/64.png" style=""/></p><p><br></p><p><br></p><p>（2.3）第三轮的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 中，满足 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>sameVnode(oldEndVnode, newStartVnode)</code></span>，那么首先对 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldEndVnode</code></span>和<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newStartVnode</code></span> 进行 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>，并对 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldEndVnode</code></span>进行 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patch</code></span>，并完成 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldEndVnode</code></span> 移位的操作，最后<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newStartIndex</code></span>前移一位，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldStartVnode</code></span> 后移一位；</p><p><img src="https://hanwujijack.github.io/blog/65.png" alt="https://hanwujijack.github.io/blog/65.png" data-href="https://hanwujijack.github.io/blog/65.png" style=""/></p><p><br></p><p><br></p><p>（2.4）第四轮的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>中，过程同步骤3；</p><p><img src="https://hanwujijack.github.io/blog/66.png" alt="https://hanwujijack.github.io/blog/66.png" data-href="https://hanwujijack.github.io/blog/66.png" style=""/></p><p><br></p><p><br></p><p>（2.5）第五轮的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 中，同过程1；</p><p><img src="https://hanwujijack.github.io/blog/67.png" alt="https://hanwujijack.github.io/blog/67.png" data-href="https://hanwujijack.github.io/blog/67.png" style=""/></p><p><br></p><p><br></p><p>（2.6）遍历的过程结束后，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newStartIdx &gt; newEndIdx</code></span>，说明此时 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 存在多余的节点，那么最后就需要将这些多余的节点删除。</p><p><img src="https://hanwujijack.github.io/blog/68.png" alt="https://hanwujijack.github.io/blog/68.png" data-href="https://hanwujijack.github.io/blog/68.png" style=""/></p><p><br></p><p><br></p><p><code><strong>（3）有 key 的 diff 流程</strong></code></p><p>在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 不带 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>key</code></span> 的情况下，每一轮的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 过程当中都是<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>起始</code></span>和<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>结束</code></span>节点进行比较，直到 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 或者<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newCh</code></span> 被遍历完。而当为 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 引入 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>key</code></span> 属性后，在每一轮的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 过程中，当<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>起始</code></span>和<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>结束</code></span>节点都没有找到<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>sameVnode</code></span> 时，然后再判断在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newStartVnode</code></span> 的属性中是否有 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>key</code></span>，且是否在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldKeyToIndx</code></span> 中找到对应的节点 ：</p><ul><li>如果不存在这个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>key</code></span>，那么就将这个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newStartVnode</code></span>作为新的节点创建且插入到原有的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>root</code></span> 的子节点中；</li><li>如果存在这个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>key</code></span>，那么就取出 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 中的存在这个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>key</code></span> 的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span>，然后再进行 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 的过；</li></ul><p>通过以上分析，给<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vdom</code></span>上添加 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>key</code></span>属性后，遍历 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 的过程中，当<strong>起始点</strong>，<strong>结束点</strong>的<strong>搜寻</strong>及 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 出现还是无法匹配的情况下时，就会用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>key</code></span> 来作为唯一标识，来进行 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>，这样就可以提高 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 效率。</p><p>带有 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Key</code></span>属性的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span>的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 过程可见下图：</p><p>（3.1）首先从第一个节点开始比较，不管是 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 还是 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newCh</code></span> 的起始或者终止节点都不存在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>sameVnode</code></span>，但节点属性中是带 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>key</code></span> 标记的， 然后在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldKeyToIndx</code></span> 中找到对应的节点，这样第一轮 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 过后 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 上的<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>B节点</code></span>被删除了，但是 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newCh</code></span> 上的<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>B节点</code></span>上 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>elm</code></span> 属性保持对 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldCh</code></span> 上 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>B节点</code></span> 的<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>elm</code></span>引用。</p><p><img src="https://hanwujijack.github.io/blog/69.png" alt="https://hanwujijack.github.io/blog/69.png" data-href="https://hanwujijack.github.io/blog/69.png" style=""/></p><p><br></p><p><br></p><p>（3.2）第二轮的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 中，满足 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>sameVnode(oldStartVnode, newStartVnode)</code></span>，因此对这2个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>vnode</code></span> 进行<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>，最后将 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patch</code></span> 打到 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldStartVnode</code></span>上，同时 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldStartVnode</code></span> 和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newStartIndex</code></span> 都向前移动一位 ；</p><p><img src="https://hanwujijack.github.io/blog/70.png" alt="https://hanwujijack.github.io/blog/70.png" data-href="https://hanwujijack.github.io/blog/70.png" style=""/></p><p><br></p><p><br></p><p>（3.3）第三轮的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>中，满足 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>sameVnode(oldEndVnode, newStartVnode)</code></span>，那么首先对 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldEndVnode</code></span> 和<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newStartVnode</code></span> 进行 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>，并对 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldEndVnode</code></span> 进行 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patch</code></span>，并完成 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldEndVnode</code></span> 移位的操作，最后<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>newStartIndex</code></span> 前移一位，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldStartVnode</code></span>后移一位；</p><p><img src="https://hanwujijack.github.io/blog/71.png" alt="https://hanwujijack.github.io/blog/71.png" data-href="https://hanwujijack.github.io/blog/71.png" style=""/></p><p><br></p><p><br></p><p>（3.4）第四轮的<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>中，过程同步骤2；</p><p><img src="https://hanwujijack.github.io/blog/72.png" alt="https://hanwujijack.github.io/blog/72.png" data-href="https://hanwujijack.github.io/blog/72.png" style=""/></p><p><br></p><p><br></p><p>（3.5）第五轮的<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span>中，因为此时 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldStartIndex</code></span> 已经大于 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>oldEndIndex</code></span>，所以将剩余的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vnode</code></span> 队列插入队列最后。</p><p><img src="https://hanwujijack.github.io/blog/73.png" alt="https://hanwujijack.github.io/blog/73.png" data-href="https://hanwujijack.github.io/blog/73.png" style=""/></p><p><br></p><p><br></p><h3>3.3、<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patch</code></span> 过程</h3><p>通过3.2章节介绍的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 过程中，我们会看到 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>nodeOps</code></span> 相关的方法对真实 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 结构进行操作，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>nodeOps</code></span> 定义在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>src/platforms/web/runtime/node-ops.js</code></span> 中，其为基本 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 操作，这里就不在详细介绍。</p><pre><code class="language-javascript">export function createElementNS (namespace: string, tagName: string): Element {\n  return document.createElementNS(namespaceMap[namespace], tagName)\n}\n\nexport function createTextNode (text: string): Text {\n  return document.createTextNode(text)\n}\n\nexport function createComment (text: string): Comment {\n  return document.createComment(text)\n}\n\nexport function insertBefore (parentNode: Node, newNode: Node, referenceNode: Node) {\n  parentNode.insertBefore(newNode, referenceNode)\n}\n\nexport function removeChild (node: Node, child: Node) {\n  node.removeChild(child)\n}\n</code></pre><h3>3.4、总结</h3><p>通过前三小节简析，我们从主线上把模板和数据如何渲染成最终的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 的过程分析完毕了，我们可以通过下图更直观地看到从初始化 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 到最终渲染的整个过程。</p><p><img src="https://hanwujijack.github.io/blog/74.png" alt="https://hanwujijack.github.io/blog/74.png" data-href="https://hanwujijack.github.io/blog/74.png" style=""/></p><p><br></p><p><br></p><h2>四、总结</h2><p>本文从通过介绍真实 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 结构其解析过程以及存在的问题，从而引出为什么需要虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span>；然后分析虚拟<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 的好处，以及其一些理论基础和基础算法的实现；最后根据我们已经掌握的基础知识，再一步步去查看<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue.js</code></span> 的源码如何实现的。从存在问题 —&gt; 理论基础 —&gt; 具体实践，一步步深入，帮助大家更好的了解什么是<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual DOM</code></span>、为什么需要 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual DOM</code></span>、以及 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual DOM</code></span>的具体实现，希望本文对您有帮助。</p><p>**辛苦编写良久，如果对你有帮助，还望手动点赞鼓励~~~~~~**</p><p><strong>github地址为：github.com/fengshi123/…，上面汇总了作者所有的博客文章，如果喜欢或者有所启发，请帮忙给个 star ~，对作者也是一种鼓励。</strong></p>',__v:0,updateByUser:7},{state:1,createTime:o,updateTime:"2024-01-09T02:50:20.610Z",_id:"659cb458eda0730989cb7bcf",id:26,createByUser:7,name:"[JavaScript] 事件代理详解",html:'<h1 style="text-align: center;">js中的事件委托或事件代理详解</h1><h3>概述：</h3><p>那什么叫事件委托呢？它还有一个名字叫事件代理，JavaScript高级程序设计上讲：事件委托就是利用事件冒泡，只指定一个事件处理程序，就可以管理某一类型的所有事件。那这是什么意思呢？网上的各位大牛们讲事件委托基本上都用了同一个例子，就是取快递来解释这个现象，我仔细揣摩了一下，这个例子还真是恰当，我就不去想别的例子来解释了，借花献佛，我摘过来，大家认真领会一下事件委托到底是一个什么原理：</p><p>有三个同事预计会在周一收到快递。为签收快递，有两种办法：一是三个人在公司门口等快递；二是委托给前台MM代为签收。现实当中，我们大都采用委托的方案（公司也不会容忍那么多员工站在门口就为了等快递）。前台MM收到快递后，她会判断收件人是谁，然后按照收件人的要求签收，甚至代为付款。这种方案还有一个优势，那就是即使公司里来了新员工（不管多少），前台MM也会在收到寄给新员工的快递后核实并代为签收。</p><p>这里其实还有2层意思的：</p><p>第一，现在委托前台的同事是可以代为签收的，即程序中的现有的dom节点是有事件的；</p><p>第二，新员工也是可以被前台MM代为签收的，即程序中新添加的dom节点也是有事件的。</p><p>为什么要用事件委托：</p><p>一般来说，dom需要有事件处理程序，我们都会直接给它设事件处理程序就好了，那如果是很多的dom需要添加事件处理呢？比如我们有100个li，每个li都有相同的click点击事件，可能我们会用for循环的方法，来遍历所有的li，然后给它们添加事件，那这么做会存在什么影响呢？</p><p>在JavaScript中，添加到页面上的事件处理程序数量将直接关系到页面的整体运行性能，因为需要不断的与dom节点进行交互，访问dom的次数越多，引起浏览器重绘与重排的次数也就越多，就会延长整个页面的交互就绪时间，这就是为什么性能优化的主要思想之一就是减少DOM操作的原因；如果要用事件委托，就会将所有的操作放到js程序里面，与dom的操作就只需要交互一次，这样就能大大的减少与dom的交互次数，提高性能；</p><p>每个函数都是一个对象，是对象就会占用内存，对象越多，内存占用率就越大，自然性能就越差了（内存不够用，是硬伤，哈哈），比如上面的100个li，就要占用100个内存空间，如果是1000个，10000个呢，那只能说呵呵了，如果用事件委托，那么我们就可以只对它的父级（如果只有一个父级）这一个对象进行操作，这样我们就需要一个内存空间就够了，是不是省了很多，自然性能就会更好。</p><h3>事件委托的原理：</h3><p>事件委托是利用事件的冒泡原理来实现的，何为事件冒泡呢？就是事件从最深的节点开始，然后逐步向上传播事件，举个例子：页面上有这么一个节点树，div&gt;ul&gt;li&gt;a;比如给最里面的a加一个click点击事件，那么这个事件就会一层一层的往外执行，执行顺序a&gt;li&gt;ul&gt;div，有这样一个机制，那么我们给最外面的div加点击事件，那么里面的ul，li，a做点击事件的时候，都会冒泡到最外层的div上，所以都会触发，这就是事件委托，委托它们父级代为执行事件。</p><h3>事件委托怎么实现：</h3><p>终于到了本文的核心部分了，哈哈，在介绍事件委托的方法之前，我们先来看一段一般方法的例子：</p><p>子节点实现相同的功能：</p><p><br></p><pre><code class="language-html">&lt;ul id="ul1"&gt;\n    &lt;li&gt;111&lt;/li&gt;\n    &lt;li&gt;222&lt;/li&gt;\n    &lt;li&gt;333&lt;/li&gt;\n    &lt;li&gt;444&lt;/li&gt;\n&lt;/ul&gt;\n</code></pre><p>实现功能是点击li，弹出123：</p><p><br></p><pre><code class="language-javascript">window.onload = function(){\n    var oUl = document.getElementById("ul1");\n    var aLi = oUl.getElementsByTagName(\'li\');\n    for(var i=0;i&lt;aLi.length;i++){\n        aLi[i].onclick = function(){\n            alert(123);\n        }\n    }\n}\n</code></pre><p>上面的代码的意思很简单，相信很多人都是这么实现的，我们看看有多少次的dom操作，首先要找到ul，然后遍历li，然后点击li的时候，又要找一次目标的li的位置，才能执行最后的操作，每次点击都要找一次li；</p><p>那么我们用事件委托的方式做又会怎么样呢？</p><pre><code class="language-javascript">window.onload = function(){\n    var oUl = document.getElementById("ul1");\n   oUl.onclick = function(){\n        alert(123);\n    }\n}\n</code></pre><p>这里用父级ul做事件处理，当li被点击时，由于冒泡原理，事件就会冒泡到ul上，因为ul上有点击事件，所以事件就会触发，当然，这里当点击ul的时候，也是会触发的，那么问题就来了，如果我想让事件代理的效果跟直接给节点的事件效果一样怎么办，比如说只有点击li才会触发，不怕，我们有绝招：</p><p>Event对象提供了一个属性叫target，可以返回事件的目标节点，我们成为事件源，也就是说，target就可以表示为当前的事件操作的dom，但是不是真正操作dom，当然，这个是有兼容性的，标准浏览器用ev.target，IE浏览器用event.srcElement，此时只是获取了当前节点的位置，并不知道是什么节点名称，这里我们用nodeName来获取具体是什么标签名，这个返回的是一个大写的，我们需要转成小写再做比较（习惯问题）：</p><p><br></p><pre><code class="language-javascript">window.onload = function(){\n　　var oUl = document.getElementById("ul1");\n　　oUl.onclick = function(ev){\n　　　　var ev = ev || window.event;\n　　　　var target = ev.target || ev.srcElement;\n　　　　if(target.nodeName.toLowerCase() == \'li\'){\n　 　　　　　　\talert(123);\n　　　　　　　  alert(target.innerHTML);\n　　　　}\n　　}\n}\n</code></pre><p>这样改下就只有点击li会触发事件了，且每次只执行一次dom操作，如果li数量很多的话，将大大减少dom的操作，优化的性能可想而知！</p><p>上面的例子是说li操作的是同样的效果，要是每个li被点击的效果都不一样，那么用事件委托还有用吗？</p><p><br></p><pre><code class="language-html">&lt;div id="box"&gt;\n        &lt;input type="button" id="add" value="添加" /&gt;\n        &lt;input type="button" id="remove" value="删除" /&gt;\n        &lt;input type="button" id="move" value="移动" /&gt;\n        &lt;input type="button" id="select" value="选择" /&gt;\n    &lt;/div&gt;\n\n</code></pre><pre><code class="language-javascript">window.onload = function(){\n            var Add = document.getElementById("add");\n            var Remove = document.getElementById("remove");\n            var Move = document.getElementById("move");\n            var Select = document.getElementById("select");\n\n            Add.onclick = function(){\n                alert(\'添加\');\n            };\n            Remove.onclick = function(){\n                alert(\'删除\');\n            };\n            Move.onclick = function(){\n                alert(\'移动\');\n            };\n            Select.onclick = function(){\n                alert(\'选择\');\n            }\n\n        }\n</code></pre><p>上面实现的效果我就不多说了，很简单，4个按钮，点击每一个做不同的操作，那么至少需要4次dom操作，如果用事件委托，能进行优化吗？</p><p><br></p><pre><code class="language-javascript">window.onload = function(){\n            var oBox = document.getElementById("box");\n            oBox.onclick = function (ev) {\n                var ev = ev || window.event;\n                var target = ev.target || ev.srcElement;\n                if(target.nodeName.toLocaleLowerCase() == \'input\'){\n                    switch(target.id){\n                        case \'add\' :\n                            alert(\'添加\');\n                            break;\n                        case \'remove\' :\n                            alert(\'删除\');\n                            break;\n                        case \'move\' :\n                            alert(\'移动\');\n                            break;\n                        case \'select\' :\n                            alert(\'选择\');\n                            break;\n                    }\n                }\n            }\n\n        }\n</code></pre><p>用事件委托就可以只用一次dom操作就能完成所有的效果，比上面的性能肯定是要好一些的</p><p>现在讲的都是document加载完成的现有dom节点下的操作，那么如果是新增的节点，新增的节点会有事件吗？也就是说，一个新员工来了，他能收到快递吗？</p><p>看一下正常的添加节点的方法：</p><p><br></p><pre><code class="language-html">&lt;input type="button" name="" id="btn" value="添加" /&gt;\n    &lt;ul id="ul1"&gt;\n        &lt;li&gt;111&lt;/li&gt;\n        &lt;li&gt;222&lt;/li&gt;\n        &lt;li&gt;333&lt;/li&gt;\n        &lt;li&gt;444&lt;/li&gt;\n    &lt;/ul&gt;\n</code></pre><p>现在是移入li，li变红，移出li，li变白，这么一个效果，然后点击按钮，可以向ul中添加一个li子节点</p><p><br></p><pre><code class="language-javascript">window.onload = function(){\n            var oBtn = document.getElementById("btn");\n            var oUl = document.getElementById("ul1");\n            var aLi = oUl.getElementsByTagName(\'li\');\n            var num = 4;\n\n            //鼠标移入变红，移出变白\n            for(var i=0; i&lt;aLi.length;i++){\n                aLi[i].onmouseover = function(){\n                    this.style.background = \'red\';\n                };\n                aLi[i].onmouseout = function(){\n                    this.style.background = \'#fff\';\n                }\n            }\n            //添加新节点\n            oBtn.onclick = function(){\n                num++;\n                var oLi = document.createElement(\'li\');\n                oLi.innerHTML = 111*num;\n                oUl.appendChild(oLi);\n            };\n        }\n</code></pre><p>这是一般的做法，但是你会发现，新增的li是没有事件的，说明添加子节点的时候，事件没有一起添加进去，这不是我们想要的结果，那怎么做呢？一般的解决方案会是这样，将for循环用一个函数包起来，命名为mHover，如下：</p><p><br></p><pre><code class="language-javascript">window.onload = function(){\n            var oBtn = document.getElementById("btn");\n            var oUl = document.getElementById("ul1");\n            var aLi = oUl.getElementsByTagName(\'li\');\n            var num = 4;\n\n            function mHover () {\n                //鼠标移入变红，移出变白\n                for(var i=0; i&lt;aLi.length;i++){\n                    aLi[i].onmouseover = function(){\n                        this.style.background = \'red\';\n                    };\n                    aLi[i].onmouseout = function(){\n                        this.style.background = \'#fff\';\n                    }\n                }\n            }\n            mHover ();\n            //添加新节点\n            oBtn.onclick = function(){\n                num++;\n                var oLi = document.createElement(\'li\');\n                oLi.innerHTML = 111*num;\n                oUl.appendChild(oLi);\n                mHover ();\n            };\n        }\n</code></pre><p>虽然功能实现了，看着还挺好，但实际上无疑是又增加了一个dom操作，在优化性能方面是不可取的，那么有事件委托的方式，能做到优化吗？</p><p><br></p><pre><code class="language-javascript">window.onload = function(){\n            var oBtn = document.getElementById("btn");\n            var oUl = document.getElementById("ul1");\n            var aLi = oUl.getElementsByTagName(\'li\');\n            var num = 4;\n\n            //事件委托，添加的子元素也有事件\n            oUl.onmouseover = function(ev){\n                var ev = ev || window.event;\n                var target = ev.target || ev.srcElement;\n                if(target.nodeName.toLowerCase() == \'li\'){\n                    target.style.background = "red";\n                }\n\n            };\n            oUl.onmouseout = function(ev){\n                var ev = ev || window.event;\n                var target = ev.target || ev.srcElement;\n                if(target.nodeName.toLowerCase() == \'li\'){\n                    target.style.background = "#fff";\n                }\n\n            };\n\n            //添加新节点\n            oBtn.onclick = function(){\n                num++;\n                var oLi = document.createElement(\'li\');\n                oLi.innerHTML = 111*num;\n                oUl.appendChild(oLi);\n            };\n        }\n</code></pre><p>看，上面是用事件委托的方式，新添加的子元素是带有事件效果的，我们可以发现，当用事件委托的时候，根本就不需要去遍历元素的子节点，只需要给父级元素添加事件就好了，其他的都是在js里面的执行，这样可以大大的减少dom操作，这才是事件委托的精髓所在。</p><h2>现在有一个问题：</h2><p>现在给一个场景 ul &gt; li &gt; div &gt; p，div占满li，p占\b满div，还是给ul绑定时间，需要判断点击的是不是li（假设li里面的结构是不固定的），那么e.target就可能是p，也有可能是div，这种情况你会怎么处理呢？</p><p>那我们现在就再现一下他给的场景</p><p><br></p><pre><code class="language-html">　　&lt;ul id="test"&gt;\n        &lt;li&gt;\n            &lt;p&gt;11111111111&lt;/p&gt;\n        &lt;/li&gt;\n        &lt;li&gt;\n            &lt;div&gt;\n                22222222\n            &lt;/div&gt;\n        &lt;/li&gt;\n        &lt;li&gt;\n            &lt;span&gt;3333333333&lt;/span&gt;\n        &lt;/li&gt;\n        &lt;li&gt;4444444&lt;/li&gt;\n    &lt;/ul&gt;\n</code></pre><p>如上列表，有4个li，里面的内容各不相同，点击li，event对象肯定是当前点击的对象，怎么指定到li上，下面我直接给解决方案：</p><p><br></p><pre><code class="language-javascript">　　var oUl = document.getElementById(\'test\');\n    oUl.addEventListener(\'click\',function(ev){\n        var target = ev.target;\n        while(target !== oUl ){\n            if(target.tagName.toLowerCase() == \'li\'){\n                console.log(\'li click~\');\n                break;\n            }\n            target = target.parentNode;\n        }\n    })\n</code></pre><p>核心代码是while循环部分，实际上就是一个递归调用，你也可以写成一个函数，用递归的方法来调用，同时用到冒泡的原理，从里往外冒泡，知道currentTarget为止，当当前的target是li的时候，就可以执行对应的事件了，然后终止循环，恩，没毛病！</p><p>这里看不到效果，大家可以复制过去运行一下！</p><h1>优点：</h1><ol><li>减少事件注册，节省内存。比如，在table上代理所有td的click事件。在ul上代理所有li的click事件。</li><li>简化了dom节点更新时，相应事件的更新。比如不用在新添加的li上绑定click事件。当删除某个li时，不用移解绑上面的click事件。</li></ol><h1>缺点：</h1><ol><li>事件委托基于冒泡，对于不冒泡的事件不支持。</li><li>层级过多，冒泡过程中，可能会被某层阻止掉。</li><li>理论上委托会导致浏览器频繁调用处理函数，虽然很可能不需要处理。所以建议就近委托，比如在table上代理td，而不是在document上代理td。</li><li>把所有事件都用代理就可能会出现事件误判。比如，在document中代理了所有button的click事件，另外的人在引用改js时，可能不知道，造成单击button触发了两个click事件。</li></ol><h2>总结：</h2><p>那什么样的事件可以用事件委托，什么样的事件不可以用呢？</p><p>适合用事件委托的事件：click，mousedown，mouseup，keydown，keyup，keypress。</p><p>值得注意的是，mouseover和mouseout虽然也有事件冒泡，但是处理它们的时候需要特别的注意，因为需要经常计算它们的位置，处理起来不太容易。</p><p>不适合的就有很多了，举个例子，mousemove，每次都要计算它的位置，非常不好把控，在不如说focus，blur之类的，本身就没用冒泡的特性，自然就不能用事件委托了。</p>',__v:0,updateByUser:7},{state:1,createTime:o,updateTime:"2024-01-09T03:35:56.584Z",_id:"659caf4eeda0730989cb7ba4",id:25,createByUser:7,name:"[JavaScript] 事件循环（web&node）",html:'<h1 style="text-align: center;">JavaScript事件循环（web&amp;node）</h1><h3>1. 异步执行原理</h3><h4>（1）单线程的JavaScript</h4><p>我们知道，JavaScript是一种<strong>单线程</strong>语言，它主要用来与用户互动，以及操作DOM。</p><p>JavaScript 有同步和异步的概念，这就解决了代码阻塞的问题：</p><ul><li><strong>同步</strong>：如果在一个函数返回的时候，调用者就能够得到预期结果，那么这个函数就是同步的；</li><li><strong>异步</strong>：如果在函数返回的时候，调用者还不能够得到预期结果，而是需要在将来通过一定的手段得到，那么这个函数就是异步的。</li></ul><p><strong>那单线程有什么好处呢？</strong></p><ul><li>在 JS 运行的时候可能会阻止 UI 渲染，这说明了两个线程是互斥的。这是因为 JS 可以修改 DOM，如果在 JS 执行的时候 UI 线程还在工作，就可能导致不能安全的渲染 UI。</li><li>得益于 JS 是单线程运行的，可以达到节省内存，节约上下文切换时间的好处。</li></ul><h4>（2）多线程的浏览器</h4><p>JS 是单线程的，在同一个时间只能做一件事情，<strong>那为什么浏览器可以同时执行异步任务呢？</strong></p><p>这是因为浏览器是多线程的，当 JS 需要执行异步任务时，浏览器会另外启动一个线程去执行该任务。也就是说，JavaScript是单线程的指的是执行JavaScript代码的线程只有一个，是浏览器提供的JavaScript引擎线程（主线程）。除此之外，浏览器中还有定时器线程、 HTTP 请求线程等线程，这些线程主要不是来执行 JS 代码的。</p><p>比如主线程中需要发送数据请求，就会把这个任务交给异步 HTTP 请求线程去执行，等请求数据返回之后，再将 callback 里需要执行的 JS 回调交给 JS 引擎线程去执行。也就是说，浏览器才是真正执行发送请求这个任务的角色，而 JS 只是负责执行最后的回调处理。所以这里的异步不是 JS 自身实现的，而是浏览器为其提供的能力。</p><p>下图是Chrome浏览器的架构图：</p><p><img src="https://hanwujijack.github.io/blog/47.awebp" alt="https://hanwujijack.github.io/blog/47.awebp" data-href="https://hanwujijack.github.io/blog/47.awebp" style=""/></p><p>可以看到，Chrome不仅拥有多个进程，还有多个线程。以渲染进程为例，就包含GUI渲染线程、JS引擎线程、事件触发线程、定时器触发线程、异步HTTP请求线程。这些线程为 JS 在浏览器中完成异步任务提供了基础。</p><h3>2. 浏览器的事件循环</h3><p> JavaScript的任务分为两种<span style="color: rgb(168, 98, 234); background-color: rgb(248, 245, 255);"><code>同步</code></span>和<span style="color: rgb(168, 98, 234); background-color: rgb(248, 245, 255);"><code>异步</code></span>：</p><ul><li><strong>同步任务：</strong> 在主线程上排队执行的任务，只有一个任务执行完毕，才能执行下一个任务，</li><li><strong>异步任务：</strong> 不进入主线程，而是放在任务队列中，若有多个异步任务则需要在任务队列中排队等待，任务队列类似于缓冲区，任务下一步会被移到执行栈然后主线程执行调用栈的任务。</li></ul><p>上面提到了任务队列和执行栈，下面就先来看看这两个概念。</p><h4>（1）执行栈与任务队列</h4><p><strong>1）执行栈</strong>：从名字可以看出，执行栈使用到的是数据结构中的栈结构， 它是一个存储函数调用的栈结构，遵循<strong>先进后出</strong>的原则。<strong>它主要负责跟踪所有要执行的代码。</strong> 每当一个函数执行完成时，就会从堆栈中弹出（pop）该执行完成函数；如果有代码需要进去执行的话，就进行 push 操作。以下图为例：</p><p><img src="https://hanwujijack.github.io/blog/48.awebp" alt="https://hanwujijack.github.io/blog/48.awebp" data-href="https://hanwujijack.github.io/blog/48.awebp" style=""/></p><p>当执行这段代码时，首先会执行一个 main 函数，然后执行我们的代码。根据<strong>先进后出</strong>的原则，后执行的函数会先弹出栈，在图中也可以发现，foo 函数后执行，当执行完毕后就从栈中弹出了。</p><p>JavaScript在按顺序执行执行栈中的方法时，每次执行一个方法，都会为它生成独有的执行环境（上下文)，当这个方法执行完成后，就会销毁当前的执行环境，并从栈中弹出此方法，然后继续执行下一个方法。</p><p><strong>2）任务队列：</strong> 从名字中可以看出，任务队列使用到的是数据结构中的队列结构，它用来保存异步任务，遵循<strong>先进先出</strong>的原则。<strong>它主要负责将新的任务发送到队列中进行处理。</strong></p><p>JavaScript在执行代码时，会将同步的代码按照顺序排在执行栈中，然后依次执行里面的函数。当遇到异步任务时，就将其放入任务队列中，等待当前执行栈所有同步代码执行完成之后，就会从异步任务队列中取出已完成的异步任务的回调并将其放入执行栈中继续执行，如此循环往复，直到执行完所有任务。</p><p>JavaScript任务的执行顺序如下：</p><p><br></p><p><strong>在事件驱动的模式下，至少包含了一个执行循环来检测任务队列中是否有新任务。通过不断循环，去取出异步任务的回调来执行，这个过程就是事件循环，每一次循环就是一个事件周期。</strong></p><h4>（2）宏任务和微任务</h4><p>任务队列其实不止一种，根据任务种类的不同，可以分为<strong>微任务（micro task）队列</strong>和<strong>宏任务（macro task）队列</strong>。常见的任务如下：</p><ul><li><strong>宏任务：</strong> script( 整体代码)、setTimeout、setInterval、I/O、UI 交互事件、setImmediate(Node.js 环境)</li><li><strong>微任务：</strong> Promise、MutaionObserver、process.nextTick(Node.js 环境)；</li></ul><p>任务队列执行顺序如下：</p><p><img src="https://hanwujijack.github.io/blog/49.awebp" alt="https://hanwujijack.github.io/blog/49.awebp" data-href="https://hanwujijack.github.io/blog/49.awebp" style=""/></p><p>可以看到，Eventloop 在处理宏任务和微任务的逻辑时的执行情况如下：</p><ol><li>JavaScript 引擎首先从宏任务队列中取出第一个任务；</li><li>执行完毕后，再将微任务中的所有任务取出，按照顺序分别全部执行（这里包括不仅指开始执行时队列里的微任务），如果在这一步过程中产生新的微任务，也需要执行，<strong>也就是说在执行微任务过程中产生的新的微任务并不会推迟到下一个循环中执行，而是在当前的循环中继续执行。</strong></li><li>然后再从宏任务队列中取下一个，执行完毕后，再次将 microtask queue 中的全部取出，循环往复，直到两个 queue 中的任务都取完。</li></ol><p><strong>也是就是说，一次 Eventloop 循环会处理一个宏任务和所有这次循环中产生的微任务。</strong></p><p>下面通过一个例子来体会事件循环：</p><pre><code class="language-javascript">console.log(\'同步代码1\');\n\nsetTimeout(() =&gt; {\n    console.log(\'setTimeout\')\n}, 0)\n\nnew Promise((resolve) =&gt; {\n  console.log(\'同步代码2\')\n  resolve()\n}).then(() =&gt; {\n    console.log(\'promise.then\')\n})\n\nconsole.log(\'同步代码3\');\n</code></pre><p>代码输出结果如下：</p><pre><code class="language-javascript">"同步代码1"\n"同步代码2"\n"同步代码3"\n"promise.then"\n"setTimeout"\n</code></pre><p>那这段代码执行过程是怎么的呢？</p><ol><li>遇到第一个console，它是同步代码，加入执行栈，执行并出栈，打印出 <strong>"同步代码1"；</strong></li><li>遇到setTimeout，它是一个宏任务，加入宏任务队列；</li><li>遇到new Promise 中的console，它是同步代码，加入执行栈，执行并出栈，打印出 <strong>"同步代码2"；</strong></li><li>遇到Promise then，它是一个微任务，加入微任务队列；</li><li>遇到第三个console，它是同步代码，加入执行栈，执行并出栈，打印出 <strong>"同步代码3"；</strong></li><li>此时执行栈为空，去执行微任务队列中所有任务，打印出 <strong>"promise.then"；</strong></li><li>执行完微任务队列中的任务，就去执行宏任务队列中的一个任务，打印出 <strong>"setTimeout"</strong></li></ol><p><strong>注：更多异步代码执行示例，详见文章：</strong> <a href="https://juejin.cn/post/6959043611161952269" target="_blank">《「2021」高频前端面试题汇总之代码输出结果篇》</a></p><p>从上面的宏任务和微任务的工作流程中，可以得出以下结论：</p><ul><li>微任务和宏任务是绑定的，每个宏任务在执行时，会创建自己的微任务队列。</li><li>微任务的执行时长会影响当前宏任务的时长。比如一个宏任务在执行过程中，产生了 10 个微任务，执行每个微任务的时间是 10ms，那么执行这 10 个微任务的时间就是 100ms，也可以说这 10 个微任务让宏任务的执行时间延长了 100ms。</li><li>在一个宏任务中，分别创建一个用于回调的宏任务和微任务，无论什么情况下，微任务都早于宏任务执行（优先级更高）。</li></ul><p><strong>那么问题来了，为什么要将任务队列分为微任务和宏任务呢，他们之间的本质区别是什么呢？</strong></p><p>JavaScript在遇到异步任务时，会将此任务交给其他线程来执行（比如遇到setTimeout任务，会交给定时器触发线程去执行，待计时结束，就会将定时器回调任务放入任务队列等待主线程来取出执行），主线程会继续执行后面的同步任务。</p><p>对于微任务，比如promise.then，当执行promise.then时，浏览器引擎不会将异步任务交给其他浏览器的线程去执行，而是将任务回调存在一个队列中，当执行栈中的任务执行完之后，就去执行promise.then所在的微任务队列。</p><p>所以，宏任务和微任务的本质区别如下：</p><ul><li>微任务：不需要特定的异步线程去执行，没有明确的异步任务去执行，只有回调；</li><li>宏任务：需要特定的异步线程去执行，有明确的异步任务去执行，有回调；</li></ul><h3>3. Node.js的事件循环</h3><h4>（1）事件循环的概念</h4><p>对于Node.js的事件循环，官网的描述如下：</p><blockquote>When Node.js starts, it initializes the event loop, processes the provided input script (or drops into the REPL, which is not covered in this document) which may make async API calls, schedule timers, or call process.nextTick(), then begins processing the event loop.</blockquote><p>翻译一下就是：当Node.js启动时，它会初始化一个事件循环，来处理输入的脚本，这个脚本可能进行异步API的调用、调度计时器或调用process.nextTick()，然后开始处理事件循环。</p><p>JavaScript和Node.js是基于V8 引擎的，浏览器中包含的异步方式在 NodeJS 中也是一样的。除此之外，Node.js中还有一些其他的异步形式：</p><ul><li>文件 I/O：异步加载本地文件。</li><li>setImmediate()：与 setTimeout 设置 0ms 类似，在某些同步任务完成后立马执行。</li><li>process.nextTick()：在某些同步任务完成后立马执行。</li><li>server.close、socket.on(\'close\',...）等：关闭回调。</li></ul><p>这些异步任务的执行就需要依靠Node.js的事件循环机制了。</p><p>Node.js 中的 Event Loop 和浏览器中的是完全不相同的东西。Node.js使用V8作为js的解析引擎，而I/O处理方面使用了自己设计的libuv，libuv是一个基于事件驱动的跨平台抽象层，封装了不同操作系统一些底层特性，对外提供统一的API，事件循环机制也是它里面的实现的，如下图所示： <img src="https://p3-juejin.byteimg.com/tos-cn-i-k3u1fbpfcp/4fca3d06b2464ce5a6694e0966fa93ff~tplv-k3u1fbpfcp-zoom-in-crop-mark:1512:0:0:0.awebp" alt="" data-href="" style=""/> 根据上图，可以看到Node.js的运行机制如下:</p><ol><li>V8引擎负责解析JavaScript脚本；</li><li>解析后的代码，调用Node API；</li><li>libuv库负责Node API的执行。它将不同的任务分配给不同的线程，形成一个Event Loop（事件循环），以异步的方式将任务的执行结果返回给V8引擎；</li><li>V8引擎将结果返回给用户；</li></ol><h4>（2）事件循环的流程</h4><p>其中libuv引擎中的事件循环分为 6 个阶段，它们会按照顺序反复运行。每当进入某一个阶段的时候，都会从对应的回调队列中取出函数去执行。当队列为空或者执行的回调函数数量到达系统设定的阈值，就会进入下一阶段。下面 是Eventloop 事件循环的流程：</p><p><img src="https://hanwujijack.github.io/blog/50.awebp" alt="https://hanwujijack.github.io/blog/50.awebp" data-href="https://hanwujijack.github.io/blog/50.awebp" style=""/></p><p>整个流程分为六个阶段，当这六个阶段执行完一次之后，才可以算得上执行了一次 Eventloop 的循环过程。下面来看下这六个阶段都做了哪些事：</p><ol><li><span style="color: rgb(168, 98, 234); background-color: rgb(248, 245, 255);"><code>timers</code></span> 阶段：执行timer（setTimeout、setInterval）的回调，由 poll 阶段控制；</li><li><span style="color: rgb(168, 98, 234); background-color: rgb(248, 245, 255);"><code>I/O callbacks</code></span> 阶段：主要执行系统级别的回调函数，比如 TCP 连接失败的回调；</li><li><span style="color: rgb(168, 98, 234); background-color: rgb(248, 245, 255);"><code>idle, prepare</code></span> 阶段：仅Node.js内部使用，可以忽略；</li><li><span style="color: rgb(168, 98, 234); background-color: rgb(248, 245, 255);"><code>poll</code></span> 阶段：轮询等待新的链接和请求等事件，执行 I/O 回调等；</li><li><span style="color: rgb(168, 98, 234); background-color: rgb(248, 245, 255);"><code>check</code></span> 阶段：执行 setImmediate() 的回调；</li><li><span style="color: rgb(168, 98, 234); background-color: rgb(248, 245, 255);"><code>close callbacks</code></span> 阶段：执行关闭请求的回调函数，比如socket.on(\'close\', ...)</li></ol><p>注意：上面每个阶段都会去执行完当前阶段的任务队列，然后继续执行当前阶段的微任务队列，只有当前阶段所有微任务都执行完了，才会进入下个阶段，这里也是与浏览器中逻辑差异较大的地方。</p><p>其中，这里面比较重要的就是第四阶段：poll，这一阶段中，系统主要做两件事：</p><ul><li>回到 timer 阶段执行回调</li><li>执行 I/O 回调</li></ul><p>在进入该阶段时如果没有设定了 timer 的话，会出现以下情况：</p><p>（1）如果 poll 队列不为空，会遍历回调队列并同步执行，直到队列为空或者达到系统限制；</p><p>（2）如果 poll 队列为空时，会出现以下情况：</p><ul><li>如果有 setImmediate 回调需要执行，poll 阶段会停止并且进入到 check 阶段执行回调；</li><li>如果没有 setImmediate 回调需要执行，会等待回调被加入到队列中并立即执行回调，这里同样会有个超时时间设置防止一直等待下去；</li></ul><p>当设定了 timer 且 poll 队列为空，则会判断是否有 timer 超时，如果有的就会回到 timer 阶段执行回调。</p><p>这一过程的具体执行流程如下图所示：</p><p><img src="https://hanwujijack.github.io/blog/51.awebp" alt="https://hanwujijack.github.io/blog/51.awebp" data-href="https://hanwujijack.github.io/blog/51.awebp" style=""/></p><h4>（3）宏任务和微任务</h4><p>Node.js事件循环的异步队列也分为两种：宏任务队列和微任务队列。</p><ul><li>常见的宏任务：setTimeout、setInterval、 setImmediate、script（整体代码）、 I/O 操作等。</li><li>常见的微任务：process.nextTick、new Promise().then(回调)等。</li></ul><h4>（4）process.nextTick() </h4><p>上面提到了process.nextTick()，它是node中新引入的一个任务队列，它会在上述各个阶段结束时，在进入下一个阶段之前立即执行。</p><p>Node.js官方文档的解释如下：</p><blockquote>process.nextTick()is not technically part of the event loop. Instead, thenextTickQueuewill be processed after the current operation is completed, regardless of the current phase of the event loop. Here, an operation is defined as a transition from the underlying C/C++ handler, and handling the JavaScript that needs to be executed.</blockquote><p>例如下面的代码：</p><pre><code class="language-javascript">setTimeout(() =&gt; {\n    console.log(\'timeout\');\n}, 0);\n\nPromise.resolve().then(() =&gt; {\n    console.error(\'promise\')\n})\n\nprocess.nextTick(() =&gt; {\n    console.error(\'nextTick\')\n})\n</code></pre><p>输出结果如下：</p><pre><code class="language-bash">nextTick\npromise\ntimeout\n</code></pre><p>可以看到，process.nextTick()是优先于promise的回调执行。</p><h4>（5）setImmediate 和 setTimeout</h4><p>上面还提到了setImmediate 和 setTimeout，这两者很相似，主要区别在于调用时机的不同：</p><ul><li><strong>setImmediate</strong>：在poll阶段完成时执行，即check阶段；</li><li><strong>setTimeout</strong>：在poll阶段为空闲时，且设定时间到达后执行，但它在timer阶段执行；</li></ul><p>例如下面的代码：</p><pre><code class="language-javascript">setTimeout(() =&gt; {\n  console.log(\'timeout\');\n}, 0);\n\nsetImmediate(() =&gt; {\n  console.log(\'setImmediate\');\n});\n</code></pre><p>输出结果如下：</p><pre><code class="language-bash">timeout\nsetImmediate\n</code></pre><p>在上面代码的执行过程中，第一轮循环后，分别将 setTimeout &nbsp;和 setImmediate 加入了各自阶段的任务队列。第二轮循环首先进入<strong>timers 阶段</strong>，执行定时器队列回调，然后 <strong>pending callbacks</strong>和<strong>poll 阶段</strong>没有任务，因此进入<strong>check 阶段</strong>执行 setImmediate 回调。所以最后输出为timeout、setImmediate。</p><h3>4. <strong>Node与浏览器Event Loop差异</strong></h3><p>Node.js与浏览器的 Event Loop 差异如下：</p><ul><li>Node.js：microtask 在事件循环的各个阶段之间执行；</li><li>浏览器：microtask 在事件循环的 macrotask 执行完之后执行；</li></ul><p> Nodejs和浏览器的事件循环流程对比如下：</p><ol><li>执行全局的 Script 代码（与浏览器无差）；</li><li>把微任务队列清空：注意，Node 清空微任务队列的手法比较特别。在浏览器中，我们只有一个微任务队列需要接受处理；但在 Node 中，有两类微任务队列：next-tick 队列和其它队列。其中这个 next-tick 队列，专门用来收敛 process.nextTick 派发的异步任务。<strong>在清空队列时，优先清空 next-tick 队列中的任务，随后才会清空其它微任务</strong>；</li><li>开始执行 macro-task（宏任务）。注意，Node 执行宏任务的方式与浏览器不同：在浏览器中，我们每次出队并执行一个宏任务；而在 Node 中，我们每次会尝试清空当前阶段对应宏任务队列里的所有任务（除非达到系统限制）；</li><li>步骤3开始，会进入 3 -&gt; 2 -&gt; 3 -&gt; 2…的循环。</li></ol>',__v:0,updateByUser:7},{state:1,createTime:e,updateTime:"2024-01-09T03:36:46.735Z",_id:"659bb81dc58a6f24f80b8c64",id:24,createByUser:7,name:"[vue] Vue 自定义组件中 v-model 的使用",html:'<h1 style="text-align: center; line-height: 1.5;"><a href="https://www.cnblogs.com/hanliukui/p/16687647.html" target=""><span style="color: rgb(0, 0, 0); background-color: rgb(255, 255, 255);">Vue 自定义组件中 v-model 的使用</span></a></h1><h2 style="line-height: 1.5;">Vue2中使用</h2><blockquote>2.2.0+ 新增</blockquote><p>一个组件上的 v-model 默认会利用名为 value 的 prop 和名为 input 的事件，但是像单选框、复选框等类型的输入控件可能会将 value attribute 用于不同的目的。model 选项可以用来避免这样的冲突：</p><pre style="text-align: left;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">Vue.component(\'base-checkbox\', {\nmodel: {\n  prop: \'checked\',\n  event: \'change\'\n},\nprops: {\n\tchecked: Boolean\n},\ntemplate: &lt;input type="checkbox" v-bind:checked="checked" v-on:change="$emit(\'change\', $event.target.checked)" &gt;\n})\n</code></pre><p>现在在这个组件上使用 v-model 的时候：</p><pre style="text-align: left;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">&lt;base-checkbox v-model="lovingVue"&gt;&lt;/base-checkbox&gt;\n</code></pre><p>这里的 lovingVue 的值将会传入这个名为 checked 的 prop。同时当 触发一个 change 事件并附带一个新的值的时候，这个 lovingVue 的 property 将会被更新。</p><blockquote>注意你仍然需要在组件的 props 选项里声明 checked 这个 prop。</blockquote><p><br></p><h2 style="text-align: left; line-height: 1.5;">Vue3中使用</h2><h3 style="text-align: left; line-height: 1.5;">v-model 使用 modelValue</h3><p style="text-align: left;">自定义事件可以用于开发支持 v-model 的自定义表单组件。回忆一下 v-model 在原生元素上的用法：</p><pre style="text-align: left;"><code class="language-html" style="text-align: left; line-height: 1.5;">&lt;input v-model="searchText" /&gt;\n</code></pre><p style="text-align: left;">上面的代码其实等价于下面这段 (编译器会对 v-model 进行展开)：</p><pre style="text-align: left;"><code class="language-html" style="text-align: left; line-height: 1.5;">&lt;input\n  :value="searchText"\n  @input="searchText = $event.target.value"\n/&gt;\n</code></pre><p style="text-align: left;">而当使用在一个组件上时，v-model 会被展开为如下的形式：</p><pre style="text-align: left;"><code class="language-html" style="text-align: left; line-height: 1.5;">&lt;CustomInput\n  :modelValue="searchText"\n  @update:modelValue="newValue =&gt; searchText = newValue"\n/&gt;\n</code></pre><p style="text-align: left;">要让这个例子实际工作起来，</p><ol><li style="text-align: left;">将内部原生 input 元素的 value attribute 绑定到 modelValue prop</li><li style="text-align: left;">输入新的值时在 input 元素上触发 update:modelValue 事件</li></ol><p style="text-align: left;">这里是相应的代码：</p><pre style="text-align: left;"><code class="language-html" style="text-align: left; line-height: 1.5;">&lt;!-- CustomInput.vue --&gt;\n&lt;script&gt;\n  export default {\n    props: [\'modelValue\'],\n    emits: [\'update:modelValue\']\n  }\n&lt;/script&gt;\n\n&lt;template&gt;\n  &lt;input\n    :value="modelValue"\n    @input="$emit(\'update:modelValue\', $event.target.value)"\n    /&gt;\n  &lt;/template&gt;\n</code></pre><p style="text-align: left;">现在 v-model 也可以在这个组件上正常工作了：</p><pre style="text-align: left;"><code class="language-html" style="text-align: left; line-height: 1.5;">&lt;CustomInput v-model="searchText" /&gt;\n</code></pre><p style="text-align: left;">另一种在组件内实现 v-model 的方式是使用一个可写的，同时具有 getter 和 setter 的计算属性。get 方法需返回 modelValue prop，而 set 方法需触发相应的事件：</p><pre style="text-align: left;"><code class="language-html" style="text-align: left; line-height: 1.5;">&lt;!-- CustomInput.vue --&gt;\n&lt;script&gt;\nexport default {\n  props: [\'modelValue\'],\n  emits: [\'update:modelValue\'],\n  computed: {\n    value: {\n      get() {\n        return this.modelValue\n      },\n      set(value) {\n        this.$emit(\'update:modelValue\', value)\n      }\n    }\n  }\n}\n&lt;/script&gt;\n\n&lt;template&gt;\n  &lt;input v-model="value" /&gt;\n&lt;/template&gt;\n</code></pre><h3 style="text-align: left; line-height: 1.5;">自定义 v-model 的使用的参数</h3><p style="text-align: left;">默认情况下，v-model 在组件上都是使用 modelValue 作为 prop，并以 update:modelValue 作为对应的事件。我们可以通过给 v-model 指定一个参数来更改这些名字：</p><pre style="text-align: left;"><code class="language-html" style="text-align: left; line-height: 1.5;">&lt;MyComponent v-model:title="bookTitle" /&gt;\n</code></pre><p style="text-align: left;">在这个例子中，子组件应声明一个 title prop，并通过触发 update:title 事件更新父组件值：</p><pre style="text-align: left;"><code class="language-html" style="text-align: left; line-height: 1.5;">&lt;!-- MyComponent.vue --&gt;\n&lt;script&gt;\nexport default {\n  props: [\'title\'],\n  emits: [\'update:title\']\n}\n&lt;/script&gt;\n\n&lt;template&gt;\n  &lt;input\n    type="text"\n    :value="title"\n    @input="$emit(\'update:title\',
