@nuxtjs/axios @nuxtjs/proxy\n</code></pre><p>安装完成后在 nuxt.config.js 文件里面添加以下配置：</p><pre><code class="language-javascript">module.exports = {\n  // 配置相关依赖模块\n  modules: [\n    \'@nuxtjs/axios\',\n    \'@nuxtjs/proxy\'\n  ],\n  axios: {\n    // 是否开启代理\n    proxy: true,\n    // 尝试请求次数\n    retry: { retries: 3 },\n    //开发模式下开启debug\n    debug: process.env._ENV == "production" ? false : true,\n    // headers 设置\n    headers: { \'Content-Type\': \'application/json\', \'crossDomain\': true },\n    timeout: 5000,\n    // 设置一个请求 baseUrl 这个要与 proxy 中保持一致\n    prefix: "/api"\n  },\n  proxy: {\n    \'/api\': {\n      target: \'http://ts.lagou.uieee.com/api/v2\', // 目标接口域名\n      changeOrigin: true, // 表示是否跨域\n      pathRewrite: {\n        \'^/api\': \'/\', // 把 /api 替换成 /\n      }\n    }\n  },\n  build: {\n    // 防止多次打包\n    vendor: ["axios"]\n  }\n}\n</code></pre><ol><li><strong>扩展 axios</strong></li></ol><p>创建 nuxt 插件，更改全局配置全局配置自定义 axios，在 plugins/ 目录下新建 axios.js 文件：</p><pre><code class="language-javascript">// plugins/axios.js\nexport default function({ $axios, redirect }) {\n  console.log(\'axios 请求插件被调用了！\')\n  $axios.onResponse(res = {\n    return res.data\n  })\n  $axios.onError(error = {\n    const code = parseInt(error.response && error.response.status)\n    if (code === 404) {\n      redirect("/")\n    }\n  });\n}\n</code></pre><p>在 nuxt.config.js 中配置 axios.js 插件：</p><pre><code class="language-javascript">module.exports = {\n  plugins: ["@/plugins/axios"],\n}\n</code></pre><ol><li><strong>使用 axios 插件</strong></li></ol><p>通过上面的设置后，使用 axios 插件需要注意的是在 asyncData 内和在 asyncData 外的使用是所不同的。</p><p>在 asyncData 里使用，服务端请求数据</p><pre><code class="language-javascript">// 请求数据，该方法会运行在服务器端\nasync asyncData( context ){\n    let res = await context.$axios.get("/feeds")\n    return {\n      newsList: res.feeds\n    }\n}\n</code></pre><p>在 asyncData 外使用，客户端请求数据</p><pre><code class="language-javascript">async mounted(){\n    let res = await this.$axios.get("/feeds")\n    console.log(res.feeds )\n}\n</code></pre><h4>4.4 Nuxt ElementUI 按需引用配置</h4><p>Nuxt 使用 create-nuxt-app 创建项目时，选择使用 Element-UI 为默认组件库，发现 Nuxt 没有开启 Element-UI 的按需引入配置，需要自行配置。</p><ol><li><strong>安装依赖</strong></li></ol><p>在 create-nuxt-app 中没有选择 Element-UI 的先安装。</p><pre><code class="language-javascript">npm install element-ui --save\n</code></pre><p>或者</p><pre><code class="language-javascript">yarn add element-ui\n</code></pre><p>Element-UI 开启按需引入，必须安装 babel-plugin-component 插件。</p><pre><code class="language-javascript">npm install babel-plugin-component --save-dev\n</code></pre><p>或者</p><pre><code class="language-javascript">yarn add babel-plugin-component\n</code></pre><ol><li>安装完成依赖后，在 plugins 目录下创建相应的插件文件 element-ui.js</li></ol><pre><code class="language-javascript">// element-ui.js\nimport Vue from \'vue\'\nimport {\n  Container,\n  Header,\n  Aside,\n  Main,\n  Menu,\n  MenuItem,\n  Button,\n  Form,\n  FormItem,\n  Input\n} from \'element-ui\'\nconst components = [\n  Container,\n  Header,\n  Aside,\n  Main,\n  Menu,\n  MenuItem,\n  Button,\n  Form,\n  FormItem,\n  Input\n];\nconst Element = {\n  install (Vue) {\n    components.forEach(component = {\n      Vue.component(component.name, component)\n    })\n  }\n}\n// 全局引入\n// import Element from \'element-ui\'\n\nimport locale from \'element-ui/lib/locale/lang/en\'\nVue.use(Element, { locale })\n</code></pre><ol><li>在 nuxt.config.js 中配置 plugins 选项，通过配置导入插件</li></ol><pre><code class="language-javascript">module.exports = {\n  plugins: ["@/plugins/element-ui"],\n}\n</code></pre><pre><code class="language-has">PS：Nuxt 默认为开启 SSR，采用服务端渲染，也可以手动配置关闭 SSR，配置为：\n</code></pre><pre><code class="language-javascript">module.exports = {\n  plugins: [\n    {\n      src: "@/plugins/element-ui",\n      ssr: false  // 关闭ssr\n    }\n  ],\n}\n</code></pre><ol><li>如果在 create-nuxt-app 中默认选了 Element-UI 的，还需要在 nuxt.config.js 中，将 Element-UI 的全局样式去掉，即：</li></ol><pre><code class="language-javascript">module.exports = {\n  css: [\'element-ui/lib/theme-chalk/index.css\'],\n}\n</code></pre><ol><li>在 nuxt.config.js 文件中 build 选项中配置 babel 选项</li></ol><pre><code class="language-javascript">module.exports = {\n  build: {\n    // 按需引入 element 的样式 webpack 配置\n    babel: {\n      "plugins": [\n        [\n          "component",\n          {\n            "libraryName": "element-ui",\n            "styleLibraryName": "theme-chalk"\n          }\n        ]\n      ]\n    }\n  }\n}\n</code></pre><p>到此，Element-UI 按需引入配置完成。</p><h4>4.5 Nuxt 多语言 i18n 站点配置</h4><p>在 Nuxt 中配置多语言站点逻辑相当复杂，要非常清晰理解到「服务端/客户端」之间的每个关键环节，还要理解多语言模式下的 ElementUI 插件的同步关系等。</p><ol><li>安装nuxt-i18n</li></ol><pre><code class="language-javascript">npm install nuxt-i18n -S\nyarn add nuxt-i18n\n</code></pre><ol><li>新建 lang 文件夹，放置语言包，输出语言包配置信息</li></ol><p>lang/zh.js 配置中文站点下的语言包信息</p><pre><code class="language-javascript">const zh = {\n  home:\'首页\',\n  news:\'新闻中心\',\n  aboutus: \'关于我们\',\n  musicPlayer:\'音乐播放器\'\n}\nexport default zh\n</code></pre><p>lang/en.js 配置英文站点下的语言包信息</p><pre><code class="language-javascript">const en = {\n  home:\'Home\',\n  news:\'NewsList\',\n  aboutus: \'AboutUs\',\n  musicPlayer:\'MusicPlayer\'\n}\nexport default en\n</code></pre><p>lang/Index.js 组合 element-ui 语言包信息及默认语言包配置信息</p><pre><code class="language-javascript">import zh from "./zh.js";\nimport en from "./en.js";\n// 加载element-ui语言包\nimport enLocale from "element-ui/lib/locale/lang/en";\nimport zhLocale from "element-ui/lib/locale/lang/zh-CN";\n// const mergeZH = Object.assign(zhLocale, zh);\n// const mergeEN = Object.assign(enLocale, en);\nconst mergeZH = { ...zhLocale, ...zh };\nconst mergeEN = { ...enLocale, ...en };\nconst langSet = {\n  fallbackLocale: "zh",\n  messages: {\n    en: mergeEN,\n    zh: mergeZH\n  }\n};\nexport default langSet;\n</code></pre><ol><li>在 Plugins 中新建 i18n.js 插件</li></ol><pre><code class="language-javascript">import Vue from \'vue\'\nimport VueI18n from \'vue-i18n\'\n// 引入语言包配置的相关信息\nimport langSet from \'../lang/index\'\n// 引入 element 配置的语言包信息\nimport elementLocale from \'element-ui/lib/locale\'\n\nVue.use(VueI18n)\n\nexport default ({ app, store }) = {\n  app.i18n = new VueI18n({\n    // 要在 store 中配置相应的语言状态，这个状态会在中间件 middleware 中调用（实现客户端、服务端信息共用）\n    locale: store.state.user.lang,\n    ...langSet\n  })\n  // 按需加载配置element\n  elementLocale.i18n((key, value) = app.i18n.t(key, value))\n}\n</code></pre><ol><li>在 nuxt.config.js 中引入配置好的插件文件，这个时候代表 i18n 作为插件引入到咱们系统中</li></ol><pre><code class="language-javascript">plugins: [\n  "@/plugins/axios.js",\n  "@/plugins/element-ui.js",\n  "@/plugins/i18n.js"\n]\n</code></pre><ol><li>在 store user model 中配置相应的语言状态信息</li></ol><pre><code class="language-javascript">const state = () = ({\n  lang: \'zh\',\n  langs: [\'zh\', \'en\'],\n})\nconst mutations = {\n  M_SET_LANG(state, lang){\n    state.lang = lang\n  }\n}\nconst actions = {\n  setLang({ commit }, lang) {\n    commit("M_SET_LANG", lang);\n  },\n}\nexport default {\n  namespaced: true,\n  state,\n  getters,\n  mutations,\n  actions\n}\n</code></pre><ol><li>设置路由中间件：i18n.js，切换语言时，更改路由，同时更新 store 中语言类型</li></ol><pre><code class="language-javascript">export default function ({ isHMR, app, store, route, params, redirect }) {\n  // 如果从热模块替换调用中间件，则忽略它\n  if (isHMR) {\n    return\n  }\n  // 获取语言包中设置的默认语言\n  const defaultLang = app.i18n.fallbackLocale\n  // 获取 state 中保存当前语言状态\n  const lang = store.state.user.lang || defaultLang\n  // 获取 state 中保存的允许语言种类数组\n  const langs = store.state.user.langs\n  // 获取 url 路径中配置的语言状态 \n  const urlLang = params.lang\n\n  // 如果路由没有传递 lang 参数，或者传递的参数不在 langs 数组中\n  if (!urlLang || !langs.includes(urlLang)) {\n    // 如果语言状态设置异常，则追加语言路由地址\n    return redirect(\'/\' + lang + route.fullPath)\n  } else if(urlLang !== lang){\n    // 在 store 中设置新的语言\n    store.commit(\'user/M_SET_LANG\', urlLang)\n    // 设置语言为新的语言体系\n    app.i18n.locale = urlLang\n  }\n}\n</code></pre><ol><li>在 nuxt.config.js 配置路由中间件，同步设置 build 防止多次打包；到此为止，i18n 多语言配置完成，但是调用还有对应的逻辑需要判断</li></ol><pre><code class="language-javascript">router: {\n    middleware: ["auth", "i18n"]\n},\n// 自定义 webpack 配置\nbuild: {\n    // 防止多次打包\n    vendor: ["axios", "vue-i18n"],\n    transpile: [/^element-ui/]\n}\n</code></pre><ol><li>在 pages 文件下将凡是需要多语言配置的页面都移动进 _lang 文件夹内， 也就是说我们以 语言 作为动态路由</li></ol><pre><code class="language-javascript">页组件\n|-- layouts                          // 布局目录，用于组织应用的布局组件，不可更改。\n|-- middleware                       // 用于存放中间件\n|-- pages                            // 用于存放写的页面，我们主要的工作区域\n|-- |-- _lang\n|-- |-- |-- index.vue\n|-- |-- |-- about\n|-- |-- |-- |-- index.vue\n</code></pre><ol><li>在 layouts / default.vue 默认布局文件或者 pages 页面中使用配置的语言</li></ol><pre><code class="language-html">&lt;template&gt;\n  &lt;div&gt;\n    &lt;header&gt;\n      &lt;nuxt-link to="/"&gt;{{ $t("home") }}&lt;/nuxt-link&gt;\n      &lt;nuxt-link to="/news"&gt;{{ $t("news") }}&lt;/nuxt-link&gt;\n      &lt;nuxt-link to="/about"&gt;{{ $t("aboutus") }}&lt;/nuxt-link&gt;\n    &lt;/header&gt;\n    &lt;Nuxt /&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n</code></pre><ol><li>对需要根据语言异步 axios 请求数据的地方，我们根据上下文中 vuex state 中的语言状态来获取</li></ol><pre><code class="language-html">&lt;template&gt;\n  &lt;div class="news"&gt;\n    &lt;nuxt-link v-for="(item, index) in newsList" :key="index" :to=" \'/news/\' + item.id "&gt;\n      &lt;el-button type="success"&gt;{{item.title}}&lt;/el-button&gt;\n    &lt;/nuxt-link&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n\n&lt;script&gt;\nexport default {\n  // 请求数据，该方法会运行在服务器端\n  async asyncData( context ){\n    let res = await context.$axios.get("http://localhost:4000/news-list?num=10&lang="+context.store.state.user.lang)\n    return {\n      newsList: res.list\n    }\n  }\n}\n&lt;/script&gt;\n</code></pre><ol><li>如何在语言包中没有设置语言状态，前端（客户端）可以根据 vuex state 语言逻辑切换显示内容</li></ol><pre><code class="language-html">&lt;template&gt;\n  &lt;div class="about"&gt;\n    &lt;h2&gt; {{title}} &lt;/h2&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n\n&lt;script&gt;\nimport {\n    mapState\n} from \'vuex\'\nexport default {\n  computed: {\n    ...mapState(\'user\',[\n      \'lang\'\n    ]),\n    title(){\n      if(this.lang === \'zh\'){\n        return \'关于我们\'\n      }else{\n        return \'About us\'\n      }\n\n    }\n  }\n}\n&lt;/script&gt;\n</code></pre><ol><li>设置i18n locale ，同时结合 vuex state 来实现语言状态设置和切换</li></ol><pre><code class="language-html">&lt;template&gt;\n  &lt;div&gt;\n    &lt;header&gt;\n      &lt;nuxt-link to="/"&gt;{{ $t("home") }}&lt;/nuxt-link&gt;\n      &lt;nuxt-link to="/news"&gt;{{ $t("news") }}&lt;/nuxt-link&gt;\n      &lt;nuxt-link to="/about"&gt;{{ $t("aboutus") }}&lt;/nuxt-link&gt;\n    &lt;/header&gt;\n    &lt;Nuxt /&gt;\n    &lt;footer&gt;\n      &lt;el-button v-for="(item, index) in langs"\n      :key="index"\n      :disabled="item === lang? true : false"\n      :type=" item === lang ? \'success\':\'primary\' "\n      @click="changeLang(item)"&gt;{{item}}&lt;/el-button&gt;\n    &lt;/footer&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n\n&lt;script&gt;\nimport {\n    mapState,\n    mapActions\n} from \'vuex\'\nexport default {\n  data() {\n    return {};\n  },\n  computed: {\n    ...mapState(\'user\',[\n      \'lang\',\'langs\'\n    ])\n  },\n  methods:{\n    ...mapActions(\'user\', [\n      "setLang"\n    ]),\n    changeLang(lang){\n      // vuex 修改语言状态\n      this.setLang(lang)\n      // 通知 i18n 修改语言状态（仅仅为前端语言状态的改变）\n      this.$i18n.locale = lang\n      // 一旦监听到语言发生改变，则回到系统首页\n      this.$router.push("/")\n    }\n  }\n};\n&lt;/script&gt;\n</code></pre><p>到此为止，我们终于完成了所有的逻辑配置，这个时候我们 ElementUI 中的语言状态也会同步发生更新</p><h4>4.6 Nuxt generate 静态化输出多语言 CMS 站点</h4><p>Generate 静态化打包的目的是为了能够生产出对应的静态文件，这里我们现在需要实现的目的是：</p><ol><li>根据语言包配置，输出对应语言下的独立站点</li><li>根据新闻列表，输出对应语言下的新闻文件</li></ol><pre><code class="language-javascript">// 指定渲染输出的语言类目下的文件体系\ngenerate: {\n \t\t// nuxt generate 生成的目录名称 \n    dir: \'jxnuxt\',\n   // Nuxt.js 在生成静态文件时使用 html-minifier 对 html 文件进行压缩，配置压缩的行为\n    minify: {\n      collapseBooleanAttributes: true,\n      collapseWhitespace: false,\n      decodeEntities: true,\n      minifyCSS: true,\n      minifyJS: true,\n      processConditionalComments: true,\n      removeAttributeQuotes: false,\n      removeComments: false,\n      removeEmptyAttributes: true,\n      removeOptionalTags: true,\n      removeRedundantAttributes: true,\n      removeScriptTypeAttributes: false,\n      removeStyleLinkTypeAttributes: false,\n      removeTagWhitespace: false,\n      sortAttributes: true,\n      sortClassName: false,\n      trimCustomFragments: true,\n      useShortDoctype: true\n    }，\n    // 直接配置的路由在 Nuxt.js 执行 generate 命令时，动态路由 会被忽略\n    // routes: [\'/cn\', \'/en\', \'/cn/news\', \'/en/news\']\n    // 动态参数返回 Promise 对象类型，函数回调是 callback(err, params)\n    async routes(callback) {\n      const langs = ["/en", "/zh"];\n      const urls = ["/", "/news", "/about"];\n      const routes = [];\n      langs.map(lang = {\n        urls.map(url = {\n          routes.push(lang + url);\n        });\n      });\n\n      let res = await axios.get(\n        "http://localhost:4000/news-list?num=10&lang=en"\n      );\n      res.data.list.map(item = {\n        routes.push("/en/news/" + item.id);\n      });\n\n      let resq = await axios.get(\n        "http://localhost:4000/news-list?num=10&lang=zh"\n      );\n      resq.data.list.map(item = {\n        routes.push("/zh/news/" + item.id);\n      });\n\n      callback(null, routes);\n    }\n  }\n}\n\n\n\n\n </code></pre><p><br></p>',__v:0,updateByUser:7},{state:1,createTime:"2024-01-04T02:25:52.885Z",updateTime:"2024-01-08T08:32:52.529Z",_id:"659618fdf5f49032fa436ba2",id:3,createByUser:7,name:"[Nuxt]安装Prismjs",html:"<p><br></p><h3>1.安装 prism.js</h3><p><br></p><pre style=\"text-align: left;\"><code class=\"language-javascript\">npm i --save Prismjs \nnpm i --save babel-plugin-prismjs </code></pre><h3>2.在plugins中添加prism.js代码如下</h3><pre><code class=\"language-javascript\">import Prism from 'prismjs';\nimport 'prismjs/themes/prism-okaidia.css';\nexport default Prism\n</code></pre><h3>3.配置nuxt.config.js文件</h3><p>在这个位置:</p><pre style=\"text-align: left;\"><code class=\"language-javascript\"> babel: {\n      // compact: false,\n      plugins: [\n        [\n          'prismjs',\n          {\n            languages: \"all\",\n            //配置显示行号插件\n            plugins: [\n              // 'toolbar',\n              'line-numbers',\n              'show-language',\n              'copy-to-clipboard'\n            ],\n            theme: 'okaidia', //主体名称\n            css: true\n          }\n        ]\n      ]\n    },\n plugins: [\n    {\n      src: '@/plugins/baidu-seo-push.js',\n      ssr: false\n    },\n    {\n      src: '@/plugins/ga.js',\n      ssr: false\n    },\n    {\n      src: \"@/plugins/prism\",\n      ssr: false\n    },\n  ],\n    </code></pre><p><br></p>",__v:0,updateByUser:7},{state:1,createTime:"2024-01-04T02:13:20.017Z",updateTime:"2024-01-08T08:33:02.875Z",_id:"659615e48ba7e22f58ac6372",id:2,createByUser:7,name:"[Nuxt]百度SEO，自动提交",html:'<h1 style="text-align: center;">百度SEO，自动推送加强收录js代码，自动提交简介</h1><p><br></p><p><a href="https://ziyuan.baidu.com/college/courseinfo?id=267&page=2#h2_article_title18" target="_blank"><strong>什么是自动推送工具？自动推送工具解决了什么问题？</strong></a></p><p>自动推送JS代码是百度搜索资源平台最新推出的轻量级链接提交组件，站长只需将自动推送的JS代码放置在站点每一个页面源代码中，当页面被访问时，页面链接会自动推送给百度，有利于新页面更快被百度发现。</p><p>为了更快速的发现站点每天产生的最新内容，百度搜索资源平台推出API推送工具，产品上线后，部分站长反馈使用API推送方式的技术门槛较高，于是我们顺势推出更低成本的JS自动推送工具。一步安装便可实现页面自动推送，低成本，高收益。</p><p> </p><p><a href="https://ziyuan.baidu.com/college/courseinfo?id=267&page=2#h2_article_title19" target="_blank"><strong>自动推送代码如何安装使用？</strong></a></p><p>站长需要在每个页面的HTML代码中包含以下自动推送JS代码：</p><p> </p><pre><code class="language-javascript" style="text-align: left; line-height: 1.5;">\n&lt;script&gt;\n(function(){\n    var bp = document.createElement(\'script\');\n    var curProtocol = window.location.protocol.split(\':\')[0];\n    if (curProtocol === \'https\'){\n   bp.src = \'https://zz.bdstatic.com/linksubmit/push.js\';\n  }\n  else{\n  bp.src = \'http://push.zhanzhang.baidu.com/push.js\';\n  }\n    var s = document.getElementsByTagName("script")[0];\n    s.parentNode.insertBefore(bp, s);\n})();\n&lt;/script&gt;</code></pre><p> </p><p>如果站长使用PHP语言开发的网站，可以按以下步骤操作：<br>1、创建名为“baidu_js_push.php”的文件，文件内容是上述自动推送JS代码；<br>2、在每个PHP模板页文件中的 &lt;body&gt; 标记后面添加一行代码：<br>&lt;?php include_once("baidu_js_push.php") ?&gt;</p><p> </p><p><a href="https://ziyuan.baidu.com/college/courseinfo?id=267&page=2#h2_article_title20" target="_blank"><strong>为什么自动推送可以更快的将页面推送给百度搜索？</strong></a></p><p>基于自动推送的实现原理问题，当新页面每次被浏览时，页面URL会自动推送给百度，无需站长汇总URL再进行API推送操作。</p><p>借助用户的浏览行为来触发推送动作，省去了站长人工操作的时间。</p><p> </p><p><a href="https://ziyuan.baidu.com/college/courseinfo?id=267&page=2#h2_article_title21" target="_blank"><strong>自动推送和API推送有什么区别？</strong></a></p><p>已经在使用普通收录提交里的API推送（或sitemap）的网站还需要再部署自动推送代码吗？<br> </p><p>二者之间互不冲突，互为补充。已经使用API推送的站点，依然可以部署自动推送的JS代码，二者一起使用。</p><p> </p><p><a href="https://ziyuan.baidu.com/college/courseinfo?id=267&page=2#h2_article_title22" target="_blank"><strong>什么样的网站更适合使用自动推送？</strong></a></p><p>自动推送由于实现便捷和后续维护成本低的特点，适合技术能力相对薄弱，无能力支持全天候实时主动推送程序的站长。</p><p>站长仅需一次部署自动推送JS代码的操作，就可以实现新页面被浏览即推送的效果，低成本实现链接自动提交。</p><p>同时，我们也支持API推送和自动推送代码配合使用，二者互不影响。</p><h3>在nuxt中添加代码</h3><p>plugins中新建baidu-seo-push.js代码如下</p><pre><code class="language-javascript">/*\n** 只在生产模式的客户端中使用\n*/\n/*\n  ** 百度seo-自动push脚本\n  ** https://zz.bdstatic.com/linksubmit/push.js\n  */\n  (function() {\n    var bp = document.createElement(\'script\');\n    bp.id = "baidu_push";\n    var curProtocol = window.location.protocol.split(\':\')[0];\n    if (curProtocol === \'https\'){\n      bp.src = \'https://zz.bdstatic.com/linksubmit/push.js\';\n    }\n    else{\n      bp.src = \'http://push.zhanzhang.baidu.com/push.js\';\n    }\n    var s = document.getElementsByTagName("script")[0];\n    s.parentNode.insertBefore(bp, s);\n  })();\n  /*\n  ** 应用挂载后\n  */\n  window.onNuxtReady((app) =&gt; {\n    app.$nuxt.$on(\'routeChanged\', (to, from) =&gt; {\n      (function() {\n        document.getElementById(\'baidu_push\') && document.getElementById(\'baidu_push\').remove()\n        var bp = document.createElement(\'script\');\n        bp.id = "baidu_push";\n        var curProtocol = window.location.protocol.split(\':\')[0];\n        if (curProtocol === \'https\'){\n          bp.src = \'https://zz.bdstatic.com/linksubmit/push.js\';\n        }\n        else{\n          bp.src = \'http://push.zhanzhang.baidu.com/push.js\';\n        }\n        var s = document.getElementsByTagName("script")[0];\n        s.parentNode.insertBefore(bp, s);\n      })();\n    })\n  })\n</code></pre><p>在nuxt.config.js中<span style="color: rgb(38, 38, 38);">plugins添加如下代码</span></p><pre><code > plugins: [\n    {\n      src: \'@/plugins/baidu-seo-push.js\',\n      ssr: false\n    },\n    {\n      src: \'@/plugins/ga.js\',\n      ssr: false\n    },\n  ],</code></pre><p><br></p>',__v:0,updateByUser:7},{state:1,createTime:"2024-01-04T00:45:48.185Z",updateTime:"2024-01-08T08:33:12.035Z",_id:"659612d9cd15cf0d10117648",id:1,createByUser:7,name:"[Nuxt]Google Analytics",html:'<p style="line-height: 1;"><br></p><h1 style="text-align: center;">GOOGLE ANALYTICS 教程：如何给网站加GA代码</h1><p><br></p><p><br></p><p>Google Analytics ，一般直接简称GA（后续使用简称），是目前使用较为广泛的网站流量分析工具（其实也支持移动app和其他联网设备数据的收集），包括我们熟知的知乎、豆瓣、携程等大流量站点都有使用GA来做网站流量数据的收集。</p><p>本文将介绍如何给网站加GA 代码，并以此作为《Google Analytics 教程》系列文章的第一篇。</p><h3></h3><h3><strong>1. 获取GA 代码</strong></h3><p>进入<a href="https://analytics.google.com/analytics/web/?hl=zh-cn" target="_blank">GA 后台</a> ，点击左上侧管理，选择需要添加代码的网站对应的账号和媒体资源后，依次点击媒体资源下的<span style="font-size: 14px;"><strong>跟踪信息</strong></span>-<span style="font-size: 14px;"><strong>跟踪代码</strong></span>，可以看到如下所示界面：</p><p>红色框线里的代码即是GA 基础代码，也就是本文所说需要加到网站上的GA 代码。</p><p><img src="https://hanwujijack.github.io/blog/1.png" alt="GA" data-href="https://hanwujijack.github.io/blog/1.png" style=""/></p><h3><strong>2. 添加GA 代码到网站</strong></h3><p>复制上述GA 代码，将之添加到网站<span style="font-size: 14px;"><strong>所有需要监测的页面</strong></span>。</p><p>在plugins中添加ga.js代码如下</p><pre><code class="language-javascript">/*\n ** 只在生产模式的客户端中使用\n */\n\n\n(function () {\n  var hm = document.createElement("script");\n  hm.src = "https://www.googletagmanager.com/gtag/js?id=G-N8464N6KV6";\n  hm.async = 1;\n  hm.id = "chrome_fx";\n  var s = document.getElementsByTagName("script")[0];\n  s.parentNode.insertBefore(hm, s);\n  window.dataLayer = window.dataLayer || [];\n  function gtag() {\n    dataLayer.push(arguments);\n  }\n  gtag(\'js\', new Date());\n  gtag(\'config\', \'G-N8464N6KV6\');\n})();\n\n/*\n ** 应用挂载后\n */\nwindow.onNuxtReady((app) =&gt; {\n  app.$nuxt.$on(\'routeChanged\', (to, from) =&gt; {\n    var _hmt = _hmt || [];\n    (function () {\n      document.getElementById(\'chrome_fx\') && document.getElementById(\'chrome_fx\').remove()\n      var hm = document.createElement("script");\n      hm.src = "https://www.googletagmanager.com/gtag/js?id=G-N8464N6KV6";\n      hm.async = 1;\n      hm.id = "chrome_fx";\n      var s = document.getElementsByTagName("script")[0];\n      s.parentNode.insertBefore(hm, s);\n      window.dataLayer = window.dataLayer || [];\n      function gtag() {\n        dataLayer.push(arguments);\n      }\n      gtag(\'js\', new Date());\n      gtag(\'config\', \'G-N8464N6KV6\');\n    })();\n  })\n})</code></pre><h3><strong>在nuxt.config.js文件内</strong><span style="color: rgb(0, 0, 0);">plugins添加</span></h3><pre><code class="language-javascript">plugins: [\n    {\n      src: \'@/plugins/baidu-seo-push.js\',\n      ssr: false\n    },\n    {\n      src: \'@/plugins/ga.js\',\n      ssr: false\n    },\n  ],</code></pre><h3><strong>3. 验证代码添加是否成功</strong></h3><p>要验证代码是否添加成功，方法有很多。比如，可以用浏览器访问下已经添加了GA 代码的页面，然后切换到GA 后台，点击顶部导航<span style="font-size: 14px;"><strong>报告，</strong></span>依次点击<span style="font-size: 14px;"><strong>实时</strong></span>-<span style="font-size: 14px;"><strong>概览，</strong></span>查看下目前是否显示有活跃用户。</p><p>如果你熟悉浏览器开发者工具，可以抓包看下页面打开或者刷新的时候是否有以https://www.google-analytics.com/collect? 开头的请求发出，类似如下所示：</p><p><img src="https://hanwujijack.github.io/blog/2.png" alt="引导" data-href="https://hanwujijack.github.io/blog/2.png" style=""/></p><p>如果有这种请求发出，说明页面上已经成功添加了GA 代码。</p><p>OK，到这里如何添加GA代码就介绍完了，有任何疑问可以留言与我交流哈~</p><p><br></p>',__v:0,updateByUser:7}],pageList:[],info:{}},config:{config:{}}},serverRendered:!0,routePath:"/article/6",config:{_app:{basePath:"/blog/",assetsPath:"/blog/static/",cdnURL:null}}}}("2024-01-08T06:38:37.015Z","2024-01-20T00:44:24.143Z","2024-01-04T02:44:13.279Z","2024-01-09T00:39:54.780Z","2024-01-04T05:36:18.177Z",'<h1 style="text-align: center;">【Nuxt】03 Nuxt2 页面缓存、组件缓存、api缓存</h1><p><br></p><p>基于nuxt.js的<a href="https://so.csdn.net/so/search?q=%E6%9C%8D%E5%8A%A1%E7%AB%AF%E6%B8%B2%E6%9F%93&spm=1001.2101.3001.7020" target="_blank">服务端渲染</a>项目可以通过缓存来优化的场景有以下几点：</p><p><br></p><table style="width: auto; text-align: center;"><tbody><tr><th colspan="1" rowspan="1" width="auto">优化点</th><th colspan="1" rowspan="1" width="auto">参考文档及思路</th><th colspan="1" rowspan="1" width="auto">优化场景/条件</th><th colspan="1" rowspan="1" width="auto">特别说明</th><th colspan="1" rowspan="1" width="auto">检测方法</th></tr><tr><td colspan="1" rowspan="1" width="auto">1. 页面缓存</td><td colspan="1" rowspan="1" width="auto">vue官方文档</td><td colspan="1" rowspan="1" width="auto">页面内容不是用户特定（即对于相同的 URL，总是为所有用户渲染相同的内容）</td><td colspan="1" rowspan="1" width="auto">一般来说，一个页面在服务端做了持久化缓存，那么对应页面的存在的api缓存，组件缓存也就没有意义了，对于页面缓存与api缓存同时存在的情况下（有可能存在），api缓存的时间应该比页面缓存的时间小，这样是为了让api响应的内容保持最新</td><td colspan="1" rowspan="1" width="auto">1、代码本地测试：在asyncData中打印测试日志，页面缓存后，刷新页面后服务端不会输出测试日志；2、比较html页面加载的DOMContentLoaded时间，刷新页面可以看到缓存后的值比首次页面加载(未缓存)的值要小</td></tr><tr><td colspan="1" rowspan="1" width="auto">2. api缓存</td><td colspan="1" rowspan="1" width="auto">在axios请求与响应拦截器中去做</td><td colspan="1" rowspan="1" width="auto">接口响应内容不是用户特定（即对于相同的api接口URL，即总是为所有用户响应相同的内容)</td><td colspan="1" rowspan="1" width="auto">一般请求方式为GET的api请求</td><td colspan="1" rowspan="1" width="auto">比较首次请求与缓存后的api接口响应的时间</td></tr><tr><td colspan="1" rowspan="1" width="auto">3. 组件缓存</td><td colspan="1" rowspan="1" width="auto">nuxtjs官网文档 vue 官网文档</td><td colspan="1" rowspan="1" width="auto">不依赖与全局状态，对渲染上下文不产生副作用的子组件</td><td colspan="1" rowspan="1" width="auto">要缓存的组件name值必须唯一，serverCacheKey根据某个prop的值作为唯一key</td><td colspan="1" rowspan="1" width="auto">检测方法同页面缓存检测方法一致，这个可能几乎察觉不到</td></tr><tr><td colspan="1" rowspan="1" width="auto">4. asyncData函数优化</td><td colspan="1" rowspan="1" width="auto">Promise.all</td><td colspan="1" rowspan="1" width="auto">该函数中请求api接口数超过1个，多的甚至达到10,20多个，这种情况我们不能使用async await，请求完一个再接着请求下一个(同步请求接口)；如果有10个接口需要请求，每个接口平均响应1s，那么至少需要10s才会响应html页面；如果使用Promise.all异步请求10个接口，那么最快接近1s响应html页面；</td><td colspan="1" rowspan="1" width="auto">asyncData函数会在服务端执行代码，因此一定要做好容错处理；另外如果该函数代码一直未执行完，那么页面首次响应将会被挂起，一直处于加载中</td><td colspan="1" rowspan="1" width="auto">对于页面首次加载，该函数执行耗时越短，页面响应时间就越短(页面加载越快)</td></tr></tbody></table><h3>1、页面缓存功能模块实现</h3><p>我们在项目根目录中创建一个文件 ~/serverMiddleware/page-cache.js</p><pre><code class="language-javascript">import LRUCache from \'lru-cache\'\n\nconst cache = new LRUCache({\n maxAge: 1000 * 60 * 2, // 有效期2分钟\n max: 1000 // 最大缓存数量\n})\n\nexport default function(req, res, next) {\n // 本地开发环境不做页面缓存\n if (process.env.NODE_ENV !== \'development\') {\n try {\n  const cacheKey = req.url\n  const cacheData = cache.get(cacheKey)\n  if (cacheData) {\n  return res.end(cacheData, \'utf8\')\n  }\n  const originalEnd = res.end\n  res.end = function(data) {\n  cache.set(cacheKey, data)\n  originalEnd.call(res, ...arguments)\n  }\n } catch(error) {\n  // console.log(`page-cache-middleware: ${error}`)\n  next()\n }\n }\n next()\n}\n</code></pre><h3>2、api缓存功能模块实现</h3><p>我们在项目根目录中分别创建两个文件 ~/plugins/axios/createCacheKey.js 与 ~/plugins/axios/cache.js ；特别坑的一点是nuxt.<a href="https://so.csdn.net/so/search?q=js%E5%BC%80%E5%8F%91&spm=1001.2101.3001.7020" target="_blank">js开发</a>环境cache.js插件代码在页面刷新，路由切换都相当于首次运行，因此你会发现缓存功能失效，只有在 process.env.NODE_ENV === ‘production’ 生产环境中测试有效</p><pre><code class="language-javascript">// ～/plugins/axios/createCacheKey.js\n\n\nimport md5 from \'md5\'\n\n/**\n * 根据请求配置，是否是请求拦截器 创建缓存key\n * @param {Object} config\n * @param {Boolean} isRequest \n */\n\nexport default function createCacheKey(\n config = {},\n isRequest = false\n) {\n const {\n url,\n data,\n params,\n method,\n baseURL,\n } = config || {}\n\n let commonUrl = url\n\n /**\n * request拦截器中config.url是未拼接baseURL的，response拦截器中response.config.url是拼接过baseURL的，\n * 为了保持统一，使用统一拼接baseURL的commonUrl；注意下面的if条件判断\n */\n if (isRequest && !commonUrl.match(baseURL) && !commonUrl.match(/^https?/)) {\n commonUrl = !!baseURL.match(/.+\\/$/) ? `${baseURL.replace(/\\/$/, \'\')}${url}` : `${baseURL}${url}`\n }\n\n // 根据请求指令，url，body体，参数生成规则\n const rule = `method=${method}-url=${commonUrl}-data=${JSON.stringify(data || {})}-params=${JSON.stringify(params || {})}`\n\n // md5加密\n return md5(rule)\n}\n</code></pre><pre><code class="language-javascript">// ～/plugins/axios/cache.js\nimport LRUCache from \'lru-cache\'\nimport axios from \'axios\'\nimport globalConfig from \'../../global-config\'\nimport createCacheKey from \'./createCacheKey\'\n\nconst cache = new LRUCache({\n maxAge: 1000 * 60, // 有效期60秒，如果存在页面缓存，api缓存的时间应该比页面缓存的时间小，这样是为了让api响应的内容保持最新\n max: 1000 // 最大缓存数量\n})\n\n/**\n * matchCacheCondition 是否满足持久化缓存条件：服务端运行时 && 非本地开发环境 && api请求为get请求方式\n * @param {Object} config 请求配置\n */\nfunction matchCacheCondition(config = {}) {\n return process.server && process.env.NODE_ENV !== \'development\' && config.method.toLowerCase() === \'get\'\n}\n\n/**\n * 如果所有页面都启用了缓存，api缓存就没有必要了\n */\nexport default function({ $axios, redirect }) {\n $axios.interceptors.request.use(config =&gt; {\n const { baseUrl } = globalConfig\n config.baseURL = baseUrl[process.env.environment] || baseUrl[\'other\']\n\n // 不满足缓存条件直接return config\n if (!matchCacheCondition(config)) {\n  return config\n }\n\n const cacheKey = createCacheKey(config, true)\n const cacheData = cache.get(cacheKey)\n\n if (cacheData) {\n  const source = axios.CancelToken.source()\n  config.cancelToken = source.token\n  source.cancel({ cacheData, cacheKey, url: config.url })\n  return config\n }\n\n return config\n })\n\n $axios.interceptors.response.use(response =&gt; {\n if (matchCacheCondition(response.config)) {\n  cache.set(createCacheKey(response.config), response)\n }\n return response\n }, (error) =&gt; {\n if (axios.isCancel(error) && matchCacheCondition(response.config)) {\n  // console.log(`当前页面组件asyncData或者fetch函数中被缓存的接口url为：${error.message.url}`)\n  return Promise.resolve(error.message.cacheData)\n }\n\n // 服务端打印api接口请求错误日志\n if (process.server) {\n  try {\n  const {\n   config: {\n   url\n   },\n   message\n  } = error || {}\n  console.log(`请求url：${url}，错误消息：${message}`)\n  } catch(error) {\n  // console.log(error)\n  }\n }\n\n // 服务端，客户端统一reject错误对象，因此页面组件asyncData，fetch函数请求api接口一定要做catch处理\n return Promise.reject(error)\n })\n}\n</code></pre><h3>3、组件缓存</h3><p>vue官网文档原话：如果 renderer 在组件渲染过程中进行缓存命中，那么它将直接重新使用整个子树的缓存结果。这意味着在以下情况，你不应该缓存组件：</p><ul><li>它具有可能依赖于全局状态的子组件。</li><li>它具有对渲染上下文产生副作用(side effect)的子组件。</li><li>因此，应该小心使用组件缓存来解决性能瓶颈。在大多数情况下，你不应该也不需要缓存单一实例组件。适用于缓存的最常见类型的组件，是在大的 v-for 列表中重复出现的组件。由于这些组件通常由数据库集合(database collection)中的对象驱动，它们可以使用简单的缓存策略：使用其唯一 id，再加上最后更新的时间戳，来生成其缓存键(cache key)：</li></ul><pre><code class="language-javascript">const LRU = require(\'lru-cache\')\nmodule.exports = {\n  render: {\n    bundleRenderer: {\n      cache: LRU({\n        max: 1000, // 缓存队列长度\n        maxAge: 1000 * 60 // 缓存1分钟\n     })\n   }\n }\n}\n</code></pre><p>需要做缓存的 vue 组件， 需增加 name 以及 serverCacheKey 字段，以确定缓存的唯一键值。</p><pre><code class="language-javascript">\nexport default {\n  name: \'zzZyHome\',\n  props: [\'type\'],\n  serverCacheKey: props =&gt; props.type + \'::\' + props.item.last_updated\n}\n</code></pre><h3>4、页面组件asyncData函数优化</h3><p>举一个简单的例子进行优化</p><pre><code class="language-javascript">{\n async asyncData({ $axios }) {\n // 1、增加catch处理，是为了让服务端，客户端运行时不报错，特别是防止服务端运行时不报错，不然页面就挂了\n // 2、catch函数返回一个resolve空字面量对象的Promise，表明dataPromise1的状态未来始终是resolved状态\n const dataPromise1 = $axios.get(\'/api/data1\').catch(() =&gt; Promise.resolve({}))\n\n const dataPromise2 = $axios.get(\'/api/data2\').catch(() =&gt; Promise.resolve({}))\n const dataPromise3 = $axios.get(\'/api/data3\').catch(() =&gt; Promise.resolve({}))\n const dataPromise4 = $axios.get(\'/api/data4\').catch(() =&gt; Promise.resolve({}))\n const dataPromise5 = $axios.get(\'/api/data5\').catch(() =&gt; Promise.resolve({}))\n const dataPromise6 = $axios.get(\'/api/data6\').catch(() =&gt; Promise.resolve({}))\n const dataPromise7 = $axios.get(\'/api/data7\').catch(() =&gt; Promise.resolve({}))\n const dataPromise8 = $axios.get(\'/api/data8\').catch(() =&gt; Promise.resolve({}))\n\n // 保证apiData有数据\n const apiData = await new Promise(resolve =&gt; {\n  Promise.all([\n  dataPromise1, dataPromise2, dataPromise3, dataPromise4,\n  dataPromise5, dataPromise6, dataPromise7, dataPromise8,\n  ])\n  .then(dataGather =&gt; {\n   resolve({\n   data1: dataGather[0],\n   data2: dataGather[1],\n   data3: dataGather[2],\n   data4: dataGather[3],\n   data5: dataGather[4],\n   data6: dataGather[5],\n   data7: dataGather[6],\n   data8: dataGather[7],\n   })\n  })\n })\n\n return apiData\n }\n}\n\n\n\n\n </code></pre><p><br></p>',"[Nuxt]03 Nuxt2 页面缓存、组件缓存、api缓存","2024-01-19T04:39:13.960Z")</script><script src="/blog/static/c973c3f.js" defer></script><script src="/blog/static/97df99b.js" defer></script><script src="/blog/static/7fd3430.js" defer></script><script src="/blog/static/3b63c59.js" defer></script><script src="/blog/static/b2eec6f.js" defer></script><script src="/blog/static/1745880.js" defer></script><script src="/blog/static/7470f18.js" defer></script><script src="/blog/static/6c8b94b.js" defer></script><script src="/blog/static/3405695.js" defer></script><script src="/blog/static/e665389.js" defer></script><script src="/blog/static/8a4078d.js" defer></script><script src="/blog/static/be10192.js" defer></script><script src="/blog/static/0ebf135.js" defer></script><script src="/blog/static
