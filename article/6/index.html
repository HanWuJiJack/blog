      Hsueh</a></p> <p class="copyright" data-v-166de2b0>Copyright© 2023-2024</p></footer></div></div></div><script>window.__NUXT__=function(e,n,t,o,r,l,a,s){return{layout:"nor",data:[{html:l,name:a}],fetch:{},error:null,state:{article:{list:[{state:1,createTime:n,updateTime:"2024-01-20T03:49:21.858Z",_id:"65ab422f43b1d10bbf69c798",id:36,createByUser:7,name:"[Nuxt.js]实战和配置",html:'<h2 style="text-align: center;">[Nuxt.js]实战和配置</h2><p>前段时间刚好公司有项目使用了Nuxt.js来搭建，而刚好在公司内部做了个分享，稍微再整理一下发出来。本文比较适合初用Nuxt.js的同学，主要讲下搭建过程中做的一些配置。建议初次使用Nuxt.js的同学先过一遍<a href="https://link.segmentfault.com/?enc=VK7vjTQ0w4xECZYJHjIKqw%3D%3D.lney1KE56gykBe5NfaQR6JmVFaQFhrPlPIG7ehOvj7U%3D" target="_blank">官方文档</a>，再回头看下我这篇文章。</p><h2>一、为什么要用Nuxt.js</h2><p>原因其实不用多说，就是利用Nuxt.js的服务端渲染能力来解决Vue项目的SEO问题。</p><h2>二、Nuxt.js和纯Vue项目的简单对比</h2><h3>1. build后目标产物不同</h3><p>vue: dist</p><p>nuxt: .nuxt</p><h3>2. 网页渲染流程</h3><p>vue: 客户端渲染，先下载js后，通过ajax来渲染页面；</p><p>nuxt： 服务端渲染，可以做到服务端拼接好html后直接返回，首屏可以做到无需发起ajax请求；</p><h3>3. 部署流程</h3><p>vue： 只需部署dist目录到服务器，没有服务端，需要用nginx等做Web服务器；</p><p>nuxt： 需要部署几乎所有文件到服务器（除node_modules，.git），自带服务端，需要pm2管理（部署时需要reload pm2），若要求用域名，则需要nginx做代理。</p><h3>4. 项目入口</h3><p>vue: <span style="color: var(--bs-code-color);"><code>/src/main.js</code></span>，在main.js可以做一些全局注册的初始化工作；<br>nuxt: 没有main.js入口文件，项目初始化的操作需要通过<span style="color: var(--bs-code-color);"><code>nuxt.config.js</code></span>进行配置指定。</p><h2>三、从零搭建一个Nuxt.js项目并配置</h2><h3>新建一个项目</h3><p>直接使用脚手架进行安装：</p><pre style="line-height: 1.5;"><code>npx create-nuxt-app &lt;项目名&gt;</code></pre><p>值得一说的是，关于<span style="color: var(--bs-code-color);"><code>Choose custom server framework</code></span>（选择服务端框架），可以根据你的业务情况选择一个服务端框架，常见的就是Express、Koa，默认是None，即Nuxt默认服务器，我这里选了<span style="color: var(--bs-code-color);"><code>Express</code></span>。</p><ul><li>选择默认的Nuxt服务器，不会生成<span style="color: var(--bs-code-color);"><code>server</code></span>文件夹，所有服务端渲染的操作都是Nuxt帮你完成，无需关心服务端的细节，开发体验更接近Vue项目，缺点是无法做一些服务端定制化的操作。</li><li>选择其他的服务端框架，比如<span style="color: var(--bs-code-color);"><code>Express</code></span>，会生成<span style="color: var(--bs-code-color);"><code>server</code></span>文件夹，帮你搭建一个基本的Node服务端环境，可以在里面做一些node端的操作。比如我公司业务需要（解析protobuf）使用了<span style="color: var(--bs-code-color);"><code>Express</code></span>，对真正的服务端api做一层转发，在node端解析protobuf后，返回json数据给客户端。</li></ul><p>还有<span style="color: var(--bs-code-color);"><code>Choose Nuxt.js modules</code></span>（选择nuxt.js的模块），可以选<span style="color: var(--bs-code-color);"><code>axios</code></span>和<span style="color: var(--bs-code-color);"><code>PWA</code></span>,如果选了axios，则会帮你在nuxt实例下注册<span style="color: var(--bs-code-color);"><code>$axios</code></span>，让你可以在.vue文件中直接<span style="color: var(--bs-code-color);"><code>this.$axios</code></span>发起请求。</p><h3>开启eslint检查</h3><p>在<span style="color: var(--bs-code-color);"><code>nuxt.config.js</code></span>的build属性下添加:</p><pre style="line-height: 1.5;"><code>  build: {\n    extend (config, ctx) {\n      // Run ESLint on save\n      if (ctx.isDev &amp;&amp; ctx.isClient) {\n        config.module.rules.push({\n          enforce: \'pre\',\n          test: /\\.(js|vue)$/,\n          loader: \'eslint-loader\',\n          exclude: /(node_modules)/\n        })\n      }\n    }\n  }</code></pre><p>这样开发时保存文件就可以检查语法了。nuxt默认使用的规则是<a href="https://link.segmentfault.com/?enc=%2BldeJXyWNRzfEOsqmU%2B5Dg%3D%3D.y12XJqHBp3uXpkkwfZ%2FVPzJCrICsOx6u61S2WMt71wJTtmDZknWvUVBSuplxlPHL" target="_blank">@nuxtjs</a>（底层来自<a href="https://link.segmentfault.com/?enc=pSeJRi2NpICavFgdyXI2pw%3D%3D.Opj882W7NBppvJ3o7Nk5KTmNXQdCR3CX31HWz1FeEKKJkOrMHPhjHMsVHcJbU1thsPwwzYh1oGW1gkMgU0UAzA%3D%3D" target="_blank">eslint-config-standard</a>），规则配置在<span style="color: var(--bs-code-color);"><code>/.eslintrc.js</code></span>:</p><pre style="line-height: 1.5;"><code>module.exports = {\n  root: true,\n  env: {\n    browser: true,\n    node: true\n  },\n  parserOptions: {\n    parser: \'babel-eslint\'\n  },\n  extends: [\n    \'@nuxtjs\', // 该规则对应这个依赖： @nuxtjs/eslint-config\n    \'plugin:nuxt/recommended\'\n  ],\n  // add your custom rules here\n  rules: {\n    \'nuxt/no-cjs-in-config\': \'off\'\n  }\n}\n</code></pre><p>如果不习惯用<span style="color: var(--bs-code-color);"><code>standard</code></span>规则的团队可以将<span style="color: var(--bs-code-color);"><code>@nuxtjs</code></span>改成其他的。</p><h3>使用dotenv和@nuxtjs/dotenv统一管理环境变量</h3><p>在node端，我们喜欢使用<span style="color: var(--bs-code-color);"><code>dotenv</code></span>来管理项目中的环境变量，把所有环境变量都放在根目录下的<span style="color: var(--bs-code-color);"><code>.env</code></span>中。</p><ul><li>安装：</li></ul><pre style="line-height: 1.5;"><code>npm i dotenv</code></pre><ul><li>使用：</li></ul><ol><li>在根目录下新建一个<span style="color: var(--bs-code-color);"><code>.env</code></span>文件，并写上需要管理的环境变量，比如服务端地址<span style="color: var(--bs-code-color);"><code>APIHOST</code></span>:</li></ol><pre style="line-height: 1.5;"><code>APIHOST=http://your_server.com/api</code></pre><ol><li>在<span style="color: var(--bs-code-color);"><code>/server/index.js</code></span>中使用（该文件是选Express服务端框架自动生成的）：</li></ol><pre style="line-height: 1.5;"><code>require(\'dotenv\').config()\n\n// 通过process.env即可使用\nconsole.log(process.env.APIHOST) // http://your_server.com/api</code></pre><p>此时我们只是让服务端可以使用<span style="color: var(--bs-code-color);"><code>.env</code></span>的文件而已，Nuxt客户端并不能使用<span style="color: var(--bs-code-color);"><code>.env</code></span>，按<a href="https://link.segmentfault.com/?enc=t6mWIOu4kKfUHt1Uih8XtA%3D%3D.%2BCMTaefXpPLehDVmsDi69R8IRc4PJ1uKa9QRA9Fat8g6v4iEt75uRMvhOm2Kg4X1" target="_blank">Nuxt.js文档</a>所说，可以将客户端的环境变量放置在<span style="color: var(--bs-code-color);"><code>nuxt.config.js</code></span>中：</p><pre style="line-height: 1.5;"><code>module.exports = {\n  env: {\n    baseUrl: process.env.BASE_URL || \'http://localhost:3000\'\n  }\n}</code></pre><p>但如果node端和客户端需要使用同一个环境变量时(后面讲到API鉴权时会使用同一个SECRET变量)，就需要同时在<span style="color: var(--bs-code-color);"><code>nuxt.config.js</code></span>和<span style="color: var(--bs-code-color);"><code>.env</code></span>维护这个字段，比较麻烦，我们更希望环境变量只需要在一个地方维护，所以为了解决这个问题，我找到了<span style="color: var(--bs-code-color);"><code>@nuxtjs/dotenv</code></span>这个依赖，它使得nuxt的客户端也可以直接使用<span style="color: var(--bs-code-color);"><code>.env</code></span>，达到了我们的预期。</p><ul><li>安装：</li></ul><pre style="line-height: 1.5;"><code>npm i @nuxtjs/dotenv</code></pre><p>客户端也是通过<span style="color: var(--bs-code-color);"><code>process.env.XXX</code></span>来使用，不再举例啦。</p><p>这样，我们通过<span style="color: var(--bs-code-color);"><code>dotenv</code></span>和<span style="color: var(--bs-code-color);"><code>@nuxtjs/dotenv</code></span>这两个包，就可以统一管理开发环境中的变量啦。</p><p>另外，<span style="color: var(--bs-code-color);"><code>@nuxtjs/dotenv</code></span>允许打包时指定其他的env文件。比如，开发时我们使用的是<span style="color: var(--bs-code-color);"><code>.env</code></span>，但我们打包的线上版本想用其他的环境变量，此时可以指定build时用另一份文件如<span style="color: var(--bs-code-color);"><code>/.env.prod</code></span>，只需在<span style="color: var(--bs-code-color);"><code>nuxt.config.js</code></span>指定：</p><pre style="line-height: 1.5;"><code>module.exports = {\n    modules: [\n    [\'@nuxtjs/dotenv\', { filename: \'.env.prod\' }] // 指定打包时使用的dotenv\n  ],\n}</code></pre><h3>@nuxtjs/toast模块</h3><p>toast可以说是很常用的功能，一般的UI框架都会有这个功能。但如果你的站点没有使用UI框架，而alert又太丑，不妨引入该模块：</p><pre style="line-height: 1.5;"><code>npm install @nuxtjs/toast</code></pre><p>然后在<span style="color: var(--bs-code-color);"><code>nuxt.config.js</code></span>中引入</p><pre style="line-height: 1.5;"><code>module.exports = {\n    modules: [\n    \'@nuxtjs/toast\',\n    [\'@nuxtjs/dotenv\', { filename: \'.env.prod\' }] // 指定打包时使用的dotenv\n  ],\n  toast: {// toast模块的配置\n    position: \'top-center\', \n    duration: 2000\n  }\n}</code></pre><p>这样，nuxt就会在全局注册<span style="color: var(--bs-code-color);"><code>$toast</code></span>方法供你使用，非常方便：</p><pre style="line-height: 1.5;"><code>this.$toast.error(\'服务器开小差啦~~\')\nthis.$toast.error(\'请求成功~~\')</code></pre><h3>API鉴权</h3><p>对于某些敏感的服务，我们可能需要对API进行鉴权，防止被人轻易盗用我们node端的API，因此我们需要做一个API的鉴权机制。常见的方案有jwt，可以参考一下阮老师的介绍：<a href="https://link.segmentfault.com/?enc=zIO4AZPAWL1yVrt38AcaiA%3D%3D.B3CsuZ%2BtV8FdvnKsbTk5uiqgTqT1h49s2IQnCUry8PQy%2ByH2UmS5UxwThkMYwl8G5k9SQFJytmLkULEaV6k4q8lkfeJEsZhHBYklD0k5I2c%3D" target="_blank">《JSON Web Token 入门教程》</a>。如果场景比较简单，可以自行设计一下，这里提供一个思路：</p><ol><li>客户端和node端在环境变量中声明一个秘钥：SECRET=xxxx，注意这个是保密的;</li><li>客户端发起请求时，将当前时间戳(timestamp)和<span style="color: var(--bs-code-color);"><code>SECRET</code></span>通过某种算法，生成一个<span style="color: var(--bs-code-color);"><code>signature</code></span>，请求时带上<span style="color: var(--bs-code-color);"><code>timestamp</code></span>和<span style="color: var(--bs-code-color);"><code>signature</code></span>；</li><li>node接收到请求，获得<span style="color: var(--bs-code-color);"><code>timestamp</code></span>和<span style="color: var(--bs-code-color);"><code>signature</code></span>，将<span style="color: var(--bs-code-color);"><code>timestamp</code></span>和秘钥用同样的算法再生成一次签名<span style="color: var(--bs-code-color);"><code>_signature</code></span></li><li>对比客户端请求的<span style="color: var(--bs-code-color);"><code>signature</code></span>和node用同样的算法生成的<span style="color: var(--bs-code-color);"><code>_signature</code></span>，如果一致就表示通过，否则鉴权失败。</li></ol><p>具体的步骤：</p><p>客户端对axios进行一层封装：</p><pre style="line-height: 1.5;"><code>import axios from \'axios\'\nimport sha256 from \'crypto-js/sha256\'\nimport Base64 from \'crypto-js/enc-base64\'\n// 加密算法，需安装crypto-js\nfunction crypto (str) {\n  const _sign = sha256(str)\n  return encodeURIComponent(Base64.stringify(_sign))\n}\n\nconst SECRET = process.env.SECRET\n\nconst options = {\n  headers: { \'X-Requested-With\': \'XMLHttpRequest\' },\n  timeout: 30000,\n  baseURL: \'/api\'\n}\n\n// The server-side needs a full url to works\nif (process.server) {\n  options.baseURL = `http://${process.env.HOST || \'localhost\'}:${process.env.PORT || 3000}/api`\n  options.withCredentials = true\n}\n\nconst instance = axios.create(options)\n// 对axios的每一个请求都做一个处理，携带上签名和timestamp\ninstance.interceptors.request.use(\n  config =&gt; {\n    const timestamp = new Date().getTime()\n    const param = `timestamp=${timestamp}&amp;secret=${SECRET}`\n    const sign = crypto(param)\n    config.params = Object.assign({}, config.params, { timestamp, sign })\n    return config\n  }\n)\n\nexport default instance</code></pre><p>接着，在server端写一个鉴权的中间件，<span style="color: var(--bs-code-color);"><code>/server/middleware/verify.js</code></span>：</p><pre style="line-height: 1.5;"><code>const sha256 = require(\'crypto-js/sha256\')\nconst Base64 = require(\'crypto-js/enc-base64\')\n\nfunction crypto (str) {\n  const _sign = sha256(str)\n  return encodeURIComponent(Base64.stringify(_sign))\n}\n// 使用和客户端相同的一个秘钥\nconst SECRET = process.env.SECRET\n\nfunction verifyMiddleware (req, res, next) {\n  const { sign, timestamp } = req.query\n  // 加密算法与请求时的一致\n  const _sign = crypto(`timestamp=${timestamp}&amp;secret=${SECRET}`)\n  if (_sign === sign) {\n    next()\n  } else {\n    res.status(401).send({\n      message: \'invalid token\'\n    })\n  }\n}\n\nmodule.exports = { verifyMiddleware }</code></pre><p>最后，在需要鉴权的路由中引用这个中间件, <span style="color: var(--bs-code-color);"><code>/server/index.js</code></span>：</p><pre style="line-height: 1.5;"><code>const { Router } = require(\'express\')\nconst { verifyMiddleware } = require(\'../middleware/verify.js\')\nconst router = Router()\n\n// 在需要鉴权的路由加上\nrouter.get(\'/test\', verifyMiddleware, function (req, res, next) {\n    res.json({name: \'test\'})\n})</code></pre><h3>静态文件的处理</h3><p>根目录下有个<span style="color: var(--bs-code-color);"><code>/static</code></span>文件夹，我们希望这里面的文件可以直接通过url访问，需要在<span style="color: var(--bs-code-color);"><code>/server/index.js</code></span>中加入一句：</p><pre style="line-height: 1.5;"><code>const express = require(\'express\')\nconst app = express()\n\napp.use(\'/static\', express.static(\'static\'))</code></pre><h2>四、Nuxt开发相关</h2><h3>生命周期</h3><p>Nuxt扩展了Vue的生命周期，大概如下：</p><pre style="line-height: 1.5;"><code>export default {\n  middleware () {}, //服务端\n  validate () {}, // 服务端\n  asyncData () {}, //服务端\n  fetch () {}, // store数据加载\n  beforeCreate () {  // 服务端和客户端都会执行},\n  created () { // 服务端和客户端都会执行 },\n  beforeMount () {}, \n  mounted () {} // 客户端\n}</code></pre><h3>asyncData</h3><p>该方法是Nuxt最大的一个卖点，服务端渲染的能力就在这里，首次渲染时务必使用该方法。<br>asyncData会传进一个context参数，通过该参数可以获得一些信息，如：</p><pre style="line-height: 1.5;"><code>export default {\n  asyncData (ctx) {\n    ctx.app // 根实例\n    ctx.route // 路由实例\n    ctx.params  //路由参数\n    ctx.query  // 路由问号后面的参数\n    ctx.error   // 错误处理方法\n  }\n}</code></pre><h3>渲染出错和ajax请求出错的处理</h3><ul><li>asyncData渲染出错</li></ul><p>使用<span style="color: var(--bs-code-color);"><code>asyncData</code></span>钩子时可能会由于服务器错误或api错误导致无法渲染，此时页面还未渲染出来，需要针对这种情况做一些处理，当遇到asyncData错误时，跳转到错误页面，nuxt提供了<span style="color: var(--bs-code-color);"><code>context.error</code></span>方法用于错误处理，在asyncData中调用该方法即可跳转到错误页面。</p><pre style="line-height: 1.5;"><code>export default {\n    async asyncData (ctx) {\n        // 尽量使用try catch的写法，将所有异常都捕捉到\n        try {\n            throw new Error()\n        } catch {\n            ctx.error({statusCode: 500, message: \'服务器开小差了~\' })\n        }\n    }\n}</code></pre><p>这样，当出现异常时会跳转到<a href="https://link.segmentfault.com/?enc=p3cFerd4psY5ymwMHDXOcQ%3D%3D.reLhrSsfEaQRK6Qqks%2B5MnZ%2F%2BhmemdZv2pzRvWaDXFv1Q9cd8RxuppjWmbfGmKp6UOiY%2FdGxvJy8nj10sO3mL8Z0Bn8B4oqPwF8DNIPYN9o%3D" target="_blank">默认的错误页</a>，错误页面可以通过<span style="color: var(--bs-code-color);"><code>/layout/error.vue</code></span>自定义。</p><p>这里会遇到一个问题，<span style="color: var(--bs-code-color);"><code>context.error</code></span>的参数必须是类似<span style="color: var(--bs-code-color);"><code>{ statusCode: 500, message: \'服务器开小差了~\' }</code></span>，<span style="color: var(--bs-code-color);"><code>statusCode</code></span>必须是http状态码，<br>而我们服务端返回的错误往往有一些其他的自定义代码，如<span style="color: var(--bs-code-color);"><code>{resultCode: 10005, resultInfo: \'服务器内部错误\' }</code></span>，此时需要对返回的api错误进行转换一下。</p><p>为了方便，我引入了<span style="color: var(--bs-code-color);"><code>/plugins/ctx-inject.js</code></span>为context注册一个全局的错误处理方法： <span style="color: var(--bs-code-color);"><code>context.$errorHandler(err)</code></span>。注入方法可以参考：<a href="https://link.segmentfault.com/?enc=iXfC1Y91QE6wZ3NUjha1aA%3D%3D.WhwwAC2T9JZ6gmiT9bKrO%2BXvxLh2tRQsiUM1mCLQKghsZ8l9JrkYep6fJqAmx5CXe8kDdb%2FyBLeO%2B97dhr%2FQdrDVrc2LoDugr65gak2z0pc%3D" target="_blank">注入 $root 和 context</a>，<span style="color: var(--bs-code-color);"><code>ctx-inject.js</code></span>:</p><pre style="line-height: 1.5;"><code>// 为context注册全局的错误处理事件\nexport default (ctx, inject) =&gt; {\n  ctx.$errorHandler = err =&gt; {\n    try {\n      const res = err.data\n      if (res) {\n        // 由于nuxt的错误页面只能识别http的状态码，因此statusCode统一传500，表示服务器异常。\n        ctx.error({ statusCode: 500, message: res.resultInfo })\n      } else {\n        ctx.error({ statusCode: 500, message: \'服务器开小差了~\' })\n      }\n    } catch {\n      ctx.error({ statusCode: 500, message: \'服务器开小差了~\' })\n    }\n  }\n}</code></pre><p>然后在<span style="color: var(--bs-code-color);"><code>nuxt.config.js</code></span>使用该插件：</p><pre style="line-height: 1.5;"><code>export default {\n  plugins: [\n    \'~/plugins/ctx-inject.js\'\n  ]\n}</code></pre><p>注入完毕，我们就可以在<span style="color: var(--bs-code-color);"><code>asyncData</code></span>介个样子使用了：</p><pre style="line-height: 1.5;"><code>export default {\n    async asyncData (ctx) {\n        // 尽量使用try catch的写法，将所有异常都捕捉到\n        try {\n            throw new Error()\n        } catch(err) {\n            ctx.$errorHandler(err)\n        }\n    }\n}</code></pre><ul><li>ajax请求出错</li></ul><p>对于ajax的异常，此时页面已经渲染，出现错误时不必跳转到错误页，可以通过<span style="color: var(--bs-code-color);"><code>this.$toast.error(res.message)</code></span> toast出来即可。</p><h3>loading方法</h3><p>nuxt内置了页面顶部<a href="https://link.segmentfault.com/?enc=5EFmJ1Y%2BabhfdSpIWP76wg%3D%3D.hTv2HfkkWcL%2B%2FAb1Uae85jyFnHdKuaxdnNndaSbPqv6AkFHGV8vSI4mDpwwpkSppP5fGNP33b0o4JVe%2BMpVabLegexHfUKfoAWh%2BcT%2F20IZEfC40bVf%2F87RgHg5tzfNu" target="_blank">loading进度条的样式</a><br>推荐使用，提供页面跳转体验。<br>打开： <span style="color: var(--bs-code-color);"><code>this.$nuxt.$loading.start()</code></span><br>完成： <span style="color: var(--bs-code-color);"><code>this.$nuxt.$loading.finish()</code></span></p><h3>打包部署</h3><p>一般来说，部署前可以先在本地打包，本地跑一下确认无误后再上传到服务器部署。命令：</p><pre style="line-height: 1.5;"><code>// 打包\nnpm run build\n// 本地跑\nnpm start</code></pre><p>除node_modules，.git,.env，将其他的文件都上传到服务器，然后通过<span style="color: var(--bs-code-color);"><code>pm2</code></span>进行管理,可以在项目根目录建一个<span style="color: var(--bs-code-color);"><code>pm2.json</code></span>方便维护：</p><pre style="line-height: 1.5;"><code>{\n  "name": "nuxt-test",\n  "script": "./server/index.js",\n  "instances": 2,\n  "cwd": "."\n}</code></pre><p>然后配置生产环境的环境变量，一般是直接用<span style="color: var(--bs-code-color);"><code>.env.prod</code></span>的配置：<span style="color: var(--bs-code-color);"><code>cp ./.env.prod ./.env</code></span>。<br>首次部署或有新的依赖包，需要在服务器上<span style="color: var(--bs-code-color);"><code>npm install</code></span>一次，然后就可以用<span style="color: var(--bs-code-color);"><code>pm2</code></span>启动进程啦：</p><pre style="line-height: 1.5;"><code>// 项目根目录下运行\npm2 start ./pm2.json</code></pre><p>需要的话，可以设置开机自动启动pm2: <span style="color: var(--bs-code-color);"><code>pm2 save &amp;&amp; pm2 startup</code></span>。<br>需要注意的是，每次部署都得重启一下进程:<span style="color: var(--bs-code-color);"><code>pm2 reload nuxt-test</code></span>。</p><h2>五、最后</h2><p>Nuxt.js引入了Node，同时<span style="color: var(--bs-code-color);"><code>nuxt.config.js</code></span>替代了<span style="color: var(--bs-code-color);"><code>main.js</code></span>的一些作用，目录结构和vue项目都稍有不同，增加了很多的约定，对于初次接触的同学可能会觉得非常陌生，更多的内容还是得看一遍官方的文档。</p>',__v:0,updateByUser:7},{state:1,createTime:n,updateTime:"2024-01-20T03:30:39.839Z",_id:"65ab39db43b1d10bbf69c765",id:35,createByUser:7,name:"[vite]",html:'<h2 style="text-align: center; line-height: 1.5;">深入浅出vite</h2><h3 style="line-height: 1.5;">1、前端构建工具的痛点</h3><ul><li>模块化方面，提供模块加载方案，并兼容不同的模块规范。</li><li>语法转译方面，配合 Sass、TSC、Babel 等前端工具链，完成高级语法的转译功能，同时对于静态资源也能进行处理，使之能作为一个模块正常加载。</li><li>产物质量方面，在生产环境中，配合 Terser等压缩工具进行代码压缩和混淆，通过 Tree Shaking 删除未使用的代码，提供对于低版本浏览器的语法降级处理等等。</li><li>开发效率方面，构建工具本身通过各种方式来进行性能优化，包括使用原生语言 Go/Rust、no-bundle等等思路，提高项目的启动性能和热更新的速度。</li></ul><p><img src="https://hanwujijack.github.io/blog/77.png" alt="https://hanwujijack.github.io/blog/77.png" data-href="https://hanwujijack.github.io/blog/77.png" style=""/><img src="https://img2023.cnblogs.com/blog/2338509/202308/2338509-20230823163456944-459085595.png" alt="" data-href="" style="height: auto;"/></p><p>一般的项目使用 Webpack 之后，启动花个几分钟都是很常见的事情，热更新也经常需要等待十秒以上。这主要是因为：</p><ul><li>项目冷启动时必须<strong>递归打包</strong>整个项目的依赖树</li><li>JavaScript 语言本身的性能限制，导致构建性能遇到瓶颈，直接影响开发效率</li></ul><p> Vite 很好地解决了这些问题。</p><ul><li>Vite 在开发阶段基于浏览器原生 ESM 的支持实现了<code><strong>no-bundle</strong></code>服务</li><li>借助 <strong>Esbuild</strong> 超快的编译速度来做第三方库构建和 TS/JSX 语法编译，从而能够有效提高开发效率</li><li>模块化方面，Vite 基于浏览器原生 ESM 的支持实现模块加载，并且无论是开发环境还是生产环境，都可以将其他格式的产物(如 CommonJS)转换为 ESM。</li><li>语法转译方面，Vite 内置了对 TypeScript、JSX、Sass 等高级语法的支持，也能够加载各种各样的静态资源，如图片、Worker 等等。</li><li>产物质量方面，Vite 基于成熟的打包工具 Rollup 实现生产环境打包，同时可以配合Terser、Babel等工具链，可以极大程度保证构建产物的质量。</li></ul><h3 style="line-height: 1.5;">2、前端三大模块规范：<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>CommonJS</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>AMD</code></span> 和 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>ES Module</code></span></h3><h3 style="line-height: 1.5;">CommonJS 规范</h3><p>存在的问题：</p><ol><li>模块加载器由 Node.js 提供，依赖了 Node.js 本身的功能实现，比如文件系统，如果<span style="color: rgb(153, 51, 0);"> CommonJS 模块直接放到浏览器中是无法执行的</span>。当然, 业界也产生了 <a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Fbrowserify%2Fbrowserify" target="_blank">browserify</a> 这种打包工具来支持打包 CommonJS 模块，从而顺利在浏览器中执行，相当于社区实现了一个第三方的 loader。</li><li>CommonJS 本身约定以同步的方式进行模块加载，这种加载机制放在服务端是没问题的。但如果这种加载机制放到浏览器端，会带来明显的性能问题。它会产生大量同步的模块请求，浏览器要等待响应返回后才能继续解析模块。也就是说，模块请求会<span style="color: rgb(153, 51, 0);">造成浏览器 JS 解析过程的阻塞</span>，导致页面加载速度缓慢。</li></ol><h3 style="line-height: 1.5;">AMD 规范</h3><p><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>AMD</code></span>全称为<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Asynchronous Module Definition</code></span>，即异步模块定义规范。</p><p>存在的问题：</p><ul><li>没有得到浏览器的原生支持，AMD 规范需要由第三方的 loader 来实现，最经典的就是 <a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Frequirejs%2Frequirejs" target="_blank">requireJS</a> 库了</li><li>代码阅读和书写都比较困难</li></ul><h3 style="line-height: 1.5;">ES6 Module</h3><p>由 ECMAScript 官方提出的模块化规范，作为一个官方提出的规范，<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>ES Module</code></span> 已经得到了现代浏览器的内置支持。</p><p>在现代浏览器中，如果在 HTML 中加入含有<span style="color: rgb(153, 51, 0);"><code>type="module"</code></span>属性的 script 标签，那么浏览器会按照 ES Module 规范来进行依赖加载和模块解析，这也是 Vite 在开发阶段实现 <span style="color: rgb(153, 51, 0);">no-bundle</span> 的原因，由于模块加载的任务交给了浏览器，即使不打包也可以顺利运行模块代码。</p><h3 style="line-height: 1.5;">3、vite从0开始搭建前端项目</h3><p>命令：</p><p><br></p><pre><code class="language-bash">pnpm create vite</code></pre><p> Vite 默认会把项目根目录下的<span style="color: rgb(255, 102, 0);"><code>index.html</code></span>作为入口文件。也就是说，当你访问<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>http://localhost:3000</code></span>的时候，Vite 的 <span style="color: rgb(255, 102, 0);">Dev Server</span> 会自动返回这个 HTML 文件的内容。</p><p> index.html：在 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>body</code></span> 标签中除了 id 为 root 的根节点之外，还包含了一个声明了<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>type="module"</code></span>的 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>script</code></span> 标签。</p><p>　　由于现代浏览器原生支持了 ES 模块规范，因此原生的 ES 语法也可以直接放到浏览器中执行，只需要在 script 标签中声明 <span style="color: rgb(255, 102, 0);"><code>type="module" </code></span>即可。</p><p>　　比如index.html文件中的 script 标签就声明了 type="module"，同时 src 指向了<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>/src/main.tsx</code></span>文件，此时相当于请求了<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>http://localhost:3000/src/main.tsx</code></span>这个资源，Vite 的 Dev Server 此时会接受到这个请求，然后读取对应的文件内容，进行一定的中间处理，最后将处理的结果返回给浏览器。</p><p><br></p><pre><code class="language-javascript">&lt;script type="module" src="/src/main.tsx"&gt;&lt;/script&gt;</code></pre><p> Vite 所倡导的<span style="color: rgb(255, 102, 0);"><code>no-bundle</code></span>理念的真正含义: </p><p>　　利用浏览器原生 ES 模块的支持，实现开发阶段的 Dev Server，进行模块的按需加载，而不是先整体打包再进行加载。</p><p>　　相比 Webpack 这种必须打包再加载的传统构建模式，Vite 在开发阶段省略了繁琐且耗时的打包过程，这也是它为什么快的一个重要原因。</p><p>开发环境：Vite项目中一个import表示一个http请求，Dev Server拦截这些请求，并将请求资源转译为浏览器能运行的文件后返回。实现开发环境不打包（no-bundle），快速预览项目运行结果。</p><p>生产环境：在生产环境中Vite会使用Rollup对文件进行打包，在配置文件中通过 <span style="color: rgb(255, 102, 0);">root</span> 选项可以指定项目入口文件，本节的项目中还使用了tsc做ts的类型检查（只进行类型检查，不输出产物）。</p><p><span style="color: rgb(255, 102, 0);">vite dev server</span> 的本质就是拦截请求，并将请求内容转成浏览器支持的格式。</p><h3 style="line-height: 1.5;"> 4、PostCSS</h3><p>由于有 CSS 代码的 AST (抽象语法树)解析能力，PostCSS 可以做的事情非常多，甚至能实现 CSS 预处理器语法和 CSS Modules，社区当中也有不少的 PostCSS 插件，常见的插件包括:</p><ul><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Fcuth%2Fpostcss-pxtorem" target="_blank">postcss-pxtorem</a>： 用来将 px 转换为 rem 单位，在适配移动端的场景下很常用。</li><li>autoprefixer：用来自动为不同的目标浏览器添加样式前缀，解决的是浏览器兼容性的问题</li><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Fcsstools%2Fpostcss-preset-env" target="_blank">postcss-preset-env</a>: 通过它，你可以编写最新的 CSS 语法，不用担心兼容性问题。</li><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Fcssnano%2Fcssnano" target="_blank">cssnano</a>: 主要用来压缩 CSS 代码，跟常规的代码压缩工具不一样，它能做得更加智能，比如提取一些公共样式进行复用、缩短一些常见的属性值等等。</li></ul><p>CSS In JS</p><p>社区中有两款主流的<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>CSS In JS</code></span> 方案: <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>styled-components</code></span>和<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>emotion</code></span>。</p><h3 style="line-height: 1.5;"> 5、预构建</h3><p><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>no-bundle</code></span>只是对于源代码(业务代码)而言，对于第三方依赖而言，Vite 还是选择 bundle(打包)，并且使用速度极快的打包器 Esbuild 来完成这一过程。</p><p><strong>为什么需要预构建：</strong></p><ul><li>将其他格式(如 UMD 和 CommonJS)的产物转换为 ESM 格式，使其在浏览器通过 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>&lt;script type="module"&gt;&lt;script&gt;</code></span>的方式正常加载。</li><li>打包第三方库的代码，将各个第三方库分散的文件合并到一起，减少 HTTP 请求数量，避免页面加载性能劣化。<br>在这种<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>依赖层级深</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>涉及模块数量多</code></span>的情况下，会触发成百上千个网络请求，巨大的请求量加上 Chrome 对同一个域名下只能同时支持 <code><strong>6 个</strong></code> HTTP 并发请求的限制，导致页面加载十分缓慢</li></ul><p><strong>预构建产物：</strong></p><p>根目录下的<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>node_modules</code></span>中发现<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>.vite</code></span>目录，这就是预构建产物文件存放的目录。</p><p>对于依赖的请求结果，Vite 的 Dev Server 会设置强缓存，缓存过期时间被设置为一年。</p><p>除了 HTTP 缓存，Vite 还设置了本地文件系统的缓存，所有的预构建产物默认缓存在<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>node_modules/.vite</code></span>目录中。如果以下 3 个地方都没有改动，Vite 将一直使用缓存文件:</p><ol><li>package.json 的 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>dependencies</code></span> 字段</li><li>各种包管理器的 lock 文件</li><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>optimizeDeps</code></span> 配置内容</li></ol><p>清除缓存：</p><ol><li>删除<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>node_modules/.vite</code></span>目录。</li><li>在 Vite 配置文件中，将<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>server.force</code></span>设为<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>true</code></span>。(注意，Vite 3.0 中配置项有所更新，你需要将 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>optimizeDeps.force</code></span> 设为<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>true</code></span>)</li><li>命令行执行<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>npx vite --force</code></span>或者<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>npx vite optimize</code></span>。</li></ol><p><strong>自定义配置：</strong></p><p>1、入口文件----<span style="color: rgb(255, 102, 0);">entries</span>：</p><p>在项目第一次启动时，Vite 会默认抓取项目中所有的 HTML 文件（如当前脚手架项目中的<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>index.html</code></span>），</p><p>将 HTML 文件作为应用入口，然后根据入口文件扫描出项目中用到的第三方依赖，最后对这些依赖逐个进行编译。</p><p>当默认扫描 HTML 文件的行为无法满足需求的时候，比如项目入口为<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>vue</code></span>格式文件时，你可以通过 entries 参数来配置。</p><p>2、添加一些依赖----<span style="color: rgb(255, 102, 0);">include</span></p><p>Vite 会根据应用入口(<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>entries</code></span>)自动搜集依赖，然后进行预构建，这是不是说明 Vite 可以百分百准确地搜集到所有的依赖呢？事实上并不是，某些情况下 Vite 默认的扫描行为并不完全可靠，这就需要联合配置<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>include</code></span>来达到完美的预构建效果了。</p><p>场景：动态import</p><p>3、依赖包被手动<span style="color: rgb(255, 102, 0);">exclude</span></p><p>遇到了要在预构建中排除某个包的情况，需要注意<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>它所依赖的包</code></span>是否具有 ESM 格式。</p><p>第三方包出现了问题该怎么办，分别给你介绍了两个解决思路: 通过<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>patch-package</code></span>修改库代码和编写 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Esbuild 插件</code></span>修改模块加载的内容。 </p><h3 style="line-height: 1.5;">6、vite双引擎架构</h3><p>开发环境：<span style="color: rgb(255, 102, 0);">esbuild</span>（性能好，速度快）</p><p>Esbuild 作为打包工具的缺点：</p><ul><li>不支持降级到 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>ES5</code></span> 的代码。这意味着在低端浏览器代码会跑不起来。</li><li>不支持 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>const enum</code></span> 等语法。这意味着单独使用这些语法在 esbuild 中会直接抛错。</li><li>不提供操作打包产物的接口，像 Rollup 中灵活处理打包产物的能力(如<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>renderChunk</code></span>钩子)在 Esbuild 当中完全没有。</li><li>不支持自定义 Code Splitting 策略。传统的 Webpack 和 Rollup 都提供了自定义拆包策略的 API，而 Esbuild 并未提供，从而降级了拆包优化的灵活性。</li></ul><p>Vite 在开发阶段使用它成功启动项目并获得极致的性能提升，生产环境处于稳定性考虑当然是采用功能更加丰富、生态更加成熟的 Rollup 作为依赖打包工具了。</p><p> 生产环境：<span style="color: rgb(255, 102, 0);">Rollup</span></p><p>基于 Rollup 本身成熟的打包能力进行扩展和优化，主要包含 3 个方面:</p><ol><li>CSS 代码分割。如果某个异步模块中引入了一些 CSS 代码，Vite 就会自动将这些 CSS 抽取出来生成单独的文件，提高线上产物的缓存复用率。</li><li>自动预加载。Vite 会自动为入口 chunk 的依赖自动生成预加载标签&lt;link rel="modulepreload"&gt; 。</li><li>异步 Chunk 加载优化。比如A和B同时以来了C。Rollup 打包之后，会先请求 A，然后浏览器在加载 A 的过程中才决定请求和加载 C。但 Vite 进行优化之后，请求 A 的同时会自动预加载 C，通过优化 Rollup 产物依赖加载方式可以减少请求的延迟。</li></ol><p>Esbuild除了在开发环境进行依赖预构建，还可以介入生产环境的<span style="color: rgb(255, 102, 0);">代码转译和代码压缩</span>，凭借的正是它无比优异的构建性能，也就是快！</p><p>在 Esbuild 打包的过程会有几个关键环节，TS/JS 编译、模块打包、代码压缩，这几个环节在 Esbuild 都能够达到 <span style="color: rgb(255, 102, 0);">AST 的复用</span>，而在 webpack 中就做不到。</p><p>7、Esbuild</p><p> </p><h3 style="line-height: 1.5;">8、Rollup</h3><p>Rollup 具有天然的 <span style="color: rgb(255, 102, 0);"><code>Tree Shaking</code></span> 功能，可以分析出未使用到的模块并自动擦除。这是由于Rollup 可以在编译阶段分析出依赖关系，对 AST 语法树中没有使用到的节点进行删除，从而实现 Tree Shaking。</p><p>虽然 Rollup 能够打包<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>输出</code></span>出 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>CommonJS</code></span> 格式的产物，但对于<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>输入</code></span>给 Rollup 的代码<span style="color: rgb(255, 102, 0);">并不支持 CommonJS</span>，仅仅支持 ESM。</p><p>2个核心插件：</p><ul><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>@rollup/plugin-node-resolve</code></span>是为了允许我们加载第三方依赖，否则像<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>import React from \'react\'</code></span> 的依赖导入语句将不会被 Rollup 识别。</li><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>@rollup/plugin-commonjs</code></span> 的作用是将 CommonJS 格式的代码转换为 ESM 格式。</li></ul><p>其他常用的插件库：</p><ul><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Frollup%2Fplugins%2Ftree%2Fmaster%2Fpackages%2Fjson" target="_blank">@rollup/plugin-json</a>： 支持<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>.json</code></span>的加载，并配合<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>rollup</code></span>的<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Tree Shaking</code></span>机制去掉未使用的部分，进行按需打包。</li><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Frollup%2Fplugins%2Ftree%2Fmaster%2Fpackages%2Fbabel" target="_blank">@rollup/plugin-babel</a>：在 Rollup 中使用 Babel 进行 JS 代码的语法转译。</li><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Frollup%2Fplugins%2Ftree%2Fmaster%2Fpackages%2Ftypescript" target="_blank">@rollup/plugin-typescript</a>: 支持使用 TypeScript 开发。</li><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Frollup%2Fplugins%2Ftree%2Fmaster%2Fpackages%2Falias" target="_blank">@rollup/plugin-alias</a>：支持别名配置。</li><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Frollup%2Fplugins%2Ftree%2Fmaster%2Fpackages%2Freplace" target="_blank">@rollup/plugin-replace</a>：在 Rollup 进行变量字符串的替换。</li><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Fbtd%2Frollup-plugin-visualizer" target="_blank">rollup-plugin-visualizer</a>: 对 Rollup 打包产物进行分析，自动生成产物体积可视化分析图。</li><li>rollup-plugin-terser：压缩代码。</li></ul><h3 style="line-height: 1.5;">9、Rollup的插件机制</h3><p>插件机制：Rollup 设计出了一套完整的插件机制，将自身的核心逻辑与插件逻辑分离，让你能按需引入插件功能，提高了 Rollup 自身的可扩展性。</p><p>生命周期钩子：Rollup 的打包过程中，会定义一套完整的构建生命周期，从开始打包到产物输出，中途会经历一些标志性的阶段，并且在不同阶段会自动执行对应的插件钩子函数(Hook)。</p><p>Rollup整体构建阶段的逻辑可以简化为 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Build</code></span> 和 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Output</code></span> 两大阶段：</p><p><br></p><pre><code class="language-javascript">// Build 阶段\nconst bundle = await rollup.rollup(inputOptions);\n// Output 阶段\nawait Promise.all(outputOptions.map(bundle.write));\n// 构建结束\nawait bundle.close();\n</code></pre><p>打包如下代码为例：</p><p><br></p><pre><code class="language-javascript">// src/index.js\nimport { a } from \'./module-a\';\nconsole.log(a);\n\n// src/module-a.js\nexport const a = 1;\n</code></pre><h4>1、Build阶段：</h4><p>Build 阶段主要负责创建模块依赖图，初始化各个模块的 AST 以及模块之间的依赖关系。</p><p>下面为一个bundle对象的信息：</p><p><br></p><pre><code class="language-javascript">{\n      ast: \'AST 节点信息，具体内容省略\',\n      code: \'export const a = 1;\',\n      dependencies: [],\n      id: \'/Users/code/rollup-demo/src/data.js\',\n      // 其它属性省略\n},\n</code></pre><p>目前经过 Build 阶段的 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>bundle</code></span> 对象其实并没有进行模块的打包，这个对象的作用在于存储各个模块的内容及依赖关系，同时暴露<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>generate</code></span>和<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>write</code></span>方法，以进入到后续的 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Output</code></span> 阶段（<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>write</code></span>和<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>generate</code></span>方法唯一的区别在于前者打包完产物会写入磁盘，而后者不会）。</p><p>所以，真正进行打包的过程会在 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Output</code></span> 阶段进行，即在<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>bundle</code></span>对象的 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>generate</code></span>或者<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>write</code></span>方法中进行。</p><h4>2、Output阶段</h4><p>示例代码执行打包结果后的输出如下：</p><p><br></p><pre><code class="language-javascript">{\n  output: [\n    {\n      exports: [],\n      facadeModuleId: \'/Users/code/rollup-demo/src/index.js\',\n      isEntry: true,\n      isImplicitEntry: false,\n      type: \'chunk\',\n      code: \'const a = 1;\\n\\nconsole.log(a);\\n\',\n      dynamicImports: [],\n      fileName: \'index.js\',\n      // 其余属性省略\n    }\n  ]\n}\n</code></pre><p>对于一次完整的构建过程而言， Rollup 会先进入到 Build 阶段，解析各模块的内容及依赖关系，然后进入<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Output</code></span>阶段，完成打包及输出的过程。</p><p>对于不同的阶段，Rollup 插件会有不同的插件工作流程。</p><h4>3、插件Hook类型</h4><p> Rollup 为了追求<span style="color: rgb(255, 102, 0);">扩展性和可维护性</span>，引入了插件机制。</p><p>分类：</p><p>插件的各种 Hook 可以根据这<strong>两个构建阶段</strong>分为两类: <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Build Hook</code></span> 与 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Output Hook。</code></span></p><p>根据不同的 Hook <strong>执行方式</strong>也会有不同的分类，主要包括<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Async</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Sync</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Parallel</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Squential</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>First</code></span>这五种</p><ul><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Build Hook：</code></span>即在<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Build</code></span>阶段执行的钩子函数，在这个阶段主要进行模块代码的转换、AST 解析以及模块依赖的解析，那么这个阶段的 Hook 对于代码的操作粒度一般为<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>模块</code></span>级别，也就是单文件级别。</li><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Ouput Hook</code></span>(官方称为<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Output Generation Hook</code></span>)：则主要进行代码的打包，对于代码而言，操作粒度一般为 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>chunk</code></span>级别(一个 chunk 通常指很多文件打包到一起的产物)。</li></ul><p>1)、async 和 sync</p><p>　　两者其实是相对的，分别代表<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>异步</code></span>和<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>同步</code></span>的钩子函数，两者最大的区别在于同步钩子里面不能有异步逻辑，而异步钩子可以有。</p><p>2）、Parallel</p><p>　　并行的钩子函数。如果有多个插件实现了这个钩子的逻辑，一旦有钩子函数是异步逻辑，则并发执行钩子函数，不会等待当前钩子完成(底层使用 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Promise.all</code></span>)。</p><p>　　它的执行时机其实是在构建刚开始的时候，各个插件可以在这个钩子当中做一些状态的初始化操作，但其实插件之间的操作并不是相互依赖的，也就是可以并发执行，从而提升构建性能。反之，对于需要依赖其他插件处理结果的情况就不适合用 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Parallel</code></span> 钩子了，比如 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>transform</code></span>。</p><p>3）、Sequential</p><p>　　串行的钩子函数。这种 Hook 往往适用于插件间处理结果相互依赖的情况，前一个插件 Hook 的返回值作为后续插件的入参，这种情况就需要等待前一个插件执行完 Hook，获得其执行结果，然后才能进行下一个插件相应 Hook 的调用，如<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>transform</code></span>。</p><p>4）、First</p><p>多个插件实现了这个 Hook，那么 Hook 将依次运行，直到返回一个非 null 或非 undefined 的值为止。比较典型的 Hook 是 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>resolveId</code></span>，一旦有插件的 resolveId 返回了一个路径，将停止执行后续插件的 resolveId 逻辑。</p><h4>4、build阶段的工作流</h4><ol><li>首先经历 options 钩子进行配置的转换，得到处理后的配置对象。</li><li>随之 Rollup 会调用buildStart钩子，正式开始构建流程。</li><li>Rollup 先进入到 resolveId 钩子中解析文件路径。(从 input 配置指定的入口文件开始)。</li><li>Rollup 通过调用load钩子加载模块内容。</li><li>紧接着 Rollup 执行所有的 transform 钩子来对模块内容进行进行自定义的转换，比如 babel 转译。</li><li>现在 Rollup 拿到最后的模块内容，进行 AST 分析，得到所有的 import 内容，调用 moduleParsed 钩子:6.1 如果是普通的 import，则执行 resolveId 钩子，继续回到步骤3。6.2 如果是动态 import，则执行 resolveDynamicImport 钩子解析路径，如果解析成功，则回到步骤4加载模块，否则回到步骤3通过 resolveId 解析路径。</li><li>直到所有的 import 都解析完毕，Rollup 执行buildEnd钩子，Build 阶段结束</li></ol><h4>5、Output阶段的工作流</h4><ol><li>执行所有插件的 outputOptions 钩子函数，对 output 配置进行转换。</li><li>执行 renderStart，并发执行 renderStart 钩子，正式开始打包。</li><li>并发执行所有插件的banner、footer、intro、outro 钩子(底层用 Promise.all 包裹所有的这四种钩子函数)，这四个钩子功能很简单，就是往打包产物的固定位置(比如头部和尾部)插入一些自定义的内容，比如协议声明内容、项目介绍等等。</li><li>从入口模块开始扫描，针对动态 import 语句执行 renderDynamicImport钩子，来自定义动态 import 的内容。</li><li>对每个即将生成的 chunk，执行 augmentChunkHash钩子，来决定是否更改 chunk 的哈希值，在 watch 模式下即可能会多次打包的场景下，这个钩子会比较适用。</li><li>如果没有遇到 import.meta 语句，则进入下一步，否则:6.1 对于 import.meta.url 语句调用 resolveFileUrl 来自定义 url 解析逻辑6.2 对于其他import.meta 属性，则调用 resolveImportMeta 来进行自定义的解析。</li><li>接着 Rollup 会生成所有 chunk 的内容，针对每个 chunk 会依次调用插件的renderChunk方法进行自定义操作，也就是说，在这里时候你可以直接操作打包产物了。</li><li>随后会调用 generateBundle 钩子，这个钩子的入参里面会包含所有的打包产物信息，包括 chunk (打包后的代码)、asset(最终的静态资源文件)。你可以在这里删除一些 chunk 或者 asset，最终这些内容将不会作为产物输出。</li><li>前面提到了rollup.rollup方法会返回一个bundle对象，这个对象是包含generate和write两个方法，两个方法唯一的区别在于后者会将代码写入到磁盘中，同时会触发writeBundle钩子，传入所有的打包产物信息，包括 chunk 和 asset，和 generateBundle钩子非常相似。不过值得注意的是，这个钩子执行的时候，产物已经输出了，而 generateBundle 执行的时候产物还并没有输出。顺序如下图所示:</li></ol><p> &nbsp; &nbsp; <img src="https://hanwujijack.github.io/blog/78.png" alt="https://hanwujijack.github.io/blog/78.png" data-href="https://hanwujijack.github.io/blog/78.png" style=""/> &nbsp; &nbsp; &nbsp;<img src="https://img2023.cnblogs.com/blog/2338509/202308/2338509-20230829113141443-1489357732.png" alt="" data-href="" style="height: auto;"/></p><p><img src="https://p3-juejin.byteimg.com/tos-cn-i-k3u1fbpfcp/12142ea189be4a8f918cf247f408487e~tplv-k3u1fbpfcp-jj-mark:1512:0:0:0:q75.awebp" alt="" data-href="" style="height: auto;"/></p><ol><li>当上述的<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>bundle</code></span>的<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>close</code></span>方法被调用时，会触发<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>closeBundle</code></span>钩子，到这里 Output 阶段正式结束。</li></ol><p>Rollup 的插件开发整体上是非常简洁和灵活的，总结为以下几个方面:</p><ul><li>插件逻辑集中管理。各个阶段的 Hook 都可以放在一个插件中编写，比如上述两个 Webpack 的 Loader 和 Plugin 功能在 Rollup 只需要用一个插件，分别通过 transform 和 renderChunk 两个 Hook 来实现。</li><li>插件 API 简洁，符合直觉。Rollup 插件基本上只需要返回一个包含 name 和各种钩子函数的对象即可，也就是声明一个 name 属性，然后写几个钩子函数即可。</li><li>插件间的互相调用。比如刚刚介绍的<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>alias</code></span>插件，可以通过插件上下文对象的<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>resolve</code></span>方法，继续调用其它插件的 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>resolveId</code></span>钩子，类似的还有<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>load</code></span>方法，这就大大增加了插件的灵活性。</li></ul><p>常见的Hook实战：resolveId、load、transform、renderChunk、generateBundle</p><p>问答题：</p><p>1.为什么Rollup设计了一套完整的插件机制？<br>2.在Rollup一次完整的构建过程中，Rollup会经历哪两个阶段？每个阶段的作用是什么？<br>3.谈谈你对插件Hook类型的理解？<br>4.根据Hook执行方式可以把插件分成哪几类？<br>5.请描述一下Rollup插件在build阶段的工作流程？<br>6.请描述一下Rollup插件在Output阶段的工作流程？<br>答案：</p><p>1. 将核心逻辑和插件逻辑分离，按需引入插件，提高拓展性。<br>2. 两个阶段，分别是构建（build）阶段和打包（output）阶段；build阶段主要进行模块代码的转换、AST解析以及模块依赖的解析；output阶段主要进行代码打包；<br>3. 不同的插件Hook类型代表了不同的执行特点，会围绕在build和output两个阶段起至关重要的作用。<br>4. Build Hook和Output Hook<br>5. 首先经历options配置转换得到配置对象，随后调用buildStart开始构建流程，进入resolveId中解析文件路径，加载模块内容，接着执行所有的transform来对模块内容进行自定义转换，最后进行AST分析得到所有的import内容，一直等待解析完毕执行buildEnd，build阶段结束。<br>6. 首先执行所有插件的outputOptions对配置进行转换，然后执行renderStart进行正式打包，随后并发执行所有插件的banner、footer、intro、outro钩子往打包产物中插入一些自定义内容，针对动态import语句执行renderDynamicImport钩子，对每个生成的chunk执行augmentChunHash钩子，决定是否更改chunk的哈希值，生成所有chunk内容后，调用renderChunk方法进行自定义操作，这时你可以直接操作打包产物了，随后调用generateBundle钩子，可以在这里删除一些chunk或者asset，这些东西不会作为产物输出，最后调用close出发closeBundle钩子，output阶段结束。</p><h3 style="line-height: 1.5;"><br>10、如何开发完整的vite插件</h3><h4>1、插件和插件执行的顺序</h4><p>vite独有的的5个钩子：</p><ul><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>config</code></span>: 用来进一步修改配置。</li><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>configResolved</code></span>: 用来记录最终的配置信息。</li><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>configureServer</code></span>: 用来获取 Vite Dev Server 实例，添加中间件。</li><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>transformIndexHtml</code></span>: 用来转换 HTML 的内容。</li><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>handleHotUpdate</code></span>: 用来进行热更新模块的过滤，或者进行自定义的热更新处理。</li></ul><p>Vite 插件的执行顺序：</p><p><img src="https://img2023.cnblogs.com/blog/2338509/202308/2338509-20230829164555753-246648512.png" alt="" data-href="" style="height: auto;"/><img src="https://hanwujijack.github.io/blog/79.png" alt="https://hanwujijack.github.io/blog/79.png" data-href="https://hanwujijack.github.io/blog/79.png" style=""/></p><p> </p><ul><li>服务启动阶段: <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>config</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>configResolved</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>options</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>configureServer</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>buildStart</code></span></li><li>请求响应阶段: 如果是 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>html</code></span> 文件，仅执行<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>transformIndexHtml</code></span>钩子；对于非 HTML 文件，则依次执行<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>resolveId</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>load</code></span>和<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>transform</code></span>钩子。相信大家学过 Rollup 的插件机制，已经对这三个钩子比较熟悉了。</li><li>热更新阶段: 执行<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>handleHotUpdate</code></span>钩子。</li><li>服务关闭阶段: 依次执行<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>buildEnd</code></span>和<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>closeBundle</code></span>钩子。</li></ul><h4>2、插件应用的位置</h4><p>默认情况下 Vite 插件同时被用于开发环境和生产环境，你可以通过<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>apply</code></span>属性来决定应用场景。</p><p><br></p><pre><code class="language-javascript">{\n  // \'serve\' 表示仅用于开发环境，\'build\'表示仅用于生产环境\n  apply: \'serve\'\n}</code></pre><p><span style="color: rgb(255, 102, 0);"><code>apply</code></span>参数还可以配置成一个函数，进行更灵活的控制：</p><p><br></p><pre><code class="language-javascript">apply(config, { command }) {\n  // 只用于非 SSR 情况下的生产环境构建\n  return command === \'build\' && !config.build.ssr\n}</code></pre><p>可以通过<span style="color: rgb(255, 102, 0);"><code>enforce</code></span>属性来指定插件的执行顺序：</p><p><br></p><pre><code class="language-javascript">{\n  // 默认为`normal`，可取值还有`pre`和`post`\n  enforce: \'pre\'\n}</code></pre><p>vite中插件的执行顺序：</p><ul><li>Alias (路径别名)相关的插件。</li><li>⭐️ 带有 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>enforce: \'pre\'</code></span> 的用户插件。</li><li>Vite 核心插件。</li><li>⭐️ 没有 enforce 值的用户插件，也叫<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>普通插件</code></span>。</li><li>Vite 生产环境构建用的插件。</li><li>⭐️ 带有 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>enforce: \'post\'</code></span> 的用户插件。</li><li>Vite 后置构建插件(如压缩插件)。</li></ul><p><img src="https://img2023.cnblogs.com/blog/2338509/202308/2338509-20230829165038353-1396603624.png" alt="" data-href="" style="height: auto;"/><img src="https://hanwujijack.github.io/blog/80.png" alt="https://hanwujijack.github.io/blog/80.png" data-href="https://hanwujijack.github.io/blog/80.png" style=""/></p><h3 style="line-height: 1.5;"> 11、HMR----模块级别的局部更新</h3><p>HMR 的全称叫做<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Hot Module Replacement</code></span>，即<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>模块热替换</code></span>或者<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>模块热更新，实现局部刷新和状态保存。</code></span></p><p><span style="color: rgb(255, 102, 0);"><code>import.meta</code></span>对象为现代浏览器原生的一个内置对象，Vite 所做的事情就是在这个对象上的 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>hot</code></span> 属性中定义了一套完整的属性和方法。因此，在 Vite 当中，你就可以通过<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>import.meta.hot</code></span>来访问关于 HMR 的这些属性和方法，比如<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>import.meta.hot.accept()。</code></span></p><h4>1）模块更新逻辑：hot.accept</h4><p>接受模块更新：</p><ul><li>接受自身模块的更新</li><li>接受某个子模块的更新</li><li>接受多个子模块的更新</li></ul><h4>2）模块销毁时的逻辑：hot.dispose</h4><h4>3）共享数据：hot.data</h4><h4>4）其他方法：</h4><ul><li>import.meta.hot.decline()：此模块不可热更新</li><li> import.meta.hot.invalidate()：强制刷新页面自定义事件：<code>import.meta.hot.on 来监听HMR的自定义事件，内部有以下事件会自动触发：</code></li><ul><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>vite:beforeUpdate</code></span> 当模块更新时触发；</li><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>vite:beforeFullReload</code></span> 当即将重新刷新页面时触发；</li><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>vite:beforePrune</code></span> 当不再需要的模块即将被剔除时触发；</li><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>vite:error</code></span> 当发生错误时（例如，语法错误）触发。</li></ul></ul><h3 style="line-height: 1.5;"> 12、拆包解决打包产物体积过大</h3><p> 生产环境下，为了提高页面加载性能，构建工具一般将项目的代码打包(bundle)到一起，这样上线之后只需要请求少量的 JS 文件，大大减少 HTTP 请求。</p><p>vite利用底层打包引擎 Rollup拆包API——<span style="color: rgb(255, 102, 0);">manualChunks</span> 来完成项目的模块打包。</p><p>在生产环境下 Vite 完全利用 Rollup 进行构建，因此拆包也是基于 Rollup 来完成的，但 Rollup 本身是一个<span style="color: rgb(255, 102, 0);">专注 JS 库打包</span>的工具，对应用构建的能力还尚为欠缺，Vite 正好是补足了 Rollup 应用构建的能力。</p><p>构建领域的专业概念：</p><ul><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>bundle</code></span> 指的是整体的打包产物，包含 JS 和各种静态资源。</li><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>chunk</code></span>指的是打包后的 JS 文件，是 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>bundle</code></span> 的子集。</li><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>vendor</code></span>是指第三方包的打包产物，是一种特殊的 chunk。</li></ul><p> 传统的单 chunk 打包模式下的问题：</p><ul><li>无法做到<span style="color: rgb(255, 102, 0);">按需加载</span>，即使是当前页面不需要的代码也会进行加载。<br>无论是<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Initial Chunk</code></span>还是<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Async Chunk</code></span>，都会打包进同一个产物。</li><li>线上<span style="color: rgb(255, 102, 0);">缓存复用率极低</span>，改动一行代码即可导致整个 bundle 产物缓存失效。<br>服务端一般在响应资源时加上一些 HTTP 响应头，最常见的响应头之一就是<span style="color: rgb(255, 102, 0);"><code>cache-control</code></span>，它可以指定浏览器的强缓存。</li></ul><p> 构建工具一般会根据产物的内容生成哈希值，一旦内容变化就会导致整个 chunk 产物的强缓存失效，所以单 chunk 打包模式下的缓存命中率极低，基本为零。</p><p>一般而言，把不经常变化的第三方包拆出来。</p><h4>1）vite默认的拆包策略</h4><p>产物的结构：</p><p><img src="https://img2023.cnblogs.com/blog/2338509/202308/2338509-20230831143358915-1134549929.png" alt="" data-href="" style="height: auto;"/><img src="https://hanwujijack.github.io/blog/81.png" alt="https://hanwujijack.github.io/blog/81.png" data-href="https://hanwujijack.github.io/blog/81.png" style=""/></p><ul><li> Vite 实现了自动 CSS 代码分割的能力，即实现一个 chunk 对应一个 css 文件，比如上面产物中<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>index.js</code></span>对应一份<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>index.css</code></span>，而按需加载的 chunk <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Danamic.js</code></span>也对应单独的一份<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Danamic.css</code></span>文件，与 JS 文件的代码分割同理，这样做也能提升 CSS 文件的缓存复用率。</li><li>Vite 基于 Rollup 的manualChunksAPI 实现了应用拆包的策略:对于 Initital Chunk 而言，业务代码和第三方包代码分别打包为单独的 chunk，在上述的例子中分别对应index.js和vendor.js。需要说明的是，这是 Vite 2.9 版本之前的做法，而在 Vite 2.9 及以后的版本，默认打包策略更加简单粗暴，将所有的 js 代码全部打包到 index.js 中。对于 Async Chunk 而言 ，动态 import 的代码会被拆分成单独的 chunk，如上述的Dynacmic组件。</li></ul><p>Vite 默认拆包的优势在于实现了 CSS 代码分割与业务代码、第三方库代码、动态 import 模块代码三者的分离，但缺点也比较直观，第<span style="color: rgb(255, 102, 0);">三方库的打包产物容易变得比较臃肿。</span></p><h4> 2）自定义拆包策略</h4><p><br></p><pre><code class="language-javascript">{\n  build: {\n    rollupOptions: {\n      output: {\n        // manualChunks 配置\n        manualChunks: {\n          // 将 React 相关库打包成单独的 chunk 中\n          \'react-vendor\': [\'react\', \'react-dom\'],\n          // 将 Lodash 库的代码单独打包\n          \'lodash\': [\'lodash-es\'],\n          // 将组件库的代码打包\n          \'library\': [\'antd\', \'@arco-design/web-react\'],\n        },\n      },\n    }\n  },\n}\n</code></pre><p>第三方包更新的时候，也只会更新其中一个 chunk 的 url，而不会全量更新，从而提高了第三方包产物的缓存命中率。但是此方式需要手动解决<span style="color: rgb(255, 102, 0);">循环依赖</span>的问题。</p><p>产物结构如下图：</p><p><img src="https://img2023.cnblogs.com/blog/2338509/202308/2338509-20230831143653983-43525038.png" alt="" data-href="" style="height: auto;"/><img src="https://hanwujijack.github.io/blog/82.png" alt="https://hanwujijack.github.io/blog/82.png" data-href="https://hanwujijack.github.io/blog/82.png" style=""/></p><h4> 3）Vite 自定义拆包的终极解决方案——<span style="color: rgb(255, 102, 0);"><code>vite-plugin-chunk-split</code></span></h4><p><br></p><pre><code class="language-javascript">import { chunkSplitPlugin } from \'vite-plugin-chunk-split\';\n\nexport default {\n  chunkSplitPlugin({\n    // 指定拆包策略\n    customSplitting: {\n      // 1. 支持填包名。`react` 和 `react-dom` 会被打包到一个名为`render-vendor`的 chunk 里面(包括它们的依赖，如 object-assign)\n      \'react-vendor\': [\'react\', \'react-dom\'],\n      // 2. 支持填正则表达式。src 中 components 和 utils 下的所有文件被会被打包为`component-util`的 chunk 中\n      \'components-util\': [/src\\/components/, /src\\/utils/]\n    }\n  })\n}\n</code></pre><p>开箱即用的拆包方案，无需手动解决循环依赖的问题。</p><h3 style="line-height: 1.5;"> 13、联合前端编译工具链，消灭低版本浏览器兼容问题</h3><p>通过 Vite 构建我们完全可以兼容各种低版本浏览器，打包出既支持现代(<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Modern</code></span>)浏览器又支持旧版(<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Legacy</code></span>)浏览器的产物。</p><p>旧版浏览器的语法兼容问题主要分两类: <span style="color: rgb(255, 102, 0);">语法降级</span>问题和<span style="color: rgb(255, 102, 0);"> Polyfill 缺失</span>问题。前者比较好理解，比如某些浏览器不支持箭头函数，我们就需要将其转换为<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>function(){}</code></span>语法；而对后者来说，<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Polyfill</code></span>本身可以翻译为<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>垫片</code></span>，也就是为浏览器提前注入一些 API 的实现代码，如<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Object.entries</code></span>方法的实现，这样可以保证产物可以正常使用这些 API，防止报错。</p><p>这两类问题本质上是通过前端的<span style="color: rgb(255, 102, 0);">编译工具链</span>(如<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Babel</code></span>)及 JS 的基础 <span style="color: rgb(255, 102, 0);">Polyfill 库</span>(如<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>corejs</code></span>)来解决的，不会跟具体的构建工具所绑定。也就是说，对于这些本质的解决方案，在其它的构建工具(如 Webpack)能使用，在 Vite 当中也完全可以使用。</p><p>解决上述提到的两类语法兼容问题，主要需要用到两方面的工具，分别包括:</p><ul><li>编译时工具：代表工具有@babel/preset-env和@babel/plugin-transform-runtime。</li><li>运行时基础库：代表库包括core-js和regenerator-runtime。</li></ul><p>编译时工具的作用是在代码编译阶段进行<span style="color: rgb(255, 102, 0);"><code>语法降级及添加 polyfill 代码的引用语句</code></span>。由于这些工具只是编译阶段用到，运行时并不需要，我们需要将其放入<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>package.json</code></span>中的<span style="color: rgb(255, 102, 0);"><code>devDependencies</code></span>中。</p><p>运行时基础库是根据 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>ESMAScript</code></span>官方语言规范提供各种<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Polyfill</code></span>实现代码，主要包括<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>core-js</code></span>和<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>regenerator-runtime</code></span>两个基础库，不过在 babel 中也会有一些上层的封装，包括：</p><ul><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fbabeljs.io%2Fdocs%2Fen%2Fbabel-polyfill" target="_blank">@babel/polyfill</a></li><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fbabeljs.io%2Fdocs%2Fen%2Fbabel-runtime" target="_blank">@babel/runtime</a></li><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fbabeljs.io%2Fdocs%2Fen%2Fbabel-runtime-corejs2" target="_blank">@babel/runtime-corejs2</a></li><li><a href="https://link.juejin.cn/?target=https%3A%2F%2Fbabeljs.io%2Fdocs%2Fen%2Fbabel-runtime-corejs3" target="_blank">@babel/runtime-corejs3</a> 看似各种运行时库眼花缭乱，其实都是<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>core-js</code></span>和<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>regenerator-runtime</code></span>不同版本的封装罢了(<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>@babel/runtime</code></span>是个特例，不包含 core-js 的 Polyfill)。这类库是项目运行时必须要使用到的，因此一定要放到<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>package.json</code></span>中的<span style="color: rgb(255, 102, 0);"><code>dependencies</code></span>中！</li></ul><h4>1）、@babel/preset-env方案</h4><p><br></p><pre><code class="language-javascript">// .babelrc.json\n{\n  "presets": [\n    [\n      "@babel/preset-env", \n      {\n        // 指定兼容的浏览器版本\n        "targets": {\n          "ie": "11"\n        },\n        // 基础库 core-js 的版本，一般指定为最新的大版本\n        "corejs": 3,\n        // Polyfill 注入策略，后文详细介绍\n        "useBuiltIns": "usage",\n        // 不将 ES 模块语法转换为其他模块语法\n        "modules": false\n      }\n    ]\n  ]\n}\n</code></pre><p><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>useBuiltIns</code></span>，它决定了添加 Polyfill 策略，默认是 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>false</code></span>，即不添加任何的 Polyfill。可以手动将<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>useBuiltIns</code></span>配置为<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>entry</code></span>或者<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>usage。usage表示按需Polyfill导入的配置。</code></span></p><p>以上配置利用<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>@babel/preset-env</code></span>进行了目标浏览器语法的降级和<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Polyfill</code></span>注入，但是@babel/preset-env方案存在局限性：</p><ul><li>如果使用新特性，往往是通过基础库(如 core-js)往全局环境添加 Polyfill，如果是开发应用没有任何问题，如果是开发第三方工具库，则很可能会对全局空间造成污染。</li><li>很多工具函数的实现代码(如上面示例中的<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>_defineProperty</code></span>方法)，会在许多文件中重现出现，造成文件体积冗余。</li></ul><h4>2）更优的 Polyfill 注入方案: transform-runtime</h4><p><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>transform-runtime</code></span>方案可以作为<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>@babel/preset-env</code></span>中<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>useBuiltIns</code></span>配置的替代品，也就是说，一旦使用<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>transform-runtime</code></span>方案，你应该把<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>useBuiltIns</code></span>属性设为 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>false</code></span>。</p><p><br></p><pre><code class="language-javascript">// babelrc.json\n{\n  "plugins": [\n    // 添加 transform-runtime 插件\n    [\n      "@babel/plugin-transform-runtime", \n      {\n        "corejs": 3\n      }\n    ]\n  ],\n  "presets": [\n    [\n      "@babel/preset-env", \n      {\n        "targets": {\n          "ie": "11"\n        },\n        "corejs": 3,\n        // 关闭 @babel/preset-env 默认的 Polyfill 注入\n        "useBuiltIns": false,\n        "modules": false\n      }\n    ]\n  ]\n}\n</code></pre><ul><li><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>transform-runtime</code></span> 一方面能够让我们在代码中使用<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>非全局版本</code></span>的 Polyfill，这样就避免全局空间的污染，这也得益于 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>core-js</code></span> 的 pure 版本产物特性。</li></ul><h4>3）viet语法降级与Polyfill注入</h4><p>Vite 官方已经为我们封装好了一个开箱即用的方案: <span style="color: rgb(255, 102, 0);"><code>@vitejs/plugin-legacy</code></span>，我们可以基于它来解决项目语法的浏览器兼容问题。这个插件内部使用 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>@babel/preset-env</code></span> 以及 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>core-js</code></span>等一系列基础库来进行语法降级和 Polyfill 注入。底层也是通过<span style="color: rgb(255, 102, 0);"><code>@babel/preset-env</code></span>来完成兼容方案的。</p><p><br></p><pre><code class="language-javascript">import legacy from "@vitejs/plugin-legacy;";\nimport { defineConfig } from "vite";\n\nexport default defineConfig({\n  plugins: [legacy({ targets: ["ie &gt;= 11"] })],\n});\n</code></pre><p><span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>legacy</code></span>插件是一个相对复杂度比较高的插件，插件在各个钩子阶段的流程图如下：</p><p><img src="https://img2023.cnblogs.com/blog/2338509/202308/2338509-20230831171327703-172624157.png" alt="" data-href="" style="height: auto;"/><img src="https://hanwujijack.github.io/blog/83.png" alt="https://hanwujijack.github.io/blog/83.png" data-href="https://hanwujijack.github.io/blog/83.png" style=""/></p><ul><li> 首先是在<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>configResolved</code></span>钩子中调整了<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>output</code></span>属性，这么做的目的是让 Vite 底层使用的打包引擎 Rollup 能另外打包出一份<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Legacy 模式</code></span>的产物。</li><li>在<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>renderChunk</code></span>阶段，插件会对 Legacy 模式产物进行语法转译和 Polyfill 收集，值得注意的是，这里并不会真正注入<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Polyfill</code></span>，而仅仅只是收集<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Polyfill。</code></span></li><li>进入<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>generateChunk</code></span>钩子阶段，现在 Vite 会对之前收集到的<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Polyfill</code></span>进行统一的打包，实现也比较精妙，主要逻辑集中在<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>buildPolyfillChunk</code></span>函数。</li><li>通过<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>transformIndexHtml</code></span>钩子来将这些产物插入到 HTML 的结构中。</li></ul><h3 style="line-height: 1.5;"> 14、vite系统的进行性能优化</h3><p>对于项目的加载性能优化而言，常见的优化手段可以分为下面三类:</p><ol><li><strong>网络优化</strong>。包括 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>HTTP2</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>DNS 预解析</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Preload</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Prefetch</code></span>等手段。</li><li><strong>资源优化</strong>。包括<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>构建产物分析</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>资源压缩</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>产物拆包</code></span>、<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>按需加载</code></span>等优化方式。</li><li><strong>预渲染优化</strong>，本文主要介绍<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>服务端渲染</code></span>(SSR)和<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>静态站点生成</code></span>(SSG)两种手段。</li></ol><h4> 1-1）、HTTP2</h4><p>传统的 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>HTTP 1.1</code></span> 存在<strong>队头阻塞</strong>的问题，同一个 TCP 管道中同一时刻只能处理一个 HTTP 请求，也就是说如果当前请求没有处理完，其它的请求都处于阻塞状态，另外浏览器对于同一域名下的并发请求数量都有限制，比如 Chrome 中只允许 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>6</code></span> 个请求并发（这个数量不允许用户配置），也就是说请求数量超过 <strong>6</strong> 个时，多出来的请求只能排队、等待发送。</p><p>因此，在 HTTP 1.1 协议中，队头阻塞和请求排队问题很容易成为网络层的性能瓶颈。而 HTTP 2 的诞生就是为了解决这些问题，它主要实现了如下的能力：</p><ul><li><strong>多路复用：</strong>将数据分为多个二进制帧，多个请求和响应的数据帧在同一个 TCP 通道进行传输，解决了之前的队头阻塞问题。而与此同时，在 HTTP2 协议下，浏览器不再有同域名的并发请求数量限制，因此请求排队问题也得到了解决。</li><li><strong>Server Push：</strong>即服务端推送能力。可以让某些资源能够提前到达浏览器，比如对于一个 html 的请求，通过 HTTP 2 我们可以同时将相应的 js 和 css 资源推送到浏览器，省去了后续请求的开销。</li></ul><p><code><strong>vite-plugin-mkcert</strong></code>插件仅用于开发阶段，在生产环境中我们会对线上的服务器进行配置，从而开启 HTTP2 的能力，如 <a href="https://link.juejin.cn/?target=http%3A%2F%2Fnginx.org%2Fen%2Fdocs%2Fhttp%2Fngx_http_v2_module.html" target="_blank">Nginx 的 HTTP2 配置</a>。</p><h4>1-2）、DNS解析</h4><p>浏览器在向跨域的服务器发送请求时，首先会进行 DNS 解析，将服务器域名解析为对应的 IP 地址。我们通过 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>dns-prefetch</code></span> 技术将这一过程提前，降低 DNS 解析的延迟时间，具体使用方式如下:</p><p><br></p><pre><code class="language-html">&lt;!-- href 为需要预解析的域名 --&gt;\n&lt;link rel="dns-prefetch" href="https://fonts.googleapis.com/"&gt; </code></pre><p>一般情况下 <code><strong>dns-prefetch</strong></code>会与<code><strong>preconnect</strong></code> 搭配使用，前者用来解析 DNS，而后者用来会建立与服务器的连接，建立 TCP 通道及进行 TLS 握手，进一步降低请求延迟。使用方式如下所示:</p><p><br></p><pre><code class="language-html">&lt;link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin&gt;\n&lt;link rel="dns-prefetch" href="https://fonts.gstatic.com/"&gt;</code></pre><h4>1-3）、Preload/Prefetch</h4><p>对于一些比较重要的资源，我们可以通过 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>Preload</code></span> 方式进行预加载，即在资源使用之前就进行加载，而不是在用到的时候才进行加载，这样可以使资源更早地到达浏览器。</p><p><br></p><pre><code class="language-html">&lt;link rel="preload" href="style.css" as="style"&gt;\n&lt;link rel="preload" href="main.js" as="script"&gt;</code></pre><p>与普通 script 标签不同的是，对于原生 ESM 模块，浏览器提供了<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>modulepreload</code></span>来进行预加载：</p><p><br></p><pre><code class="language-html">&lt;link rel="modulepreload" href="/src/app.js" /&gt;</code></pre><h4>2-1）、产物分析报告</h4><p><br></p><pre><code class="language-javascript">// 注: 首先需要安装 rollup-plugin-visualizer 依赖\nimport { defineConfig } from "vite";\nimport react from "@vitejs/plugin-react";\nimport { visualizer } from "rollup-plugin-visualizer";\n// https://vitejs.dev/config/\nexport default defineConfig({\n  plugins: [\n    react(),\n    visualizer({\n      // 打包完成后自动打开浏览器，显示产物体积报告\n      open: true,\n    }),\n  ],\n});\n</code></pre><h4>2-2）、资源压缩</h4><p><br></p><pre><code class="language-javascript">// vite.config.ts\nexport default {\n  build: {\n    // 类型: boolean | \'esbuild\' | \'terser\'\n    // 默认为 `esbuild`\n    minify: \'esbuild\',\n    // 产物目标环境\n    target: \'modules\',\n    // 如果 minify 为 terser，可以通过下面的参数配置具体行为\n    // https://terser.org/docs/api-reference#minify-options\n    terserOptions: {}\n  }\n}\n</code></pre><p>target参数：Vite 默认的参数是<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>modules。</code></span></p><p>设置合适的 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>target</code></span> 特别重要，一旦目标环境的设置不能覆盖所有的用户群体，那么极有可能在某些低端浏览器中出现语法不兼容问题，从而发生线上事故。</p><p>为了线上的稳定性，推荐大家最好还是将 target 参数设置为<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>ECMA</code></span>语法的最低版本<code><strong>es2015/es6</strong></code>。</p><p>图片压缩：Vite 中我们一般使用 <span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>vite-plugin-imagemin</code></span>来进行图片压缩。</p><h4>2-3）、产物拆包</h4><p>一般来说，如果不对产物进行<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>代码分割</code></span>(或者<span style="color: rgb(192, 52, 29); background-color: rgb(251, 229, 225); font-size: 12px;"><code>拆包</code></span>)，全部打包到一个 chunk 中，会产生如下的问题:</p><ul><li>首屏加载的代码体积过大，即使是当前页面不需要的代码也会进行加载。</li><li>线上缓存复用率极低，改动一行代码即可导致整个 bundle 产物缓存失效。</li></ul><p>而 Vite 中内置如下的代码拆包能力:</p><ul><li>CSS 代码分割，即实现一个 chunk 对应一个 css 文件。</li><li>默认有一套拆包策略，将应用的代码和第三方库的代码分别打包成两份产物，并对于动态 import 的模块单独打包成一个 chunk。</li><li></li><li></li></ul><pre><code class="language-typescript">// vite.config.ts\n{\n  build {\n    rollupOptions: {\n      output: {\n        // 1. 对象配置\n        manualChunks: {\n          // 将 React 相关库打包成单独的 chunk 中\n          \'react-vendor\': [\'react\', \'react-dom\'],\n          // 将 Lodash 库的代码单独打包\n          \'lodash\': [\'lodash-es\'],\n          // 将组件库的代码打包\n          \'library\': [\'antd\'],\n        },\n        // 2. 函数配置 需要注意循环引用的问题\n          if (id.includes(\'antd\') || id.includes(\'@arco-design/web-react\')) {\n            return \'library\';\n          }\n          if (id.includes(\'lodash\')) {\n            return \'lodash\';\n          }\n          if (id.includes(\'react\')) {\n            return \'react\';\n          }\n      },\n    }\n  },\n}\n</code></pre><h4>2-4）、按需加载</h4><p>一个比较好的方式是对<strong>路由组件进行动态引入</strong>。</p><h4>3-1）、预渲染优化</h4><p>SSG 可以在<strong>构建阶段</strong>生成完整的 HTML 内容，它与 SSR 最大的不同在于 HTML 的生成在构建阶段完成，而不是在<strong>服务器</strong>的运行时。</p><p>SSG 同样可以给浏览器完整的 HTML 内容，不依赖于 JS 的加载，可以有效提高页面加载性能。</p><p>不过相比 SSR，SSG 的内容往往动态性不够，适合比较静态的站点，比如文档、博客等场景。</p><p> </p>',__v:0,updateByUser:7},{state:1,createTime:n,updateTime:n,_id:"65ab368f43b1d10bbf69c755",id:34,createByUser:7,name:"[Babel]",html:'<h1 style="text-align: center;">Babel 笔记</h1><p>Babel 是什么？</p><p>Babel是一个工具集，用于将高版本的 js代码 （如：<a href="https://so.csdn.net/so/search?q=ES6&spm=1001.2101.3001.7020" target="_blank">ES6</a>） 转换为版本低兼容性好的代码，从而可以运行在低版本浏览器或其它环境中。</p><h5>安装</h5><pre><code class="language-bash">npm install -g npx # 安装 npx\nnpm init # npm 初始化\nnpm i @babel/cli @babel/core @babel/preset-env --save-dev # 安装 babel 依赖\n</code></pre><h5>配置文件</h5><ol><li>.babelrc.js、.babel.config.jsmodule.exports = { presets: ["@babel/env"] // @babel/env 是 @babel/preset-env 的简写 } 123</li><li>.babelrc{ "presets": ["@babel/env"] // presets 预设 } 123</li><li>在 package.json{ ... "babel": { "presets": ["@babel/env"] } } 123456</li></ol><p>以上四种配置效果相同，推荐使用<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>.js</code></span>的方式，可以进行动态配置。</p><h5>编译</h5><pre><code class="language-bash"># 本地安装 @babel/cli 使用 npx 进行启动 -o 是--out-file 的简写 参数为输出的文件\nnpx babel main.js -o comiled.js\n</code></pre><pre><code class="language-javascript">// 转换前 main.js\nlet fn = count =&gt; ++count\n\nlet p = Promise.resolve(0)\n// 转换后 comiled.js\n"use strict"; // 编译后默认采用严格模式\n\nvar fn = function fn(count) {\n  return ++count;\n};\n\nvar p = Promise.resolve(0);\n</code></pre><p>可以看出 Babel 没有对 Promise 进行转换，因为 Babel 默认只转换新的语法，而不转换新的 API。</p><p>新的API分类两类：</p><ol><li>一类是<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>Promise、Map、Symbol、Proxy、Iterator</code></span>等全局对象及其对象自身的方法。</li><li>一类是新的实例方法，例如数组实例方法 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>find()</code></span></li></ol><p>如果像转换 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>Promise</code></span> 可以使用 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>@babel/plugin-transform-runtime</code></span> 插件</p><p>安装</p><pre><code class="language-bash">npm i --save-dev @babel/plugin-transform-runtime\n</code></pre><pre><code class="language-javascript">module.exports = {\n  presets: ["@babel/env"],\n  plugins: [["@babel/plugin-transform-runtime", {\n    corejs: 3\n  }]]\n}\n</code></pre><pre><code class="language-javascript">// 转换前 main.js\nlet p = Promise.resolve(0)\n\np.then(r =&gt; console.log(r))\n// 转换后 comiled.js\n"use strict"; \n\nvar _interopRequireDefault = require("@babel/runtime-corejs3/helpers/interopRequireDefault");\n\nvar _promise = _interopRequireDefault(require("@babel/runtime-corejs3/core-js-stable/promise"));\n\nvar p = _promise["default"].resolve(0);\n\np.then(function (r) {\n  return console.log(r);\n});\n</code></pre><p><span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>Promise</code></span> 被转换成了 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>_promise</code></span> 辅助函数，同时采用 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>require</code></span> 引入的方式，避免不同 js 文件内辅助函数的重复声明，只是对内置对象进行重命名（Promise =&gt; _promise），没有污染全局环境。</p><h5>browserslist</h5><p>目标环境配置表，用于配置编译文件的，浏览器运行环境，使用了@babel/preset-env这个预设，此时Babel就会读取browserslist的配置。</p><pre><code class="language-javascript">// 在 package.json\n{\n    ...\n    "browserslist": [\n        "&gt; 1%",\n        "not ie &lt;= 8"\n    ]\n}\n// 目标环境是市场份额大于1%的浏览器同时不考虑IE8及以下的IE浏览器。\n</code></pre><pre><code class="language-bash">// 新建一个 .browserslistrc 文件\n&gt; 1%\nnot ie &lt;= 8\n</code></pre><h5>配置项</h5><p>配置项使用以 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>@babel/env</code></span> 为例</p><pre><code class="language-javascript">module.exports = {\n  presets: [["@babel/env", {\n      targets: {\n          "ie": "8",\n      },\n      useBuiltIns: false,\n      corejs: 2,\n      modules: "auto"\n  }]]\n}\n</code></pre><ol><li>targets：写法与browserslist是一样的，如果对@babel/preset-env的targets参数项进行了设置，那么就不使用browserslist的配置，而是使用targets的配置。</li><li>useBuiltIns：这个参数项主要和 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>polyfill</code></span> 的行为有关。取值为 false 的时候，会将 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>polyfill</code></span> 全部引入到最终的代码里。参数有 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>entry, usage, false</code></span>，默认 false ，相关包 @babel/polyfill</li><li>corejs：core-js 的版本，参数有 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>2,3</code></span> ， 默认 2，相关包 core-js</li><li>modules：该项用来设置是否把ES6的模块化语法改成其它模块化语法，参数有 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>"amd","umd", "systemjs","commonjs","cjs","auto",false</code></span>，具体使用<a href="https://www.babeljs.cn/docs/babel-preset-env" target="_blank">参考文档</a>，默认 “auto“</li></ol><p><a href="https://www.babeljs.cn/docs/babel-plugin-transform-runtime" target="_blank">@babel/plugin-transform-runtime 配置项</a></p><h5>目前（babel 7）比较常用的预设</h5><ul><li>@babel/preset-env</li><li>@babel/preset-flow</li><li>@babel/preset-react</li><li>@babel/preset-typescript</li></ul><h5>目前（babel 7）比较常用的插件</h5><ul><li>@babel/plugin-transform-runtime</li></ul>',__v:0},{state:1,createTime:n,updateTime:"2024-01-20T02:51:54.934Z",_id:"65ab338043b1d10bbf69c744",id:33,createByUser:7,name:"[ESLint]",html:'<p># ESLint学习笔记</p><p><br></p><p>## 环境准备</p><p>操作系统：支持 macOS，Linux，Windows</p><p><br></p><p>运行环境：Node &gt;= 6.14 和 npm &gt;= 3</p><p><br></p><p>## 安装 ESLint</p><p>使用 npm 安装 ESLint</p><pre><code class="language-bash">npm install eslint --save-dev</code></pre><p>然后要创建一个配置文件</p><pre><code class="language-bash">./node_modules/.bin/eslint --init</code></pre><p>脚本会让你做出选择</p><pre><code class="language-bash">How would you like to use ESLint? (Use arrow keys)\n  To check syntax only \n❯ To check syntax and find problems \n  To check syntax, find problems, and enforce code style\n</code></pre><pre><code class="language-bash">How would you like to use ESLint? (Use arrow keys)\nWhat type of modules does your project use? (Use arrow keys)\n❯ JavaScript modules (import/export) \n  CommonJS (require/exports) \n  None of these \n</code></pre><p><br></p><pre><code class="language-bash">Which framework does your project use? (Use arrow keys)\n❯ React \n  Vue.js \n  None of these \n</code></pre><p><br></p><pre><code class="language-bash">Where does your code run? (Press &lt;space&gt; to select, &lt;a&gt; to toggle all, &lt;i&gt; to invert selection)\n❯◉ Browser\n ◯ Node\n</code></pre><p><br></p><pre><code class="language-bash">How would yo
