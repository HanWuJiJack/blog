</p><p><br></p><pre><code class="language-bash">yarn add vue\n</code></pre><p>安装 webpack 和 webpack-dev-server，由于我们在开发环境中需要，所以在开发环境下安装依赖「生产环境中是不需要的」</p><p><br></p><pre><code class="language-bash">yarn add webpack webpack-dev-server --dev\n</code></pre><p>我们查看 package.json 文件，就会看到依赖安装上了，如下所示：</p><p><br></p><p><img src="https://hanwujijack.github.io/blog/30.webp" alt="https://hanwujijack.github.io/blog/30.webp" data-href="https://hanwujijack.github.io/blog/30.webp" style=""/></p><p><br></p><ul><li>5、在 index.html 输入以下内容</li><li></li></ul><pre><code class="language-html">&lt;!DOCTYPE html&gt;\n&lt;html lang="en"&gt;\n&lt;head&gt;\n  &lt;meta charset="UTF-8"&gt;\n  &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;\n  &lt;meta http-equiv="X-UA-Compatible" content="ie=edge"&gt;\n  &lt;title&gt;Document&lt;/title&gt;\n&lt;/head&gt;\n&lt;body&gt;\n&lt;div id="container"&gt;&lt;/div&gt;\n\n&lt;script src="./dist/bundle.js"&gt;&lt;/script&gt;\n&lt;/body&gt;\n&lt;/html&gt;\n</code></pre><p>我们定义了一个 id 为 container 的 div 并且，引入了打包后的　bundle.js</p><ul><li>6、在 src 中新建 main.js</li><li></li></ul><pre><code class="language-javascript">import Vue from \'vue\' ;\n\nnew Vue({\n  el: \'#container\',\n  render:h =&gt; h(\'div\',\'HelloWorld\')\n})\n\n</code></pre><p>以上代码就是把 helloWorld 渲染到 id 为 container 的 div 中</p><ul><li>7、在根目录下新建 webpack.config.js 并配置</li><li></li></ul><pre><code class="language-javascript">var path = require(\'path\')\n\nmodule.exports = {\n  // 入口文件\n  entry: \'./src/main.js\',\n  // 输出\n  output: {\n    path:path.resolve(__dirname,\'./dist\'),\n    publicPath: \'/dist/\',\n    // 名字叫 bundle.js\n    filename: \'bundle.js\'\n  },\n\n  // 导入的时候就可以不添加后缀后了\n  resolve:{\n    extensions: [\'.js\', \'.vue\']\n  },\n\n  devServer: {//webpack-dev-server配置\n    historyApiFallback: true,//不跳转\n    noInfo: true,\n    inline: true,//实时刷新\n    hot:true\n  }\n}\n</code></pre><p>好了基本上完成了，下面我们来测试一下</p><ul><li>8、查看结果</li></ul><p>在目录所在的命令行中输入以下命令</p><p><br></p><pre><code class="language-bash">webpack-dev-server --port 8888 --open --hot\n</code></pre><p>输入上述命令就会自动打开浏览器，并且显示出 HelloWorld 来，我们一个简单的基于 webpack 的 vue demo 就是跑起来了<br></p><p><img src="https://hanwujijack.github.io/blog/31.webp" alt="https://hanwujijack.github.io/blog/31.webp" data-href="https://hanwujijack.github.io/blog/31.webp" style=""/></p><p><br></p><p>这好像跟组件没有半毛钱关系呀，不要急，我们接着来「就不休息了」</p><ul><li>9、我们在 src 中新建一个 first.vue</li><li></li></ul><pre><code class="language-html">&lt;template lang="html"&gt;\n  &lt;div class=""&gt;\n    我是一个单个组件\n  &lt;/div&gt;\n&lt;/template&gt;\n\n&lt;script&gt;\nexport default {\n}\n&lt;/script&gt;\n\n&lt;style lang="css" scoped&gt;\n&lt;/style&gt;\n\n</code></pre><p>以上是一个标准的 vue 组件，并且把这个组件暴露出来，这就是一个单组件</p><ul><li>10 、在 main.js 引入 first.vue 组件，修改 main.js</li><li></li></ul><pre><code class="language-javascript">import Vue from \'vue\' ;\nimport first from \'./first\'\n\nnew Vue({\n  el: \'#container\',\n  render:h =&gt; h(first)\n})\n</code></pre><p>我们来运行一下，看结果<br><img src="https://hanwujijack.github.io/blog/32.webp" alt="https://hanwujijack.github.io/blog/32.webp" data-href="https://hanwujijack.github.io/blog/32.webp" style=""/></p><p><br></p><p>挂了，从图可以看出说我们缺少 babel-loader「就是用来转化 es6 语法的」，我们安装一下 babel-loader 并配置　webpack</p><p>安装 babel-loader「babel 依赖于 babel-core 我们一同安装」</p><p><br></p><pre><code class="language-bash">yarn add babel-loader babel-core --dev\n</code></pre><p>配置 webpack.config.js「配置在 module 的 rules 下面」</p><p><br></p><pre><code class="language-javascript">{\n   test:/\\.js$/,\n   exclude: /node_modules/,\n   loader: \'babel-loader\'\n }\n</code></pre><p>再运行结果<br><img src="https://hanwujijack.github.io/blog/33.webp" alt="https://hanwujijack.github.io/blog/33.webp" data-href="https://hanwujijack.github.io/blog/33.webp" style=""/></p><p><br></p><p>靠，又挂了，不过这次说的是 vue-loader 的问题，什么是 vue-loader 呢？先说一下 loader 吧,webpack 里面的 loader 的作用就是资源转化，由于 webpack 默认支持 js ，如果你想转化 vue 为 js 模版，那么就要使用 vue-loader ，如果你想把　css 转化成原生的　css 那么就要使用 style-loader 等</p><p>vue-loader 是一个加载器，能把以上的类似于 first.vue 组件转化成 JavaScript 模块。这里不过多的介绍 vue-loader。可自行百度，或者我抽出一篇把 webpack 大概说一下</p><ul><li>11、安装 vue-loader</li></ul><p>我们安装 vue-loader</p><p><br></p><pre><code class="language-bash">yarn add vue-loader --dev\n</code></pre><p>运行查看结果：<br><img src="https://hanwujijack.github.io/blog/34.webp" alt="https://hanwujijack.github.io/blog/34.webp" data-href="https://hanwujijack.github.io/blog/34.webp" style=""/></p><p><br></p><p>疯了，还报错，但是 vue-loader 错误没有了，这是一个新的错误，说找不到 vue-template-compiler「它就是一个把 vue2.0 模版预编译为渲染函数，避免开销」</p><p>好吧，没有办法，我们安装一下</p><p><br></p><pre><code class="language-bash">yarn add vue-template-compiler --dev\n</code></pre><p>再次运行查看结果：<br><img src="https://hanwujijack.github.io/blog/35.webp" alt="https://hanwujijack.github.io/blog/35.webp" data-href="https://hanwujijack.github.io/blog/35.webp" style=""/></p><p><span style="color: rgb(64, 64, 64); background-color: rgb(255, 255, 255); font-size: 16px;">不容易呀，终于显示出来了，不过不要激动，还有一些问题，我们看 chrome 的 cosole 中显示下面错误</span></p><p><img src="https://hanwujijack.github.io/blog/36.webp" alt="https://hanwujijack.github.io/blog/36.webp" data-href="https://hanwujijack.github.io/blog/36.webp" style=""/></p><p><br></p><p>说的是找不到　css-loader,为什么呢？由于我们使用 vue 的单个组件里面使用了 style 标签，识别不到，就要使用 css-loader，我们安装一下</p><p><br></p><pre><code class="language-bash">yarn add css-loader --dev\n</code></pre><p>我们知道安装完 loader 一定要配置一下 webpack , 在　webpack.config.js 中的 module 下的 rules 下添加</p><p><br></p><pre><code class="language-javascript">{\n    test: /\\.css$/,\n    loader: \'style-loader!css-loader\'\n},\n</code></pre><p>继续运行查看结果：<br><img src="https://hanwujijack.github.io/blog/37.webp" alt="https://hanwujijack.github.io/blog/37.webp" data-href="https://hanwujijack.github.io/blog/37.webp" style=""/></p><p><br></p><p><br></p><p>[图片上传失败...(image-e5a47d-1523543487961)]</p><p>完美，调试窗口也没有报错，这样我们就一步一步搭建了一个 类似于 vue-cli 创建 vue 项目「当然没有 vue-cli 那样的完善」</p><ul><li>12、我们再建一个组件来丰富一下此 demo 吧</li></ul><blockquote>我们定义一个名为 login.vue 的组件</blockquote><pre><code class="language-html">&lt;template lang="html"&gt;\n&lt;div &gt;\n  &lt;h4&gt;我是登录组件，包含在　first.vue 组件中&lt;/h4&gt;\n  用户名:&lt;input type="text" name="" value="" placeholder="用户名" v-model="username"&gt; &lt;br/&gt;\n  密   码:&lt;input type="password" name="" value="" placeholder="密码" v-model="userpass"&gt;&lt;br/&gt;\n  &lt;div &gt;\n      &lt;button type="button" name="button" class="loginbutton" @click="login()"&gt;登录&lt;/button&gt;\n      &lt;button type="button" name="button" class="resetbutton" @click="reset()"&gt;重置&lt;/button&gt;\n  &lt;/div&gt;\n  {{show message}\n&lt;/div&gt;\n&lt;/template&gt;\n\n&lt;script&gt;\nexport default {\n  name: \'login\',\n  data() {\n    return {\n      // 用户名\n      username:\'\',\n      // 密码\n      userpass: \'\',\n      // 显示信息\n      show message:\'\n    }\n  },\n  methods: {\n    login() {\n      if(this.username.length==0 || this.userpass.length==0){\n        this.showmessage = \'用户名或密码不能为空！\'\n        return\n      }\n      this.showmessage = "欢迎 "+this.username+" 登录"\n      this.username = \'\'\n      this.userpass = \'\'\n    },\n    reset() {\n      this.username = \'\'\n      this.userpass = \'\'\n      this.showmessage = \'\'\n    }\n  }\n}\n&lt;/script&gt;\n\n&lt;style lang="css" scoped&gt;\n  .loginbutton{\n    background: red;\n  }\n  .resetbutton{\n    background-color: green;\n  }\n&lt;/style&gt;\n\n</code></pre><blockquote>修改 first.vue 组件「引入 login.vue 组件并且使用」</blockquote><p><br><img src="https://hanwujijack.github.io/blog/38.webp" alt="https://hanwujijack.github.io/blog/38.webp" data-href="https://hanwujijack.github.io/blog/38.webp" style=""/></p><p><span style="color: rgb(64, 64, 64); background-color: rgb(250, 250, 250); font-size: 16px;">运行查看结果</span></p><p><img src="https://hanwujijack.github.io/blog/39.webp" alt="https://hanwujijack.github.io/blog/39.webp" data-href="https://hanwujijack.github.io/blog/39.webp" style=""/></p><p><br></p><p>从以上结果可以看到，我们不仅在 first.vue 中引入了 login.vue 组件，而且 login.vue 组件的方法和事件完美运行</p><h3>三、总结</h3><p>本节我们着重介绍了 vue 最重要的特性之一 --- 组件，并用知道了 vue 中的组件有四种形式</p><ul><li>1、全局组件--在所有的 vue 实例中都可以使用</li><li>2、局部组件--只能在指定的 vue 实例中使用</li><li>3、嵌套组件--一个组件中可以嵌套另一个组件</li><li>4、单个组件--通过手写类 vue-cli 实现一个 vue demo 并且通过编写单个组件进行组件之间的组合</li></ul><p><strong>PS:</strong> 我们在开发中，尽量使用单个组件的方式进行开发，这样不仅好维护并且方便阅读，更便于团队之间的协作</p><p>到此为止，我们把 vue 的组件就介绍完了，赶紧撸起袖子写一写吧<br></p><p><br></p><p><br></p><p><br></p>',updateByUser:7},{state:1,createTime:e,updateTime:"2024-01-08T08:31:01.386Z",_id:"659ba0fcc58a6f24f80b8a5e",id:14,createByUser:7,name:"[elmentUI]在ios移动端使用elmentUI后无法弹出软键盘",html:'<h3 style="text-align: center;">在ios移动端使用elmentUI后无法弹出软键盘</h3><p><br></p><pre><code class="language-html"> &lt;el-select v-model="form.value" filterable   @change = "changeStore"&gt;\n                   &lt;el-option\n                           v-for="item in form.options"\n                           :key="item.value"\n                           :label="item.label"\n                           :value="item.value"&gt;\n                   &lt;/el-option&gt;\n               &lt;/el-select&gt;</code></pre><p><br></p><p>原因：</p><p>上面这段代码，变成组件的时候是这样的</p><p><img src="https://hanwujijack.github.io/blog/9.png" alt="引导" data-href="https://hanwujijack.github.io/blog/9.png" style=""/></p><p>是因为 input有readonly属性，所以不会弹出软键盘，所以尝试去除readonly属性，代码如下：</p><p>document.getElementById(\'**\').removeAttribute(\'readOnly\')</p><p>但是这个组件在blur的时候又把readonly加回去了，因此在blur的时候还要把readonly属性去掉，查看select组件的源码后发现blur的时候有50毫秒的延迟用户体验优化，因此去除操作也得是个异步操作，才能消除readonly，源码如下：</p><p>解决方案</p><p>公共文件夹里写上这段代码即可：</p><pre><code class="language-javascript">Array.from(document.getElementsByClassName(\'el-select\')).forEach((item) =&gt; {\n      item.children[0].children[0].removeAttribute(\'readOnly\')\n      item.children[0].children[0].onblur = function () {\n        let _this = this\n        setTimeout(() =&gt; {\n          _this.removeAttribute(\'readOnly\')\n        }, 200)\n      }\n    })</code></pre><p><br></p>',__v:0,updateByUser:7},{state:1,createTime:r,updateTime:"2024-01-08T08:31:08.907Z",_id:"65967318c5bd87554d985724",id:13,createByUser:7,name:"[vue]02-指令",html:'<h1 style="text-align: center;">【vue】02-指令</h1><blockquote>正文</blockquote><h3>一、Vue 的实例</h3><p>通过上节课，我们知道如何引入 Vue 来工作，初学者不建议使用 vue-cli 来创建项目，在这里我们使用引入 script 来编写 Vue demo</p><p>Vue 完全可以看做是面向对象的语言，我们创建一个 Vue 的实例一般是这样做的</p><p><br></p><pre style="text-align: left; line-height: 1.5;"><code class="language-vue.js .js  language" style="text-align: left; line-height: 1.5;">var vm = new Vue({\n  // 数据\n  data:{\n  }，\n  methods:{\n    // 方法\n  }，\n  等等其它 \n})\n</code></pre><p>我们可以看到 -- data 作为属性、methods 作为方法，new Vue 就是一个实例对象，这样理解 Vue 就会很轻松「如果有面向对象的基础」</p><h3>二、什么是指令</h3><p>传统意义上的指令就是指挥机器工作的指示和命令，vue 中的指令一般是以 v- 开头</p><p>vue 中的指令的职责是，当表达式的值改变时，会响应式的对 DOM 产生影响</p><p>在开始指令之前，我们先来一个 helloWorld 来直观的感受下下 Vue 吧</p><h4>1、先来一个 HelloWorld</h4><p>在这里我使用 atom 来开发</p><p><img src="https://hanwujijack.github.io/blog/10.webp" alt="https://hanwujijack.github.io/blog/10.webp" data-href="https://hanwujijack.github.io/blog/10.webp" style=""/></p><p><span style="color: rgb(64, 64, 64); background-color: rgb(250, 250, 250); font-size: 16px;">2、打开 index.html，输入以下内容</span></p><pre><code class="language-html">&lt;h3&gt;Vue 的指令&lt;/h3&gt;\n&lt;hr style="height:2px;border:none;border-top:2px dashed #0066CC;"  /&gt;\n&lt;ol&gt;\n   &lt;li&gt;&lt;a href="./instructions/hello.html"&gt;Hello World&lt;/a&gt;&lt;/li&gt;\n&lt;/ol&gt;</code></pre><p><span style="color: rgb(64, 64, 64); background-color: rgb(255, 255, 255); font-size: 16px;">以上是核心代码，body 中的代码「没有写 html 标准模版代码，完整的可以看 index.html界面」</span></p><p><span style="color: rgb(64, 64, 64); background-color: rgb(250, 250, 250); font-size: 16px;">3、在 js 目录下引入 vue.js 文件「在官方上下载」</span></p><p><img src="https://hanwujijack.github.io/blog/11.webp" alt="https://hanwujijack.github.io/blog/11.webp" data-href="https://hanwujijack.github.io/blog/11.webp" style=""/></p><p><span style="color: rgb(64, 64, 64); background-color: rgb(250, 250, 250); font-size: 16px;">4、在 instructions 目录下新建 hello.html</span></p><p><br></p><pre><code class="language-html">&lt;!DOCTYPE html&gt;\n&lt;html lang="en"&gt;\n&lt;head&gt;\n  &lt;meta charset="UTF-8"&gt;\n  &lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;\n  &lt;meta http-equiv="X-UA-Compatible" content="ie=edge"&gt;\n  &lt;title&gt;Vue--hello world&lt;/title&gt;\n  &lt;script src="../js/vue.js"&gt;&lt;/script&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;div id="container"&gt;{{msg}}&lt;/div&gt;\n\n  &lt;script&gt;\n    var vm = new Vue({\n      el:\'#container\',\n      data:{\n        msg:\'hello world\'\n      }\n    })\n  &lt;/script&gt;\n&lt;/body&gt;\n&lt;/html&gt;</code></pre><p>5、查看一下结果吧，这里我们使用 browser-sync 来启动一个服务「帮你解决手动刷新的困扰，看过我 react 系列的应该非常熟悉」,这里不过多介绍 browser-sync , 了解更多请查看官网：<a href="https://links.jianshu.com/go?to=http%3A%2F%2Fwww.browsersync.cn" target="_blank">http://www.browsersync.cn</a><br></p><p><span style="color: rgb(64, 64, 64); background-color: rgb(255, 255, 255); font-size: 16px;">打开命令行，在根目录下输入</span></p><p><br></p><pre><code class="language-javascript">vue-study/vue-lesson/01、基本指令 // 在当前目录\n browser-sync start --server --files "**/*.css, **/*.html"</code></pre><p><br></p><p><br></p><p><img src="https://hanwujijack.github.io/blog/12.webp" alt="https://hanwujijack.github.io/blog/12.webp" data-href="https://hanwujijack.github.io/blog/12.webp" style=""/></p><p><br></p><p><span style="color: rgb(64, 64, 64); background-color: rgb(255, 255, 255); font-size: 16px;">就会自动打开默认浏览器，然后界面就出来了，往后你修改的内容，不用 F5 不用刷新，内容自动就同步了「真 TM 帅」</span></p><p><img src="https://hanwujijack.github.io/blog/13.webp" alt="https://hanwujijack.github.io/blog/13.webp" data-href="https://hanwujijack.github.io/blog/13.webp" style=""/></p><p><br></p><p><span style="color: rgb(64, 64, 64); background-color: rgb(255, 255, 255); font-size: 16px;">看到了吧，输入命令以后就会自动打开浏览器容器，并且显示 index.html 的内容，我们也正确的看到了 hello world 的内容「使用 vue 创建的」</span></p><p><br></p><h4 style="text-align: start;">二、v-on,v-if,v-for 指令</h4><p><span style="color: rgb(64, 64, 64); background-color: rgb(250, 250, 250); font-size: 16px;">1、v-on 是用来监管 DOM 事件的，并执行一些 js 代码，比如点击事件，提交事件等</span></p><p><br></p><pre><code class="language-html">v-on:click="表达式"</code></pre><p style="text-align: start;">废话不多说直接上例子吧</p><ul><li style="text-align: start;">1、在 instructions 下新建 v-on.html，然后在 index.html 中引入</li></ul><p style="text-align: start;">先看 index.html 中修改「见下面红色框」</p><p style="text-align: start;"><img src="https://hanwujijack.github.io/blog/14.webp" alt="https://hanwujijack.github.io/blog/14.webp" data-href="https://hanwujijack.github.io/blog/14.webp" style=""></p><ul><li style="text-align: start;">2、v-on.html 给出 body 中的核心代码「html 基本模版和 vue.js 引信省略」</li></ul><p style="text-align: start;"><br></p><p><br></p><pre><code class="language-html">&lt;body&gt;\n  &lt;div id="container"&gt;\n    &lt;!--这里添加 v-on:click 然后定义一个方法--&gt;\n    &lt;input type="button" value="点我" v-on:click="clickme()"/&gt;\n    &lt;p&gt;{{num}}&lt;/p&gt;\n  &lt;/div&gt;\n\n  &lt;script&gt;\n    var vm = new Vue({\n      el:"#container",\n      data:{\n        // 定义一个数据默认是1\n        num:1\n      },\n      // 方法写在 methods 关建字中，从字名看里面可以多个方法\n      methods:{\n         // 这里就是 v-onclick:后面跟的方法\n        clickme:function(){\n          // this 指的是当前对象 -- vm\n          this.num++\n        }\n      }\n    })\n  &lt;/script&gt;\n&lt;/body&gt;</code></pre><p><br></p><ul><li style="text-align: start;">3、这样一个简单的 v-on:click 指令就可以使用了，我们来看一下结果</li></ul><p><img src="https://hanwujijack.github.io/blog/15.webp" alt="https://hanwujijack.github.io/blog/15.webp" data-href="https://hanwujijack.github.io/blog/15.webp" style=""/></p><p><span style="color: rgb(64, 64, 64); background-color: rgb(255, 255, 255); font-size: 16px;"><strong>PS:</strong></span><span style="color: rgb(64, 64, 64); background-color: rgb(255, 255, 255); font-size: 16px;"> v-on 的缩写</span></p><p><br></p><p><br></p><pre><code class="language-javascript">&lt;!-- 完整语法 --&gt;\n&lt;a v-on:click="doSomething"&gt;...&lt;/a&gt;\n\n&lt;!-- 缩写 --&gt;\n&lt;a @click="doSomething"&gt;...&lt;/a&gt;</code></pre><p><span style="color: rgb(64, 64, 64); background-color: rgb(250, 250, 250); font-size: 16px;">2、v-if 和 v-for 指令</span></p><p style="text-align: start;">v-if 是条件判断，v-for 是用来循环数据的，从名字就可以看出来</p><p style="text-align: start;"><span style="color: rgb(199, 37, 78); background-color: rgb(242, 242, 242); font-size: 12px;"><code>v-if 的模版</code></span></p><p><br></p><pre><code class="language-html">&lt;div v-if="type === \'A\'"&gt;\n  A\n&lt;/div&gt;\n&lt;div v-else-if="type === \'B\'"&gt;\n  B\n&lt;/div&gt;\n&lt;div v-else-if="type === \'C\'"&gt;\n  C\n&lt;/div&gt;\n&lt;div v-else&gt;\n  Not A/B/C\n&lt;/div&gt;</code></pre><p style="text-align: start;">其中 v-else-if 和 v-else 不是必须的「根据实际情况看是否需要」</p><p style="text-align: start;"><span style="color: rgb(199, 37, 78); background-color: rgb(242, 242, 242); font-size: 12px;"><code>v-for 的模版</code></span></p><p><br></p><pre><code class="language-html">&lt;标签 v-for="item in mites"&gt;\n    {{item}}\n&lt;/标签&gt;\n\n比如：遍历 li  假设有一个数组 items=[{"message":"hello"},"message":"vue"]\n&lt;ul id="container"&gt;\n  &lt;li v-for="item in items"&gt;\n    {{ item.message }}\n  &lt;/li&gt;\n&lt;/ul&gt;</code></pre><p><span style="color: rgb(64, 64, 64); background-color: rgb(255, 255, 255); font-size: 16px;">如果想要使用 v-for 来遍历带索引使用</span></p><pre><code class="language-html">v-for="(item,index) in items"</code></pre><p style="text-align: start;">其中 index 就是索引，如果想使用索引的话就可以使用此种方式</p><p style="text-align: start;">这里的标签指的需要循环的标签，好了不多说了，直接看例子吧，下面我们实现一个下面的例子</p><p style="text-align: start;"><img src="https://hanwujijack.github.io/blog/16.webp" alt="https://hanwujijack.github.io/blog/16.webp" data-href="https://hanwujijack.github.io/blog/16.webp" style=""></p><p style="text-align: start;"><span style="color: rgb(64, 64, 64); background-color: rgb(255, 255, 255); font-size: 16px;">我们使用 v-if 来判断需要显示方形按钮/div 还是圆形按钮/div ，并且使用 v-for 遍历了两个数组「分别使用 ul 和 table 样式显示」</span></p><p><br></p><pre><code class="language-html">&lt;div id="container"&gt;\n      &lt;h3&gt;1、使用 v-if 来切换按钮上的文字和 div 的显示样式&lt;/h3&gt;\n      &lt;button v-on:click="cheangeDiv()" style="width:100px;"&gt;{{theWord}}&lt;/button&gt;\n      &lt;!--  如果 flag 为 true 的话那么就显示 div --&gt;\n      &lt;div v-if="flag" &gt;\n        &lt;div id="showDiv"&gt;\n            我显示出来了\n        &lt;/div&gt;\n      &lt;/div&gt;\n      &lt;!-- 否则显示圆形的 div --&gt;\n      &lt;div v-else&gt;\n        &lt;div id="showBuleDiv"&gt;&lt;span style="color:white"&gt;哈哈&lt;/span&gt;&lt;/div&gt;\n      &lt;/div&gt;\n   &lt;hr&gt;\n   &lt;h3&gt;2、使用 v-for 来循环数组&lt;/h3&gt;\n\n    &lt;span&gt;列举出你喜欢吃的水果&lt;/span&gt;&lt;br/&gt;\n    我喜欢吃的水果有\n    &lt;ul&gt;\n      &lt;li v-for="item in fruit"&gt;\n        &lt;span&gt;{{item}}&lt;/span&gt;\n      &lt;/li&gt;\n    &lt;/ul&gt;\n\n  &lt;h3&gt; 3、使用 v-for 循环输出 以下 json 串&lt;/h3&gt;\n  &lt;p&gt;\n    mydatas:[\n      {"name":"TigerChain","age":"保密","address":"地球中国","lover":"不告诉你"},\n      {"name":"张三","age":"23","address":"地球中国","lover":"打游戏"},\n      {"name":"李四","age":"25","address":"地球中国","lover":"读书"},\n      {"name":"王五","age":"30","address":"是中唯一不下雪的地方","lover":"写代码"},\n      {"name":"赵六","age":"18","address":"中国北京","lover":"写博客"},\n      {"name":"钱七","age":"27","address":"中国陕西","lover":"做菜"}\n    ]\n  &lt;/p&gt;\n    &lt;table border="1"&gt;\n      &lt;tr&gt;\n        &lt;th&gt;序号&lt;/th&gt;\n        &lt;th&gt;姓名&lt;/th&gt;\n        &lt;th&gt;年龄&lt;/th&gt;\n        &lt;th&gt;地址&lt;/th&gt;\n        &lt;th&gt;爱好&lt;/th&gt;\n      &lt;/tr&gt;\n      &lt;tr v-for="(item,index) in mydatas"&gt;\n        &lt;!-- 其中 index 是索引，也就是数组的角标 --&gt;\n        &lt;td&gt;&lt;span&gt;{{index}}&lt;/span&gt;&lt;/td&gt;\n        &lt;td&gt;&lt;span&gt;{{item.name}}&lt;/span&gt;&lt;/td&gt;\n        &lt;td&gt;&lt;span&gt;{{item.age}}&lt;/span&gt;&lt;/td&gt;\n        &lt;td&gt;&lt;span&gt;{{item.address}}&lt;/span&gt;&lt;/td&gt;\n        &lt;td&gt;&lt;span&gt;{{item.lover}}&lt;/span&gt;&lt;/td&gt;\n      &lt;/tr&gt;\n    &lt;/table&gt;\n  &lt;/div&gt;\n\n  &lt;script&gt;\n    var vm = new Vue({\n      el:\'#container\',\n      // 数据\n      data:{\n        theWord:"圆形",\n        flag:false,\n        msg:\'show me\',\n        mydatas:[\n          {"name":"TigerChain","age":"保密","address":"地球中国","lover":"不告诉你"},\n          {"name":"张三","age":"23","address":"地球中国","lover":"打游戏"},\n          {"name":"李四","age":"25","address":"地球中国","lover":"读书"},\n          {"name":"王五","age":"30","address":"是中唯一不下雪的地方","lover":"写代码"},\n          {"name":"赵六","age":"18","address":"中国北京","lover":"写博客"},\n          {"name":"钱七","age":"27","address":"中国陕西","lover":"做菜"}\n        ],\n        fruit:["苹果","香蕉","葡萄","美国香瓜"]\n\n      },\n      // 方法\n      methods:{\n        // 切换 div\n        cheangeDiv(){\n          this.flag = !this.flag;\n          if(this.theWord =="圆形"){\n            this.theWord = "方形"\n          }else{\n            this.theWord = "圆形"\n          }\n        }\n      }\n    })\n  &lt;/script&gt;</code></pre><blockquote>3、v-show 和 v-model</blockquote><p><code>v-show</code></p><p>在前面我们使用了 v-if 指令，v-show 的指令和 v-if 类似，基本模版是：</p><p><br></p><pre><code class="language-html">&lt;标签 v-show="条件"&gt;如果达到条件要显示的内容&lt;/标签&gt;\n</code></pre><p>比如：我们有一个按钮点击显示或隐藏 div 如下效果<br><img src="https://hanwujijack.github.io/blog/17.webp" alt="https://hanwujijack.github.io/blog/17.webp" data-href="https://hanwujijack.github.io/blog/17.webp" style=""/></p><p><br></p><p><code>核心代码:</code></p><p><br></p><pre><code class="language-html">&lt;div id="container"&gt;\n  &lt;button @click="clickMe()"&gt;{{defaultButton}}&lt;/button&gt;\n  &lt;!-- 如果 v-show = true 的话就会显示 此 div  --&gt;\n  &lt;div v-show="flag" id="showDiv"&gt;\n    &lt;span&gt;我是 v-show&lt;/span&gt;\n  &lt;/div&gt;\n&lt;/div&gt;\n\n&lt;script&gt;\n  var vm = new Vue({\n    el:\'#container\',\n    data:{\n      // 是否显示 div 的标志，默认是不显示\n      flag:false,\n      // 默认按钮显示字样\n      defaultButton:\'显示\'\n    },\n    methods:{\n      // 按钮点击的方法\n      clickMe(){\n        if(this.defaultButton == "显示"){\n          this.defaultButton ="隐藏"\n        }else{\n          this.defaultButton ="显示"\n        }\n        this.flag = !this.flag\n      }\n    }\n  })\n&lt;/script&gt;\n</code></pre><p>从上面的例子中，我们可以感受到 v-show 的用法了</p><p><code>v-model</code></p><p>v-modle 体现了 mvvm 设计思想，它是一个双向数据绑定「在 input 和 textarea 上」</p><p>我们直接在上面 id 为 container 的 div 中添加如下代码</p><p><br></p><pre><code class="language-html">&lt;input type="text" v-model="itext" class="myinput"&gt; &lt;br/&gt;\n你输入的值是：&lt;font class="myfont"&gt;{{itext}}&lt;/font&gt;\n</code></pre><p>并且我们在 data 中定义一个 itext 属性</p><p><br></p><pre><code class="language-javascript">data:{\n  // 是否显示 div 的标志，默认是不显示\n  flag:false,\n  // 默认按钮显示字样\n  defaultButton:\'显示\',\n  // 新添加的属性\n  itext: \'\'\n},\n</code></pre><p>运行查看结果：<br></p><p><img src="https://hanwujijack.github.io/blog/18.webp" alt="https://hanwujijack.github.io/blog/18.webp" data-href="https://hanwujijack.github.io/blog/18.webp" style=""/></p><p><br></p><p><br></p><p>从上面的结果中我们可以看到，当我们给 input 中输入文本的时候就下面就会自动的显示出所对应的文本，并且点击按钮的时候改变文本的值，输入框中的值会自动改变，这就是双向绑定</p><h3>三、来个 blog 实例</h3><blockquote>1、经过上面我们学习了几个指令，我们来写一个综合的小案例，效果如下：</blockquote><p><br><img src="https://hanwujijack.github.io/blog/19.webp" alt="https://hanwujijack.github.io/blog/19.webp" data-href="https://hanwujijack.github.io/blog/19.webp" style=""/></p><p><br></p><p><br></p><blockquote>2、开始撸码「在这里我们给出核心代码」，后面会放出 demo 地址</blockquote><p>我们在 instructions 目录下新建一个 blog-demo.html 文件</p><ul><li>1、首先我们在这里要引入一个 sweetalert2.js 来做弹出框</li><li>2、我们来看看 div 中的内容</li><li></li></ul><pre><code class="language-html  language">  &lt;div id="container"&gt;\n    &lt;p&gt;标题：&lt;input type="text" v-model="title" placeholder="标题" &gt;&lt;/p&gt;\n    &lt;p&gt;内容：&lt;textarea name="content" id="" cols="30" rows="10" v-model="content"&gt;&lt;/textarea&gt;&lt;/p&gt;\n    &lt;p&gt;&lt;input type="submit" value="添加" v-on:click="add" &gt;&lt;/p&gt;\n\n    &lt;hr&gt;\n\n    &lt;table border="1"&gt;\n      &lt;tr&gt;\n        &lt;th&gt;序号&lt;/th&gt;\n        &lt;th&gt;标题&lt;/th&gt;\n        &lt;th&gt;内容&lt;/th&gt;\n        &lt;th&gt;操作&lt;/th&gt;\n      &lt;/tr&gt;\n      &lt;!-- 遍历把内容显示出来 --&gt;\n      &lt;tr v-for="(data,index) in datas"&gt;\n        &lt;td&gt;{{index+1}}&lt;/td&gt;\n        &lt;td&gt;{{data.title}}&lt;/td&gt;\n        &lt;td&gt;{{data.content}}&lt;/td&gt;\n        &lt;td&gt;\n          &lt;a href="#" v-on:click="deleteRow(index)"&gt;删除&lt;/a&gt;\n          &lt;a href="#" v-on:click="modifyData(index)"&gt;修改&lt;/a&gt;\n        &lt;/td&gt;\n      &lt;/tr&gt;\n    &lt;/table&gt;\n    &lt;span v-show="datas.length!=0" &gt;&lt;a href="#" v-on:click="deleteAllData()"&gt;全部删除&lt;/a&gt;&lt;/span&gt;\n    &lt;!-- 没有数据的显示这个标签 --&gt;\n    &lt;span v-show="datas.length==0"&gt;没有数据&lt;/span&gt;\n  &lt;/div&gt;\n</code></pre><p>以上我们定义了一个 blog 的模版，下面我们给它添加一些操作功能</p><ul><li>3、添加 script 代码</li></ul><p>从上面的代码中，我们看到了 v-modle,v-show ,v-for 等指令，下面我们来看看 vue 中的代码</p><p><br></p><pre><code class="language-javascript  language">&lt;script&gt;\nvar vm = new Vue({\n  el:\'#container\',\n  data:{\n    // 标题\n    title:\'\',\n    // 内容\n    content:\'\',\n    // 所有的内容\n    datas:[]\n  },\n  methods:{\n    // 添加数据\n    add(){\n      if(this.title =="" || this.content==""){\n        alert("标题或内容不能为空")\n        return\n      }\n      // 把标题和内容添加到数组中\n      this.datas.push({"title":this.title,"content":this.content})\n      // 添加完数据以后把标题和内容置空\n      this.title=""\n      this.content=""\n    },\n    // 删除数据\n    deleteRow(index){\n      //在一个方法中调用\n      let that = this // 由于是在方法的方法内部，this 就指的是当前方法了， 所以要使用 var that = this 来声明一下\n     //在一个方法中调用 另一个方法\n     this.$options.methods.deleteMethod(function callback(){\n         that.datas.splice(index,1)\n     })\n    },\n    //修改数据\n    modifyData(index){\n      // 取得原来的数据\n      let data = this.datas[index]\n\n      swal({\n        title: \'修改\',\n        // type: \'info\',\n        html:\n          "&lt;div&gt;&lt;p&gt;标题:&lt;input id=\\"title\\" value="+data.title+" &gt;&lt;/input&gt;&lt;/p&gt;"+\n          " &lt;p&gt;内容:&lt;input  id=\\"content\\" value="+data.content+"&gt;&lt;/input&gt;&lt;/p&gt;&lt;/div&gt;" ,\n\n        showCancelButton: true,\n        focusConfirm: false,\n        confirmButtonText:\'确定\',\n        cancelButtonText:\'取消\'\n      }).then((result)=&gt;{\n        if(result.value){\n          let title = document.getElementById(\'title\').value\n          let content = document.getElementById(\'content\').value\n          // 修改数据\n          this.datas.splice(index,1,{"title":title,"content":content})\n        }\n      })\n    },\n    //删除 全部数据\n    deleteAllData(){\n      //这里使用箭头函数就不用再使用 let that = this 来转化了,可以上面的比较一下，两种方式\n     this.$options.methods.deleteMethod(()=&gt;{\n       this.datas = []\n     })\n    },\n    // 封装一个删除方法\n    deleteMethod(callback){\n      swal({\n        title: \'确定删除吗?\',\n        text: "全部删除了以后就不恢复不了哦！",\n        type: \'warning\',\n        showCancelButton: true,\n        confirmButtonColor: \'#3085d6\',\n        cancelButtonColor: \'#d33\',\n        cancelButtonText:\'取消\',\n        confirmButtonText: \'确定删除!\'\n      }).then((result) =&gt; {\n        if (result.value) {\n           callback()\n        }\n      })\n    }\n  }\n})\n&lt;/script&gt;\n</code></pre><p>以上就是 blog-demo 的核心代码，注释的非常清楚，这里不过多解释了，请自行实践</p><p>到此为止，我们就把 vue 的几个常用的指令说完了</p><h3>四、总结</h3><p>通过这节，我们学习了 vue 的几个常见的指令，并且写了一个小 demo ，通过动手就能直观的感受到 vue 指令的作用</p><p><br></p><p><br></p><p><br></p><p><br></p><p><br></p><p><br></p><p><br></p>',__v:0,updateByUser:7},{state:1,createTime:r,updateTime:"2024-01-08T08:31:13.831Z",_id:"65967246c5bd87554d98571b",id:12,createByUser:7,name:"[vue]01-环境搭建",html:'<h1 style="text-align: center;">01、手把手教 Vue -- 环境搭建</h1><blockquote>教程简介</blockquote><ul><li>1、阅读对象本篇教程适合新手阅读，老手直接略过</li><li>2、教程难度初级，本人水平有限，文章内容难免会出现问题，如果有问题欢迎指出，谢谢</li><li>3、Demo 地址</li></ul><blockquote>教程大纲</blockquote><blockquote>一、什么是 VueVue 的特点二、Vue 的使用方式1、直接引入 script2、使用 CDN3、使用 yarn/npm4、使用 vue-cli 脚手架三、Vue 的开发工具</blockquote><blockquote>正文</blockquote><h3>一、什么是 Vue</h3><p>Vue 是一个用于构建用户界面的渐进式框架「注意读音类似于 View，作者的初衷也是让其起 View 的功能」，Vue 只注重视图层，这点和 React 的是一毛一样的</p><blockquote>vue 的特点</blockquote><ul><li>简单、易用</li><li>灵活</li><li>高效</li></ul><h3>二、Vue 环境搭建</h3><h4>1、Vue 的使用方式</h4><blockquote>1、下载 vue.js 引用到项目中</blockquote><p>我们直接下载 vue.js 然后引入 标签中即可，Vue 分为开发版本和生产版本</p><ul><li>1、开发版本：https://vuejs.org/js/vue.js</li><li>2、生产版本：https://vuejs.org/js/vue.min.js</li></ul><p><strong>PS：</strong> 开发版本有完整的调试和警告，而生产版本则是一个精简版本，删除了警告，如果我们在开发的时候建议选择开发版本方便调试</p><p>使用方式</p><p><br></p><pre style="text-align: left; line-height: 1.5;"><code class="language-html" style="text-align: left; line-height: 1.5;">&lt;html&gt;    &lt;head&gt;     &lt;!-- 引入 vue.js 所在的目录--&gt;     &lt;script src="vue.js"&gt;&lt;/script&gt;    &lt;/head&gt;    &lt;body&gt;    &lt;/body&gt;&lt;/html&gt;\n</code></pre><blockquote>2、使用 CDN 引用</blockquote><p>官方推荐使用 <a href="https://links.jianshu.com/go?to=https%3A%2F%2Fcdn.jsdelivr.net%2Fnpm%2Fvue" target="_blank">https://cdn.jsdelivr.net/npm/vue</a></p><blockquote>3、使用 nmp/yarn 安装</blockquote><ul><li>1、安装 node</li></ul><p>使用 npm 和 yarn 首先要安装 node，可以去官网下载：<a href="https://links.jianshu.com/go?to=https%3A%2F%2Fnodejs.org%2Fen%2Fdownload%2Fcurrent%2F" target="_blank">https://nodejs.org/en/download/current/</a></p><p><br></p><p>下载对应 win 系统还是 mac 系统的版本，然后安装即可</p><p>在我的 mac 电脑上我直接使用 Homebrew 安装的</p><p><br></p><pre style="text-align: left; line-height: 1.5;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">brew install node</code></pre><p>安装完 node 会自带 npm「node 的包管理器」,安装完成以后在命令行中输入</p><pre style="text-align: left; line-height: 1.5;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">node -v\n</code></pre><p>看到以下 node 的版本信息则表示安装成功了</p><ul><li>2、使用 npm 安装 vue</li></ul><p>在命令行输入以下命令即完成安装</p><p><br></p><pre style="text-align: left; line-height: 1.5;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">// 全局安装\nnpm install -g vue\n</code></pre><p>使用 vue-V 查看是否安装成功，如果显示出版本号则表示安装成功</p><ul><li>3、使用 yar「替代 npm 的包管理器」 安装</li></ul><p><strong>a)、</strong> 要使用 yarn 先需要安装 yarn , 在这里我们使用 npm 安装 yarn</p><p><br></p><pre style="text-align: left; line-height: 1.5;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">// 全局安装\nnpm install yarn -g\n</code></pre><p><strong>b)、</strong> 使用 yarn 安装 vue</p><p><br></p><pre style="text-align: left; line-height: 1.5;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">yarn global add vue\n</code></pre><p>以上命令在 win 系统上安装完成以后，在命令行中使用 vue 可能会出现 Command not found 命令，那么我们需要配置一下环境变量。把 yarn 的 bin 目录配置到环境变量即可「配置到 path 路径下」，使用以下命令直接查看 yarn 的 bin 目录「把此命令显示出的路径直接配置到 path 后面即可」</p><p><br></p><pre style="text-align: left; line-height: 1.5;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">yarn global bin\n</code></pre><p>由于我这里是 mac 电脑，所以就不演示了，如果碰到这个问题，就配置一下环境变量即可</p><p>使用 vue-V 查看是否安装成功，如果显示出版本号则表示安装成功</p><h4>2、使用 cli 「命令行工具」</h4><p>我们除了上面的引用或安装 vue 外，还可以使用 vue-cli「脚手架工具」</p><p>vue-cli 是一个脚手架工具「就是一个工具集合，可以快速的创建一个 vue 项目」</p><p>同样使用 yarn/npm 来安装 vue-cli，我们全局安装</p><p><br></p><pre style="text-align: left; line-height: 1.5;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">npm install --global vue-cli \n或者使用\nyarn global add vue-cli\n</code></pre><p>安装完以后，我们输入 vue -V 查看是否安装成功，或使用 vue-list 查看</p><p>看到上面内容则证明我们的 vue-cli 脚手架工具安装成功了</p><h4>3、使用 vue-cli 来创建一个项目</h4><ul><li>1、新建一个目录，我这里放在桌面「我以 mac 电脑演示，win 同理」</li></ul><pre style="text-align: left; line-height: 1.5;"><code class="language-javascript" style="text-align: left; line-height: 1.5;"> cd Desktop\n mkdir myvuedemo\n cd myvuedemo\n</code></pre><ul><li>2、使用 vue-cli 创建项目</li></ul><pre style="text-align: left; line-height: 1.5;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">vue init webpack myfirstvuedemo\n</code></pre><p>这里的 vue 项目是基于 webpack 的，使用上述命令我就可以创建一个名为 myfirstvuedemo 的 vue 项目</p><p>当我们输入上述命令以后就会开始下载模版，然后会提示输入项目名「自己写一个即可」，完了一路回车，出现 yes 就直接回车「目前先这样搞，别管为什么，但是如果看过我的 react 教程就会了解，最后提示使用 npm 还是 yarn 来管理包，我选择的是 yarn」</p><p>安装完依赖以后，就会出现下面的命令</p><p>如图所示，我们成功创建出了项目，如果大家使用 npm 或是 yarn 出现安装不了的情况，那么切换一下源即可「tabao 的源就非常不错」，我们根据上面的提示，进入到项目中，然后运行一下项目看看结果</p><ul><li>3、运行项目</li></ul><pre style="text-align: left; line-height: 1.5;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">cd myfirstvuedemo\n然后运行\nyarn run dev\n</code></pre><p>我们就会看到使用 webpack 启动服务，然后编译，完成以后提示项目运行的地址：默认是—<a href="https://links.jianshu.com/go?to=http%3A%2F%2Flocalhost%3A8080" target="_blank">http://localhost:8080</a></p><p>我们在浏览器中输入 <span style="color: rgb(199, 37, 78); background-color: rgb(242, 242, 242); font-size: 12px;"><code>http://localhost:8080</code></span> 回车，看结果</p><p>怎么样，我们使用 vue-cli 就成功创建出一个 vue 项目，只不过他默认的主页是 Vue 的一些介绍，要搞成自己项目修改即可「后面说到 vue-cli 创建项目会说到的」，怎么样？脚手架创建项目简单吧「建议初学者不要直接使用 vue-cli 来创建项目，而是引入vue.js 来使用，后面熟练了再使用 vue-cli」</p><h3>三、Vue 开发工具</h3><ul><li>1、webstorm</li><li>2、sublime</li><li>3、atom</li><li>4、Visual Studio Code[即 vscode]</li></ul><p><br></p><p>对于开发工具来说，没有最好，只有最合适，完全看个人习惯，有的就习惯使用 vim 开发「你咬我呀」,我个人习惯于使用 atom 和webstrom</p><p>到此为止，我们把 vue 的环境就简单的搭建起来了，快来试一下吧</p>',__v:0,updateByUser:7},{state:1,createTime:r,updateTime:"2024-01-08T08:31:26.807Z",_id:"65966da3c5bd87554d985708",id:11,createByUser:7,name:"[PM2]的安装和使用简介",html:'<h1 style="text-align: center;">PM2的安装和使用简介</h1><h3>一、简介</h3><p>PM2是node进程管理工具，可以利用它来简化很多node应用管理的繁琐任务，如性能监控、自动重启、负载均衡等，而且使用非常简单。</p><h2>二、前期必备</h2><p>node 环境</p><p>npm</p><h3>三、安装</h3><p>全局安装</p><pre><code class="language-javascript">npm install -g pm2</code></pre><h3>四、入门教程</h3><p>挑express应用来举例。一般我们都是通过npm start启动应用，其实就是调用node ./bin/www。那么，换成pm2就是</p><p>注意，这里用了–watch参数，意味着当你的express应用代码发生变化时，pm2会帮你重启服务(长时间监测有可能会出现问题，这时需要重启项目)</p><p><strong>pm2 start ./bin/www –watch</strong></p><h3>五、常用命令</h3><h4>启动</h4><p>参数说明： </p><ul><li>–watch：监听应用目录的变化，一旦发生变化，自动重启。如果要精确监听、不见听的目录，最好通过配置文件。</li><li>-i –instances：启用多少个实例，可用于负载均衡。如果-i 0或者-i max，则根据当前机器核数确定实例数目。</li><li>–ignore-watch：排除监听的目录/文件，可以是特定的文件名，也可以是正则。比如–ignore-watch=”test node_modules “some scripts”“</li><li>-n –name：应用的名称。查看应用信息的时候可以用到。</li><li>-o –output ：标准输出日志文件的路径。</li><li>-e –error ：错误输出日志文件的路径。</li><li>–interpreter ：the interpreter pm2 should use for executing app (bash, python…)。比如你用的coffee script来编写应用。 </li></ul><p>完整命令行参数列表：地址</p><ul><li><strong>pm2 start app.js –watch -i 2</strong></li></ul><h4>重启</h4><ul><li><strong>pm2 restart app.js</strong></li></ul><h4>停止</h4><p>停止特定的应用。可以先通过pm2 list获取应用的名字（–name指定的）或者进程id。</p><ul><li><strong>pm2 stop app_name|app_id</strong></li></ul><p>如果要停止所有应用，可以</p><ul><li><strong>pm2 stop all</strong></li></ul><h4>删除</h4><ul><li><strong>pm2 stop app_name|app_id </strong></li><li><strong>pm2 stop all</strong></li></ul><h4>查看进程状态</h4><ul><li><strong>pm2 list</strong></li></ul><h4>自动重启</h4><ul><li><strong>pm2 start app.js –watch</strong></li></ul><p>*这里是监控整个项目的文件</p><h4>日志查看</h4><p>除了可以打开日志文件查看日志外，还可以通过pm2 logs来查看实时日志。</p><ul><li>pm2 logs</li><li>pm2 save # 记得保存进程状态</li><li>npm install pm2 -g</li><li>pm2 update</li></ul><h4>附pm2命令：</h4><p>npm install pm2 -g &nbsp; &nbsp;# 命令行安装 pm2</p><p>pm2 start app.js -i 4 &nbsp;# 后台运行pm2，启动4个app.js</p><p> &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;# 也可以把\'max\' 参数传递给 start</p><p> &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;# 正确的进程数目依赖于Cpu的核心数目</p><p>pm2 start app.js --name my-api # 命名进程</p><p>pm2 list &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;# 显示所有进程状态</p><p>pm2 monit &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;# 监视所有进程</p><p>pm2 logs &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;# 显示所有进程日志</p><p>pm2 stop all &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;# 停止所有进程</p><p>pm2 restart all &nbsp; &nbsp; &nbsp; &nbsp;# 重启所有进程</p><p>pm2 reload all &nbsp; &nbsp; &nbsp; &nbsp;# 0 秒停机重载进程 (用于 NETWORKED 进程)</p><p>pm2 stop 0 &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;# 停止指定的进程</p><p>pm2 restart 0 &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;# 重启指定的进程</p><p>pm2 startup &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;# 产生 init 脚本 保持进程活着</p><p>pm2 web &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;# 运行健壮的 computer API endpoint (http://localhost:9615)</p><p>pm2 delete 0 &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;# 杀死指定的进程</p><p>pm2 delete all &nbsp; &nbsp; &nbsp; &nbsp;# 杀死全部进程</p>',__v:0,updateByUser:7},{state:1,createTime:t,updateTime:"2024-01-08T08:31:46.202Z",_id:"65963660ac3be535986f7956",id:9,createByUser:7,name:"[koa]request entity too large",html:'<h1 style="text-align: center;"><a href="https://www.cnblogs.com/baby123/p/13359472.html" target="">【koa】 request entity too large</a></h1><p>POST数据太大，出现了413错误，错误描述 request entity too large</p><p>原因：</p><p>使用了koa-body，koa-bodyparser，从它们的README看，接收的参数有默认大小</p><p>koa-body</p><p>- `jsonLimit` **{String|Integer}** The byte (if integer) limit of the JSON body, default `1mb`<br>- `formLimit` **{String|Integer}** The byte (if integer) limit of the form body, default `56kb`<br>- `textLimit` **{String|Integer}** The byte (if integer) limit of the text body, default `56kb`</p><p>koa-bodyparser</p><p>* **formLimit**: limit of the `urlencoded` body. If the body ends up being larger than this limit, a 413 error code is returned. Default is `56kb`.<br>* **jsonLimit**: limit of the `json` body. Default is `1mb`.<br>* **textLimit**: limit of the `text` body. Default is `1mb`.</p><p>解决的方法</p><pre><code class="language-javascript">const koaBody = require(\'koa-body\');\nconst bodyParser = require(\'koa-bodyparser\')\n\napp.use(koaBody({\n    multipart: true,\n    formLimit:"10mb",\n    jsonLimit:"10mb"\n}));\napp.use(bodyParser({\n    formLimit:"10mb",\n    jsonLimit:"10mb"\n}));\n</code></pre><p> </p>',__v:0,updateByUser:7},{state:1,createTime:t,updateTime:"2024-01-08T08:31:55.327Z",_id:"65962780ac3be535986f7914",id:8,createByUser:7,name:"[Nuxt]05 Nuxt2项目打包优化",html:'<h1 style="text-align: center;">【Nuxt】05 Nuxt2项目打包优化</h1><h2>1 打包优化</h2><p>在nuxt.config.js配置</p><pre><code class="language-javascript">build: {\n    // 开启打包分析\n    analyze: true,\n}\n</code></pre><p>进行打包可以查看包体积</p><p>element引入优化：</p><ul><li>在插件按需引入：</li></ul><p><img src="https://hanwujijack.github.io/blog/3.png" alt="引导" data-href="https://hanwujijack.github.io/blog/3.png" style=""/></p><ul><li>打包分包 npm i babel-plugin-component -D，在我自己的项目里，打包后的elementUI资源可以降低至原先的30%</li></ul><pre><code class="language-javascript">module.exports={\n  build: {\n      transpile: [/^element-ui/],\n      babel: {\n        plugins: [\n          [\n            \'component\',\n            {\n              libraryName: \'element-ui\',\n              styleLibraryName: \'theme-chalk\'\n            }\n          ]\n        ]\n      },\n    ...\n  }\n}\n</code></pre><h3>压缩</h3><p>正好安装compression-webpack-plugin来对js文件进行压缩。</p><ul><li>安装: npm install compression-webpack-plugin</li><li>在nuxt.config.js中：</li></ul><pre><code class="language-javascript">const CompressionPlugin = require(\'compression-webpack-plugin\');\nmodule.exports={\n  build: {\n    plugins: [\n      new CompressionPlugin({\n        test: /\\.js$|\\.html$|\\.css/, // 匹配文件名\n        threshold: 10240, // 对超过10kb的数据进行压缩\n        deleteOriginalAssets: false // 是否删除原文件\n      })\n    ],\n  }\n}\n</code></pre><p>这样打包出来的大小虽然没变，但是点击.nuxt-dist-client中你会发现gz打包后，较原来的文件减少了3/4的体积。</p><h3>nuxt-precompress：主要是压缩我们的js/html/css文件</h3><p>配置好之后build一下，果然在.nuxt/dist/client里生成了<a href="https://so.csdn.net/so/search?q=%E5%8E%8B%E7%BC%A9%E6%96%87%E4%BB%B6&spm=1001.2101.3001.7020" target="_blank">压缩文件</a>。</p><ul><li>安装: nuxt-precompress</li><li>在nuxt.config.js中：</li></ul><pre><code class="language-javascript">nuxtPrecompress: {\n    enabled: true, // Enable in production\n    report: false, // set true to turn one console messages during module init\n    test: /\\.(js|css|html|txt|xml|svg)$/, // files to compress on build\n    middleware: {\n      enabled: true,\n      enabledStatic: true,\n      encodingsPriority: [\'br\', \'gzip\']\n    },\n    gzip: {\n      enabled: true,\n      filename: \'[path].gz[query]\', // middleware will look for this filename\n      threshold: 10240,\n      minRatio: 0.8,\n      compressionOptions: { level: 9 }\n    },\n    brotli: {\n      enabled: true,\n      filename: \'[path].br[query]\', // middleware will look for this filename\n      compressionOptions: { level: 11 },\n      threshold: 10240,\n      minRatio: 0.8\n    }\n  },\n</code></pre><h3>chunk分包</h3><p>splitChunks: 設定 Chunks 的最大和最小 size。<br>在nuxt.config.js中加入：</p><pre><code class="language-javascript">module.exports={\n  build: {\n    optimization: {\n      splitChunks: {\n        minSize: 10000,\n        maxSize: 250000\n      }\n    },\n  }\n}\n</code></pre><h3>公共业务模块提取</h3><pre><code class="language-javascript">module.exports={\n  build: {\n    optimization: { // 拆分大文件\n      splitChunks: {\n        cacheGroups: {\n          default: {\n            name: \'chunk-commons\',\n            chunks: \'initial\',\n            minChunks: 3, // 模块被引用3次以上的才抽离\n            priority: -20\n          }\n          ...\n        }\n      }\n    },\n}\n\n\n\n\n </code></pre><p><br></p>',__v:0,updateByUser:7},{state:1,createTime:t,updateTime:"2024-01-08T08:32:05.677Z",_id:"659626a6ac3be535986f790b",id:7,createByUser:7,name:"[Nuxt]04 Nuxt2-SEO： sitemap.xml、seo优化、robots.txt",html:"<h1 style=\"text-align: center;\">【Nuxt】04 Nuxt2-SEO： sitemap.xml、seo优化、robots.txt</h1><h4>1 SiteMap设置</h4><h5>环境准备</h5><p>注意生成sitemap依赖于@nuxtjs/sitemap，并且需要用axios进行请求，不要使用@nuxtjs/axios，不然会报错</p><h5>sitemap.xml配置</h5><ul><li>在nuxt.config.js中配置下面的内容</li></ul><pre><code class=\"language-javascript\">npm install @nuxtjs/sitemap\nnpm install axios\n</code></pre><ul><li>在static/sitemap.js中配置下面的内容</li></ul><pre><code class=\"language-javascript\">const webConfig = {\n  // 本地\n  local: {\n    baseURL: 'http://localhost:8828',\n    referer: 'http://localhost:8828/',\n    url: 'http://localhost:8828'\n  },\n  // sit环境\n  sit: {\n    baseURL: '',\n    referer: '',\n    url: ''\n  },\n  // 线上环境\n  production: {\n    baseURL: '',\n    referer: '/',\n    url: ''\n  }\n}\n\n\nimport axios from 'axios'\n// 运行环境是不是开发环境\nconst isDev = Boolean(process.env.OPE_ENV === 'development')\nconst API_ENV = process.env.API_ENV\n// 接口url\nconst baseUrl = webConfig[API_ENV].baseURL\n// referer\nconst referer = isDev ? webConfig['local'].referer : webConfig[API_ENV].referer\n// 网站域名\nconst hostname = isDev ? webConfig['local'].url : webConfig[API_ENV].url\n\nconst config = {\n  baseURL: baseUrl,\n  withCredentials: true,\n  time: Date.now(),\n  headers: {\n    Accept: 'application/json; charset=utf-8',\n    Referer: referer,\n    common: {\n      languageCode: 'zh-CN',\n      referer: referer\n    }\n  }\n}\nconst sitemap = {\n  path: '/sitemap.xml', //生成的文件路径\n  hostname: hostname, //网站的网址\n  cacheTime: 1000 * 60 * 60 * 24, //一天的更新频率，只在generate:false有用\n  gzip: true, //生成.xml.gz的sitemap\n  generate: false,\n // 排除不要页面\n  exclude: [\n    '/404',\n    '/page',\n    '/details',\n    '/article',\n    '/tags',\n    '/category',\n    '/search'\n  ],\n  defaults: {\n    changefred: 'always',\n    lastmod: new Date(),\n    priority: 0.8\n  },\n  routes: async () =&gt; {\n    let routes = []\n    let res = await axios.get(`${baseUrl}/api/getArticle`, {})\n    if (res.code === 200) {\n     res.list.forEach((item) =&gt; {\n        routes.push(\n          {\n            url: `/xxxx/${item.pageCode}`,\n            changefreq: 'always',\n            priority: 0.9\n          }\n        )\n      })\n    }\n    return routes\n  }\n}\nmodule.exports = sitemap\n\n</code></pre><ul><li>在nuxt.config.js中配置下面的内容</li></ul><pre><code class=\"language-javascript\">const sitemap = require('./static/sitemap')\n\nmodule.exports = {\n  ...,\n  sitemap: sitemap,\n}\n\n</code></pre><h4>2 robots.txt协议</h4><p>在nuxt项目的static文件夹下，配置项目的静态文件，直接在static新建robots.txt即可，nuxt运行时会自动装配到根路由</p><pre><code class=\"language-javascript\"># 该文件可以通过`网站域名/Robots.txt`直接访问\n\n# User-agent作用：描述搜索引擎的名字，对于该文件来说至少药有一条user-agent记录，则该项的值设为*\nUser-agent: *\n# Disallow:  描述不希望被访问到的一个url\nDisallow: /cart?*\nDisallow: /*Cart-*\nDisallow: /*retailavailability\nAllow: /*wishlist*.js\nSitemap: 网站的域名/sitemap.xml\n</code></pre><h4>3 seo优化</h4><ul><li>全局seo：在nuxt.config.js的meta中添加网站的字符编码、语言、响应式标签、网站描述、网站关键字等信息；在link中添加全局的css、网站logo等信息。</li></ul><pre><code class=\"language-javascript\">head: {\n    title: pkg.name,\n    meta: [\n      { charset: 'utf-8' },\n      { name: 'viewport', content: 'width=device-width, initial-scale=1' },\n      { hid: 'description', name: 'description', content: pkg.description }\n    ],\n    link: [\n      { rel: 'icon', type: 'image/x-icon', href: '/favicon.ico' }\n    ]\n  },\n</code></pre><ul><li>页面seo：在nuxt.js项目pages路由页面的script中添加head方法，该方法将随nuxt运行时自动载入</li></ul><pre><code class=\"language-javascript\">head () {\n  return {\n    title: `${this.info.blogName} | ${this.info.blogDescription}`,\n    meta: [\n      { name: 'keywords', content: this.info.keywords },\n      { name: 'description', content: this.info.description }\n    ]\n  }\n}\n\n\n\n\n </code></pre><p><br></p>",__v:0,updateByUser:7},{state:1,createTime:t,updateTime:"2024-01-08T08:32:17.377Z",_id:"659624e1ac3be535986f78fb",id:6,createByUser:7,name:a,html:l,__v:0,updateByUser:7},{state:1,createTime:t,updateTime:"2024-01-08T08:32:29.285Z",_id:"65961bf0ac3be535986f7873",id:5,createByUser:7,name:"[Nuxt]01 什么是SSR 服务端渲染",html:'<h1 style="text-align: center;">【Nuxt】01 什么是SSR 服务端渲染</h1><p><br></p><h3>前言</h3><p>在当前的<a href="https://so.csdn.net/so/search?q=%E5%89%8D%E7%AB%AF%E5%BC%80%E5%8F%91&spm=1001.2101.3001.7020" target="_blank">前端开发</a>工作中，我们见到最多的三种渲染方式，如下：</p><ul><li><span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>CSR</code></span>：<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>Client Side Rendering</code></span>，客户端（通常是浏览器）渲染；</li><li><span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>SSR</code></span>：<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>Server Side Rendering</code></span>，服务端渲染；</li><li><span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>SSG</code></span>：<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>Static Site Generation</code></span>，静态网站生成；</li></ul><p>其中<a href="https://so.csdn.net/so/search?q=CSR&spm=1001.2101.3001.7020" target="_blank">CSR</a>在前端开发工作中最为常见，有SEO需求时会考虑SSR\\SSR，但SEO时SSR效果更好，所以接下来大致说明一下CSR、SSR。</p><h4>1 什么是浏览器端渲染 CSR</h4><p>浏览器端渲染<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>CSR</code></span>是<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>Client Side Render</code></span>的简称，页面上的内容是我们加载的 js 文件渲染出来的，js 文件运行在浏览器上面，服务端只返回一个html模板。简单的理解就是，服务器端不负责解析页面的文档结构，服务器端把 js 、css、images 等静态资源一次性给客户端，客户端通过 js 生产虚拟 DOM 结构树，再通过 axios 请求需要的数据渲染到页面中展示内容，实现了前后端分离。</p><p>咱们平常使用 vue 构建的 SPA 应用都是浏览器端渲染，Vue 应用原始的 HTML 页面 body 标签中只有一个 id 为 app 的节点， DOM 结构是通过 MVVM 模型中 VM 构建虚拟 DOM ，构建完成后再 mouted 到咱们的页面上。随后，根据业务需求发出 axios 请求，再根据 Diff 算法对新的数据，按需渲染更新页面。</p><p><img src="https://hanwujijack.github.io/blog/4.png" alt="引导" data-href="https://hanwujijack.github.io/blog/4.png" style=""/></p><h4>2 什么是服务端渲染 SSR</h4><p>服务端渲染 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>SSR</code></span> 是 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>Server Side Render</code></span> 的简称，页面上的内容是通过服务端渲染生成的，浏览器直接显示服务端返回的html就可以了。简单的理解就是，将组件或页面通过服务器生成html字符串，再发送到浏览器客户端直接展示内容。</p><p>咱们经常提到的前后端混合开发模型 MVC 模型，比如：PHP 的 ThinkPHP 框架、java 的 Spring MVC 框架，这些框架都会直接对应一个解析引擎（我们也经常称作为：模板引擎），比如：PHP Smarty、java JSP 。这些解析引擎的解决思路也很相似，都是在传统的网页 HTML（标准通用标记语言的子集）文件 ( .htm, .html ) 中插入PHP 或者 java 程序段，从而形成 View 视图文件，这些程序片段会被 服务端 解析后形成完整的 html 文件，再发布到客户端进行显示。</p><p>PS：MVC 模式是开发者经典模式，其中 M 是指业务模型，V 是指用户界面，C 则是控制器，使用 MVC 的目的是将 M 和 V 的实现代码分离，从而使同一个程序可以使用不同的表现形式。其中，View 的定义比较清晰，就是用户界面，咱们前端工程师的工作核心也就是在此。</p><p><img src="https://hanwujijack.github.io/blog/5.png" alt="引导" data-href="https://hanwujijack.github.io/blog/5.png" style=""/></p><h5>2.1 使用SSR的利弊</h5><p>追根溯源，早期咱们 Web 开发程序员是没有前后端明确概念这么一说的，在 jQuery 的时代，直接操作 DOM，前端开发都是 SSR 的，服务端通过 assign、show 等方式将数据注入到模板中，再解析成目标 html 后进行发布。后续React、Vue出现后，整合了dom操作，SPA应用大行其道。俗话说，天下大势，分久必合，合久必分啊，但一些官网，SSR 的需求还是仍然须在的。</p><h5>2.2 SSR的优势</h5><ol><li>更利于SEO。不同爬虫工作原理类似，只会爬取源码，不会执行网站的任何脚本（Google除外，据说Googlebot可以运行javaScript）。使用了Vue、React或者其它MVVM框架之后，页面大多数DOM元素都是在客户端根据 js 动态生成，可供爬虫抓取分析的内容大大减少(如图一)。另外，浏览器爬虫不会等待我们的数据完成之后再去抓取我们的页面数据。服务端渲染返回给客户端的是已经获取了异步数据并执行 JavaScript 脚本的最终HTML，网络爬虫就可以抓取到完整页面的信息。</li><li>更利于首屏渲染首屏的渲染是 node 发送过来的 html 字符串，并不依赖于 js 文件了，这就会使用户更快的看到页面的内容。尤其是针对大型单页应用，打包后文件体积比较大，普通客户端渲染加载所有所需文件时间较长，首页就会有一个很长的白屏等待时间。</li></ol><h5>2.3 SSR的局限</h5><ol><li>服务端压力较大本来是通过客户端完成渲染，现在统一到服务端 node 服务去做。尤其是高并发访问的情况，会大量占用服务端CPU 资源；</li><li>开发条件受限在服务端渲染中，只会执行到组件beforCreate、created生命周期钩子，因此项目引用的第三方的库需要考虑当前库是否支持ssr；</li><li>学习成本相对较高除了对 webpack、Vue、React 这些客户端的逻辑要熟悉，还需要掌握 node、Koa2 等相关服务端技术，前后端的技术界限被模糊化，相对于客户端渲染，项目构建、部署过程更加复杂。</li></ol><p><br></p>',__v:0,updateByUser:7},{state:1,createTime:t,updateTime:"2024-01-08T08:32:40.664Z",_id:"65961b86ac3be535986f7865",id:4,createByUser:7,name:"[Nuxt]02 Nuxt2项目搭建与配置、路由使用、生命周期、国际化等",html:'<h1 style="text-align: center;">【Nuxt】02 Nuxt2项目搭建与配置、路由使用、生命周期、国际化等</h1><h3>一、 项目搭建</h3><h4>1 Nuxt 简介</h4><p>Nuxt.js 是一个基于 Vue.js 的通用应用框架，通过对客户端/服务端基础架构的抽象组织，Nuxt.js 主要关注的是应用的 UI渲染。</p><p>Nuxt.js 简单的说就是 Vue.js 的通用框架，最常用的就是用来作 SSR（服务器端渲染）。再直白点说，就是 Vue.js 原来是开发 SPA（单页应用）的，但是随着技术的普及，很多人想用 Vue 开发多页应用，并在服务端完成渲染。这时候就出现了 Nuxt.js 这个框架，她简化了 SSR 的开发难度。还可以直接用命令把我们制作的 vue 项目生成为静态 html（我们也称这个技术解决方案为 SSG）。<br><img src="https://img-blog.csdnimg.cn/20210225230627927.jpg?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzM4OTg3MTQ2,size_16,color_FFFFFF,t_70#id=fYGSx&originHeight=1446&originWidth=2500&originalType=binary&ratio=1&rotation=0&showTitle=false&status=done&style=none&title=#id=M58ES&originHeight=1446&originWidth=2500&originalType=binary&ratio=1&rotation=0&showTitle=false&status=done&style=none&title=" alt="" data-href="" style=""/><br>项目搭建与配置</p><pre><code class="language-javascript">npx create-nuxt-app nuxt-demo\n</code></pre><p>然后按照需要进行配置项选择<br>当运行完时，它将安装所有依赖项，因此下一步是启动项目:</p><pre><code class="language-javascript">cd &lt;project-name&gt;\nnpm run dev\n</code></pre><p>应用现在运行在 <a href="http://localhost:3000/" target="_blank">http://localhost:3000</a> 上运行。</p><h4>2 Nuxt 目录结构介绍</h4><pre><code class="language-javascript">|-- .nuxt                            // Nuxt自动生成，临时的用于编辑的文件，build\n|-- assets                           // 用于组织未编译的静态资源入LESS、SASS 或 JavaScript\n|-- components                       // 用于自己编写的Vue组件，比如滚动组件，日历组件，分页组件\n|-- layouts                          // 布局目录，用于组织应用的布局组件，不可更改。\n|-- middleware                       // 用于存放中间件\n|-- pages                            // 用于存放写的页面，我们主要的工作区域\n|-- plugins                          // 用于存放JavaScript插件的地方\n|-- static                           // 用于存放静态资源文件，比如图片\n|-- store                            // 用于组织应用的Vuex 状态管理。\n|-- .editorconfig                    // 开发工具格式配置\n|-- .eslintrc.js                     // ESLint的配置文件，用于检查代码格式\n|-- .gitignore                       // 配置git不上传的文件\n|-- nuxt.config.json                 // 用于组织Nuxt.js应用的个性化配置，已覆盖默认配置\n|-- package-lock.json                // npm自动生成，用于帮助package的统一性设置的，yarn也有相同的操作\n|-- package-lock.json                // npm自动生成，用于帮助package的统一性设置的，yarn也有相同的操作\n|-- package.json                     // npm包管理配置文件\n\n</code></pre><table style="width: auto; text-align: center;"><tbody><tr><th colspan="1" rowspan="1" width="auto">别名</th><th colspan="1" rowspan="1" width="auto">目录</th></tr><tr><td colspan="1" rowspan="1" width="auto"><span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>~</code></span></td><td colspan="1" rowspan="1" width="auto"></td></tr><tr><td colspan="1" rowspan="1" width="auto">或 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>@</code></span></td><td colspan="1" rowspan="1" width="auto"><a href="https://www.nuxtjs.cn/api/configuration-srcdir" target="_blank">srcDir</a></td></tr><tr><td colspan="1" rowspan="1" width="auto"><span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>~~</code></span></td><td colspan="1" rowspan="1" width="auto"></td></tr><tr><td colspan="1" rowspan="1" width="auto">或 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>@@</code></span></td><td colspan="1" rowspan="1" width="auto"><a href="https://www.nuxtjs.cn/api/configuration-rootdir" target="_blank">rootDir</a></td></tr></tbody></table><h3>二、 Nuxt 常用配置项</h3><h4><strong>1 配置IP和端口：</strong></h4><p>开发中经常会遇到端口被占用或者指定 IP 的情况。我们需要在根目录下的 package.json 里对 config 项进行配置。比如现在我们想把 IP 配置成 127.0.0.1，端口设置 1818</p><pre><code class="language-javascript">"config":{\n    "nuxt":{\n      "host":"127.0.0.1",\n      "port":"1818"\n    }\n  },\n</code></pre><p>配置好后，我们在终端中输入npm run dev，然后你会看到服务地址改为了127.0.0.1:1818.</p><h4><strong>2 配置全局CSS</strong></h4><p>在开发多页项目时，都会定义一个全局的 CSS 来初始化我们的页面渲染，比如把 padding 和 margin 设置成 0，网上也有非常出名的开源 css 文件 <a href="https://necolas.github.io/normalize.css/8.0.1/normalize.css" target="_blank">normailze.css</a>，要定义这些配置，需要在nuxt.config.js里进行操作。</p><p>比如现在我们要把页面字体设置为红色，就可以在 assets/css/normailze.css 文件，然后把字体设置为红色。</p><p>PS：如果使用 scss 需要安装依赖 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>npm install --save-dev node-sass sass-loader</code></span></p><pre><code class="language-css">/* assets/css/normailze.css */\nhtml{\n    color:red;\n}\n</code></pre><pre><code class="language-css">// nuxt.config.js\ncss:[\'~assets/css/normailze.css\']\n</code></pre><h4>3 配置 webpack 的 loader</h4><p>在 nuxt.config.js 里是可以对 webpack 的基本配置进行覆盖的，比如现在我们要配置一个 url-loader 来进行小图片的64位打包。就可以在 nuxt.config.js 的 build 选项里进行配置。</p><pre><code class="language-javascript">// 自定义 webpack 配置\nbuild: {\n    transpile: [/^element-ui/],\n    extend (config, { isDev, isClient }) {\n      // 音频文件 file-loader 处理，使用 &lt;audio :src="require(\'@/assets/water.mp3\')" controls&lt;/audio 快速调用\n      config.module.rules.push({\n        test: /\\.(ogg|mp3|wav|mpe?g)$/i,\n        loader: \'file-loader\',\n        options: {\n          name: \'[path][name].[ext]\'\n        }\n      })\n      // 配置 eslint 检查\n      if (isDev && isClient) {\n        config.module.rules.push({\n          enforce: \'pre\',\n          test: /\\.(js|vue)$/,\n          loader: \'eslint-loader\',\n          exclude: /(node_modules)/\n        })\n      }\n    }\n}\n</code></pre><h4>4 环境配置</h4><p>第一步：安装cross-env插件</p><pre><code class="language-javascript">npm install cross-env --save\n\n第二步：根目录下创建env.js文件,配置环境变量</code></pre><p>配置各个环境下的接口地址和服务端口</p><pre><code class="language-javascript">export default {\n  dev: {\n    server: {\n      host: \'0.0.0.0\',\n      port: 8888,\n    },\n    api: {\n      port: \'\',\n      host: \'开发环境接口地址\'\n    }\n  },\n  test: {\n    server: {\n      host: \'0.0.0.0\',\n      port: 7085,\n    },\n    api: {\n      port: \'\',\n      host: \'测试环境接口地址\'\'\n    }\n  },\n  uat: {\n    server: {\n      host: \'0.0.0.0\',\n      port: 7085,\n    },\n    api: {\n      port: \'\',\n      host: \'预发布环境接口地址\'\'\n    }\n  },\n  prod: {\n    server: {\n      host: \'0.0.0.0\',\n      port: 7085,\n    },\n    api: {\n      port: \'\',\n      host: \'生产环境接口地址\'\'\n    }\n  }\n}\n\n第三步：nuxt.config.js配置基本的接口地址变量</code></pre><pre><code class="language-javascript">import env from \'./env\';\nexport default {\n  env:{\n    MODE:process.env.MODE\n  },\n  axios: {\n    baseURL: env[process.env.MODE].api.host,\n  },\n  //修改默认的访问端口\n  server: env[process.env.MODE].server,\n}\n</code></pre><h3>三、Nuxt 基础使用</h3><h4>1 Nuxt 路由配置和参数传递</h4><p>学习前端框架都要学习路由机制，因为路由可以体现我们的业务逻辑，把模块串联起来，让程序焕发光彩。那简单的说路由就是我们的跳转机制，也可以简单理解成链接跳转。Nuxt.js 的路由并不复杂，它给我们进行了封装，让我们节省了很多配置环节。</p><p><strong>1. 简单路由Demo</strong></p><p>我们现在根目录的pages文件下新建两个文件夹，<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>about</code></span> 和 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>news</code></span>，在 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>about</code></span> 文件夹下新建 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>index.vue</code></span> 文件</p><pre><code class="language-html">&lt;template&gt;\n  &lt;div&gt;\n      &lt;h2&gt;About Index page&lt;/h2&gt;\n      &lt;ul&gt;\n        &lt;li&gt;&lt;a href="/"Home&gt;&lt;/a&gt;&lt;/li&gt;\n      &lt;/ul&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n</code></pre><p>在 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>news</code></span> 文件夹下新建 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>index.vue</code></span> 文件</p><pre><code class="language-html">&lt;template&gt;\n  &lt;div&gt;\n      &lt;h2&gt;News Index page&lt;/h2&gt;\n       &lt;ul&gt;\n        &lt;li&gt;&lt;a href="/"Home&gt;&lt;/a&gt;&lt;/li&gt;\n      &lt;/ul&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n</code></pre><p>修改原来的 pages 文件夹下的 index.vue</p><pre><code class="language-html">&lt;template&gt;\n  &lt;div&gt;\n    &lt;ul&gt;\n      &lt;li&gt;&lt;a href="/"HOME&gt;&lt;/a&gt;&lt;/li&gt;\n      &lt;li&gt;&lt;a href="/about"ABOUT&gt;&lt;/a&gt;&lt;/li&gt;\n      &lt;li&gt;&lt;a href="/news"&gt;NEWS&lt;/a&gt;&lt;/li&gt;\n    &lt;/ul&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n</code></pre><p><span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>&lt;nuxt-link&gt;</code></span><strong>标签</strong></p><p>虽然上面的例子跳转已经成功，但是 Nuxt.js 并不推荐这种<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>&lt;a&gt;</code></span>标签的作法，它为我们准备了<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>&lt;nuxt-link&gt;</code></span>标签（vue中叫组件），我们先把首页的<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>&lt;a&gt;</code></span>标签替换成<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>&lt;nuxt-link&gt;</code></span>。</p><pre><code class="language-html">&lt;template&gt;\n  &lt;div&gt;\n    &lt;ul&gt;\n      &lt;li&gt;&lt;nuxt-link :to="{name:\'index\'}"&gt;HOME&lt;/nuxt-link&gt;&lt;/li&gt;\n      &lt;li&gt;&lt;nuxt-link :to="{name:\'about\'}"&gt;ABOUT&lt;/nuxt-link&gt;&lt;/li&gt;\n      &lt;li&gt;&lt;nuxt-link :to="{name:\'news\'}"&gt;NEWS&lt;/nuxt-link&gt;&lt;/li&gt;\n    &lt;/ul&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n</code></pre><p>我们再次预览页面，也是可以进行正常跳转的，在实际开发中尽量使用标签的方法跳转路由。</p><p><strong>2. params传递参数</strong></p><p>路由经常需要传递参数，我们可以简单的使用 params 来进行传递参数，我们现在向新闻页面（news）传递个参数，然后在新闻页面进行简单的接收。</p><p>我们先修改 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>pages</code></span>下的 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>Index.vue</code></span>文件，给新闻的跳转加上 params 参数，传递 3306 ID。注意：一般情况下我们不推荐这种传递参数方法，因为我们一刷新，参数立马就丢失了！</p><pre><code class="language-html">&lt;template&gt;\n  &lt;div&gt;\n    &lt;ul&gt;\n      &lt;li&gt;&lt;nuxt-link :to="{name:\'index\'}"&gt;HOME&lt;/nuxt-link&lt;/li&gt;\n      &lt;li&gt;&lt;nuxt-link :to="{name:\'about\'}"&gt;ABOUT&lt;/nuxt-link&lt;/li&gt;\n      &lt;li&gt;&lt;nuxt-link :to="{name:\'news\',params:{newsId:3306}}"&gt;NEWS&lt;/nuxt-link&lt;/li&gt;\n    &lt;/ul&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n</code></pre><p>在 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>news</code></span> 文件夹下的 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>index.vue</code></span> 里用 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>$route.params.newsId</code></span> 进行接收</p><pre><code class="language-html">&lt;template&gt;\n  &lt;div&gt;\n      &lt;h2&gt;News Index page&lt;/h2&gt;\n      &lt;p&gt;NewsID:{{$route.params.newsId}}&lt;/p&gt;\n       &lt;ul&gt;\n        &lt;li&gt;&lt;a href="/"Home&gt;&lt;/a&gt;&lt;/li&gt;\n      &lt;/ul&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n</code></pre><h4>2 Nuxt 动态路由和参数校验</h4><p>简单的路由已经弄清楚了，这节看一下动态路由，其实动态路由就是带参数的路由。比如我们现在新闻模块下面有很多新闻详细页，这时候就需要动态路由的帮助了。</p><p><strong>1. 新闻详细页面传递参数</strong></p><p>在 news 文件夹下面新建了 _id.vue 的文件，以下画线为前缀的 Vue 文件就是动态路由，然后在文件里边有 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>$route.params.id</code></span> 来接收参数。</p><pre><code class="language-javascript">&lt;template&gt;\n  &lt;div&gt;\n      &lt;h2&gt;News-Content [{{$route.params.id}}]&lt;/h2&gt;\n      &lt;ul&gt;\n        &lt;li&gt;&lt;a href="/"Home&gt;&lt;/a&gt;&lt;/li&gt;\n      &lt;/ul&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n</code></pre><p>修改新闻首页路由，我们在 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>/pages/news/index.vue</code></span> 进行修改，增加两个详细页的路由</p><pre><code class="language-html">&lt;template&gt;\n  &lt;div&gt;\n      &lt;h2&gt;News Index page&lt;/h2&gt;\n      &lt;p&gt;NewsID:{{$route.params.newsId}}&lt;/p&gt;\n       &lt;ul&gt;\n        &lt;li&gt;&lt;a href="/"Home&gt;&lt;/a&gt;&lt;/li&gt;\n        &lt;li&gt;&lt;a href="/news/123"&gt;News-1&lt;/a&gt;&lt;/li&gt;\n        &lt;li&gt;&lt;a href="/news/456"&gt;News-2&lt;/a&gt;&lt;/li&gt;\n      &lt;/ul&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n</code></pre><p><strong>2. 路由动态参数校验</strong></p><p>进入一个页面，对参数传递的正确性校验是必须的，<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>Nuxt.js</code></span> 也贴心的为我们准备了校验方法 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>validate( )</code></span></p><pre><code class="language-javascript">export default {\n  validate ({ params }) {\n    // Must be a number\n    return /^\\d+$/.test(params.id)\n  }\n}\n</code></pre><p>我们使用了validate方法，并把params传递进去，然后用正则进行了校验，如果正则返回了true正常进入页面，如果返回false进入404页面。</p><h4>3 Nuxt 路由动画效果</h4><p>路由的动画效果，也叫作页面的更换效果。Nuxt.js提供两种方法为路由提供动画效果，一种是全局的，一种是针对单独页面制作。</p><p><strong>1. 全局路由动画设置</strong></p><p>全局动画默认使用 page 来进行设置，例如现在我们为每个页面都设置一个进入和退出时的渐隐渐现的效果。我们可以先在根目录的 assets/css 下建立一个 main.css 文件</p><pre><code class="language-css">.page-enter-active, .page-leave-active {\n    transition: opacity 1s;\n}\n.page-enter, .page-leave-active {\n    opacity: 0;\n}\n</code></pre><p>然后在 nuxt.config.js 里加入一个全局的 css 文件就可以了</p><pre><code class="language-css">css:[\'assets/css/main.css\']\n</code></pre><p>这时候在页面切换的时候就会有2秒钟的动画切换效果了，但是你会发现一些页面是没有效果的，这是因为你没有是<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>&lt;nuxt-link</code></span>组件来制作跳转链接，注意使用 a 标签跳转是没有动画的，这个是为什么呢？</p><p>比如我们上节课作的动态路由新闻页，你就需要改成下面的链接，改过之后你就会看到动画效果了</p><pre><code class="language-html">&lt;li&gt;&lt;nuxt-link :to="{name:\'news-id\',params:{id:123}}"&gt;News-1&lt;/nuxt-link&gt;&lt;/li&gt;\n</code></pre><p><strong>2. 单独设置页面动效</strong></p><p>想给一个页面单独设置特殊的效果时，我们只要在 css 里改变默认的 page，然后在页面组件的配置中加入transition 字段即可。例如，我们想给about页面加入一个字体放大然后缩小的效果，其他页面没有这个效果。</p><p>在全局样式 assets/main.css 中添加以下内容。</p><pre><code class="language-css">.test-enter-active, .test-leave-active {\n    transition: all 2s;\n    font-size:12px;\n\n}\n.test-enter, .test-leave-active {\n    opacity: 0;\n    font-size:40px;\n}\n</code></pre><p>然后在 about/index.vue 组件中设置，这时候就有了页面的切换独特动效了。</p><pre><code class="language-javascript">export default {\n  transition:\'test\'\n}\n</code></pre><h4>4 Nuxt 默认模板和布局</h4><p>在开发应用时，经常会用到一些公用的元素，比如网页的标题是一样的，每个页面都是一模一样的标题。这时候我们有两种方法，第一种方法是作一个公用的组件出来，第二种方法是修改默认模版。这两种方法各有利弊，比如公用组件更加灵活，但是每次都需要自己手动引入；模版比较方便，但是只能每个页面都引入。这节课我们就学习一下如何使用 Nuxt 的默认模版和默认布局功能。</p><p><strong>1. 默认模板</strong></p><p>Nuxt 为我们提供了超简单的默认模版订制方法，只要在根目录下创建一个 app.html 就可以实现了。现在我们希望每个页面的最上边都加入 「学而时习之，不亦说乎」这几个字，我们就可以使用默认模版来完成。</p><pre><code class="language-html">&lt;!DOCTYPE html\n&lt;html lang="en"&gt;\n&lt;head&gt;\n   {{ HEAD }}\n&lt;/head&gt;\n&lt;body&gt;\n    &lt;p&gt;学而时习之，不亦说乎&lt;/p&gt;\n    {{ APP }}\n&lt;/body&gt;\n&lt;/html&gt;\n</code></pre><p>这里的 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>{{ HEAD }}</code></span> 读取的是 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>nuxt.config.js</code></span> 里的信息，<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>{{ APP }}</code></span> 就是我们写的 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>pages</code></span>文件夹下的主体页面了。需要注意的是 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>HEAD</code></span> 和 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>APP</code></span> 都需要大写，如果小写会报错的。这里还有一个小坑需要大家注意，就是如果你建立了默认模板后，记得要重启服务器，否则你的显示不会成功；但是默认布局是不用重启服务器的。</p><p><strong>2. 默认布局</strong></p><p>和默认模板类似的功能还有默认布局，但是从名字上你就可以看出来，默认布局主要针对于页面的统一布局使用。它在位置根目录下的 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>layouts/default.vue</code></span>。需要注意的是在默认布局里不要加入头部信息，只是关于<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>&lt;template&gt;</code></span>标签下的内容统一订制。</p><p>还是上边的需求，我们在每个页面的最顶部放入「有朋自远方来，不亦说乎」这几个字，看一下在默认布局里的实现。</p><pre><code class="language-html">&lt;template&gt;\n  &lt;div&gt;\n    &lt;p&gt;有朋自远方来，不亦说乎&lt;/p&gt;\n    &lt;nuxt/&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n</code></pre><p>这里的<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>&lt;nuxt/&gt;</code></span>就相当于我们每个页面的内容，你也可以把一些通用样式放入这个默认布局里，但是个人不建议这样写，会增加页面的复杂程度。</p><h4>5 Nuxt 错误页面及个性 meta 设置</h4><p>当用户输入路由错误的时候，我们需要给他一个明确的指引，所以说在应用程序开发中 404 页面是必不可少的。Nuxt.js 支持直接在默认布局文件夹里建立错误页面。</p><p><strong>1. 建立错误页面</strong></p><p>在根目录下的 layouts 文件夹下建立一个 error.vue 文件，它相当于一个显示应用错误的组件。</p><pre><code class="language-html">&lt;template&gt;\n  &lt;div&gt;\n      &lt;h2 v-if="error.statusCode==404"&gt;404页面不存在&lt;/h2&gt;\n      &lt;h2 v-else&gt;500服务器错误&lt;/h2&gt;\n      &lt;ul&gt;\n          &lt;li&lt;nuxt-link to="/"HOME&lt;/nuxt-link&lt;/li&gt;\n      &lt;/ul&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n\n&lt;script&gt;\nexport default {\n  props:[\'error\'],\n}\n&lt;/script&gt;\n</code></pre><p>代码用 v-if 进行判断错误类型，需要注意的是这个错误是你需要在<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>&lt;script</code></span>里 props 进行声明的，如果不声明程序是找不到 error.statusCode 的。</p><p><strong>2. 个性 meta 设置</strong></p><p>页面的 Meta 对于 SEO 的设置非常重要，比如你现在要作个新闻页面，那为了搜索引擎对新闻的收录，需要每个页面对新闻都有不同的 title 和 meta 设置。直接使用 head 方法来设置当前页面的头部信息就可以了。我们现在要把 New-1 这个页面设置成个性的 meta 和 title 。</p><ol><li>我们先把<span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>pages/news/index.vue</code></span>页面的链接进行修改一下，传入一个 title，目的是为了在新闻具体页面进行接收 title，形成文章的标题。</li></ol><pre><code class="language-html">&lt;li&gt;\n   &lt;nuxt-link :to=" {name:\'news-id\',params:{id:123,title:\'坚持学习\'}} "&gt;News-1&lt;/nuxt-link&gt;\n&lt;/li&gt;\n</code></pre><ol><li>第一步完成后，我们修改 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>/pages/news/_id.vue</code></span>，让它根据传递值变成独特的 meta 和 title 标签。</li></ol><pre><code class="language-html">&lt;template&gt;\n  &lt;div&gt;\n      &lt;h2&gt;News-Content [{{$route.params.id}}]&lt;/h2&gt;\n      &lt;ul&gt;\n        &lt;li&gt;&lt;a href="/"Home&gt;&lt;/a&gt;&lt;/li&gt;\n      &lt;/ul&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n&lt;script&gt;\nexport default {\n  validate ({ params }) {\n    return /^\\d+$/.test(params.id)\n  },\n  data(){\n    return{\n      title: this.$route.params.title,\n    }\n  },\n\t//独立设置head信息\n  head(){\n      return{\n        title:this.title,\n        meta:[\n          {hid:\'description\',name:\'news\',content:\'This is news page\'}\n        ]\n      }\n    }\n}\n&lt;/script&gt;\n</code></pre><p>注意：为了避免子组件中的 meta 标签不能正确覆盖父组件中相同的标签而产生重复的现象，建议利用 hid 键为meta标签配一个唯一的标识编号。</p><h4>6 Nuxt asyncData 方法获取数据</h4><p>在项目中需要在初始化页面前先得到数据，也就是我们常说的异步请求数据。Nuxt.js 贴心的为我们扩展了 Vue.js 的方法，增加了 anyncData，从名字上就很好理解，这是一个异步方法。</p><p><strong>1. 创建远程数据</strong></p><p>使用 <span style="color: rgb(199, 37, 78); background-color: rgb(249, 242, 244); font-size: 14px;"><code>MockJS + express</code></span> 构建一个简单的数据模拟请求服务输出对应的数据结构</p><pre><code class="language-javascript">// 使用 Mock 构建本地服务器输出数据结果\nconst Mock = require("mockjs");\nconst express = require("express");\nconst app = express();\n\n//允许跨域请求返回数据\napp.all("*", function(req, res, next) {\n  res.header("Access-Control-Allow-Origin", "*");\n  res.header("Access-Control-Allow-Methods", "PUT, GET, POST, DELETE, OPTIONS");\n  res.header("Access-Control-Allow-Headers", "X-Requested-With");\n  res.header("Access-Control-Allow-Headers", "Content-Type");\n  next();\n});\n\n//根据传入的参数 num，生成 num 条模拟的数据列表\nfunction generatorList(num, lang) {\n  if (lang === "cn") {\n    return Mock.mock({\n      [`list|${num}`]: [\n        {\n          // 文章 ID\n          "id|+1": 1,\n          // 作者\n          author: "@cname",\n          // 模拟标题，中文字符串长度为 20 位到 30 位\n          title: "@ctitle(10,20)",\n          // 发布时间\n          date: "@date(\'yyyy-MM-dd\')"\n        }\n      ]\n    });\n  } else {\n    return Mock.mock({\n      [`list|${num}`]: [\n        {\n          // 文章 ID\n          "id|+1": 1,\n          // 作者\n          author: "@name",\n          // 模拟标题，中文字符串长度为 20 位到 30 位\n          title: "@title(10,20)",\n          // 发布时间\n          date: "@date(\'yyyy-MM-dd\')"\n        }\n      ]\n    });\n  }\n}\n//截取路由并反馈数据\napp.get("/news-list", function(req, res) {\n  // 获取 get 请求数据条数参数 num\n  const { num, lang } = req.query;\n  return res.send(generatorList(num, lang));\n});\napp.get("/new-info", function(req, res) {\n  // 获取 get 请求数据条数参数 num\n  const { id, lang } = req.query;\n  let mock = Mock.mock({\n    // 文章 ID\n    id,\n    // 作者\n    author: "@cname",\n    // 模拟标题，中文字符串长度为 20 位到 30 位\n    title: "@ctitle(10,20)",\n    // 内容段落\n    content: "@cparagraph(5, 20)",\n    // 发布时间\n    date: "@date(\'yyyy-MM-dd\')"\n  });\n  if (lang === "en") {\n    mock = Mock.mock({\n      // 文章 ID\n      id,\n      // 作者\n      author: "@name",\n      // 模拟标题，中文字符串长度为 20 位到 30 位\n      title: "@title(10,20)",\n      // 内容段落\n      content: "@paragraph(5, 20)",\n      // 发布时间\n      date: "@date(\'yyyy-MM-dd\')"\n    });\n  }\n  return res.send(mock)\n});\n\n//设置端口并打印对应调用结果\napp.listen(4000, function() {\n  console.log(\n    "本地mock服务启动，接口地址为：http://localhost:4000/data?num=请求列表数量"\n  );\n});\n</code></pre><p><strong>2. 安装 Axios</strong></p><p>Vue.js官方推荐使用的远程数据获取方式就Axios，所以我们安装官方推荐，来使用Axios。这里我们使用npm 来安装 axios。 直接在终端中输入下面的命令：</p><pre><code class="language-javascript">npm install axios --save\n</code></pre><p><strong>ansycData的promise方法</strong></p><p>我们在pages下面新建一个文件，叫做 ansyData.vue。注意：我们需要在 asyncData 中引入 context 上下文参数代替 this，因为 asyncData 方法是在组件初始化时调用，所以没法通过 this 来引用组件实例对象</p><pre><code class="language-html">&lt;template&gt;\n  &lt;div class="news"&gt;\n    &lt;h2&gt;新闻列表页面&lt;/h2&gt;\n    &lt;nuxt-link v-for="(item, index) in newsList" :key="index" :to=" \'/news/\' + item.id "&gt;{{item.title}}&lt;/nuxt-link&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n\n&lt;script&gt;\nimport axios from \'axios\'\nexport default {\n  name:\'news\',\n  // 请求数据，该方法会运行在服务器端\n  async asyncData(){\n    let res = await axios.get("http://localhost:4000/news-list?num=10&lang=cn")\n    console.log(res.data.list)\n    return {\n      newsList: res.data.list\n    }\n  },\n  // 使用 context 获取上下文信息\n  async asyncData(context){\n    console.log(context.route.params.id)\n    let res = await axios.get("http://localhost:4000/new-info?id="+ context.route.params.id +"&lang=cn")\n    console.log(res.data)\n    return {\n      newInfo: res.data\n    }\n  }\n}\n&lt;/script&gt;\n\n&lt;style lang="scss" scoped&gt;\n.news{\n  h2{\n    margin: 20px 0;\n  }\n  a{\n    padding: 10px 0;\n    text-decoration: none;\n    display: block;\n  }\n}\n&lt;/style&gt;\n</code></pre><h4>7 Nuxt 静态资源和打包</h4><p><strong>1. 直接引入图片</strong></p><p>我们在网上任意下载一个图片，放到项目中的 static 文件夹下面，然后可以使用下面的引入方法进行引用。</p><pre><code class="language-html">&lt;div&gt;&lt;img src="~static/logo.png" /&gt;&lt;/div&gt;\n</code></pre><p>这种引用方法是不用估计相对路径的，“~” 就相当于定位到了项目跟目录，这时候你的图片路径就不会出现错误，就算打包也是正常的。</p><p><strong>2. CSS引入图片</strong></p><p>如果在CSS中引入图片，方法和 html 中直接引入是一样的，也是用“~”符号引入。</p><pre><code class="language-css">&lt;style&gt;\n  .diss{\n    width: 300px;\n    height: 100px;\n    background-image: url(\'~static/logo.png\');\n  }\n&lt;/style&gt;\n</code></pre><p><strong>3. 打包静态HTML并运行</strong></p><p>用Nuxt.js制作完成后，你可以打包成静态文件并放在服务器上，进行运行。</p><pre><code class="language-javascript">npm run generate\n</code></pre><p>然后在 dist 文件夹下输入 live-server 就可以了</p><h3>四、Nuxt 进阶使用</h3><h4>4.1 Nuxt 生命周期</h4><ol><li>Nuxt 业务响应执行生命周期逻辑</li></ol><p><img src="https://img-blog.csdnimg.cn/20210225230726927.png?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzM4OTg3MTQ2,size_16,color_FFFFFF,t_70#id=HDkM5&originHeight=2702&originWidth=1002&originalType=binary&ratio=1&rotation=0&showTitle=false&status=done&style=none&title=" alt="" data-href="" style=""/><img src="https://hanwujijack.github.io/blog/6.png" alt="引导" data-href="https://hanwujijack.github.io/blog/6.png" style=""/></p><ol><li>Nuxt 生命周期钩子函数</li></ol><p><img src="https://hanwujijack.github.io/blog/7.png" alt="引导" data-href="https://hanwujijack.github.io/blog/7.png" style=""/><img src="https://img-blog.csdnimg.cn/20210225230741765.jpeg?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzM4OTg3MTQ2,size_16,color_FFFFFF,t_70#id=X1WQ1&originHeight=872&originWidth=480&originalType=binary&ratio=1&rotation=0&showTitle=false&status=done&style=none&title=" alt="" data-href="" style=""/></p><ol><li>Nuxt 客户端生命周期钩子函数（即 Vue 生命周期钩子函数）</li></ol><p><img src="https://img-blog.csdnimg.cn/20210225230757731.jpeg?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzM4OTg3MTQ2,size_16,color_FFFFFF,t_70#id=Z5LKS&originHeight=2844&originWidth=2604&originalType=binary&ratio=1&rotation=0&showTitle=false&status=done&style=none&title=" alt="" data-href="" style=""/><img src="https://hanwujijack.github.io/blog/8.png" alt="引导" data-href="https://hanwujijack.github.io/blog/8.png" style=""/></p><h4>4.2 Nuxt Vuex 状态树</h4><p>对于每个大项目来说，使用状态树 (store) 管理状态 (state) 十分有必要，所以 Nuxt.js 内核实现了 Vuex。</p><p>Nuxt.js 会尝试找到应用根目录下的 store 目录，如果该目录存在，它将做以下的事情：</p><ol><li>引用 vuex 模块</li><li>将 vuex 模块 加到 vendors 构建配置中去</li><li>设置 Vue 根实例的 store 配置项</li></ol><p><strong>一、创建 Vuex 状态树</strong></p><ol><li>首先，创建 Vuex store index.js + user.js 文件：</li></ol><pre><code class="language-javascript">import Vue from \'vue\';\nimport Vuex from \'vuex\';\nimport user from \'./user\';\nVue.use(Vuex);\nconst store = () = new Vuex.Store({\n  state: {\n  },\n  mutations: {\n  },\n  modules: {\n    user\n  }\n});\nexport default store\n</code></pre><pre><code class="language-javascript">const state = () = ({\n  username: "未登录用户",\n  girls: ["小红", "小花"]\n})\nconst getters = {\n  gilsNum: state = {\n    return state.girls.length;\n  }\n}\nconst mutations = {\n  M_LOGIN(state, username) {\n    state.username = username;\n  },\n  M_LOGOUT(state) {\n    state.username = "未登录用户";\n  },\n  M_ADDGIRL(state, girl) {\n    state.girls.push(girl);\n  }\n};\nconst actions = {\n  login({ state, commit }, name) {\n    commit("M_LOGIN", name);\n  },\n  logout({ state, commit }) {\n    commit("M_LOGOUT");\n  },\n  addGirl({ state, commit }, girl) {\n    commit("M_ADDGIRL", girl);\n  }\n};\nexport default {\n  namespaced: true,\n  state,\n  getters,\n  mutations,\n  actions\n};\n</code></pre><ol><li>接着，在 pages/about.vue 中使用 user 模块</li></ol><pre><code class="language-html">&lt;template&gt;\n  &lt;div class="about"&gt;\n    &lt;p&gt;用户名是：{{username}} {{gilsNum}}&lt;/p&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n\n&lt;script&gt;\nimport { mapState, mapMutations, mapActions, mapGetters } from \'vuex\'\nexport default {\n  name:\'about\',\n  computed: {\n    ...mapState(\'user\',[\n      \'username\', \'girls\'\n    ]),\n    ...mapGetters(\'user\', [\n      \'gilsNum\'\n    ]),\n  },\n  methods: {\n    ...mapActions(\'user\', [                                             \n      "login", "logout", "addGirl"\n    ])\n  }\n}\n&lt;/script&gt;\n</code></pre><ol><li>我们也可以将模块文件分解为单独的文件：state.js、actions.js、mutations.js 、 getters.js</li></ol><p><strong>二、使用 nuxtServerInit 方法调用 Vuex</strong></p><p>如果在状态树中指定了 nuxtServerInit 方法，Nuxt.js 调用它的时候会将页面的上下文对象作为参数传给它，当我们想将服务端的一些数据传到客户端时，这个方法是非常好用的。</p><p>举个例子，假设我们服务端的会话状态树里可以通过 req.session.user 来访问当前登录的用户。将该登录用户信息传给客户端的状态树，我们只需更新 store/index.js 如下：</p><p>PS：关于 context 上下文对象，<a href="https://www.nuxtjs.cn/api/context" target="_blank">官方文档</a>，非常重要要仔细理解和学习，这玩意是连接服务端和客户端的关键桥梁</p><pre><code class="language-javascript">const store = () = new Vuex.Store({\n  state: {\n  },\n  mutations: {\n  },\n  modules: {\n    user\n  },\n  actions:{\n    nuxtServerInit ({ commit }) {\n      console.log("nuxtServerInit is runing 哈哈哈哈")\n      // 服务端这里首次被调用\n      commit(\'user/M_LOGIN\', \'01-犬夜叉\')\n    }\n  }\n})\n</code></pre><p><strong>三、使用 middleware 构建中间件服务</strong></p><pre><code class="language-javascript">// 在 middleware 文件夹中创建一个 auth.js 文件\nexport default function ({ store, route }){\n  console.log("中间件被执行了")\n  console.log(route)\n  store.commit("user/M_LOGIN", \'02-黑猫警长\')\n}\n// 在 nuxt.config.js 文件中路由拦截全局使用\nrouter: {\n   middleware: \'auth\'\n}\n</code></pre><pre><code class="language-html">// 在 page 页面中设置使用\n&lt;template&gt;\n  &lt;h1&gt;Secret page&lt;/h1&gt;\n&lt;/template&gt;\n\n&lt;script&gt;\nexport default {\n  middleware: \'auth\'\n}\n&lt;/script&gt;\n</code></pre><p>**四、在 asyncData 中调用 vuex **</p><p>asyncData 方法一般用来进行服务端数据初始化操作，同时也可以根据上下文去设置 store 信息</p><pre><code class="language-javascript">export default {   \n  asyncData({ store }){\n    console.log("asyncData is runing")\n    // store.commit("user/M_LOGIN", \'蜡笔小新\')\n    store.dispatch("user/login", \'03-樱桃小丸子\')\n  },\n}\n</code></pre><p><strong>五、使用 fetch 方法调用 Vuex</strong></p><p>fetch 方法会在渲染页面前被调用，作用是填充状态树 store 数据，与 asyncData 方法类似，不同的是它不会设置组件的数据，也就是说单纯的在服务端进行数据初始化操作。</p><p>如果页面组件设置了fetch方法，它会在组件每次加载前被调用（在服务端或切换至目标路由之前），此方法需要跟服务端的人员配合</p><pre><code class="language-javascript">export default {   \n  fetch({ store }){\n    console.log("fetch is runing")\n    // store.commit("user/M_LOGIN", \'蜡笔小新\')\n    store.dispatch("user/login", \'04-樱桃小丸子\')\n  },\n}\n</code></pre><h4>4.3 Nuxt axios 跨域与拓展配置</h4><p><a href="https://www.nuxtjs.cn/" target="_blank">Nuxt</a> 是 Vue 项目服务器端渲染（SSR)解决方案。而在使用时，就会遇到前后端分离情况下的域名或端口不一致导致的跨域问题。本文将介绍如何通过设置代理解决 Nuxt 与 <a href="https://github.com/axios/axios" target="_blank">axios</a> 集成的跨域问题。</p><ol><li><strong>解决跨域</strong></li></ol><p>Nuxt 使用 axios 为避免出现前端页面跨域问题，需要安装 @nuxtjs/axios 和 @nuxtjs/proxy 两个模块。**注意：**不需要手动注册 @nuxtjs/proxy 模块，但是必须要确保它在依赖项中</p><p>用 yarn 安装：</p><pre><code class="language-javascript">yarn add axios @nuxtjs/axios @nuxtjs/proxy\n</code></pre><p>使用 npm 安装：</p><pre><code class="language-javascript">npm install axios
