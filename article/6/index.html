u like to define a style for your project? (Use arrow keys)\n❯ Use a popular style guide \n  Answer questions about your style \n  Inspect your JavaScript file(s) \n</code></pre><p><br></p><pre><code class="language-bash">Which style guide do you want to follow? (Use arrow keys)\n❯ Airbnb (https://github.com/airbnb/javascript) \n  Standard (https://github.com/standard/standard) \n  Google (https://github.com/google/eslint-config-google) \n</code></pre><p><br></p><p><br></p><pre><code class="language-bash"> What format do you want your config file to be in? (Use arrow keys)\n❯ JavaScript \n  YAML \n  JSON\n</code></pre><p>于是就会在当前文件夹生成一个 `.eslintrc` 文件。</p><p><br></p><h2>`.eslintrc` 文件</h2><pre><code class="language-javascript">{\n    "parserOptions": { /* 解析器选项 */\n        "ecmaVersion": 6, /* 使用的 ECMAScript 版本 */\n        "sourceType": "module", /* 设置为 "script" (默认) 或 "module"（如果你的代码是 ECMAScript 模块) */\n        "ecmaFeatures": { /* 额外的语言特性 */\n            "globalReturn": true, /* 允许在全局作用域下使用 return 语句 */\n            "impliedStrict": true, /* 启用全局 strict mode */\n            "jsx": true /* 启用 JSX */\n        }\n    },\n    "parser": "esprima", /* 指定解析器 */\n    "plugins": [ /* 使用插件 */\n        "eslint-plugin-plugin1", \n        "plugin2" /* 插件名称可以省略 eslint-plugin- 前缀 */\n    ], \n    "processor": "a-plugin/a-processor", /* 启用插件 a-plugin 提供的处理器 a-processor。 */\n    /* 处理器可以从另一种文件中提取 JavaScript 代码，然后让 ESLint 检测 JavaScript 代码。或者处理器可以在预处理中转换 JavaScript 代码。 */\n    "extends": [ /* 继承规则 */\n        "eslint:recommended", /* 若使用 standard 规则，则写为 extends: standard */\n        "plugin:react/recommended"  /* 继承插件中的规则，react 是包名 */\n    ],\n    "rules": { /* 改变规则设置 */\n        "semi": "off", /* "off" 或 0 - 关闭规则 */\n        "curly": "warn", /* "warn" 或 1 - 开启规则，使用警告级别的错误：warn (不会导致程序退出) */\n        "quotes": "error" /* 开启规则，使用错误级别的错误：error (当被触发的时候，程序会退出) */\n    },\n    "overrides": [ /* 对指定文件的处理 */\n        {\n            "files": ["*.md"],\n            "processor": "a-plugin/markdown" /* 对指定类型的文件使用处理器 */\n        },\n        {\n            "files": ["**/*.md/*.js"],\n            "rules": { /* 对指定类型的文件应用规则 */\n                "strict": "off"\n             }\n        }\n    ]\n}\n</code></pre><p><br></p><p><br></p><p><br></p><h2> `.eslintignore` 文件</h2><p><br></p><p>在项目根目录创建一个 `.eslintignore` 文件告诉 ESLint 去忽略特定的文件和目录。</p><p><br></p><p>`.eslintignore` 文件是一个纯文本文件，其中的每一行都是一个 glob 模式表明哪些路径应该忽略检测。</p><p><br></p><p>例如，以下将忽略所有的 JavaScript 文件：</p><p><br></p><pre><code class="language-bash">**/*.js</code></pre><p>支持忽略某一路径下的文件</p><pre><code class="language-bash"># 忽略 src 目录下的 js 文件\n/root/src/*.js\n# 但是 app.js 不能被忽略\n!/root/src/app.js\n</code></pre><p>- 以 # 开头的行被当作注释，不影响忽略模式。</p><p>- 路径是相对于 .eslintignore 的位置或当前工作目录。</p><p>- 以 ! 开头的行是否定模式，它将会重新包含一个之前被忽略的模式。</p><p><br></p><h1 style="text-align: justify;">配置</h1><h2 style="text-align: justify;">基本规则</h2><p style="text-align: justify;">配置文件一般放置在项目的根目录，这样可以让你项目的所有文件都使用相同的规则。当然，你也可以在子文件夹中单独添加一个配置文件，这时子文件夹中的配置会和父级的配置合并，子配置优先。如果你不希望子文件夹应用父级的规则，那么可以在子配置中添加 <code>root: true</code>​ ，这样 <code>eslint</code>​ 就会忽略外部的配置。</p><h3 style="text-align: justify;">parser</h3><p style="text-align: justify;">​<code>eslint</code>​ 默认使用 <code>espree</code>​ 作为解释器，这也就意味着它只能解析常规的 <code>js</code>​ 文件。如果项目中使用了 <code>vue</code>​ 或者 <code>ts</code>​ ，那么默认的解释器就不能处理这些文件。这时就需要指定解释器，比如 <code>vue-eslint-parser</code>​ 或者 <code>@typescript-eslint/parser</code>​ 。</p><p style="text-align: justify;">特别的，如果你使用 <code>vue-eslint-parser</code>​ 作为解释器，那么还可以通过配置 <code>parserOptions.parser</code>​来制定 SFC 中 <code>&lt;script&gt;</code>​ 内容的解释器，具体可以参考 <a href="https://github.com/vuejs/vue-eslint-parser" target="">vue-eslint-parser</a> 。</p><h2 style="text-align: justify;">extends 继承</h2><p style="text-align: justify;">使用继承可以支持使用共享的配置。如果 <code>配置文件B</code>​ 继承自 <code>配置文件A</code>​ ，B 会以 A 为基础，并覆盖 A 的配置。具体的覆盖规则可以参考 <a href="https://zh-hans.eslint.org/docs/latest/use/configure/configuration-files#-5" target="">扩展配置文件</a> 。如果同时配置了多个继承，那么后声明的会覆盖先声明的。</p><p style="text-align: justify;"><br></p><pre><code class="language-js">module.exports = {\n  extends: [\n    ./.eslintrc.A.js,\n    ./.eslintrc.B.js,  // &lt;-- B 会覆盖 A 中的规则\n  ],\n}\n</code></pre><p style="text-align: justify;">这样的一个好处是可以把一些公共的规则抽象出来，便于复用。比如我们在配置 vue 项目时常使用到的 <a href="https://eslint.vuejs.org/user-guide/#configuration" target="">推荐规则</a> 就是通过 <code>extends</code>​ 加载进来的。</p><p style="text-align: justify;">使用 <code>extends</code>​ 不仅会继承 <code>rules</code>​ ，同时包括 <code>plugins</code>​、<code>parserOptions</code>​、<code>overriads</code>​ 等其他配置都可以被继承。</p><h2 style="text-align: justify;">plugins 插件</h2><p style="text-align: justify;">一个 <code>plugin</code>​ 可以理解为一系列的规则，一般需要配合特定的 <code>parse</code>​ 使用。只添加插件时规则是不生效的，它只代表 eslint 可以支持新的规则，只有当你在 <code>rules</code>​ 中定义或者使用 <code>extends</code>​ 间接使用时才会生效。</p><p style="text-align: justify;">比如当安装 <code>eslint-plugin-vue</code>​ 并进行正确配置，则可以启用相关的规则。</p><p style="text-align: justify;"><br></p><pre><code class="language-js">module.exports = {\n  // ↓ 引入 vue 相关规则\n  plugin: [\'vue\'],\n  // ↓ 启用规则\n  extends: [\'plugin:vue/recommended\']，\n  // ↓ 覆盖规则  \n  rules: {\n    \'vue/no-unused-components\': 1,\n  }\n}\n</code></pre><p style="text-align: justify;">注意，在我们的配置中，并没有指定 <code>parse</code>​ 。前面提到，eslint 默认使用 <code>espree</code>​ 来解析文件，这里为什么可以解析 vue 文件呢？因为在 <code>plugin:vue/recommended</code>​ 中，其实已经指定了<code>parse</code>​ ，可以参考 <a href="https://github.com/vuejs/eslint-plugin-vue/blob/master/lib/configs/base.js" target="">eslint-plugin-vue/lib/configs/base.js</a> 。</p><h2 style="text-align: justify;">overrides 覆盖</h2><p style="text-align: justify;">当常规配置不能满足个性需求，比如某些特定目录下的文件不进行特定的检查时，可以使用覆盖来解决。在同一配置文件中，覆盖的优先级高于常规配置。</p><p style="text-align: justify;"><br></p><pre><code class="language-js">module.exports = {\n  ...\n  overrides: [  \n    {\n      files: [\'*.vue\'],\n      parser: \'vue-eslint-parser\',\n      parserOptions: {\n        parser: \'@typescript-eslint/parser\',\n      },\n      rules: {\n        \'no-unused-vars\': \'off\',\n        \'no-undef\': \'off\',\n      },\n    },\n  ],\n  ...\n}\n</code></pre><p style="text-align: justify;">比如，在上面的配置中，默认使用 <code>espree</code>​ 作为解释器，但是如果文件名匹配 <code>*.vue</code>​ 时则优先使用覆盖的配置也就是使用 <code>vue-eslint-parser</code>​ 作为解释器，并且声明使用 <code>@typescript-eslint/parser</code>​ 作为 sfc 中 <code>&lt;script&gt;</code>​ 的解释器。</p><p style="text-align: justify;"><br></p><p style="text-align: justify;"><br></p><p style="text-align: justify;"><br></p><p>常见的rule有如下这些，</p><ul><li><code>no-var</code>: 禁止使用 <code>var</code> 关键字声明变量，使用 <code>let</code> 或 <code>const</code> 代替。</li><li><code>no-unused-vars</code>: 禁止声明变量但未使用，减少代码冗余。</li><li><code>no-console</code>: 禁止使用 <code>console</code> 语句，避免代码在生产环境中泄漏敏感信息。</li><li><code>semi</code>: 要求在语句末尾使用分号，规范代码风格。</li><li><code>indent</code>: 要求使用指定的缩进风格，提高代码可读性。</li><li><code>quotes</code>: 要求在字符串周围使用指定的引号类型，规范代码风格。</li><li><code>no-undef</code>: 禁止使用未声明的变量，减少错误出现的概率。</li><li><code>no-extra-parens</code>: 禁止出现不必要的括号，提高代码可读性。</li><li><code>no-multiple-empty-lines</code>: 禁止出现多行空白行，提高代码可读性。</li><li><code>no-trailing-spaces</code>: 禁止行末出现空格，提高代码可读性。</li><li><code>no-unreachable</code>: 禁止出现无法到达的代码，减少代码冗余。</li><li><code>no-useless-return</code>: 禁止出现不必要的 <code>return</code> 语句，减少代码冗余。</li></ul><p>React</p><ul><li><code>react/jsx-uses-react</code>: 检测是否使用了 React 库，如果没有使用则报错。</li><li><code>react/jsx-uses-vars</code>: 检测是否声明了 JSX 变量，如果声明了但未使用则报错。</li><li><code>react/jsx-no-undef</code>: 检测是否使用了未定义的 JSX 变量，如果使用了则报错。</li><li><code>react/jsx-indent</code>: 要求 JSX 元素的缩进为指定数量的空格。</li><li><code>react/jsx-indent-props</code>: 要求 JSX 属性的缩进为指定数量的空格。</li><li><code>react/no-unescaped-entities</code>: 禁止在 JSX 中使用未转义的 HTML 实体字符。</li><li><code>react/prop-types</code>: 检测是否为组件声明了 props 类型定义，如果没有则报错。</li></ul><p>Vue</p><ul><li><code>vue/html-indent</code>: 要求模板中的缩进为指定数量的空格。</li><li><code>vue/no-unused-components</code>: 检测是否注册了但未使用的组件，如果有则报错。</li><li><code>vue/no-unused-vars</code>: 检测是否声明了但未使用的变量，如果有则报错。</li><li><code>vue/require-prop-types</code>: 要求组件声明 props 类型定义。</li><li><code>vue/require-default-prop</code>: 要求组件声明 props 的默认值。</li><li><code>vue/require-v-for-key</code>: 要求使用 v-for 指令时为每个项提供唯一的 key 属性。</li></ul><p>等等..</p><p>除此之外，不同的插件还有对应的rule，可查看对应文档来配置。</p><h3>plugins</h3><p>用来指定插件的一个选项。插件是一种扩展 ESLint 功能的方式，可以用于检查特定类型的问题或者应用特定的编码规范。ESLint 插件通常是一个 npm 包，包含一组规则和相关的配置，通过 <code>plugins</code> 选项将其引入到项目中，就可以使用这些规则来检查代码了。</p><p>ESLint 插件通常需要配合对应的规则进行使用，可以通过 <code>extends</code> 选项来继承插件的规则。常用的插件如下：</p><ol><li><code>eslint-plugin-import</code>：用于检查模块导入的规范性，包括路径、文件类型和文件内容等方面的检查。</li><li><code>eslint-plugin-react</code>：用于检查 React 代码的规范性，包括 JSX 语法、组件使用和生命周期等方面的检查。</li><li><code>eslint-plugin-vue</code>：用于检查 Vue.js 代码的规范性，包括模板、组件和指令等方面的检查。</li><li><code>eslint-plugin-jest</code>：用于检查 Jest 测试代码的规范性，包括测试名称、匹配器和断言等方面的检查。</li><li><code>eslint-plugin-node</code>：用于检查 Node.js 代码的规范性，包括 API 使用、文件系统和子进程等方面的检查。</li><li><code>eslint-plugin-prettier</code>：用于将 Prettier 代码格式化集成到 ESLint 中，可以通过配置来自动修复代码格式问题。</li><li><code>eslint-plugin-security</code>：用于检查代码中的安全问题，包括跨站点脚本攻击、命令注入和 SQL 注入等方面的检查。</li></ol><p><br></p><h3>配置项详解</h3><p>通过第一步，我们初始化 eslint 后得到的配置文件如下：</p><pre><code class="language-javascript">module.exports = {\n  env: {\n    browser: true,\n    es2021: true,\n    node: true,\n  },\n  extends: [\n    \'eslint:recommended\',\n    \'plugin:vue/vue3-essential\',\n    \'plugin:@typescript-eslint/recommended\',\n  ],\n  overrides: [],\n  parser: \'vue-eslint-parser\',\n  parserOptions: {\n    ecmaVersion: \'latest\',\n    sourceType: \'module\',\n    parser: \'@typescript-eslint/parser\',\n  },\n  plugins: [\'vue\', \'@typescript-eslint\'],\n  rules: {},\n}\n</code></pre><p>下面我们一一过下这些个配置。</p><ul><li>root 上面配置中没有这个规则，这里稍微提一嘴。root 一般在 monorepo 项目中会比较常见，首先我们知道 ESLint 在当前目录下查找上面的几种配置文件，如果找不到的话就会在父级目录找，一直到文件系统的根目录，而如果 ESLint 配置文件中有"root": true，就会停止在父级目录中寻找。</li><li>env env 是Environments的简写，用来指定代码在哪种环境中运行。 每个环境都有特定的预定义全局变量，比如上面的env: { browser: true }表示启用 ES12 的全局变量和类型，搭配parserOptions: { ecmaVersion: \'latest\' }启用 ES12 的语法，这样配置 ESLint 就会支持最新的 ES 语法，ESLint 会自动校验语法上的错误。 并且这些环境不是互斥的，可以定义多个环境，如上面的配置同时还启用了 browser 浏览器环境和 Node.js 的环境，所以 env 字段其实就是设置全局变量（多个环境）。</li><li>extends & plugins 这俩放一起看，先看 extends 的属性值设置，有以下几种： 字符串 eslint:recommended 或 eslint:all ESLint 默认实现的两种最佳实践，当配置为 eslint:recommended 表示开启 ESLint推荐的规则；而 eslint:all 代表开启所有的规则（官方不推荐此规则） 字符串 standard/airbnb... 这类规则称为可共享的配置，是一个 npm 包。 这种 ESLint 配置都是继承社区整理好的配置规则，比如流行的风格指南eslint-config-airbnb和eslint-config-standard。 写的时候可以可以省略包名的前缀 eslint-config-，直接extends: \'airbnb\'即可。 字符串 plugin:xxx 这类规则需要搭配plugins字段使用，插件可以是一个命名格式为 eslint-plugin-&lt;plugin-name&gt; 的 npm 模块，或者包作用域下，格式为@&lt;scope&gt;/eslint-plugin-&lt;plugin-name&gt;。比如上面配置中我们添加了[\'vue\', \'@typescript-eslint\']这两个就是我们通过 npm 安装的 eslint-plugin-vue 和@typescript-eslint/eslint-plugin 这两个 ESLint 插件。 eslint-plugin-vue 会对 vue 项目做了一些定制的 eslint 规则，@typescript-eslint/eslint-plugin 会对 ts 项目做一些定制的 eslint 规则。 然后需要在 extends 中配置\'plugin:vue/vue3-essential\', \'plugin:@typescript-eslint/recommended\'来启用这些插件，这些插件默认和 ESLint 一样会默认实现了两种最佳实践 all 和 recommened，vue 中实现了 vue3-essential 的规则集，可以直接使用它配置好的规则集。 书写的规则是 plugin:包名 (省略了前缀，比如 vue)/配置名称 (比如 vue3-essential) 字符串数组 组合前面三种写法，后面的配置继承它前面的配置。</li><li>overrides ESLint 配置中的规则默认是对全局生效，如果想要针对特定文件覆盖一些规则，就可以使用 overrides 属性。 js复制代码// 关闭覆盖测试文件no-unused-expressions校验 "overrides": [ { "files": ["*-test.js","*.spec.js"], "rules": { "no-unused-expressions": "off" } } ]</li><li>parser & parserOptions ESLint 默认使用Espree作为其解析器，它是兼容 Esprima 的 JavaScript 解析器，同时兼容以下三种解析器： esprima：ESLint 早期的默认解析器； @babel/eslint-parser：babel 解析器，使得 ES6 及更高级的语法能够与 ESLint 兼容； @typescript-eslint/parser：TS 解析器，将 TypeScript 转换成与 espree 兼容的格式，使得 TS 语法能够使用 ESLint 校验，比如上面我们为 vue3+ts 项目配置 ESLint 的时候，默认的解析器就是@typescript-eslint/parser。 那么 parseOptions 解析器选项又是什么东西呢？ 如果仅从名字来看，可以知道 parseOptions 是对 parse 的补充扩展，官方的解释是：在使用自定义解析器时，为了让 ESLint 在处理非 ECMAScript 5 特性时正常工作，配置属性 parserOptions 仍然是必须的。我们可以看下它里面的几个特殊配置： ecmaVersion：代表 ECMAScript 版本，可以是数字 6，7.. 或 latest 代表最新的 ECMAScript 版本； sourceType：默认 script，如果是 ECMAScript 模块时设置为 module； ecmaFeatures：对象，表示额外的语言特性，包含globalReturn、jsx、impliedStrict、experimentalObjectRestSpread几个选项，一般情况下不需要配置。 除了以上三个配置，还有一个比较重要的配置parser，乍眼一看，咦！这不是上面的解析器 parser 一样吗？ 其实我一开始也不知道，然后在解决最开始的那个问题的时候，看了下eslint-plugin-vue 官方的解决，如果需要配置@typescript-eslint/parser 解析器时，需要将它移到parseOptions.parser上，这样就不会与 vue-eslint-parser 冲突。因为 ESLint 默认不会解析.vue 单文件组件，需要额外的解析器 vue-eslint-parser 来解析 .vue 单文件组件，如果使用@typescript-eslint/parser 覆盖 parser 时，eslint-plugin-vue 将不会生效，ESLint 也就不会校验.vue 单文件组件了。 两个 parser 的区别在于，parser配置vue-eslint-parser解析器用来处理 .vue，使得 eslint 能解析.vue 单文件组件，尤其是&lt;template&gt;标记，而 parserOptions.parser，即@typescript-eslint/parser 用来解析单文件组件中&lt;script&gt;标签中的代码。</li><li>rules ESLint 官方推荐继承eslint:recommended来开启推荐的规则，包含大量规则，而如果我们需要开启或关闭某些规则时，就需要通过 rules 配置。如果需要修改时，只需要将规则名:规则ID添加到 rules 配置中，规则 ID 可以配置为以下三种： off 或 0 - 关闭规则； warn 或 1 - 开启规则，当遇到此错误时不会报错，也不会导致程序退出； error 或 2 - 开启规则，当遇到此错误时报错，并且程序会退出。 比如默认规则如果在 ts 中使用@ts-ignore不校验 ts 代码时，代码是会报错的 这时候就可以配置\'@typescript-eslint/ban-ts-comment\': \'off\'关闭这个规则； 有些规则如"quotes": ["error", "double"]还可以有自己的属性进行配置。 并且需要注意的是，rules 中配置的规则的权重是最大的，会覆盖掉 extends 和 plugins 中引入的配置项获插件，即我们可以通过 rules 来自定义规则，而不是完全按照官方配置中的来。</li><li>globals 如果在项目中使用一个未定义的全局变量时，就会造成no-undef规则报错，解决它的方式就是将全局变量添加到globals配置中，这样再使用时就不会产生错误。</li></ul><h2>如何规避 ESLint 检查</h2><ul><li>配置.eslintignore 根目录下创建.eslintignore 文件用于对特定文件忽略 ESLint 校验，类似于.gitignore。 txt复制代码/test /dist /node_modules /public</li><li>单行代码注释 eslint-disable-line在当前行禁用 ESLint 校验，eslint-disable-next-line禁用下行代码的 ESLint 校验。 js复制代码console.log(a) // eslint-disable-line // console.log(a); // eslint-disable-line no-console, no-undef const count = ref(0) // eslint-disable-next-line a.b</li><li>多行代码注释 单独使用/* eslint-disable */（关闭从当前注释开启的所有行的 ESLint 校验）或搭配/* eslint-enable */（到此行注释前的所有行的 ESLint 校验），如下面代码所示：如果去掉/* eslint-enable */时a.b就不不会出现 ESLint 报错提示，在a.b上一行加上后，就只对/* eslint-disable */和/* eslint-enable */之间的代码有效，ESLint 就不再校验两个注释之间的代码问题。 js复制代码/* eslint-disable */ console.log(a) const count = ref(0) /* eslint-enable */ a.b 也可以设置/* eslint-disable no-undef */来禁用特定规则。<br></li></ul><p><br></p>',__v:0,updateByUser:7},{state:1,createTime:n,updateTime:n,_id:"65ab30bf43b1d10bbf69c73b",id:32,createByUser:7,name:"[vue3]动态获取路由",html:'<p style="text-align: start;">所以之前的写法就要相应的调整，之前是可以动态添加更多的路由规则，参数必须是一个符合 routes 选项要求的数组。</p><pre style="text-align: left; line-height: 1.5;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">router.addRoutes(routes: Array&lt;RouteConfig&gt;);</code></pre><p style="text-align: start;">现在是只能添加一个</p><pre style="text-align: left; line-height: 1.5;"><code class="language-javascript" style="text-align: left; line-height: 1.5;">router.addRoute("名称", {\n  path: `/index`,\n  name: \'首页\',\n  component: () =&gt; import(`@/index.vue`)\n});</code></pre><p style="text-align: start;">获取组件</p><p><br></p><pre><code class="language-javascript"> // 递归遍历生成路由表\n    gennerateRoutes(list) {\n        const modules = import.meta.glob(\'../views/**/*.vue\')\n        var result = []\n        list.forEach(item =&gt; {\n            const comPath = item.component\n            result.push({\n                path: item.path,\n                name: item.component,\n                component: modules[\'../views/\' + comPath + \'.vue\'],\n                meta: {\n                    name: item.menuName,\n                    code: item.code,\n                }\n            })\n\n            if (item.children) {\n                result = result.concat(this.gennerateRoutes(item.children))\n            }\n        })\n        return result\n    },</code></pre><p><br></p>',__v:0},{state:1,createTime:n,updateTime:n,_id:"65ab2e4243b1d10bbf69c728",id:31,createByUser:7,name:"[vue3]实现动态组件加载写法",html:"<pre><code class=\"language-javascript\">&lt;script lang=\"ts\" setup&gt;\nimport { defineAsyncComponent, ref } from 'vue'\n\n// 需要加载的组件集合\nconst components = ref(new Map&lt;string, any&gt;())\ncomponents.value.set(\n  'MyTag',\n  defineAsyncComponent(() =&gt; import('./MyTag.vue'))\n)\ncomponents.value.set(\n  'Item',\n  defineAsyncComponent(() =&gt; import('./Item.vue'))\n)\n// 默认加载的组件名\nconst compName = ref('MyTag')\n// 组件切换\nfunction onClick() {\n  if (compName.value === 'MyTag') {\n    compName.value = 'Item'\n  } else {\n    compName.value = 'MyTag'\n  }\n}\n&lt;/script&gt;\n\n&lt;template&gt;\n  &lt;div&gt;\n    &lt;el-button @click=\"onClick\"&gt;改变组件&lt;/el-button&gt;\n    &lt;component :is=\"components.get(compName)\"&gt;&lt;/component&gt;\n  &lt;/div&gt;\n&lt;/template&gt;\n\n&lt;style lang=\"scss\" scoped&gt;&lt;/style&gt;</code></pre><p><br></p>",__v:0},{state:1,createTime:n,updateTime:"2024-01-20T03:03:37.351Z",_id:"65ab2a1a43b1d10bbf69c711",id:30,createByUser:7,name:"[vue3 新特性]",html:'<h3 style="text-align: center;">vue3 新特性</h3><h1>Vue3 快速上手</h1><h2>1.Vue3 简介</h2><ul><li>2020 年 9 月 18 日，Vue.js 发布 3.0 版本，代号：One Piece（海贼王）</li><li>耗时 2 年多、<a href="https://github.com/vuejs/vue-next/graphs/commit-activity" target="_blank">2600 + 次提交</a>、<a href="https://github.com/vuejs/rfcs/tree/master/active-rfcs" target="_blank">30 + 个 RFC</a>、<a href="https://github.com/vuejs/vue-next/pulls?q=is%3Apr+is%3Amerged+-author%3Aapp%2Fdependabot-preview+" target="_blank">600 + 次 PR</a>、<a href="https://github.com/vuejs/vue-next/graphs/contributors" target="_blank">99 位贡献者</a></li><li>github 上的 tags 地址：https://github.com/vuejs/vue-next/releases/tag/v3.0.0</li></ul><h2>2.Vue3 带来了什么</h2><h3>1. 性能的提升</h3><ul><li>打包大小减少 41%</li><li>初次渲染快 55%, 更新渲染快 133%</li><li>内存减少 54%……</li></ul><h3>2. 源码的升级</h3><ul><li>使用 Proxy 代替 defineProperty 实现响应式</li><li>重写虚拟 DOM 的实现和 Tree-Shaking……</li></ul><h3>3. 拥抱 TypeScript</h3><ul><li>Vue3 可以更好的支持 TypeScript</li></ul><h3>4. 新的特性</h3><ol><li>Composition API（组合 API）setup 配置ref 与 reactivewatch 与 watchEffectprovide 与 inject……</li><li>新的内置组件FragmentTeleportSuspense</li><li>其他改变新的生命周期钩子data 选项应始终被声明为一个函数移除 keyCode 支持作为 v-on 的修饰符……</li></ol><h1>一、创建 Vue3.0 工程</h1><h2>1. 使用 vue-cli 创建</h2><p>官方文档：https://cli.vuejs.org/zh/guide/creating-a-project.html#vue-create</p><pre><code class="language-bash">## 查看@vue/cli版本，确保@vue/cli版本在4.5.0以上\nvue --version\n## 安装或者升级你的@vue/cli\nnpm install -g @vue/cli\n## 创建\nvue create vue_test\n## 启动\ncd vue_test\nnpm run serve\n</code></pre><h2>2. 使用 vite 创建</h2><p>官方文档：https://v3.cn.vuejs.org/guide/installation.html#vite</p><p>vite 官网：https://vitejs.cn</p><ul><li>什么是 vite？—— 新一代前端构建工具。</li><li>优势如下：</li><li>传统构建 与 vite 构建对比图</li></ul><p><br></p><pre><code class="language-bash">## 创建工程\nnpm init vite-app &lt;project-name&gt;\n## 进入工程目录\ncd &lt;project-name&gt;\n## 安装依赖\nnpm install\n## 运行\nnpm run dev\n</code></pre><h1>二、常用 Composition API</h1><p>官方文档: <a href="https://v3.cn.vuejs.org/guide/composition-api-introduction.html" target="_blank">https://v3.cn.vuejs.org/guide/composition-api-introduction.html</a></p><h2>1. 拉开序幕的 setup</h2><ol><li>理解：Vue3.0 中一个新的配置项，值为一个函数。</li><li>setup 是所有<span style="color: rgb(221, 81, 69);"><strong> Composition API（组合 API）</strong></span><span style="color: gray;"><em>“表演的舞台”</em></span>。</li><li>组件中所用到的：数据、方法等等，均要配置在 setup 中。</li><li>setup 函数的两种返回值：</li><li>注意点：</li></ol><h2>2.ref 函数</h2><ul><li>作用: 定义一个响应式的数据</li><li>语法: <span style="color: var(--code-text-color); background-color: var(--code-background-color);"><code>const xxx = ref(initValue)</code></span></li><li>备注：</li></ul><h2>3.reactive 函数</h2><ul><li>作用: 定义一个<span style="color: rgb(221, 81, 69);"><strong>对象类型</strong></span>的响应式数据（基本类型不要用它，要用<span style="color: var(--code-text-color); background-color: var(--code-background-color);"><code>ref</code></span>函数）</li><li>语法：<span style="color: var(--code-text-color); background-color: var(--code-background-color);"><code>const 代理对象= reactive(源对象)</code></span>接收一个对象（或数组），返回一个<span style="color: rgb(221, 81, 69);"><strong>代理对象（Proxy 的实例对象，简称 proxy 对象）</strong></span></li><li>reactive 定义的响应式数据是 “深层次的”。</li><li>内部基于 ES6 的 Proxy 实现，通过代理对象操作源对象内部数据进行操作。</li></ul><h2>4.Vue3.0 中的响应式原理</h2><h3>vue2.x 的响应式</h3><ul><li>实现原理：</li><li></li></ul><pre><code class="language-bash">Object.defineProperty(data, \'count\', {\n    get () {}, \n    set () {}\n})\n </code></pre><ul><li>存在问题：</li></ul><h3>Vue3.0 的响应式</h3><ul><li>实现原理:</li></ul><pre><code class="language-bash">new Proxy(data, {\n\t// 拦截读取属性值\n    get (target, prop) {\n    \treturn Reflect.get(target, prop)\n    },\n    // 拦截设置属性值或添加新属性\n    set (target, prop, value) {\n    \treturn Reflect.set(target, prop, value)\n    },\n    // 拦截删除属性\n    deleteProperty (target, prop) {\n    \treturn Reflect.deleteProperty(target, prop)\n    }\n})\n\nproxy.name = \'tom\' </code></pre><h2>5.reactive 对比 ref</h2><ul><li>从定义数据角度对比：</li><li>从原理角度对比：</li><li>从使用角度对比：</li></ul><h2>6.setup 的两个注意点</h2><ul><li>setup 执行的时机在 beforeCreate 之前执行一次，this 是 undefined。</li><li>setup 的参数props：值为对象，包含：组件外部传递过来，且组件内部声明接收了的属性。context：上下文对象attrs: 值为对象，包含：组件外部传递过来，但没有在 props 配置中声明的属性, 相当于 this.$attrs。slots: 收到的插槽内容, 相当于 this.$slots。emit: 分发自定义事件的函数, 相当于 this.$emit。</li></ul><h2>7. 计算属性与监视</h2><h3>1.computed 函数</h3><ul><li>与 Vue2.x 中 computed 配置功能一致</li><li>写法</li></ul><pre><code class="language-bash">import {computed} from \'vue\'\n\nsetup(){\n    ...\n\t//计算属性——简写\n    let fullName = computed(()=&gt;{\n        return person.firstName + \'-\' + person.lastName\n    })\n    //计算属性——完整\n    let fullName = computed({\n        get(){\n            return person.firstName + \'-\' + person.lastName\n        },\n        set(value){\n            const nameArr = value.split(\'-\')\n            person.firstName = nameArr[0]\n            person.lastName = nameArr[1]\n        }\n    })\n}</code></pre><h3>2.watch 函数</h3><ul><li>与 Vue2.x 中 watch 配置功能一致</li><li>两个小 “坑”：监视 reactive 定义的响应式数据时：oldValue 无法正确获取、强制开启了深度监视（deep 配置失效）。监视 reactive 定义的响应式数据中某个属性时：deep 配置有效。</li></ul><pre><code class="language-javascript">//情况一：监视ref定义的响应式数据\nwatch(sum,(newValue,oldValue)=&gt;{\n\tconsole.log(\'sum变化了\',newValue,oldValue)\n},{immediate:true})\n\n//情况二：监视多个ref定义的响应式数据\nwatch([sum,msg],(newValue,oldValue)=&gt;{\n\tconsole.log(\'sum或msg变化了\',newValue,oldValue)\n}) \n\n/* 情况三：监视reactive定义的响应式数据\n\t\t\t若watch监视的是reactive定义的响应式数据，则无法正确获得oldValue！！\n\t\t\t若watch监视的是reactive定义的响应式数据，则强制开启了深度监视 \n*/\nwatch(person,(newValue,oldValue)=&gt;{\n\tconsole.log(\'person变化了\',newValue,oldValue)\n},{immediate:true,deep:false}) //此处的deep配置不再奏效\n\n//情况四：监视reactive定义的响应式数据中的某个属性\nwatch(()=&gt;person.job,(newValue,oldValue)=&gt;{\n\tconsole.log(\'person的job变化了\',newValue,oldValue)\n},{immediate:true,deep:true}) \n\n//情况五：监视reactive定义的响应式数据中的某些属性\nwatch([()=&gt;person.job,()=&gt;person.name],(newValue,oldValue)=&gt;{\n\tconsole.log(\'person的job变化了\',newValue,oldValue)\n},{immediate:true,deep:true})\n\n//特殊情况\nwatch(()=&gt;person.job,(newValue,oldValue)=&gt;{\n    console.log(\'person的job变化了\',newValue,oldValue)\n},{deep:true}) //此处由于监视的是reactive素定义的对象中的某个属性，所以deep配置有效\n</code></pre><h3>3.watchEffect 函数</h3><ul><li>watch 的套路是：既要指明监视的属性，也要指明监视的回调。</li><li>watchEffect 的套路是：不用指明监视哪个属性，监视的回调中用到哪个属性，那就监视哪个属性。</li><li>watchEffect 有点像 computed：但 computed 注重的计算出来的值（回调函数的返回值），所以必须要写返回值。而 watchEffect 更注重的是过程（回调函数的函数体），所以不用写返回值。</li><li></li></ul><pre><code class="language-javascript">//watchEffect所指定的回调中用到的数据只要发生变化，则直接重新执行回调。\nwatchEffect(()=&gt;{\n    const x1 = sum.value\n    const x2 = person.age\n    console.log(\'watchEffect配置的回调执行了\')\n})\n</code></pre><h2>8. 生命周期</h2><ul><li>vue2.x 的生命周期</li></ul><p><img src="https://hanwujijack.github.io/blog/75.png" alt="https://hanwujijack.github.io/blog/75.png" data-href="https://hanwujijack.github.io/blog/75.png" style=""/></p><ul><li>vue3.0 的生命周期</li></ul><p><img src="https://hanwujijack.github.io/blog/76.png" alt="https://hanwujijack.github.io/blog/76.png" data-href="https://hanwujijack.github.io/blog/76.png" style=""/></p><ul><li>Vue3.0 中可以继续使用 Vue2.x 中的生命周期钩子，但有有两个被更名：</li><li>Vue3.0 也提供了 Composition API 形式的生命周期钩子，与 Vue2.x 中钩子对应关系如下：</li></ul><h2>9. 自定义 hook 函数</h2><ul><li>什么是 hook？—— 本质是一个函数，把 setup 函数中使用的 Composition API 进行了封装。</li><li>类似于 vue2.x 中的 mixin。</li><li>自定义 hook 的优势: 复用代码, 让 setup 中的逻辑更清楚易懂。</li></ul><h2>10.toRef</h2><ul><li>作用：创建一个 ref 对象，其 value 值指向另一个对象中的某个属性。</li><li>语法：const name = toRef(person,\'name\')</li><li>应用: 要将响应式对象中的某个属性单独提供给外部使用时。</li><li>扩展：toRefs 与toRef功能一致，但可以批量创建多个 ref 对象，语法：toRefs(person)</li></ul><h1>三、其它 Composition API</h1><h2>1.shallowReactive 与 shallowRef</h2><ul><li>shallowReactive：只处理对象最外层属性的响应式（浅响应式）。</li><li>shallowRef：只处理基本数据类型的响应式, 不进行对象的响应式处理。</li><li>什么时候使用?如果有一个对象数据，结构比较深, 但变化时只是外层属性变化 ===&gt; shallowReactive。如果有一个对象数据，后续功能不会修改该对象中的属性，而是生新的对象来替换 ===&gt; shallowRef。</li></ul><h2>2.readonly 与 shallowReadonly</h2><ul><li>readonly: 让一个响应式数据变为只读的（深只读）。</li><li>shallowReadonly：让一个响应式数据变为只读的（浅只读）。</li><li>应用场景: 不希望数据被修改时。</li></ul><h2>3.toRaw 与 markRaw</h2><ul><li>toRaw：</li><li>markRaw：</li></ul><h2>4.customRef</h2><ul><li>作用：创建一个自定义的 ref，并对其依赖项跟踪和更新触发进行显式控制。</li><li>实现防抖效果：</li><li></li></ul><pre><code class="language-javascript">&lt;template&gt;\n\t&lt;input type="text" v-model="keyword"&gt;\n\t&lt;h3&gt;{{keyword}}&lt;/h3&gt;\n&lt;/template&gt;\n\n&lt;script&gt;\n\timport {ref,customRef} from \'vue\'\n\texport default {\n\t\tname:\'Demo\',\n\t\tsetup(){\n\t\t\t// let keyword = ref(\'hello\') //使用Vue准备好的内置ref\n\t\t\t//自定义一个myRef\n\t\t\tfunction myRef(value,delay){\n\t\t\t\tlet timer\n\t\t\t\t//通过customRef去实现自定义\n\t\t\t\treturn customRef((track,trigger)=&gt;{\n\t\t\t\t\treturn{\n\t\t\t\t\t\tget(){\n\t\t\t\t\t\t\ttrack() //告诉Vue这个value值是需要被“追踪”的\n\t\t\t\t\t\t\treturn value\n\t\t\t\t\t\t},\n\t\t\t\t\t\tset(newValue){\n\t\t\t\t\t\t\tclearTimeout(timer)\n\t\t\t\t\t\t\ttimer = setTimeout(()=&gt;{\n\t\t\t\t\t\t\t\tvalue = newValue\n\t\t\t\t\t\t\t\ttrigger() //告诉Vue去更新界面\n\t\t\t\t\t\t\t},delay)\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t})\n\t\t\t}\n\t\t\tlet keyword = myRef(\'hello\',500) //使用程序员自定义的ref\n\t\t\treturn {\n\t\t\t\tkeyword\n\t\t\t}\n\t\t}\n\t}\n&lt;/script&gt;\n</code></pre><h2>5.provide 与 inject</h2><p><br></p><ul><li>作用：实现祖与后代组件间通信</li><li>套路：父组件有一个 provide 选项来提供数据，后代组件有一个 inject 选项来开始使用这些数据</li><li>具体写法：祖组件中：</li><li></li></ul><pre><code class="language-javascript">setup(){\n\t......\n    let car = reactive({name:\'奔驰\',price:\'40万\'})\n    provide(\'car\',car)\n    ......\n}\n</code></pre><ul><li>后代组件中：</li><li></li></ul><pre><code class="language-javascript">setup(props,context){\n\t......\n    const car = inject(\'car\')\n    return {car}\n\t......\n}\n</code></pre><h2>6. 响应式数据的判断</h2><ul><li>isRef: 检查一个值是否为一个 ref 对象</li><li>isReactive: 检查一个对象是否是由 <span style="color: var(--code-text-color); background-color: var(--code-background-color);"><code>reactive</code></span> 创建的响应式代理</li><li>isReadonly: 检查一个对象是否是由 <span style="color: var(--code-text-color); background-color: var(--code-background-color);"><code>readonly</code></span> 创建的只读代理</li><li>isProxy: 检查一个对象是否是由 <span style="color: var(--code-text-color); background-color: var(--code-background-color);"><code>reactive</code></span> 或者 <span style="color: var(--code-text-color); background-color: var(--code-background-color);"><code>readonly</code></span> 方法创建的代理</li></ul><h1>四、Composition API 的优势</h1><h2>1.Options API 存在的问题</h2><p>使用传统 OptionsAPI 中，新增或者修改一个需求，就需要分别在 data，methods，computed 里修改 。</p><p><img src="https://p3-juejin.byteimg.com/tos-cn-i-k3u1fbpfcp/f84e4e2c02424d9a99862ade0a2e4114~tplv-k3u1fbpfcp-watermark.image" alt="" data-href="" style="height: auto;"/></p><p><img src="https://p9-juejin.byteimg.com/tos-cn-i-k3u1fbpfcp/e5ac7e20d1784887a826f6360768a368~tplv-k3u1fbpfcp-watermark.image" alt="" data-href="" style="height: auto;"/></p><h2>2.Composition API 的优势</h2><p>我们可以更加优雅的组织我们的代码，函数。让相关功能的代码更加有序的组织在一起。</p><p><img src="https://p3-juejin.byteimg.com/tos-cn-i-k3u1fbpfcp/bc0be8211fc54b6c941c036791ba4efe~tplv-k3u1fbpfcp-watermark.image" alt="" data-href="" style="height: auto;"/></p><p><img src="https://p9-juejin.byteimg.com/tos-cn-i-k3u1fbpfcp/6cc55165c0e34069a75fe36f8712eb80~tplv-k3u1fbpfcp-watermark.image" alt="" data-href="" style="height: auto;"/></p><h1>五、新的组件</h1><h2>1.Fragment</h2><ul><li>在 Vue2 中: 组件必须有一个根标签</li><li>在 Vue3 中: 组件可以没有根标签, 内部会将多个标签包含在一个 Fragment 虚拟元素中</li><li>好处: 减少标签层级, 减小内存占用</li></ul><h2>2.Teleport</h2><ul><li>什么是 Teleport？—— <span style="color: var(--code-text-color); background-color: var(--code-background-color);"><code>Teleport</code></span> 是一种能够将我们的<span style="color: rgb(221, 81, 69);"><strong>组件 html 结构</strong></span>移动到指定位置的技术。</li><li></li></ul><pre><code class="language-html">&lt;teleport to="移动位置"&gt;\n\t&lt;div v-if="isShow" class="mask"&gt;\n\t\t&lt;div class="dialog"&gt;\n\t\t\t&lt;h3&gt;我是一个弹窗&lt;/h3&gt;\n\t\t\t&lt;button @click="isShow = false"&gt;关闭弹窗&lt;/button&gt;\n\t\t&lt;/div&gt;\n\t&lt;/div&gt;\n&lt;/teleport&gt;\n</code></pre><h2>3.Suspense</h2><ul><li>等待异步组件时渲染一些额外内容，让应用有更好的用户体验</li><li>使用步骤：异步引入组件</li><li></li></ul><pre><code class="language-javascript">import {defineAsyncComponent} from \'vue\'\nconst Child = defineAsyncComponent(()=&gt;import(\'./components/Child.vue\'))\n</code></pre><ul><li>使用<span style="color: var(--code-text-color); background-color: var(--code-background-color);"><code>Suspense</code></span>包裹组件，并配置好<span style="color: var(--code-text-color); background-color: var(--code-background-color);"><code>default</code></span> 与 <span style="color: var(--code-text-color); background-color: var(--code-background-color);"><code>fallback</code></span></li><li></li></ul><pre><code class="language-html">&lt;template&gt;\n\t&lt;div class="app"&gt;\n\t\t&lt;h3&gt;我是App组件&lt;/h3&gt;\n\t\t&lt;Suspense&gt;\n\t\t\t&lt;template v-slot:default&gt;\n\t\t\t\t&lt;Child/&gt;\n\t\t\t&lt;/template&gt;\n\t\t\t&lt;template v-slot:fallback&gt;\n\t\t\t\t&lt;h3&gt;加载中.....&lt;/h3&gt;\n\t\t\t&lt;/template&gt;\n\t\t&lt;/Suspense&gt;\n\t&lt;/div&gt;\n&lt;/template&gt;\n</code></pre><h1>六、其他</h1><h2>1. 全局 API 的转移</h2><ul><li>Vue 2.x 有许多全局 API 和配置。</li><li></li></ul><pre><code class="language-javascript">//注册全局组件\nVue.component(\'MyButton\', {\n  data: () =&gt; ({\n    count: 0\n  }),\n  template: \'&lt;button @click="count++"&gt;Clicked {{ count }} times.&lt;/button&gt;\'\n})\n\n//注册全局指令\nVue.directive(\'focus\', {\n  inserted: el =&gt; el.focus()\n}\n</code></pre><ul><li>Vue3.0 中对这些 API 做出了调整：</li><li>将全局的 API，即：Vue.xxx调整到应用实例（app）上</li></ul><table style="width: auto;"><tbody><tr><th colSpan="1" rowSpan="1" width="auto">2.x 全局 API（Vue）</th><th colSpan="1" rowSpan="1" width="auto">3.x 实例 API (app)</th></tr><tr><td colSpan="1" rowSpan="1" width="auto">Vue.config.xxxx</td><td colSpan="1" rowSpan="1" width="auto">app.config.xxxx</td></tr><tr><td colSpan="1" rowSpan="1" width="auto">Vue.config.productionTip</td><td colSpan="1" rowSpan="1" width="auto">移除</td></tr><tr><td colSpan="1" rowSpan="1" width="auto">Vue.component</td><td colSpan="1" rowSpan="1" width="auto">app.component</td></tr><tr><td colSpan="1" rowSpan="1" width="auto">Vue.directive</td><td colSpan="1" rowSpan="1" width="auto">app.directive</td></tr><tr><td colSpan="1" rowSpan="1" width="auto">Vue.mixin</td><td colSpan="1" rowSpan="1" width="auto">app.mixin</td></tr><tr><td colSpan="1" rowSpan="1" width="auto">Vue.use</td><td colSpan="1" rowSpan="1" width="auto">app.use</td></tr><tr><td colSpan="1" rowSpan="1" width="auto">Vue.prototype</td><td colSpan="1" rowSpan="1" width="auto">app.config.globalProperties</td></tr></tbody></table><h2>2. 其他改变</h2><ul><li>data 选项应始终被声明为一个函数。</li><li>过度类名的更改：Vue2.x 写法</li><li></li></ul><pre><code class="language-css">.v-enter,\n.v-leave-to {\n  opacity: 0;\n}\n.v-leave,\n.v-enter-to {\n  opacity: 1;\n}\n</code></pre><ul><li>Vue3.x 写法</li><li></li></ul><pre><code class="language-css">.v-enter-from,\n.v-leave-to {\n  opacity: 0;\n}\n\n.v-leave-from,\n.v-enter-to {\n  opacity: 1;\n}\n</code></pre><ul><li>移除 keyCode 作为 v-on 的修饰符，同时也不再支持config.keyCodes</li><li>移除v-on.native修饰符父组件中绑定事件</li><li></li></ul><pre><code class="language-html">&lt;my-component\n  v-on:close="handleComponentEvent"\n  v-on:click="handleNativeClickEvent"\n/&gt;\n</code></pre><ul><li>子组件中声明自定义事件</li><li></li></ul><pre><code class="language-javascript">&lt;script&gt;\n  export default {\n    emits: [\'close\']\n  }\n&lt;/script&gt;\n</code></pre><ul><li>移除过滤器（filter）过滤器虽然这看起来很方便，但它需要一个自定义语法，打破大括号内表达式是 “只是 JavaScript” 的假设，这不仅有学习成本，而且有实现成本！建议用方法调用或计算属性去替换过滤器。</li><li>……</li></ul><p><br></p>',__v:0,updateByUser:7},{state:1,createTime:s,updateTime:"2024-01-19T09:00:23.367Z",_id:"65aa39c5456d0e3b08e7dcbd",id:29,createByUser:7,name:"cookies，sessionStorage和localStorage的区别",html:'<h1 style="text-align: start;">cookies，sessionStorage和localStorage的区别</h1><h2 style="text-align: start;">基础概念： &nbsp; </h2><p style="text-align: start;"> <span style="color: rgb(254, 44, 36);"><strong>cookies</strong></span>：是一些数据, 存储于你电脑上的文本文件中。当 web 服务器向浏览器发送 web 页面时，在连接关闭后，服务端不会记录用户的信息。</p><p style="text-align: start;"><span style="color: rgb(37, 41, 51); background-color: rgb(255, 255, 255); font-size: 16px;">cookie是由服务器端写入的，而SessionStorage、 LocalStorage都是由前端写入的;</span></p><p style="text-align: start;">Cookie 的作用就是用于解决 "如何记录客户端的用户信息":</p><p style="text-align: start;"><br></p><ul><li style="text-align: start;">当用户访问 web 页面时，他的名字可以记录在 cookie 中。</li><li style="text-align: start;">在用户下一次访问该页面时，可以在 cookie 中读取用户访问记录。</li></ul><p style="text-align: start;"><span style="color: rgb(254, 44, 36);"><strong>localStorage</strong></span>：用于持久化的本地存储，除非主动删除数据，否则数据是永远不会过期的。可以将第一次请求的数据直接存储到本地，最大容量为 5M。<a href="https://so.csdn.net/so/search?q=localStorage&amp;spm=1001.2101.3001.7020" target="_blank">localStorage</a>属于永久性存储，如果存储内容多的话会消耗内存空间，导致页面卡顿。localStorage 只能以字符串的形式存储，其他类型的数据则会报错。</p><p style="text-align: start;"><em><strong> &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; 1. localStorage 的存储方法</strong></em></p><pre style="text-align: start;"><code class="language-javascript">//字符串 \nvar userName = \'John\'; \nlocalStorage.setItem(\'userName\', userName); \n//json 形式 \nvar userInfo = { "name": \'John\', "age": 25, "gener": \'male\' }; \nlocalStorage.setItem(\'userInfo\', JSON.stringify(userInfo)); </code></pre><p style="text-align: start;"> &nbsp; &nbsp; &nbsp; <strong> 2.localStorage 的获取 &nbsp;</strong></p><pre style="text-align: start;"><code class="language-javascript">localStorage.getItem(\'userName\'); 　\nlocalStorage.getItem(\'userInfo\');</code></pre><p style="text-align: start;"> &nbsp; &nbsp; &nbsp; &nbsp;3. localStorage 的删除</p><pre style="text-align: start;"><code class="language-javascript">//删除指定 localstorage 　\nlocalStorage.remove("userName")\n//清除所有 localstorage \nlocalStorage.clear();</code></pre><p style="text-align: start;"> <strong>sessionStorage</strong>：用于临时保存同一窗口（或标签页）的数据，在关闭窗口或标签页之后将会删除这些数据。换言之，sessionStorage 的生命周期只存在于页面打开时，当浏览器或当前页面关闭后，sessionStorage 将被删除。 </p><p style="text-align: start;">1. sessionStorage 的存储<br> &nbsp; &nbsp; &nbsp; &nbsp; sessionStorage 存储的数据类型依然是字符串，与 localStorage 用法相同。<br>2. sessionStorage 的获取<br> &nbsp; &nbsp; &nbsp; &nbsp; 同 localStorage 存储。<br>3. sessionStorage 的删除<br> &nbsp; &nbsp; &nbsp; &nbsp; 同 localStorage 删除。</p><h2 style="text-align: start;"> 区别：</h2><p style="text-align: start;"><strong>1、传输</strong></p><p style="text-align: start;">cookie数据始终在同源的http请求中携带（即使不需要），即cookie在浏览器和服务器间来回传递。而sessionStorage和localStorage不会自动把数据发给服务器，仅在本地保存。</p><p style="text-align: start;"><strong>2、大小</strong></p><p style="text-align: start;"> cookie数据还有路径（path）的概念，可以限制cookie只属于某个路径下。存储大小限制也不同，cookie数据不能超过4k，同时因为每次http请求都会携带cookie，所以cookie只适合保存很小的数据，如会话标识。</p><p style="text-align: start;"> sessionStorage和localStorage 虽然也有存储大小的限制，但比cookie大得多，可以达到5M或更大。数据有效期不同，</p><p style="text-align: start;"><strong>3、有效性</strong></p><p style="text-align: start;">sessionStorage：仅在当前浏览器窗口关闭前有效，自然也就不可能持久保持；localStorage：始终有效，窗口或浏览器关闭也一直保存，因此用作持久数据；cookie只在设置的cookie过期时间之前一直有效，即使窗口或浏览器关闭。</p><p style="text-align: start;"><strong>4、作用域</strong></p><p style="text-align: start;">作用域不同，sessionStorage不在不同的浏览器窗口中共享，即使是同一个页面；localStorage 在所有同源窗口中都是共享的；cookie也是在所有同源窗口中都是共享的。</p><p style="text-align: start;">Web Storage 支持事件通知机制，可以将数据更新的通知发送给监听者。Web Storage 的 api 接口使用更方便。</p><p style="text-align: start;"> sessionStorage用于本地存储一个会话（<a href="https://so.csdn.net/so/search?q=session&amp;spm=1001.2101.3001.7020" target="_blank">session</a>）中的数据，这些数据只有在同一个会话中的页面才能访问并且当会话结束后数据也随之销毁。</p><p style="text-align: start;">因此sessionStorage不是一种持久化的本地存储，仅仅是会话级别的存储。</p><p style="text-align: start;">localStorage：用于持久化的本地存储，除非主动删除数据，否则数据是永远不会过期的。</p><p><br></p>',__v:0,updateByUser:7},{state:1,createTime:s,updateTime:"2024-01-19T07:58:47.432Z",_id:"65aa286f456d0e3b08e7dc1e",id:28,createByUser:7,name:"[html转pdf]",html:'<h3 style="text-align: center;">html转pdf</h3><p>1、核心代码</p><pre><code class="language-javascript">// 导出页面为PDF格式\nimport html2canvas from \'html2canvas\'\nimport jsPDF from \'jspdf\'\nclass PdfLoader {\n    constructor(ele,\n        pdfFileName,\n        filtersClass = [],\n        pdf = {\n            top: 20,\n            bottom: 0,\n            left: 30,\n            right: 30\n        },\n        head = {\n            top: 20,\n            bottom: 10\n        },\n        foot = {\n            top: 20,\n            bottom: 20\n        }\n    ) {\n        this.pdf = pdf\n        this.domEachEndSum = 1 //加尾页页码\n        this.head = head\n        this.foot = foot\n        this.ele = ele;\n        this.ele.style.width = "595px"\n        this.pdfFileName = pdfFileName;\n        this.A4_WIDTH = 595;\n        this.A4_HEIGHT = 842;\n        this.pageHeight = 0\n        this.pageNum = 1\n        this.filtersClass = filtersClass\n        this.init = 0 //加首页页眉\n    };\n    async getPDF(resolve) {\n        let ele = this.ele;\n        let pdfFileName = this.pdfFileName\n        let eleW = ele.offsetWidth // 获得该容器的宽\n        let eleH = ele.scrollHeight // 获得该容器的高\n\n        // 添加水印\n        const shuiyinNumW = Math.ceil(eleW / 70)\n        const shuiyinNumH = Math.ceil(eleH / 70)\n\n        for (let i = 0; i &lt; shuiyinNumW; i++) {\n            for (let j = 0; j &lt; shuiyinNumH; j++) {\n                const shuiyin = document.createElement("div")\n                shuiyin.className = \'shuiyin-box\';\n                shuiyin.innerHTML = \'&lt;div class="shuiyin"&gt;hsueh&lt;/div&gt;\'\n                shuiyin.style.top = j * 70 + "px"\n                shuiyin.style.left = i * 70 + "px"\n                this.ele.appendChild(shuiyin)\n            }\n        }\n        // 添加水印\n        let eleOffsetTop = ele.offsetTop // 获得该容器到文档顶部的距离\n        let eleOffsetLeft = ele.offsetLeft // 获得该容器到文档最左的距离\n        let canvas = document.createElement("canvas")\n        let abs = 0\n        let win_in = document.documentElement.clientWidth || document.body.clientWidth // 获得当前可视窗口的宽度（不包含滚动条）\n        let win_out = window.innerWidth // 获得当前窗口的宽度（包含滚动条）\n        if (win_out &gt; win_in) {\n            abs = (win_out - win_in) / 2 // 获得滚动条宽度的一半\n        }\n        canvas.width = eleW * 2 // 将画布宽&&高放大两倍\n        canvas.height = eleH * 2\n        let context = canvas.getContext("2d")\n        context.scale(2, 2) // 增强图片清晰度\n        context.translate(-eleOffsetLeft - abs, -eleOffsetTop)\n        html2canvas(ele, {\n            useCORS: true // 允许canvas画布内可以跨域请求外部链接图片, 允许跨域请求。\n        }).then(async canvas =&gt; {\n            let contentWidth = canvas.width\n            let contentHeight = canvas.height\n            // 一页pdf显示html页面生成的canvas高度;\n            this.pageHeight = (contentWidth / this.A4_WIDTH) * this.A4_HEIGHT\n            // 这样写的目的在于保持宽高比例一致 this.pageHeight/canvas.width = a4纸高度/a4纸宽度// 宽度和canvas.width保持一致\n            // 未生成pdf的html页面高度\n            let leftHeight = contentHeight\n            // 页面偏移\n            let position = 0\n            // a4纸的尺寸[595,842],单位像素，html页面生成的canvas在pdf中图片的宽高\n            let imgWidth = this.A4_WIDTH - 10 // -10为了页面有右边距\n            let imgHeight = (this.A4_WIDTH / contentWidth) * contentHeight\n            let pageData = canvas.toDataURL("image/jpeg", 1.0)\n            let pdf = jsPDF("", "pt", "a4");\n            // 有两个高度需要区分，一个是html页面的实际高度，和生成pdf的页面高度(841.89)\n            // 当内容未超过pdf一页显示的范围，无需分页\n            if (leftHeight &lt; this.pageHeight) { // 在pdf.addImage(pageData, \'JPEG\', 左，上，宽度，高度)设置在pdf中显示；\n                pdf.addImage(pageData, "JPEG", 5, 0, imgWidth, imgHeight)\n                // pdf.addImage(pageData, \'JPEG\', 20, 40, imgWidth, imgHeight);\n            } else { // 分页\n                while (leftHeight &gt; 0) {\n                    pdf.addImage(pageData, "JPEG", 5, position, imgWidth, imgHeight)\n                    leftHeight -= this.pageHeight\n                    position -= this.A4_HEIGHT\n                    // 避免添加空白页\n                    if (leftHeight &gt; 0) {\n                        pdf.addPage()\n                    }\n                }\n            }\n            pdf.save(pdfFileName + ".pdf", {\n                returnPromise: true\n            }).then(() =&gt; { // 去除添加的空div 防止页面混乱\n                let empty = document.querySelectorAll(\'.pdf-empty\')\n                for (let i = 0; i &lt; empty.length; i++) {\n                    empty[i].remove();\n                }\n                let foot = document.querySelectorAll(\'.pdf-foot\')\n                for (let i = 0; i &lt; foot.length; i++) {\n                    foot[i].remove();\n                }\n                let head = document.querySelectorAll(\'.pdf-head\')\n                for (let i = 0; i &lt; head.length; i++) {\n                    head[i].remove();\n                }\n                let shuiyin = document.querySelectorAll(\'.shuiyin-box \')\n                for (let i = 0; i &lt; shuiyin.length; i++) {\n                    shuiyin[i].remove();\n                }\n                this.ele.style.height = \'\';\n                this.ele.style.padding = \'\';\n                this.ele.style.width = \'\'\n                resolve();\n            });\n        })\n\n    };\n    // 输出pdf\n    async outPutPdfFn(pdfFileName) {\n        return new Promise((resolve, reject) =&gt; { // 进行分割操作，当dom内容已超出a4的高度，则将该dom前插入一个空dom，把他挤下去，分割\n            let eleBounding = this.ele.getBoundingClientRect();\n            this.pageHeight = eleBounding.width / this.A4_WIDTH * this.A4_HEIGHT;\n            this.ele.style.height = \'initial\';\n            // padding: 20px 30px 40px 50px;     代表： 上  -   右  -  下  -   左\n            this.ele.style.padding = `${this.pdf.top}px ${this.pdf.right}px ${this.pdf.bottom}px ${this.pdf.left}px`;\n            pdfFileName ? this.pdfFileName = pdfFileName : null;\n            this.pageNum = 1; // pdf页数\n            this.domEach(this.ele)\n            this.domEachEnd(this.ele)\n            // 异步函数，导出成功后处理交互\n            this.getPDF(resolve, reject);\n        })\n    };\n    // 添加 页眉 页码\n    domEach(dom) {\n        let childNodes = dom.childNodes\n        childNodes.forEach((childDom, index) =&gt; {\n            if (!this.filtersClass.map(item =&gt; this.hasClass(childDom, item)).includes(true)) {\n                let divParent = childDom.parentNode; // 获取该div的父节点\n                if (this.init == 0) {\n                    if (this.head.top - this.pdf.top &lt; 0) {\n                        throw new Error("head顶部距离请大于pdf顶部距离")\n                    }\n                    // this.addHeaderDiv(childDom, divParent, 20)\n                    this.addHeaderDiv(childDom, divParent, this.head.top - this.pdf.top)\n                    this.init++\n                    this.domEach(dom)\n                    return\n                }\n                if (childDom.getBoundingClientRect) {\n                    let eleBounding = this.ele.getBoundingClientRect();\n                    const now = childDom.getBoundingClientRect();\n                    if (this.hasClass(childDom, "line") || !childDom.childNodes || childDom.childNodes.length === 0) {\n                        if (now.height + 40 + this.head.top + this.head.bottom + this.foot.top + this.foot.bottom + -this.pageHeight &gt; 0) {\n                            throw new Error("单行不允许超过A4纸高度！")\n                        }\n                    }\n                    // console.log("=&gt;now:", now)\n                    const PageButtom = now.bottom - eleBounding.top\n                    const PageTop = now.top - eleBounding.top\n                    if (PageButtom - this.pageNum * parseInt(this.pageHeight) + (this.foot.top + this.foot.bottom + 20 + 30) &gt;= 0) {\n                        // console.log("=&gt;", now, this.pageHeight, this.pageNum)\n                        const differTop = this.pageNum * parseInt(this.pageHeight) - PageTop // 计算获取当前节点到页底的距离\n                        const differButtom = this.pageNum * parseInt(this.pageHeight) - PageButtom // 计算获取当前节点到页底的距离\n                        if (differButtom &gt;= (this.foot.top + this.foot.bottom + 20)) {\n                            let divParent = childDom.parentNode; // 获取该div的父节点\n                            const newNode = this.addEmptyDiv(childDom.nextSibling, differButtom - (this.foot.top + this.foot.bottom + 20), divParent)\n                            const pageFooter = this.addFootDiv(newNode.nextSibling, divParent)\n                            this.addHeaderDiv(pageFooter.nextSibling, divParent)\n                            this.pageNum++\n                            this.domEach(dom)\n                            return\n                        } else {\n                            if (this.hasClass(childDom, "line") || !childDom.childNodes || childDom.childNodes.length === 0) {\n                                let divParent = childDom.parentNode; // 获取该div的父节点\n                                const newNode = this.addEmptyDiv(childDom, differTop - (this.foot.top + this.foot.bottom + 20), divParent)\n                                const pageFooter = this.addFootDiv(childDom, divParent)\n                                this.addHeaderDiv(childDom, divParent)\n                                this.pageNum++\n                                this.domEach(dom)\n                                return\n                            }\n                        }\n\n                    }\n                }\n                if (childDom.childNodes.length) {\n                    this.domEach(childDom)\n                }\n            }\n\n        })\n    }\n    // 添加尾页\n    domEachEnd() {\n        let divParent = this.ele // 获取该div的父节点\n        let childNodes = this.ele.childNodes\n        const childDom = childNodes[childNodes.length - this.domEachEndSum]\n        if (childDom.getBoundingClientRect) {\n            if (this.foot.bottom - this.pdf.bottom &lt; 0) {\n                throw new Error("foot底部距离请大于pdf底部距离")\n            }\n            const now = childDom.getBoundingClientRect();\n            let eleBounding = this.ele.getBoundingClientRect();\n            const PageButtom = now.bottom - eleBounding.top\n            const differButtom = this.pageNum * parseInt(this.pageHeight) - PageButtom // 计算获取当前节点到页底的距离\n            const newNode = this.addEmptyDiv(this.ele.nextSibling, differButtom - (this.foot.top + this.foot.bottom - this.pdf.bottom + 20), divParent)\n            this.addFootDiv(newNode.nextSibling, divParent, null, this.foot.bottom - this.pdf.bottom)\n        } else {\n            this.domEachEndSum++\n            this.domEachEnd()\n        }\n    }\n    addEmptyDiv(node, height, divParent) {\n        let newNode = document.createElement(\'div\');\n        newNode.className = \'pdf-empty\';\n        newNode.style.background = \'white\';\n        newNode.style.height = height + \'px\';\n        newNode.style.width = \'100%\';\n        divParent.insertBefore(newNode, node);\n        return newNode\n    }\n    addFootDiv(node, divParent, top, bottom) {\n        let paddingTop = top\n        if (paddingTop != 0 && !paddingTop) {\n            paddingTop = this.foot.top\n        }\n        let paddingBottom = bottom\n        if (paddingBottom != 0 && !paddingBottom) {\n            paddingBottom = this.foot.bottom\n        }\n        let pageFooter = document.createElement("div")\n        pageFooter.className = "pdf-foot"\n        pageFooter.innerHTML = "第" + this.pageNum + " 页"\n        pageFooter.style.paddingTop = paddingTop + "px"\n        pageFooter.style.fontSize = 12 + "px"\n        pageFooter.style.textAlign = "center"\n        pageFooter.style.lineHeight = 20 + "px"\n        pageFooter.style.paddingBottom = paddingBottom + "px"\n        divParent.insertBefore(pageFooter, node);\n        return pageFooter\n    }\n    addHeaderDiv(node, divParent, top, bottom) {\n        let paddingTop = top\n        if (paddingTop != 0 && !paddingTop) {\n            paddingTop = this.head.top\n        }\n        let paddingBottom = bottom\n        if (paddingBottom != 0 && !paddingBottom) {\n            paddingBottom = this.head.bottom\n        }\n        let pageHeader = document.createElement("div")\n        pageHeader.className = "pdf-head"\n        pageHeader.innerHTML = "hsueh" + ` - ${new Date().getFullYear()}年${new Date().getMonth() + 1}月`\n        pageHeader.style.paddingTop = paddingTop + "px"\n\n        pageHeader.style.lineHeight = 15 + "px"\n        pageHeader.style.borderBottom = "1px solid #ccc"\n        pageHeader.style.fontSize = 12 + "px"\n        pageHeader.style.paddingBottom = "4px"\n        pageHeader.style.marginBottom = paddingBottom + "px"\n        divParent.insertBefore(pageHeader, node);\n        return pageHeader\n    }\n    hasClass(element, cls) {\n        if ((`` + element.className + ``).indexOf(`` + cls + ``) &gt; -1) {\n            // console.log("element.className", element.className)\n            return true\n        } else {\n            return false\n        }\n\n    }\n}\n\nexport default function (htmlTitle, ref) {\n    let pdf = new PdfLoader(ref, htmlTitle, [\'shuiyinBox\']);\n    return pdf.outPutPdfFn(htmlTitle);\n}\n\n\n// class:line代表一行</code></pre><p><br></p><p>2、调用方法</p><pre><code class="language-javascript">async pdfDown_() {\n      this.loading("loading", 1);\n      await htmlToPdf(\'Hsueh\', this.$refs.box)\n      this.load.close();\n    }</code></pre><p>3、less样式</p><pre><code class="language-css">.shuiyin-box {\n  position: absolute;\n  top: 0;\n  left: 0;\n  z-index: 3;\n  // border: 1px solid green;\n  width: 70px;\n  height: 70px;\n  overflow: hidden;\n  opacity: 0.1;\n\n  .shuiyin {\n    margin-top: 15px;\n    transform: rotate(45deg);\n    // border: 1px solid red;\n    background-color: #eee;\n    width: 56px;\n    font-weight: 600;\n  }\n}\n\n.pdf {\n  .pdf-empty {\n    box-sizing: border-box;\n  }\n\n  .pdf-head {\n    box-sizing: border-box;\n  }\n\n  .pdf-foot {\n    box-sizing: border-box;\n  }\n}</code></pre><p>4、核心逻辑：A4纸张宽度为595，高度为842。通过遍历子元素的底部距离n（页码，从1开始）*842的距离，如果距离在30px以内则计算高度，添加空节点和页码。如果距离不满足放页码高度则考虑将div推入下一页！</p><p>5、注意：</p><p> &nbsp;filtersClass：数组添加不需要遍历的div的class</p><p> &nbsp;line:class添加line代表一行不进行子元素进行遍历</p><p><br></p>',__v:0,updateByUser:7},{state:1,createTime:o,updateTime:"2024-01-09T03:35:28.910Z",_id:"659cb562eda0730989cb7bdf",id:27,createByUser:7,name:"[vue]核心之虚拟DOM",html:'<h1 style="text-align: center;">深入剖析：Vue核心之虚拟DOM</h1><h2>前言</h2><p>使用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 做项目也有两年时间了，对 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>api</code></span>也用的比较得心应手了，虽然对 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 的一些实现原理也耳有所闻，例如 虚拟<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span>、<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>flow</code></span>、数据驱动、路由原理等等，但是自己并没有特意去探究这些原理的基础以及 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 源码是如何利用这些原理进行框架实现的，所以利用空闲时间，进行 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 框架相关技术原理和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 框架的具体实现的整理。如果你对 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 的实现原理很感兴趣，那么就可以开始这系列文章的阅读，将会为你打开 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 的底层世界大门，对它的实现细节一探究竟。 本文为 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual DOM</code></span>的技术原理和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 框架的具体实现。</p><p><strong>辛苦编写良久，还望手动点赞鼓励~</strong></p><p><strong>github地址为：github.com/fengshi123/…，上面汇总了作者所有的博客文章，如果喜欢或者有所启发，请帮忙给个 star ~，对作者也是一种鼓励。</strong></p><h2>一、真实<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span>和其解析流程</h2><p>​ 本节我们主要介绍真实 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 的解析过程，通过介绍其解析过程以及存在的问题，从而引出为什么需要虚拟<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span>。一图胜千言，如下图为 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>webkit</code></span> 渲染引擎工作流程图</p><p><img src="https://hanwujijack.github.io/blog/52.png" alt="https://hanwujijack.github.io/blog/52.png" data-href="https://hanwujijack.github.io/blog/52.png" style=""/></p><p>​ 所有的浏览器渲染引擎工作流程大致分为5步：创建 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 树 —&gt; 创建 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Style Rules</code></span> -&gt; 构建 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Render</code></span> 树 —&gt; 布局 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Layout</code></span> -—&gt; 绘制 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Painting</code></span>。</p><ul><li>第一步，构建 DOM 树：用 HTML 分析器，分析 HTML 元素，构建一棵 DOM 树；</li><li>第二步，生成样式表：用 CSS 分析器，分析 CSS 文件和元素上的 inline 样式，生成页面的样式表；</li><li>第三步，构建 Render 树：将 DOM 树和样式表关联起来，构建一棵 Render 树（Attachment）。每个 DOM 节点都有 attach 方法，接受样式信息，返回一个 render 对象（又名 renderer），这些 render 对象最终会被构建成一棵 Render 树；</li><li>第四步，确定节点坐标：根据 Render 树结构，为每个 Render 树上的节点确定一个在显示屏上出现的精确坐标；</li><li>第五步，绘制页面：根据 Render 树和节点显示坐标，然后调用每个节点的 paint 方法，将它们绘制出来。</li></ul><p><strong>注意点：</strong></p><p><code><strong>1、DOM 树的构建是文档加载完成开始的？</strong></code> 构建 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 树是一个渐进过程，为达到更好的用户体验，渲染引擎会尽快将内容显示在屏幕上，它不必等到整个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>HTML</code></span> 文档解析完成之后才开始构建 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>render</code></span> 树和布局。</p><p><code><strong>2、Render 树是 DOM 树和 CSS 样式表构建完毕后才开始构建的？</strong></code> 这三个过程在实际进行的时候并不是完全独立的，而是会有交叉，会一边加载，一边解析，以及一边渲染。</p><p><code><strong>3、CSS 的解析注意点？</strong></code> <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>CSS</code></span> 的解析是从右往左逆向解析的，嵌套标签越多，解析越慢。</p><p><code><strong>4、JS 操作真实 DOM 的代价？</strong></code> 用我们传统的开发模式，原生 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>JS</code></span> 或 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>JQ</code></span> 操作 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 时，浏览器会从构建 DOM 树开始从头到尾执行一遍流程。在一次操作中，我需要更新 10 个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 节点，浏览器收到第一个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 请求后并不知道还有 9 次更新操作，因此会马上执行流程，最终执行10 次。例如，第一次计算完，紧接着下一个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 更新请求，这个节点的坐标值就变了，前一次计算为无用功。计算 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 节点坐标值等都是白白浪费的性能。即使计算机硬件一直在迭代更新，操作 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 的代价仍旧是昂贵的，频繁操作还是会出现页面卡顿，影响用户体验</p><h2>二、<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual-DOM</code></span> 基础</h2><h3>2.1、虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 的好处</h3><p>​ 虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 就是为了解决浏览器性能问题而被设计出来的。如前，若一次操作中有 10 次更新 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 的动作，虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 不会立即操作 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span>，而是将这 10 次更新的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 内容保存到本地一个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>JS</code></span> 对象中，最终将这个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>JS</code></span> 对象一次性 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>attch</code></span> 到 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 树上，再进行后续操作，避免大量无谓的计算量。所以，用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>JS</code></span> 对象模拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 节点的好处是，页面的更新可以先全部反映在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>JS</code></span> 对象(虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> )上，操作内存中的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>JS</code></span> 对象的速度显然要更快，等更新完成后，再将最终的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>JS</code></span> 对象映射成真实的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span>，交由浏览器去绘制。</p><h3>2.2、算法实现</h3><h4>2.2.1、用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>JS</code></span> 对象模拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 树</h4><p><code><strong>（1）如何用 JS 对象模拟 DOM 树</strong></code></p><p>例如一个真实的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 节点如下：</p><pre><code class="language-html">&lt;div id="virtual-dom"&gt;\n&lt;p&gt;Virtual DOM&lt;/p&gt;\n&lt;ul id="list"&gt;\n  &lt;li class="item"&gt;Item 1&lt;/li&gt;\n  &lt;li class="item"&gt;Item 2&lt;/li&gt;\n  &lt;li class="item"&gt;Item 3&lt;/li&gt;\n&lt;/ul&gt;\n&lt;div&gt;Hello World&lt;/div&gt;\n&lt;/div&gt; \n</code></pre><p>我们用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>JavaScript</code></span> 对象来表示 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 节点，使用对象的属性记录节点的类型、属性、子节点等。</p><p><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>element.js</code></span> 中表示节点对象代码如下：</p><pre><code class="language-javascript">/**\n * Element virdual-dom 对象定义\n * @param {String} tagName - dom 元素名称\n * @param {Object} props - dom 属性\n * @param {Array&lt;Element|String&gt;} - 子节点\n */\nfunction Element(tagName, props, children) {\n    this.tagName = tagName\n    this.props = props\n    this.children = children\n    // dom 元素的 key 值，用作唯一标识符\n    if(props.key){\n       this.key = props.key\n    }\n    var count = 0\n    children.forEach(function (child, i) {\n        if (child instanceof Element) {\n            count += child.count\n        } else {\n            children[i] = \'\' + child\n        }\n        count++\n    })\n    // 子元素个数\n    this.count = count\n}\n\nfunction createElement(tagName, props, children){\n return new Element(tagName, props, children);\n}\n\nmodule.exports = createElement;\n</code></pre><p>根据 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>element</code></span> 对象的设定，则上面的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 结构就可以简单表示为：</p><pre><code class="language-javascript">var el = require("./element.js");\nvar ul = el(\'div\',{id:\'virtual-dom\'},[\n  el(\'p\',{},[\'Virtual DOM\']),\n  el(\'ul\', { id: \'list\' }, [\n\tel(\'li\', { class: \'item\' }, [\'Item 1\']),\n\tel(\'li\', { class: \'item\' }, [\'Item 2\']),\n\tel(\'li\', { class: \'item\' }, [\'Item 3\'])\n  ]),\n  el(\'div\',{},[\'Hello World\'])\n]) \n</code></pre><p>现在 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>ul</code></span> 就是我们用 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>JavaScript</code></span> 对象表示的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 结构，我们输出查看 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>ul</code></span> 对应的数据结构如下：</p><p><img src="https://hanwujijack.github.io/blog/53.png" alt="https://hanwujijack.github.io/blog/53.png" data-href="https://hanwujijack.github.io/blog/53.png" style=""/></p><p><code><strong>（2）渲染用 JS 表示的 DOM 对象</strong></code></p><p>但是页面上并没有这个结构，下一步我们介绍如何将 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>ul</code></span> 渲染成页面上真实的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 结构，相关渲染函数如下：</p><pre><code class="language-javascript">/**\n * render 将virdual-dom 对象渲染为实际 DOM 元素\n */\nElement.prototype.render = function () {\n    var el = document.createElement(this.tagName)\n    var props = this.props\n    // 设置节点的DOM属性\n    for (var propName in props) {\n        var propValue = props[propName]\n        el.setAttribute(propName, propValue)\n    }\n\n    var children = this.children || []\n    children.forEach(function (child) {\n        var childEl = (child instanceof Element)\n            ? child.render() // 如果子节点也是虚拟DOM，递归构建DOM节点\n            : document.createTextNode(child) // 如果字符串，只构建文本节点\n        el.appendChild(childEl)\n    })\n    return el\n} \n</code></pre><p>我们通过查看以上 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>render</code></span> 方法，会根据 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>tagName</code></span> 构建一个真正的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 节点，然后设置这个节点的属性，最后递归地把自己的子节点也构建起来。</p><p>我们将构建好的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 结构添加到页面 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>body</code></span> 上面，如下：</p><pre><code class="language-javascript">ulRoot = ul.render();\ndocument.body.appendChild(ulRoot); \n</code></pre><p>这样，页面 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>body</code></span> 里面就有真正的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 结构，效果如下图所示：</p><p><img src="https://hanwujijack.github.io/blog/54.png" alt="https://hanwujijack.github.io/blog/54.png" data-href="https://hanwujijack.github.io/blog/54.png" style=""/></p><h4>2.2.2、比较两棵虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 树的差异 — <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 算法</h4><p><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 算法用来比较两棵 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual DOM</code></span> 树的差异，如果需要两棵树的完全比较，那么 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>diff</code></span> 算法的时间复杂度为<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>O(n^3)</code></span>。但是在前端当中，你很少会跨越层级地移动 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 元素，所以 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual DOM</code></span> 只会对同一个层级的元素进行对比，如下图所示， <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>div</code></span> 只会和同一层级的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>div</code></span> 对比，第二层级的只会跟第二层级对比，这样算法复杂度就可以达到 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>O(n)</code></span>。</p><p><img src="https://hanwujijack.github.io/blog/58.png" alt="https://hanwujijack.github.io/blog/58.png" data-href="https://hanwujijack.github.io/blog/58.png" style=""/></p><p><br></p><p><br></p><p><strong>（1）深度优先遍历，记录差异</strong></p><p>在实际的代码中，会对新旧两棵树进行一个深度优先的遍历，这样每个节点都会有一个唯一的标记：</p><p><img src="https://hanwujijack.github.io/blog/59.png" alt="https://hanwujijack.github.io/blog/59.png" data-href="https://hanwujijack.github.io/blog/59.png" style=""/></p><p><br></p><p><br></p><p>在深度优先遍历的时候，每遍历到一个节点就把该节点和新的的树进行对比。如果有差异的话就记录到一个对象里面。</p><pre><code class="language-javascript">// diff 函数，对比两棵树\nfunction diff(oldTree, newTree) {\n  var index = 0 // 当前节点的标志\n  var patches = {} // 用来记录每个节点差异的对象\n  dfsWalk(oldTree, newTree, index, patches)\n  return patches\n}\n\n// 对两棵树进行深度优先遍历\nfunction dfsWalk(oldNode, newNode, index, patches) {\n  var currentPatch = []\n  if (typeof (oldNode) === "string" && typeof (newNode) === "string") {\n    // 文本内容改变\n    if (newNode !== oldNode) {\n      currentPatch.push({ type: patch.TEXT, content: newNode })\n    }\n  } else if (newNode!=null && oldNode.tagName === newNode.tagName && oldNode.key === newNode.key) {\n    // 节点相同，比较属性\n    var propsPatches = diffProps(oldNode, newNode)\n    if (propsPatches) {\n      currentPatch.push({ type: patch.PROPS, props: propsPatches })\n    }\n    // 比较子节点，如果子节点有\'ignore\'属性，则不需要比较\n    if (!isIgnoreChildren(newNode)) {\n      diffChildren(\n        oldNode.children,\n        newNode.children,\n        index,\n        patches,\n        currentPatch\n      )\n    }\n  } else if(newNode !== null){\n    // 新节点和旧节点不同，用 replace 替换\n    currentPatch.push({ type: patch.REPLACE, node: newNode })\n  }\n\n  if (currentPatch.length) {\n    patches[index] = currentPatch\n  }\n} \n</code></pre><p>从以上可以得出，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patches[1]</code></span> 表示 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>p</code></span> ，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patches[3]</code></span> 表示 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>ul</code></span> ，以此类推。</p><p><strong>（2）差异类型</strong></p><p><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 操作导致的差异类型包括以下几种：</p><ul><li>节点替换：节点改变了，例如将上面的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>div</code></span> 换成 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>h1</code></span>;</li><li>顺序互换：移动、删除、新增子节点，例如上面 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>div</code></span> 的子节点，把 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>p</code></span> 和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>ul</code></span> 顺序互换；</li><li>属性更改：修改了节点的属性，例如把上面 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>li</code></span> 的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>class</code></span> 样式类删除；</li><li>文本改变：改变文本节点的文本内容，例如将上面 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>p</code></span> 节点的文本内容更改为 “<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Real Dom</code></span>”；</li></ul><p>以上描述的几种差异类型在代码中定义如下所示：</p><pre><code class="language-javascript">var REPLACE = 0 // 替换原先的节点\nvar REORDER = 1 // 重新排序\nvar PROPS = 2 // 修改了节点的属性\nvar TEXT = 3 // 文本内容改变 \n</code></pre><p><strong>（3）列表对比算法</strong></p><p>​ 子节点的对比算法，例如 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>p, ul, div</code></span> 的顺序换成了 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>div, p, ul</code></span>。这个该怎么对比？如果按照同层级进行顺序对比的话，它们都会被替换掉。如 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>p</code></span> 和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>div</code></span> 的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>tagName</code></span> 不同，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>p</code></span> 会被 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>div</code></span> 所替代。最终，三个节点都会被替换，这样 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 开销就非常大。而实际上是不需要替换节点，而只需要经过节点移动就可以达到，我们只需知道怎么进行移动。</p><p>​ 将这个问题抽象出来其实就是字符串的最小编辑距离问题（<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Edition Distance</code></span>），最常见的解决方法是 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Levenshtein Distance</code></span> , <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Levenshtein Distance</code></span> 是一个度量两个字符序列之间差异的字符串度量标准，两个单词之间的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Levenshtein Distance</code></span> 是将一个单词转换为另一个单词所需的单字符编辑（插入、删除或替换）的最小数量。<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Levenshtein Distance</code></span> 是1965年由苏联数学家 Vladimir Levenshtein 发明的。<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Levenshtein Distance</code></span> 也被称为编辑距离（<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Edit Distance</code></span>），通过<strong>动态规划</strong>求解，时间复杂度为 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>O(M*N)</code></span>。</p><p>定义：对于两个字符串 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>a、b</code></span>，则他们的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Levenshtein Distance</code></span> 为：</p><p><img src="https://hanwujijack.github.io/blog/55.png" alt="https://hanwujijack.github.io/blog/55.png" data-href="https://hanwujijack.github.io/blog/55.png" style=""/></p><p><br></p><p><br></p><p>示例：字符串 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>a</code></span> 和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>b</code></span>，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>a=“abcde” ，b=“cabef”</code></span>，根据上面给出的计算公式，则他们的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Levenshtein Distance</code></span> 的计算过程如下：</p><p><img src="https://hanwujijack.github.io/blog/56.png" alt="https://hanwujijack.github.io/blog/56.png" data-href="https://hanwujijack.github.io/blog/56.png" style=""/></p><p><br></p><p><br></p><p>本文的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>demo</code></span> 使用插件 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>list-diff2</code></span> 算法进行比较，该算法的时间复杂度伟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>O(n*m)</code></span>，虽然该算法并非最优的算法，但是用于对于 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>dom</code></span> 元素的常规操作是足够的。该算法具体的实现过程这里不再详细介绍，该算法的具体介绍可以参照：<a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Flivoras%2Flist-diff" target="_blank">github.com/livoras/lis…</a></p><p><strong>（4）实例输出</strong></p><p>两个虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 对象如下图所示，其中 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>ul1</code></span> 表示原有的虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 树，<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>ul2</code></span> 表示改变后的虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 树</p><pre><code class="language-javascript">var ul1 = el(\'div\',{id:\'virtual-dom\'},[\n  el(\'p\',{},[\'Virtual DOM\']),\n  el(\'ul\', { id: \'list\' }, [\n\tel(\'li\', { class: \'item\' }, [\'Item 1\']),\n\tel(\'li\', { class: \'item\' }, [\'Item 2\']),\n\tel(\'li\', { class: \'item\' }, [\'Item 3\'])\n  ]),\n  el(\'div\',{},[\'Hello World\'])\n]) \nvar ul2 = el(\'div\',{id:\'virtual-dom\'},[\n  el(\'p\',{},[\'Virtual DOM\']),\n  el(\'ul\', { id: \'list\' }, [\n\tel(\'li\', { class: \'item\' }, [\'Item 21\']),\n\tel(\'li\', { class: \'item\' }, [\'Item 23\'])\n  ]),\n  el(\'p\',{},[\'Hello World\'])\n]) \nvar patches = diff(ul1,ul2);\nconsole.log(\'patches:\',patches);\n</code></pre><p>我们查看输出的两个虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 对象之间的差异对象如下图所示，我们能通过差异对象得到，两个虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 对象之间进行了哪些变化，从而根据这个差异对象（<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patches</code></span>）更改原先的真实 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 结构，从而将页面的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 结构进行更改。</p><p><img src="https://hanwujijack.github.io/blog/57.png" alt="https://hanwujijack.github.io/blog/57.png" data-href="https://hanwujijack.github.io/blog/57.png" style=""/></p><p><br></p><h4>2.2.3、将两个虚拟 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 对象的差异应用到真正的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 树</h4><p><code><strong>（1）深度优先遍历 DOM 树</strong></code></p><p>​ 因为步骤一所构建的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>JavaScript</code></span> 对象树和 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>render</code></span> 出来真正的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 树的信息、结构是一样的。所以我们可以对那棵 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 树也进行深度优先的遍历，遍历的时候从步骤二生成的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>patches</code></span> 对象中找出当前遍历的节点差异，如下相关代码所示：</p><pre><code class="language-javascript">function patch (node, patches) {\n  var walker = {index: 0}\n  dfsWalk(node, walker, patches)\n}\n\nfunction dfsWalk (node, walker, patches) {\n  // 从patches拿出当前节点的差异\n  var currentPatches = patches[walker.index]\n\n  var len = node.childNodes\n    ? node.childNodes.length\n    : 0\n  // 深度遍历子节点\n  for (var i = 0; i &lt; len; i++) {\n    var child = node.childNodes[i]\n    walker.index++\n    dfsWalk(child, walker, patches)\n  }\n  // 对当前节点进行DOM操作\n  if (currentPatches) {\n    applyPatches(node, currentPatches)\n  }\n} \n</code></pre><p><code><strong>（2）对原有 DOM 树进行 DOM 操作</strong></code></p><p>我们根据不同类型的差异对当前节点进行不同的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 操作 ，例如如果进行了节点替换，就进行节点替换 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 操作；如果节点文本发生了改变，则进行文本替换的 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 操作；以及子节点重排、属性改变等 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 操作，相关代码如 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>applyPatches</code></span> 所示 ：</p><pre><code class="language-hljs javascript code">function applyPatches (node, currentPatches) {\n  currentPatches.forEach(currentPatch =&gt; {\n    switch (currentPatch.type) {\n      case REPLACE:\n        var newNode = (typeof currentPatch.node === \'string\')\n          ? document.createTextNode(currentPatch.node)\n          : currentPatch.node.render()\n        node.parentNode.replaceChild(newNode, node)\n        break\n      case REORDER:\n        reorderChildren(node, currentPatch.moves)\n        break\n      case PROPS:\n        setProps(node, currentPatch.props)\n        break\n      case TEXT:\n        node.textContent = currentPatch.content\n        break\n      default:\n        throw new Error(\'Unknown patch type \' + currentPatch.type)\n    }\n  })\n} \n</code></pre><p><strong>（3）DOM结构改变</strong></p><p>通过将第 2.2.2 得到的两个 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 对象之间的差异，应用到第一个（原先）<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 结构中，我们可以看到 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>DOM</code></span> 结构进行了预期的变化，如下图所示：</p><p><img src="https://hanwujijack.github.io/blog/60.png" alt="https://hanwujijack.github.io/blog/60.png" data-href="https://hanwujijack.github.io/blog/60.png" style=""/></p><p><br></p><p><br></p><h3>2.3、结语</h3><p>相关代码实现已经放到 github 上面，有兴趣的同学可以clone运行实验，github地址为：<a href="https://link.juejin.cn/?target=https%3A%2F%2Fgithub.com%2Ffengshi123%2Fvirtual-dom-example%25E3%2580%2582" target="_blank">github.com/fengshi123/…</a></p><p><span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual DOM</code></span> 算法主要实现上面三个步骤来实现：</p><ul><li>用 JS 对象模拟 DOM 树 — element.js复制代码&lt;div id="virtual-dom"&gt; &lt;p&gt;Virtual DOM&lt;/p&gt; &lt;ul id="list"&gt; &lt;li class="item"&gt;Item 1&lt;/li&gt; &lt;li class="item"&gt;Item 2&lt;/li&gt; &lt;li class="item"&gt;Item 3&lt;/li&gt; &lt;/ul&gt; &lt;div&gt;Hello World&lt;/div&gt; &lt;/div&gt;</li><li>比较两棵虚拟 DOM 树的差异 — diff.js</li></ul><p><img src="https://hanwujijack.github.io/blog/61.png" alt="https://hanwujijack.github.io/blog/61.png" data-href="https://hanwujijack.github.io/blog/61.png" style=""/></p><ul><li>将两个虚拟 DOM 对象的差异应用到真正的 DOM 树 — patch.js复制代码function applyPatches (node, currentPatches) { currentPatches.forEach(currentPatch =&gt; { switch (currentPatch.type) { case REPLACE: var newNode = (typeof currentPatch.node === \'string\') ? document.createTextNode(currentPatch.node) : currentPatch.node.render() node.parentNode.replaceChild(newNode, node) break case REORDER: reorderChildren(node, currentPatch.moves) break case PROPS: setProps(node, currentPatch.props) break case TEXT: node.textContent = currentPatch.content break default: throw new Error(\'Unknown patch type \' + currentPatch.type) } }) }</li></ul><h2>三、<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Vue</code></span> 源码 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual-DOM</code></span> 简析</h2><p>我们从第二章节（<span style="color: rgb(255, 80, 44); background-color: rgb(255, 245, 245);"><code>Virtual-DOM</code></span> 基础）中已经掌握 <span style="color: rgb(255, 80, 44); background-color: rgb(255, 245
